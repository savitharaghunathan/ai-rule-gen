name: Eval Regression Check

on:
  pull_request:
    paths:
      - 'agents/eval/**'
      - 'internal/eval/**'
      - 'agents/rule-writer/**'
      - 'cmd/eval/**'

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.find.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4

      - id: find
        name: Find eval cases with baselines
        run: |
          cases=$(find evals -name det_baseline.json -exec dirname {} \; | \
            xargs -I{} basename {} | \
            jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "migrations=$cases" >> "$GITHUB_OUTPUT"

  eval:
    needs: discover
    if: ${{ needs.discover.outputs.migrations != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        migration: ${{ fromJson(needs.discover.outputs.migrations) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install kantra
        run: |
          curl -sL https://github.com/konveyor/kantra/releases/latest/download/kantra-linux-amd64 -o /usr/local/bin/kantra
          chmod +x /usr/local/bin/kantra

      - name: Read eval config
        id: config
        run: |
          config="evals/${{ matrix.migration }}/eval_config.yaml"
          app_repo=$(yq '.app_repo' "$config")
          app_commit=$(yq '.app_commit // ""' "$config")
          rules_dir=$(yq '.rules_dir // ""' "$config")
          echo "app_repo=$app_repo" >> "$GITHUB_OUTPUT"
          echo "app_commit=$app_commit" >> "$GITHUB_OUTPUT"
          echo "rules_dir=$rules_dir" >> "$GITHUB_OUTPUT"

      - name: Validate rules directory
        run: |
          rules_dir="${{ steps.config.outputs.rules_dir }}"
          if [ -z "$rules_dir" ] || [ ! -d "$rules_dir" ]; then
            echo "::error::rules_dir not set or missing in eval_config.yaml for ${{ matrix.migration }}"
            exit 1
          fi

      - name: Clone sample app
        run: |
          git clone ${{ steps.config.outputs.app_repo }} /tmp/sample-app
          if [ -n "${{ steps.config.outputs.app_commit }}" ]; then
            cd /tmp/sample-app && git checkout ${{ steps.config.outputs.app_commit }}
          else
            echo "::warning::app_commit not pinned — results may vary across runs"
          fi

      - name: Run eval with regression check
        id: eval
        run: |
          go run ./cmd/eval \
            --rules-dir "${{ steps.config.outputs.rules_dir }}" \
            --app-dir /tmp/sample-app \
            --compare "evals/${{ matrix.migration }}/det_baseline.json" \
            --migration "${{ matrix.migration }}" \
            2> /tmp/eval-stderr.txt || echo "EVAL_FAILED=true" >> "$GITHUB_ENV"

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let stderr = '';
            try {
              stderr = fs.readFileSync('/tmp/eval-stderr.txt', 'utf8');
            } catch(e) {
              stderr = 'No eval output captured.';
            }
            const failed = process.env.EVAL_FAILED === 'true';
            const icon = failed ? '❌' : '✅';
            const body = `### ${icon} Eval: ${{ matrix.migration }}\n\n\`\`\`\n${stderr}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail on regression
        if: env.EVAL_FAILED == 'true'
        run: exit 1
