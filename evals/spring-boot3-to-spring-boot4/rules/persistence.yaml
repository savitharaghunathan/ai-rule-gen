- ruleID: spring-boot3-to-spring-boot4-00560
  description: '@EntityScan moved to org.springframework.boot.persistence.autoconfigure package'
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: A new `spring-boot-persistence` module has been created. Users of `@EntityScan` should adapt their imports from `org.springframework.boot.autoconfigure.domain.EntityScan` to `org.springframework.boot.persistence.autoconfigure.EntityScan`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#persistence-modules
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.domain.EntityScan
        location: ANNOTATION
- ruleID: spring-boot3-to-spring-boot4-00570
  description: spring.dao.exceptiontranslation.enabled replaced by spring.persistence.exceptiontranslation.enabled
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring.dao.exceptiontranslation.enabled` property is no longer supported. Use `spring.persistence.exceptiontranslation.enabled` instead.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#persistence-modules
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.dao\.exceptiontranslation\.enabled
        filePattern: application.*\.(properties|yml)
- ruleID: spring-boot3-to-spring-boot4-00740
  description: hibernate-jpamodelgen replaced by hibernate-processor
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The dependency management for Hibernate has been harmonized to take relocations into account. Replace `hibernate-jpamodelgen` with `hibernate-processor`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#hibernate-dependency-management
      title: Migration Documentation
  when:
    java.dependency:
        name: org.hibernate.orm.hibernate-jpamodelgen
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00750
  description: hibernate-proxool is no longer published
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `hibernate-proxool` module is no longer published. Remove this dependency and migrate to an alternative connection pooling solution.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#hibernate-dependency-management
      title: Migration Documentation
  when:
    java.dependency:
        name: org.hibernate.hibernate-proxool
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00760
  description: hibernate-vibur is no longer published
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `hibernate-vibur` module is no longer published. Remove this dependency and migrate to an alternative connection pooling solution.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#hibernate-dependency-management
      title: Migration Documentation
  when:
    java.dependency:
        name: org.hibernate.hibernate-vibur
        lowerbound: 0.0.0
