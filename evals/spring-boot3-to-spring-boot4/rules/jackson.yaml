- ruleID: spring-boot3-to-spring-boot4-00340
  description: Jackson 3 uses tools.jackson package namespace; com.fasterxml.jackson is replaced
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 4 uses Jackson 3, which moves from the `com.fasterxml.jackson` package namespace to `tools.jackson`. Update all imports from `com.fasterxml.jackson.*` to the equivalent `tools.jackson.*` classes. Note that `jackson-annotations` is an exception and continues to use the `com.fasterxml.jackson.core` group ID and `com.fasterxml.jackson.annotation` package — no migration is needed for annotation imports.

    Refer to the [Jackson 3 wiki](https://github.com/FasterXML/jackson/wiki/Jackson-Release-3.0) for details on the changes.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    or:
      - java.referenced:
            pattern: com.fasterxml.jackson.core
            location: PACKAGE
      - java.referenced:
            pattern: com.fasterxml.jackson.databind
            location: PACKAGE
- ruleID: spring-boot3-to-spring-boot4-00350
  description: JsonObjectSerializer renamed to ObjectValueSerializer in Spring Boot 4
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `JsonObjectSerializer` class has been renamed to `ObjectValueSerializer` for consistency with Jackson 3. Replace all references to `JsonObjectSerializer` with `ObjectValueSerializer`.

    ## Before
    ```java
    import org.springframework.boot.jackson.JsonObjectSerializer;
    ```

    ## After
    ```java
    import org.springframework.boot.jackson.ObjectValueSerializer;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.jackson.JsonObjectSerializer
        location: IMPORT
