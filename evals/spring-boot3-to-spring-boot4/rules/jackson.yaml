- ruleID: spring-boot3-to-spring-boot4-00370
  description: Jackson2ObjectMapperBuilderCustomizer renamed to JsonMapperBuilderCustomizer
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `Jackson2ObjectMapperBuilderCustomizer` interface has been renamed to `JsonMapperBuilderCustomizer` in Spring Boot 4 as part of the Jackson 3 migration. Replace all references.

    ## Before
    ```java
    import org.springframework.boot.autoconfigure.jackson.Jackson2ObjectMapperBuilderCustomizer;
    ```

    ## After
    ```java
    import org.springframework.boot.jackson.autoconfigure.JsonMapperBuilderCustomizer;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.jackson.Jackson2ObjectMapperBuilderCustomizer
        location: IMPORT
- ruleID: spring-boot3-to-spring-boot4-00380
  description: '@JsonComponent renamed to @JacksonComponent in Spring Boot 4'
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `@JsonComponent` annotation has been renamed to `@JacksonComponent` to clarify that it is specific to Jackson and not limited to JSON. Replace all `@JsonComponent` annotations with `@JacksonComponent`.

    ## Before
    ```java
    @JsonComponent
    public class MySerializer extends JsonObjectSerializer<MyObject> { }
    ```

    ## After
    ```java
    @JacksonComponent
    public class MySerializer extends ObjectValueSerializer<MyObject> { }
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.jackson.JsonComponent
        location: ANNOTATION
- ruleID: spring-boot3-to-spring-boot4-00390
  description: '@JsonMixin renamed to @JacksonMixin in Spring Boot 4'
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `@JsonMixin` annotation has been renamed to `@JacksonMixin` to clarify that it is specific to Jackson and not limited to JSON. Replace all `@JsonMixin` annotations with `@JacksonMixin`.

    ## Before
    ```java
    @JsonMixin(MyTargetType.class)
    public abstract class MyMixin { }
    ```

    ## After
    ```java
    @JacksonMixin(MyTargetType.class)
    public abstract class MyMixin { }
    ```
  links:
