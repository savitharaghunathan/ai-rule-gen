- ruleID: spring-boot3-to-spring-boot4-00420
  description: spring.jackson.parser.* properties replaced by spring.jackson.json.read
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring.jackson.parser.*` properties (based on Jackson 2 `JsonParser.Feature`) have been replaced. Where a Jackson 2 `JsonParser.Feature` has an equivalent Jackson 3 `JsonReadFeature`, the property moves to `spring.jackson.json.read.*`. For features without a `JsonReadFeature` equivalent, use a `JsonMapperBuilderCustomizer` to apply the configuration programmatically.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.jackson\.parser\.
        filePattern: application.*\.(properties|yml)
- ruleID: spring-boot3-to-spring-boot4-00430
  description: Jackson now auto-discovers all classpath modules; set find-and-add-modules=false to disable
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    As of Spring Boot 4, Jackson will detect all modules present on the classpath and register them with mapper instances. In Spring Boot 3, only "well-known" modules were registered automatically. If you relied on the old behavior of selective module registration, you can disable the new auto-discovery by setting `spring.jackson.find-and-add-modules=false`.

    Note: this rule fires if you already have this property set. The behavioral change affects all Jackson users even without this property present.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.jackson\.find-and-add-modules
        filePattern: application.*\.(properties|yml)
