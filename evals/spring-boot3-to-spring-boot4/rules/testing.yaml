- ruleID: spring-boot3-to-spring-boot4-00860
  description: '@MockBean removed; use @MockitoBean from Spring Framework instead'
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot's `@MockBean` has been removed in favor of `@MockitoBean` from Spring Framework. Replace `@MockBean` with `@MockitoBean` on test class fields. Note: `@MockitoBean` cannot be used in `@Configuration` classes. If you had shared mocks in a `@Configuration` class, declare them on the test class using `@MockitoBean(types = {ServiceA.class, ServiceB.class})` or create a custom composed annotation.

    ```java
    // Before
    @MockBean
    private GreetingService greetingService;

    // After
    @MockitoBean
    private GreetingService greetingService;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mockbean-and-spybean-removal
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.mock.mockito.MockBean
        location: ANNOTATION
