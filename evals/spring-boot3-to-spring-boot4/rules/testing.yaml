- ruleID: spring-boot3-to-spring-boot4-00920
  description: MockMvc no longer auto-configured by @SpringBootTest; add @AutoConfigureMockMvc
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In Spring Boot 4, `@SpringBootTest` no longer provides MockMVC support automatically. If your test uses `MockMvc` with `@SpringBootTest`, add `@AutoConfigureMockMvc` to the test class. Note: this does not apply to tests using `@WebMvcTest`, which already configures MockMvc. For example:

    ```java
    @SpringBootTest
    @AutoConfigureMockMvc
    class MyTests {
        @Autowired
        MockMvc mockMvc;
    }
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#using-mockmvc-and-springboottest
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.test.web.servlet.MockMvc
        location: IMPORT
- ruleID: spring-boot3-to-spring-boot4-00940
  description: WebTestClientBuilderCustomizer removed; use RestTestClient with @AutoConfigureRestTestClient
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `WebTestClientBuilderCustomizer` has been removed in Spring Boot 4. If you use `WebTestClient` with `@SpringBootTest`, consider migrating to `RestTestClient` with `@AutoConfigureRestTestClient` for a simpler API. If you still need `WebTestClient`, configure it manually without the customizer.

    ## Before
    ```java
    @Component
    public class MyCustomizer implements WebTestClientBuilderCustomizer {
        @Override
        public void customize(WebTestClient.Builder builder) { ... }
    }
    ```

    ## After
    ```java
    @SpringBootTest
    @AutoConfigureRestTestClient
    class MyTests {
        @Autowired
        RestTestClient restTestClient;
    }
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#using-webclient-or-testresttemplate-and-springboottest
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.web.reactive.server.WebTestClientBuilderCustomizer
        location: IMPORT
