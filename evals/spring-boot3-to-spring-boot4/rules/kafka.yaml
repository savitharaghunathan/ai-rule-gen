- ruleID: spring-boot3-to-spring-boot4-00770
  description: StreamBuilderFactoryBeanCustomizer removed; use StreamsBuilderFactoryBeanConfigurer
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot's `StreamBuilderFactoryBeanCustomizer` has been removed in favor of Spring Kafka's `StreamsBuilderFactoryBeanConfigurer`. When migrating to the new configurer, be aware that it implements `Ordered` with a default value of `0`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#kafka-streams-customization
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.kafka.StreamBuilderFactoryBeanCustomizer
        location: IMPORT
- ruleID: spring-boot3-to-spring-boot4-00780
  description: spring.kafka.retry.topic.backoff.random removed; use spring.kafka.retry.topic.backoff.jitter
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Kafka has moved its retry capabilities from Spring Retry to Spring Framework. The `spring.kafka.retry.topic.backoff.random` property has been removed in favor of `spring.kafka.retry.topic.backoff.jitter`, which provides more flexibility.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-kafka-retry-features
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.kafka\.retry\.topic\.backoff\.random
        filePattern: application.*\.(properties|yml)
