- ruleID: spring-boot3-to-spring-boot4-00220
  description: EnvironmentPostProcessor moved from org.springframework.boot.env to org.springframework.boot
  category: potential
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `EnvironmentPostProcessor` interface has moved from `org.springframework.boot.env` to `org.springframework.boot` in Spring Boot 4.0. The deprecated form is still available but will be removed in a future release. Update your imports and `spring.factories` entries.

    ## Before
    ```java
    import org.springframework.boot.env.EnvironmentPostProcessor;
    ```

    ## After
    ```java
    import org.springframework.boot.EnvironmentPostProcessor;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#bootstrapregistry-and-environmentpostprocessor-package-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.env.EnvironmentPostProcessor
        location: IMPORT
- ruleID: spring-boot3-to-spring-boot4-00230
  description: spring.factories entries reference relocated Bootstrap/EnvironmentPostProcessor classes
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot 4.0 relocated `BootstrapRegistry`, `BootstrapContext`, and `BootstrapRegistryInitializer` to `org.springframework.boot.bootstrap`, and `EnvironmentPostProcessor` to `org.springframework.boot`. Update any `spring.factories` entries that reference the old package paths.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#bootstrapregistry-and-environmentpostprocessor-package-changes
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: org\.springframework\.boot\.(BootstrapRegistry|BootstrapContext|BootstrapRegistryInitializer|env\.EnvironmentPostProcessor)
        filePattern: .*spring\.factories
