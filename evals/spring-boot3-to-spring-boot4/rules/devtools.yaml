- ruleID: spring-boot3-to-spring-boot4-00260
  description: DevTools Live Reload now disabled by default
  category: potential
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: DevTools Live Reload support is now disabled by default in Spring Boot 4.0. This rule fires on any project using `spring-boot-devtools`. If you rely on the live reload feature, set `spring.devtools.livereload.enabled=true` in your application configuration. If you do not use live reload, no action is needed.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#devtools-live-reload-support
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-devtools
        upperbound: 4.0.0
