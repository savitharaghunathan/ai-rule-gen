- ruleID: spring-boot3-to-spring-boot4-00160
  description: Renamed to spring-boot-starter-webmvc
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `spring-boot-starter-web` starter has been renamed to `spring-boot-starter-webmvc` for better alignment with its corresponding module. The old starter is deprecated and will be removed in a future release.

    Update your `pom.xml`:
    ```xml
    <!-- Replace -->
    <artifactId>spring-boot-starter-web</artifactId>
    <!-- With -->
    <artifactId>spring-boot-starter-webmvc</artifactId>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#deprecated-starters
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-web
        lowerbound: 0.0.0
