- ruleID: spring-boot3-to-spring-boot4-00240
  description: alwaysApplyingWhenNonNull() removed from PropertyMapper; use always() instead
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `alwaysApplyingWhenNonNull()` method has been removed from `PropertyMapper` in Spring Boot 4.0. The `PropertyMapper` class no longer calls adapter or predicate methods by default when the source value is `null`, making this method unnecessary. If you need to perform a mapping even for `null` values, use the new `always()` method instead.

    ## Before
    ```java
    map.from(source::method).alwaysApplyingWhenNonNull().to(destination::method);
    ```

    ## After
    ```java
    map.from(source::method).always().to(destination::method);
    ```

    Review [commit 239f384ac0](https://github.com/spring-projects/spring-boot/commit/239f384ac0893d151b89f204886874c6adb00001) for examples of how Spring Boot adapted to the new API.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#property-mapper-api-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.context.properties.PropertyMapper.alwaysApplyingWhenNonNull
        location: METHOD_CALL
- ruleID: spring-boot3-to-spring-boot4-00250
  description: PropertyMapper no longer calls adapter/predicate for null values by default
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `PropertyMapper` class in Spring Boot 4.0 no longer calls adapter or predicate methods by default when the source value is `null`. Previously, mappings would always invoke the destination method regardless of the source value. Now, `map.from(source::method).to(destination::method)` will NOT call `destination.method(...)` if `source.method()` returns `null`. If you need null-value mappings, use the new `always()` method. Review your `PropertyMapper` usage to ensure null handling is correct.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#property-mapper-api-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.context.properties.PropertyMapper
        location: IMPORT
