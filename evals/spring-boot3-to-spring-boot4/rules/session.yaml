- ruleID: spring-boot3-to-spring-boot4-00060
  description: Spring Session Hazelcast support removed from Spring Boot 4
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Direct support for Spring Session Hazelcast has been removed from Spring Boot. The project is now under the leadership of the Hazelcast team. If you continue to use Spring Session Hazelcast, you will need to manage the dependency and its version independently from Spring Boot's dependency management.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-session-hazelcast
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.session.spring-session-hazelcast
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00070
  description: Spring Session MongoDB support removed from Spring Boot 4
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Direct support for Spring Session MongoDB has been removed from Spring Boot. The project is now under the leadership of the MongoDB team. If you continue to use Spring Session MongoDB, you will need to manage the dependency and its version independently from Spring Boot's dependency management.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-session-mongodb
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.session.spring-session-data-mongodb
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00470
  description: spring.session.redis properties renamed to spring.session.data.redis
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Session Data Redis properties have been renamed. Properties that previously began with `spring.session.redis` now begin with `spring.session.data.redis`. Update your application configuration accordingly.

    ## Before
    ```properties
    spring.session.redis.flush-mode=on-save
    spring.session.redis.namespace=myapp
    ```

    ## After
    ```properties
    spring.session.data.redis.flush-mode=on-save
    spring.session.data.redis.namespace=myapp
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-session
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.session\.redis\.
        filePattern: application.*\.(properties|yml)
- ruleID: spring-boot3-to-spring-boot4-00480
  description: spring.session.mongodb properties renamed to spring.session.data.mongodb
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Session Data MongoDB properties have been renamed. Properties that previously began with `spring.session.mongodb` now begin with `spring.session.data.mongodb`. Update your application configuration accordingly.

    ## Before
    ```properties
    spring.session.mongodb.collection-name=sessions
    ```

    ## After
    ```properties
    spring.session.data.mongodb.collection-name=sessions
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-session
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.session\.mongodb\.
        filePattern: application.*\.(properties|yml)
