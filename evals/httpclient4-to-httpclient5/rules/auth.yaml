- ruleID: httpclient4-to-httpclient5-00420
  description: org.apache.http.auth package moved to org.apache.hc.client5.http.auth in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |
    The `org.apache.http.auth` package has moved to `org.apache.hc.client5.http.auth` in HttpClient 5.x.

    | Old class | New class |
    |---|---|
    | `org.apache.http.auth.AuthScope` | `org.apache.hc.client5.http.auth.AuthScope` |
    | `org.apache.http.auth.UsernamePasswordCredentials` | `org.apache.hc.client5.http.auth.UsernamePasswordCredentials` |

    Note: `UsernamePasswordCredentials` now takes `char[]` instead of `String` for the password parameter.

    ```java
    // Before (HttpClient 4.x)
    new UsernamePasswordCredentials("user", "pass");

    // After (HttpClient 5.x)
    new UsernamePasswordCredentials("user", "pass".toCharArray());
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    or:
      - java.referenced:
            pattern: org.apache.http.auth.AuthScope
            location: IMPORT
      - java.referenced:
            pattern: org.apache.http.auth.UsernamePasswordCredentials
            location: IMPORT
