- ruleID: httpclient4-to-httpclient5-00010
  description: org.apache.http package renamed to org.apache.hc in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |
    Apache HttpClient 5.x uses new package namespaces. Classes under `org.apache.http` have moved to `org.apache.hc.core5` (core types) and `org.apache.hc.client5` (client types). Update all imports from `org.apache.http.*` to the corresponding `org.apache.hc.*` packages.

    This rule fires on any reference to the old `org.apache.http` package. Check other rules in this ruleset for class-specific migration guidance. For classes not covered by a specific rule, consult the migration guide linked below.

    ### Common replacements

    | Old package/class | New package/class |
    |---|---|
    | `org.apache.http.client.methods.HttpGet` | `org.apache.hc.client5.http.classic.methods.HttpGet` |
    | `org.apache.http.client.methods.HttpPost` | `org.apache.hc.client5.http.classic.methods.HttpPost` |
    | `org.apache.http.client.methods.HttpPut` | `org.apache.hc.client5.http.classic.methods.HttpPut` |
    | `org.apache.http.client.methods.HttpDelete` | `org.apache.hc.client5.http.classic.methods.HttpDelete` |
    | `org.apache.http.impl.client.HttpClients` | `org.apache.hc.client5.http.impl.classic.HttpClients` |
    | `org.apache.http.impl.client.CloseableHttpClient` | `org.apache.hc.client5.http.impl.classic.CloseableHttpClient` |
    | `org.apache.http.client.methods.CloseableHttpResponse` | `org.apache.hc.client5.http.impl.classic.CloseableHttpResponse` |
    | `org.apache.http.client.ClientProtocolException` | `org.apache.hc.client5.http.ClientProtocolException` |
    | `org.apache.http.impl.client.BasicCredentialsProvider` | `org.apache.hc.client5.http.impl.auth.BasicCredentialsProvider` |
    | `org.apache.http.impl.client.BasicCookieStore` | `org.apache.hc.client5.http.impl.cookie.BasicCookieStore` |
    | `org.apache.http.HttpEntity` | `org.apache.hc.core5.http.HttpEntity` |
    | `org.apache.http.entity.ContentType` | `org.apache.hc.core5.http.ContentType` |
    | `org.apache.http.message.BasicNameValuePair` | `org.apache.hc.core5.http.message.BasicNameValuePair` |
    | `org.apache.http.HttpResponse` | `org.apache.hc.core5.http.HttpResponse` |
    | `org.apache.http.NameValuePair` | `org.apache.hc.core5.http.NameValuePair` |
    | `org.apache.http.Header` | `org.apache.hc.core5.http.Header` |
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http
        location: PACKAGE
- ruleID: httpclient4-to-httpclient5-00070
  description: getStatusLine() removed in HttpClient 5.x, use getCode() instead
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, the `StatusLine` class has been removed as a response property. Replace `response.getStatusLine().getStatusCode()` with `response.getCode()` and `response.getStatusLine().getReasonPhrase()` with `response.getReasonPhrase()`. If you need a `StatusLine` object (e.g., for logging or toString), use `new StatusLine(response)` instead.

    ```java
    // Before (HttpClient 4.x)
    if (response.getStatusLine().getStatusCode() >= 300) {
        throw new ClientProtocolException(
            Objects.toString(response.getStatusLine()));
    }

    // After (HttpClient 5.x) — direct access
    if (response.getCode() >= 300) {
        throw new ClientProtocolException(response.getReasonPhrase());
    }

    // After (HttpClient 5.x) — StatusLine object
    StatusLine statusLine = new StatusLine(response);
    log.info("Response: {}", statusLine);
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: getStatusLine
        location: METHOD_CALL
