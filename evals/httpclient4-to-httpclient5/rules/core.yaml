- ruleID: httpclient4-to-httpclient5-00530
  description: org.apache.http.HttpRequestInterceptor moved to org.apache.hc.core5.http.HttpRequestInterceptor in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |
    `org.apache.http.HttpRequestInterceptor` has moved to `org.apache.hc.core5.http.HttpRequestInterceptor` in HttpClient 5.x. The interface is the same, but HttpClient 5.x also introduces execution-level interceptors (`ExecChainHandler`) for request/response processing that was previously done at the protocol level.

    ```java
    // Before
    import org.apache.http.HttpRequestInterceptor;

    // After
    import org.apache.hc.core5.http.HttpRequestInterceptor;
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.HttpRequestInterceptor
        location: IMPORT
- ruleID: httpclient4-to-httpclient5-00540
  description: org.apache.http.protocol package moved to org.apache.hc.core5.http.protocol in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |
    The `org.apache.http.protocol` package has moved to `org.apache.hc.core5.http.protocol` in HttpClient 5.x.

    | Old class | New class |
    |---|---|
    | `org.apache.http.protocol.HttpContext` | `org.apache.hc.core5.http.protocol.HttpContext` |
    | `org.apache.http.protocol.HttpCoreContext` | `org.apache.hc.core5.http.protocol.HttpCoreContext` |

    Note: `HttpCoreContext` constants like `HTTP_TARGET_HOST` have been removed. Use `HttpCoreContext.getEndpointDetails()` instead.

    ```java
    // Before
    import org.apache.http.protocol.HttpContext;
    import org.apache.http.protocol.HttpCoreContext;

    // After
    import org.apache.hc.core5.http.protocol.HttpContext;
    import org.apache.hc.core5.http.protocol.HttpCoreContext;
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    or:
      - java.referenced:
            pattern: org.apache.http.protocol.HttpContext
            location: IMPORT
      - java.referenced:
            pattern: org.apache.http.protocol.HttpCoreContext
            location: IMPORT
- ruleID: httpclient4-to-httpclient5-00550
  description: org.apache.http.message package moved to org.apache.hc.core5.http.message in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |
    The `org.apache.http.message` package has moved to `org.apache.hc.core5.http.message` in HttpClient 5.x. Some constructors have changed.

    | Old class | New class | Notes |
    |---|---|---|
    | `BasicHttpRequest` | `BasicHttpRequest` | Constructor now takes `Method, URI` instead of `String, String` |
    | `BasicHttpResponse` | `BasicHttpResponse` | Constructor takes `int` status code directly |
    | `BasicStatusLine` | Removed | Use `new StatusLine(response)` instead |
    | `BasicNameValuePair` | `BasicNameValuePair` | Same API |

    ```java
    // Before
    import org.apache.http.message.BasicHttpResponse;
    import org.apache.http.message.BasicStatusLine;
    new BasicHttpResponse(new BasicStatusLine(HttpVersion.HTTP_1_1, 200, "OK"));

    // After
    import org.apache.hc.core5.http.message.BasicHttpResponse;
    new BasicHttpResponse(200);
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    or:
      - java.referenced:
            pattern: org.apache.http.message.BasicHttpRequest
            location: IMPORT
      - java.referenced:
            pattern: org.apache.http.message.BasicHttpResponse
            location: IMPORT
      - java.referenced:
            pattern: org.apache.http.message.BasicStatusLine
            location: IMPORT
      - java.referenced:
            pattern: org.apache.http.message.BasicNameValuePair
            location: IMPORT
