- ruleID: httpclient4-to-httpclient5-00170
  description: addInterceptorLast() — choose protocol or execution interceptor in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `addInterceptorFirst/Last()` still exists for **protocol-level** interceptors (request/response header manipulation). For **execution-level** interceptors (logging, metrics), use `addExecInterceptorFirst()` or `addExecInterceptorLast()` instead. Logging interceptors specifically should use `addExecInterceptorFirst` so they run before content compression.

    ```java
    // Before (4.x) — logging interceptor
    HttpClients.custom().addInterceptorLast(loggingInterceptor);

    // After (5.x) — execution interceptor for logging
    HttpClients.custom().addExecInterceptorFirst("logging", loggingExecInterceptor);

    // Protocol interceptors still use addInterceptorFirst/Last
    HttpClients.custom().addRequestInterceptorFirst(myHeaderInterceptor);
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: addInterceptorLast
        location: METHOD_CALL
- ruleID: httpclient4-to-httpclient5-00180
