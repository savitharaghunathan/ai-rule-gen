- ruleID: httpclient4-to-httpclient5-00580
  description: HttpRequestRetryHandler replaced by HttpRequestRetryStrategy in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |
    `org.apache.http.client.HttpRequestRetryHandler` has been replaced by `org.apache.hc.client5.http.HttpRequestRetryStrategy` in HttpClient 5.x. The new interface adds response-based retry logic and configurable retry delays.

    ```java
    // Before (HttpClient 4.x)
    import org.apache.http.client.HttpRequestRetryHandler;
    HttpRequestRetryHandler retryHandler = (exception, executionCount, context) -> {
        return executionCount < 3;
    };
    builder.setRetryHandler(retryHandler);

    // After (HttpClient 5.x) — use DefaultHttpRequestRetryStrategy
    import org.apache.hc.client5.http.impl.DefaultHttpRequestRetryStrategy;
    builder.setRetryStrategy(new DefaultHttpRequestRetryStrategy(3, TimeValue.ofSeconds(1)));
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.client.HttpRequestRetryHandler
        location: IMPORT
- ruleID: httpclient4-to-httpclient5-00590
  description: RequestConfig moved to org.apache.hc.client5.http.config in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |
    `org.apache.http.client.config.RequestConfig` has moved to `org.apache.hc.client5.http.config.RequestConfig` in HttpClient 5.x. Timeout methods have changed significantly — `setConnectTimeout` and `setSocketTimeout` have moved to `ConnectionConfig`, and `RequestConfig` now uses `Timeout` objects instead of `int` milliseconds.

    ```java
    // Before (HttpClient 4.x)
    import org.apache.http.client.config.RequestConfig;
    RequestConfig config = RequestConfig.custom()
        .setConnectTimeout(5000)
        .setSocketTimeout(10000)
        .build();

    // After (HttpClient 5.x) — timeouts moved to ConnectionConfig
    import org.apache.hc.client5.http.config.ConnectionConfig;
    import org.apache.hc.core5.util.Timeout;
    ConnectionConfig connConfig = ConnectionConfig.custom()
        .setConnectTimeout(Timeout.ofSeconds(5))
        .setSocketTimeout(Timeout.ofSeconds(10))
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.client.config.RequestConfig
        location: IMPORT
- ruleID: httpclient4-to-httpclient5-00600
  description: CookieSpecs replaced by StandardCookieSpec in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |
    `org.apache.http.client.config.CookieSpecs` has been replaced by `org.apache.hc.client5.http.cookie.StandardCookieSpec` in HttpClient 5.x.

    | Old constant | New constant |
    |---|---|
    | `CookieSpecs.STANDARD` | `StandardCookieSpec.RELAXED` |
    | `CookieSpecs.STANDARD_STRICT` | `StandardCookieSpec.STRICT` |
    | `CookieSpecs.IGNORE_COOKIES` | `StandardCookieSpec.IGNORE` |

    ```java
    // Before
    import org.apache.http.client.config.CookieSpecs;
    RequestConfig.custom().setCookieSpec(CookieSpecs.STANDARD).build();

    // After
    import org.apache.hc.client5.http.cookie.StandardCookieSpec;
    RequestConfig.custom().setCookieSpec(StandardCookieSpec.RELAXED).build();
