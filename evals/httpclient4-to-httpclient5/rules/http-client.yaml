    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The static constant `HttpCoreContext.HTTP_TARGET_HOST` used with `HttpContext.getAttribute()` has been replaced in HttpClient 5.x. Use `HttpClientContext.getHttpRoute().getTargetHost()` instead.

    ```java
