- ruleID: httpclient4-to-httpclient5-00410
  description: setContentEncoding() removed from entity classes in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, the `setContentEncoding(String)` method has been removed from HTTP entity classes. Content encoding is now set via the entity constructor or builder instead.

    ```java
    // Before (HttpClient 4.x)
    entity.setContentEncoding("UTF-8");

    // After (HttpClient 5.x)
    // Content encoding is passed via entity constructor
    new StringEntity(content, ContentType.create("text/plain", StandardCharsets.UTF_8));
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setContentEncoding
        location: METHOD_CALL
- ruleID: httpclient4-to-httpclient5-00650
  description: StringEntity moved to org.apache.hc.core5.http.io.entity in HttpClient 5.x
  category: mandatory
  effort: 2
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |
    `org.apache.http.entity.StringEntity` has moved to `org.apache.hc.core5.http.io.entity.StringEntity` in HttpClient 5.x. The constructor now takes a `ContentType` parameter directly instead of setting it after construction.

    ```java
    // Before
    import org.apache.http.entity.StringEntity;
    StringEntity entity = new StringEntity(json, ContentType.APPLICATION_JSON);

    // After
    import org.apache.hc.core5.http.io.entity.StringEntity;
    StringEntity entity = new StringEntity(json, ContentType.APPLICATION_JSON);
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.entity.StringEntity
        location: IMPORT
