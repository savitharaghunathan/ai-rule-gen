- ruleID: httpclient4-to-httpclient5-00080
  description: EntityTemplate relocated from org.apache.http.entity in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `EntityTemplate` has been relocated from `org.apache.http.entity` to `org.apache.hc.core5.http.io.entity`. Additionally, content type is now set via the constructor rather than a separate `setContentType()` call.

    Before:
    ```java
    import org.apache.http.entity.EntityTemplate;
    EntityTemplate entity = new EntityTemplate(outstream -> { ... });
    entity.setContentType(ContentType.APPLICATION_JSON.toString());
    ```

    After:
    ```java
    import org.apache.hc.core5.http.io.entity.EntityTemplate;
    EntityTemplate entity = new EntityTemplate(-1, ContentType.APPLICATION_JSON, null, outstream -> { ... });
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.entity.EntityTemplate
        location: IMPORT
- ruleID: httpclient4-to-httpclient5-00090
  description: setContentType() setter removed; content type set via entity constructor in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, the `setContentType(String)` method has been removed from HTTP entity classes. Content type should be set via the entity constructor or builder instead.

    Before:
    ```java
    requestEntity.setContentType(ContentType.APPLICATION_JSON.toString());
    ```

    After:
    ```java
    // Content type is passed directly to the entity constructor
    new EntityTemplate(-1, ContentType.APPLICATION_JSON, null, outstream -> { ... });
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setContentType
        location: METHOD_CALL
- ruleID: httpclient4-to-httpclient5-00360
  description: HttpEntity moved to org.apache.hc.core5.http in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `HttpEntity` has moved from `org.apache.http` to `org.apache.hc.core5.http`. Update the import. Note that `setContentType()` and `setContentEncoding()` setters have been removed — content type and encoding are now set via entity constructors or builders.

    ```java
    // Before (HttpClient 4.x)
    import org.apache.http.HttpEntity;

    // After (HttpClient 5.x)
    import org.apache.hc.core5.http.HttpEntity;
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.HttpEntity
        location: IMPORT
- ruleID: httpclient4-to-httpclient5-00370
