- ruleID: httpclient4-to-httpclient5-00030
  description: Zero TTL means connections not reused in HttpClient 5.x
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, the `setConnectionTimeToLive(long, TimeUnit)` method signature changes to accept a `TimeValue` parameter. Additionally, HttpClient 5.0 treats zero TTL as an instruction that connections are not meant to be re-used, which differs from the 4.x behavior. If you use zero TTL, use a negative value instead for unlimited TTL.

    Before:
    ```java
    .setConnectionTimeToLive(1, TimeUnit.MINUTES)
    ```

    After:
    ```java
    .setConnectionTimeToLive(TimeValue.ofMinutes(1))
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setConnectionTimeToLive
        location: METHOD_CALL
- ruleID: httpclient4-to-httpclient5-00040
  description: setSoTimeout(int) changed to setSoTimeout(Timeout) in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `SocketConfig.setSoTimeout(int)` now requires a `Timeout` object instead of a raw integer (milliseconds). Wrap the value with `Timeout.ofMilliseconds()` or use other `Timeout` factory methods.

    Before:
    ```java
    SocketConfig.custom()
        .setSoTimeout(60000)
        .build()
    ```

    After:
    ```java
    SocketConfig.custom()
        .setSoTimeout(Timeout.ofMilliseconds(60000))
        .build()
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setSoTimeout
        location: METHOD_CALL
- ruleID: httpclient4-to-httpclient5-00050
  description: setConnectTimeout() moved from RequestConfig to ConnectionConfig in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `setConnectTimeout()` has moved from `RequestConfig` to `ConnectionConfig` and now requires a `Timeout` object instead of a raw integer. Note that `setSocketTimeout()` has also moved — see rule httpclient4-to-httpclient5-00060. Both timeouts should be configured together on `ConnectionConfig` and applied to the connection manager.

    ```java
    // Before (HttpClient 4.x)
    RequestConfig.custom()
        .setConnectTimeout(60000)
        .build()

    // After (HttpClient 5.x)
    ConnectionConfig connConfig = ConnectionConfig.custom()
        .setConnectTimeout(Timeout.ofMilliseconds(60000))
        .build();
    PoolingHttpClientConnectionManagerBuilder.create()
        .setDefaultConnectionConfig(connConfig)
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setConnectTimeout
        location: METHOD_CALL
- ruleID: httpclient4-to-httpclient5-00060
  description: setSocketTimeout() removed from RequestConfig, use ConnectionConfig.setSoTimeout() in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `RequestConfig.setSocketTimeout()` has been removed. Socket timeout is now configured on `ConnectionConfig` using `setSoTimeout(Timeout)`. Note that `setConnectTimeout()` has also moved to `ConnectionConfig` — see rule httpclient4-to-httpclient5-00050. Both timeouts should be configured together on `ConnectionConfig` and applied to the connection manager.

    ```java
    // Before (HttpClient 4.x)
    RequestConfig.custom()
        .setSocketTimeout(60000)
        .build()

    // After (HttpClient 5.x)
    ConnectionConfig connConfig = ConnectionConfig.custom()
        .setSoTimeout(Timeout.ofMilliseconds(60000))
        .build();
    PoolingHttpClientConnectionManagerBuilder.create()
        .setDefaultConnectionConfig(connConfig)
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setSocketTimeout
        location: METHOD_CALL
