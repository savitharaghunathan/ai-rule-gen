- ruleID: httpclient4-to-httpclient5-00210
  description: setDefaultSocketConfig() moved from HttpClients builder to connection manager builder in 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `setDefaultSocketConfig()` has been moved from the `HttpClients` builder to the connection manager builder. Configure socket settings through `PoolingHttpClientConnectionManagerBuilder` or `BasicHttpClientConnectionManager` instead.

    ```java
    // Before (4.x)
    HttpClients.custom().setDefaultSocketConfig(socketConfig);

    // After (5.x)
    PoolingHttpClientConnectionManagerBuilder.create()
        .setDefaultSocketConfig(socketConfig);
    // Then: HttpClients.custom().setConnectionManager(connectionManager);
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setDefaultSocketConfig
        location: METHOD_CALL
- ruleID: httpclient4-to-httpclient5-00630
  description: org.apache.http.config package moved to org.apache.hc.core5.http.config in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |
    The `org.apache.http.config` package has moved in HttpClient 5.x.

    | Old class | New class |
    |---|---|
    | `org.apache.http.config.Registry` | `org.apache.hc.core5.http.config.Registry` |
    | `org.apache.http.config.RegistryBuilder` | `org.apache.hc.core5.http.config.RegistryBuilder` |
    | `org.apache.http.config.SocketConfig` | `org.apache.hc.core5.http.config.SocketConfig` |

    Note: `SocketConfig.Builder.setSoTimeout()` now takes a `Timeout` object instead of `int` milliseconds.

    ```java
    // Before
    import org.apache.http.config.SocketConfig;
    SocketConfig.custom().setSoTimeout(5000).build();

    // After
    import org.apache.hc.core5.http.config.SocketConfig;
    import org.apache.hc.core5.util.Timeout;
    SocketConfig.custom().setSoTimeout(Timeout.ofSeconds(5)).build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    or:
      - java.referenced:
            pattern: org.apache.http.config.Registry
            location: IMPORT
      - java.referenced:
            pattern: org.apache.http.config.RegistryBuilder
            location: IMPORT
      - java.referenced:
            pattern: org.apache.http.config.SocketConfig
            location: IMPORT
- ruleID: httpclient4-to-httpclient5-00640
  description: org.apache.http.conn package moved to org.apache.hc.client5.http in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpcomponents-client
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpcomponents-client
    - konveyor.io/generated-by=ai-rule-gen
  message: |
    The `org.apache.http.conn` package has been restructured in HttpClient 5.x.

    | Old class | New class / approach |
    |---|---|
    | `ConnectTimeoutException` | `org.apache.hc.client5.http.ConnectTimeoutException` |
    | `ConnectionSocketFactory` | Use `PoolingHttpClientConnectionManagerBuilder` instead of manual registry |
    | `PlainConnectionSocketFactory` | Built-in to connection manager builder |
    | `ManagedHttpClientConnection` | `org.apache.hc.client5.http.io.ManagedHttpClientConnection` |

    In HttpClient 5.x, prefer `PoolingHttpClientConnectionManagerBuilder` over manual `ConnectionSocketFactory` registries:

    ```java
    // Before (4.x) — manual registry
    Registry<ConnectionSocketFactory> registry = RegistryBuilder.<ConnectionSocketFactory>create()
        .register("http", PlainConnectionSocketFactory.getSocketFactory())
        .register("https", sslFactory)
        .build();

    // After (5.x) — builder pattern
    PoolingHttpClientConnectionManager cm = PoolingHttpClientConnectionManagerBuilder.create()
        .setSSLSocketFactory(sslFactory)
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    or:
      - java.referenced:
            pattern: org.apache.http.conn.ConnectTimeoutException
            location: IMPORT
      - java.referenced:
            pattern: org.apache.http.conn.socket.ConnectionSocketFactory
            location: IMPORT
      - java.referenced:
            pattern: org.apache.http.conn.socket.PlainConnectionSocketFactory
            location: IMPORT
      - java.referenced:
            pattern: org.apache.http.conn.ManagedHttpClientConnection
            location: IMPORT
