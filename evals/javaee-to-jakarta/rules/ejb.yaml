- ruleID: ejb-method-00010
  description: EJBContext.getCallerIdentity() removed in Jakarta EE 10 (Java SE 14 removed java.security.Identity)
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `javax.ejb.EJBContext.getCallerIdentity()` was removed in Jakarta Enterprise Beans 4.0 because Java SE 14 removed `java.security.Identity`.

    ### Before
    ```java
    Identity caller = ctx.getCallerIdentity();
    ```

    ### After
    ```java
    java.security.Principal caller = ctx.getCallerPrincipal();
    ```
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-enterprise-beans
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.ejb.EJBContext.getCallerIdentity
        location: METHOD_CALL
- ruleID: ejb-method-00020
  description: EJBContext.isCallerInRole(Identity) removed; only the String overload remains
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `javax.ejb.EJBContext.isCallerInRole(Identity role)` was removed in Jakarta EE 10. Use `EJBContext.isCallerInRole(String roleName)` instead.

    ### Before
    ```java
    if (ctx.isCallerInRole(identityRole)) { ... }
    ```

    ### After
    ```java
    if (ctx.isCallerInRole("roleName")) { ... }
    ```

    ### Additional Info
    - The Identity overload was tied to `java.security.Identity`, which was removed in Java SE 14.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-enterprise-beans
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.ejb.EJBContext.isCallerInRole
        location: METHOD_CALL
- ruleID: ejb-method-00030
  description: SessionContext.getMessageContext() removed; Jakarta XML RPC is no longer in Jakarta EE 10
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `javax.ejb.SessionContext.getMessageContext()` was removed in Jakarta EE 10 because the Jakarta XML RPC specification has been dropped from the Full Platform.

    ### Migration Steps
    - The Jakarta XML RPC specification was optional in Jakarta EE 8 and JBoss EAP 7 did not support it (calls would have thrown `IllegalStateException`).
    - Remove any calls to `SessionContext.getMessageContext()`.
    - Replace XML-RPC handler usage with a Jakarta XML Web Services (`jakarta.xml.ws.*`) handler if SOAP-style message context access is still needed.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-enterprise-beans
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.ejb.SessionContext.getMessageContext
        location: METHOD_CALL
- ruleID: ejb-method-00040
  description: EJBContext.getEnvironment() removed; use JNDI java:comp/env
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `javax.ejb.EJBContext.getEnvironment()` was removed in Jakarta Enterprise Beans 4.0. Use the JNDI naming context `java:comp/env` to access the enterprise bean's environment.

    ### Before
    ```java
    Properties env = ctx.getEnvironment();
    ```

    ### After
    ```java
    Context envCtx = (Context) new InitialContext().lookup("java:comp/env");
    ```
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-enterprise-beans
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.ejb.EJBContext.getEnvironment
        location: METHOD_CALL
- ruleID: ejb-type-00010
  description: Enterprise Java Beans entity beans (javax.ejb.EntityBean) are not supported starting with JBoss EAP 7; replace CMP/BMP entity beans with Jakarta Persistence
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    EJB entity beans (`javax.ejb.EntityBean`) are not supported starting with JBoss EAP 7 (and remain unsupported in JBoss EAP 8). Replace all CMP and BMP entity beans with Jakarta Persistence entities.

    ### Before
    ```java
    import javax.ejb.EntityBean;
    import javax.ejb.EntityContext;

    public class CustomerBean implements EntityBean {
        private EntityContext ctx;
        public void setEntityContext(EntityContext ctx) { this.ctx = ctx; }
        public void unsetEntityContext() { this.ctx = null; }
        // ejbLoad, ejbStore, ejbActivate, ejbPassivate, ...
    }
    ```

    ### After
    ```java
    import jakarta.persistence.Column;
    import jakarta.persistence.Entity;
    import jakarta.persistence.GeneratedValue;
    import jakarta.persistence.Id;
    import jakarta.persistence.Table;

    @Entity
    @Table(name = "Customers")
    public class Customer {
        @Id @GeneratedValue
        private Long id;
        @Column(unique = true)
        private String username;
        // getters / setters
    }
    ```

    ### Additional Info
    - Define your persistence unit in `META-INF/persistence.xml` using `https://jakarta.ee/xml/ns/persistence` (version 3.0).
    - Remove `<entity>` configurations for entity beans from `ejb-jar.xml`.
    - Use an `EntityManager` (injected via `@PersistenceContext`) to load and persist entities.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#migrate-entity-beans-to-jakarta-persistence_default
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.ejb.EntityBean
        location: IMPLEMENTS_TYPE
- ruleID: ejb-xml-00010
  description: <entity> elements declaring CMP/BMP entity beans in ejb-jar.xml are no longer supported in JBoss EAP 7+
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    EJB entity beans declared via `<entity>` elements in `ejb-jar.xml` are no longer supported in JBoss EAP 7+. Migrate to Jakarta Persistence and define entities in `META-INF/persistence.xml`.

    ### Migration Steps
    - Remove the `<entity>` element (and its `<persistence-type>Container</persistence-type>` or `Bean` child) from `ejb-jar.xml`.
    - Replace the bean class with a JPA `@Entity` annotated class using `jakarta.persistence.*`.
    - Configure a `<persistence-unit>` in `META-INF/persistence.xml` (Jakarta Persistence 3.0 namespace `https://jakarta.ee/xml/ns/persistence`).
    - Update DAO/service code to use `EntityManager` to load and persist entities.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#migrate-entity-beans-to-jakarta-persistence_default
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='ejb-jar']//*[local-name()='enterprise-beans']/*[local-name()='entity']
        filepaths:
            - ejb-jar.xml
