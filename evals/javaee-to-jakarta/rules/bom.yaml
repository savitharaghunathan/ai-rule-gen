- ruleID: bom-dependency-00010
  description: JBoss EAP Jakarta EE 8 BOM (org.jboss.bom:jboss-eap-jakartaee8) renamed to org.jboss.bom:jboss-eap-ee in JBoss EAP 8
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The JBoss EAP Jakarta EE 8 BOM has been renamed to JBoss EAP EE in JBoss EAP 8. The Maven coordinates changed from `org.jboss.bom:jboss-eap-jakartaee8` to `org.jboss.bom:jboss-eap-ee`.

    ### Before
    ```xml
    <dependencyManagement>
      <dependencies>
        <dependency>
          <groupId>org.jboss.bom</groupId>
          <artifactId>jboss-eap-jakartaee8</artifactId>
          <version>${version.bom}</version>
          <type>pom</type>
          <scope>import</scope>
        </dependency>
      </dependencies>
    </dependencyManagement>
    ```

    ### After
    ```xml
    <dependencyManagement>
      <dependencies>
        <dependency>
          <groupId>org.jboss.bom</groupId>
          <artifactId>jboss-eap-ee</artifactId>
          <version>${version.bom}</version>
          <type>pom</type>
          <scope>import</scope>
        </dependency>
      </dependencies>
    </dependencyManagement>
    ```

    ### Additional Info
    - Update `${version.bom}` to the JBoss EAP 8 BOM version.
    - This BOM controls managed versions of Jakarta EE 10 APIs and Red Hat-supported components shipped with JBoss EAP 8.
    - If your application's build fails after this change, also review related BOMs such as `jboss-eap-ee-with-tools` (7.5.2).
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#renaming-of-jboss-eap-jakarta-ee-8_default
      title: Migration Documentation
  when:
    java.dependency:
        name: org.jboss.bom.jboss-eap-jakartaee8
        lowerbound: 0.0.0
