- ruleID: bom-dependency-00060
  description: JBoss EJB Client Legacy BOM (org.jboss.bom:wildfly-ejb-client-legacy-bom) is no longer provided with JBoss EAP 8
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The JBoss EJB Client Legacy BOM (`org.jboss.bom:wildfly-ejb-client-legacy-bom`) is no longer provided in JBoss EAP 8. Replace usages of the legacy EJB client API with the modern WildFly EJB client.

    ### Migration Steps
    - Remove the `wildfly-ejb-client-legacy-bom` dependency management import (and any matching `<dependency>`).
    - Migrate code that uses the legacy EJB client API (deprecated in JBoss EAP 7.4) to the modern WildFly EJB client (`org.wildfly:wildfly-ejb-client-bom` or appropriate replacement).
    - Stand-alone client applications can keep using EAP 7.4 client versions of this BOM, but it cannot be used inside an EAP 8 deployment.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#removal-of-jboss-ejb-client-legacy-bom_default
      title: Migration Documentation
  when:
    java.dependency:
        name: org.jboss.bom.wildfly-ejb-client-legacy-bom
        lowerbound: 0.0.0
