- ruleID: servlet-type-00010
  description: SingleThreadModel marker interface removed in Jakarta Servlet 6.0
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `javax.servlet.SingleThreadModel` marker interface was removed in Jakarta Servlet 6.0. Servlets that implemented this interface must remove the declaration and ensure their code is thread-safe.

    ### Before
    ```java
    public class MyServlet extends HttpServlet implements SingleThreadModel { ... }
    ```

    ### After
    ```java
    public class MyServlet extends HttpServlet {
        // Guard mutable state explicitly — avoid instance fields, or synchronize fine-grained sections.
    }
    ```

    ### Additional Info
    - Avoid using instance variables for per-request state; use locals or request attributes.
    - Do NOT synchronize `service`, `doGet`, or `doPost` — this serializes all requests and destroys throughput.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-servlet
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.servlet.SingleThreadModel
        location: IMPLEMENTS_TYPE
- ruleID: servlet-import-00010
  description: HttpSessionContext interface removed; never returned usable data since Servlet 2.1
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `javax.servlet.http.HttpSessionContext` was removed in Jakarta Servlet 6.0. Remove all references — there is no replacement.

    ### Migration Steps
    - Delete any imports or fields of type `HttpSessionContext`.
    - Remove any calls to `HttpSession.getSessionContext()` (also removed). Implementations were required to return no usable data since Servlet 2.1.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-servlet
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.servlet.http.HttpSessionContext
        location: IMPORT
