- ruleID: servlet-import-00020
  description: HttpUtils class removed in Jakarta Servlet 6.0
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `javax.servlet.http.HttpUtils` utility class was removed in Jakarta Servlet 6.0. Use `ServletRequest`/`HttpServletRequest` methods instead.

    ### Migration Steps
    - `HttpUtils.parseQueryString(String)` and `HttpUtils.parsePostData(int, ServletInputStream)` → `ServletRequest.getParameterMap()`. If you must distinguish query-string parameters from body parameters, parse the query string yourself.
    - `HttpUtils.getRequestURL(HttpServletRequest)` → `HttpServletRequest.getRequestURL()`.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-servlet
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.servlet.http.HttpUtils
        location: IMPORT
- ruleID: servlet-method-00020
  description: Legacy ServletContext enumeration methods removed; no replacement
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `ServletContext.getServlet(String)`, `getServlets()`, and `getServletNames()` were removed in Jakarta Servlet 6.0 with no replacement. These methods returned `null` / empty enumerations for many releases.

    ### Migration Steps
    - Remove calls. If your code depended on discovering other servlets at runtime, replace with a CDI bean, lookup-by-name with `ServletContext.getNamedDispatcher(String)`, or an explicit registry.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-servlet
      title: Migration Documentation
  when:
    or:
        - java.referenced:
            pattern: javax.servlet.ServletContext.getServlet
            location: METHOD_CALL
        - java.referenced:
            pattern: javax.servlet.ServletContext.getServlets
            location: METHOD_CALL
        - java.referenced:
            pattern: javax.servlet.ServletContext.getServletNames
            location: METHOD_CALL
- ruleID: servlet-method-00030
  description: log(Exception, String) removed; use log(String, Throwable)
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The deprecated `ServletContext.log(Exception, String)` overload was removed in Jakarta Servlet 6.0. Use `ServletContext.log(String message, Throwable throwable)` instead.

    ### Before
    ```java
    servletContext.log(exception, "failed");
    ```

    ### After
    ```java
    servletContext.log("failed", exception);
    ```
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-servlet
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.servlet.ServletContext.log
        location: METHOD_CALL
- ruleID: servlet-method-00040
  description: ServletRequest.getRealPath() removed; use ServletContext.getRealPath()
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `ServletRequest.getRealPath(String)` (and the wrapper version) were removed in Jakarta Servlet 6.0. Use `ServletContext.getRealPath(String path)` instead.

    ### Before
    ```java
    String real = request.getRealPath("/img/logo.png");
    ```

    ### After
    ```java
    String real = request.getServletContext().getRealPath("/img/logo.png");
    ```
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-servlet
      title: Migration Documentation
  when:
    or:
        - java.referenced:
            pattern: javax.servlet.ServletRequest.getRealPath
            location: METHOD_CALL
        - java.referenced:
            pattern: javax.servlet.ServletRequestWrapper.getRealPath
            location: METHOD_CALL
- ruleID: servlet-method-00050
  description: Legacy UnavailableException constructors taking Servlet removed
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Jakarta Servlet 6.0 removed:

    - `UnavailableException(Servlet, String)` constructor — use `UnavailableException(String)`.
    - `UnavailableException(int, Servlet, String)` constructor — use `UnavailableException(String, int)`.
    - `UnavailableException.getServlet()` method — no replacement.

    Replace each removed constructor call with the supported overload that omits the `Servlet` reference.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-servlet
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.servlet.UnavailableException
        location: CONSTRUCTOR_CALL
