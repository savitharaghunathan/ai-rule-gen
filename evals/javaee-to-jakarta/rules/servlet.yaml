- ruleID: servlet-method-00100
  description: setStatus(int, String) removed; use sendError(int, String)
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `HttpServletResponse.setStatus(int sc, String sm)` was removed in Jakarta Servlet 6.0. Use `sendError(int, String)` to write a status and a message.

    ### Before
    ```java
    response.setStatus(400, "Bad input");
    ```

    ### After
    ```java
    response.sendError(400, "Bad input");
    ```

    ### Additional Info
    - `setStatus(int)` (without the message) is still available.
    - `sendError` commits the response and may invoke an error page mapping; verify this is acceptable in your flow.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-servlet
      title: Migration Documentation
  when:
    or:
        - java.referenced:
            pattern: javax.servlet.http.HttpServletResponse.setStatus
            location: METHOD_CALL
        - java.referenced:
            pattern: javax.servlet.http.HttpServletResponseWrapper.setStatus
            location: METHOD_CALL
- ruleID: servlet-method-00110
  description: Legacy HttpSession value-accessor methods removed; use attribute API
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Jakarta Servlet 6.0 removed the legacy `HttpSession` value accessors. Use the attribute API.

    ### Mapping
    - `getValue(String name)` → `getAttribute(String name)`
    - `getValueNames()` → `getAttributeNames()`
    - `putValue(String name, Object value)` → `setAttribute(String name, Object value)`
    - `removeValue(String name)` → `removeAttribute(String name)`
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-servlet
      title: Migration Documentation
  when:
    or:
        - java.referenced:
            pattern: javax.servlet.http.HttpSession.getValue
            location: METHOD_CALL
        - java.referenced:
            pattern: javax.servlet.http.HttpSession.getValueNames
            location: METHOD_CALL
        - java.referenced:
            pattern: javax.servlet.http.HttpSession.putValue
            location: METHOD_CALL
        - java.referenced:
            pattern: javax.servlet.http.HttpSession.removeValue
            location: METHOD_CALL
