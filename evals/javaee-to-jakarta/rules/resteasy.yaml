- ruleID: resteasy-pattern-00010
  description: Default for resteasy.add.charset changed to true in JBoss EAP 7.1 (adds charset=UTF-8 to Content-Type)
  category: potential
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: Starting with JBoss EAP 7.1, the resteasy.add.charset parameter is true by default, so charset=UTF-8 is appended to the Content-Type header for text/* and application/xml* responses without an explicit charset. Set resteasy.add.charset=false in your web.xml or application configuration if your clients rely on the absence of an explicit charset.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#additional_resteasy_changes
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: resteasy\.add\.charset
        filePattern: (application.*\.(properties|ya?ml)|web\.xml)
