- ruleID: resteasy-import-00160
  description: ClientRequest removed in JBoss EAP 8.0; use ResteasyClient
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The legacy RESTEasy 2 client API class org.jboss.resteasy.client.ClientRequest has been removed in JBoss EAP 8.0. Migrate to org.jboss.resteasy.client.jaxrs.ResteasyClient or the standard jakarta.ws.rs.client.Client API.

    ### Before
    ```java
    ClientRequest request = new ClientRequest(generateURL("/linkheader/str"));
    ClientResponse response = request.post();
    ```

    ### After
    ```java
    ResteasyClient client = new ResteasyClientBuilder().build();
    Response response = client.target(generateURL("/linkheader/str"))
        .request().post(Entity.text(""));
    ```
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#resteasy_deprecated_classes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.jboss.resteasy.client.ClientRequest
        location: IMPORT
