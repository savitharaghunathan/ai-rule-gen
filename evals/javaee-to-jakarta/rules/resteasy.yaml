- ruleID: resteasy-pattern-00020
  description: MicroProfile is no longer available on standard JBoss EAP; use JBoss EAP XP
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: MicroProfile was previously available for JBoss EAP 7.3 as a technology preview, but has been removed from JBoss EAP. MicroProfile is now available only on JBoss EAP XP. Applications that rely on org.eclipse.microprofile.* APIs must either drop the MicroProfile dependency or migrate the deployment to JBoss EAP XP.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#microprofile_for_jboss_eap
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: org\.eclipse\.microprofile
        filePattern: .*\.(xml|properties|gradle|sbt)
