- ruleID: namespace-import-00010
  description: Jakarta EE 9+ renamed javax.* EE API packages to jakarta.*
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Jakarta EE 9 and later renamed the EE API packages from `javax.*` to `jakarta.*`. This rule flags any reference to a `javax.*` package; review each match to determine whether it is a Jakarta EE API (must be updated) or a Java SE API (no change needed — Java SE javax packages are unaffected).

    ### Before
    ```java
    import javax.ejb.Stateless;
    import javax.servlet.http.HttpServlet;
    import javax.persistence.EntityManager;
    ```

    ### After
    ```java
    import jakarta.ejb.Stateless;
    import jakarta.servlet.http.HttpServlet;
    import jakarta.persistence.EntityManager;
    ```

    ### Additional Info
    - Replace all EE API imports and FQNs of `javax.*` with `jakarta.*`.
    - Rename EE-specified system properties or configuration properties starting with `javax.` to start with `jakarta.`.
    - Rename ServiceLoader resource files under `META-INF/services/javax.[name]` to `META-INF/services/jakarta.[name]`.
    - Java SE packages (e.g., `javax.sql`, `javax.xml.parsers`, `javax.naming`) are NOT renamed.
    - The Red Hat Migration Toolkit and Eclipse Transformer can automate source and bytecode migration.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#javax-to-jakarta-package-namespace-change
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax*
        location: PACKAGE
