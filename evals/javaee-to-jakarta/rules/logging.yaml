- ruleID: logging-import-00010
  description: '@Cause moved from org.jboss.logging to org.jboss.logging.annotations and to artifact jboss-logging-annotations'
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The JBoss Logging annotation `org.jboss.logging.Cause` was deprecated and moved to the `org.jboss.logging.annotations` package in JBoss EAP 7. The annotations also moved to a separate Maven artifact `org.jboss.logging:jboss-logging-annotations`.

    ### Before
    ```java
    import org.jboss.logging.Cause;
    ```

    ### After
    ```java
    import org.jboss.logging.annotations.Cause;
    ```

    ### Additional Info
    - Add `<dependency><groupId>org.jboss.logging</groupId><artifactId>jboss-logging-annotations</artifactId></dependency>` to `pom.xml`.
    - `org.jboss.logging.BasicLogger` and `org.jboss.logging.Logger` are unchanged.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#jboss-logging-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.jboss.logging.Cause
        location: IMPORT
