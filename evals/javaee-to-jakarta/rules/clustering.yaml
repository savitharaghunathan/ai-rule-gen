- ruleID: clustering-annotation-00010
  description: '@Clustered is ignored in JBoss EAP 7+; SFSB state is replicated automatically under HA profiles'
  category: optional
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Starting with JBoss EAP 7, you no longer need `@org.jboss.ejb3.annotation.Clustered` on stateful session beans. When the server runs under an HA profile, SFSB state is replicated automatically.

    ### Before
    ```java
    @Stateful
    @Clustered
    public class MyBean implements MySessionInt { ... }
    ```

    ### After
    ```java
    @Stateful
    public class MyBean implements MySessionInt { ... }
    ```

    ### Additional Info
    - The annotation is silently ignored if left in place but should be removed to avoid confusion.
    - To opt out of automatic replication, use `@Stateful(passivationCapable=false)` or disable it globally in the `ejb3` subsystem.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#stateful-session-ejb-clustering-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.jboss.ejb3.annotation.Clustered
        location: ANNOTATION
- ruleID: clustering-xml-00120
  description: <clustered> element in jboss-ejb3.xml is no longer required in JBoss EAP 7+
  category: optional
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: The `<c:clustered>true</c:clustered>` element inside `<c:clustering>` of `jboss-ejb3.xml` is no longer required in JBoss EAP 7+. SFSB state is replicated automatically when the server runs an HA profile. Remove the element to avoid confusion.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#stateful-session-ejb-clustering-changes
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='clustering']/*[local-name()='clustered']
        filepaths:
            - jboss-ejb3.xml
- ruleID: clustering-import-00010
  description: Legacy HAPartition API is replaced by the public org.wildfly.clustering.* services in JBoss EAP 7+
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `org.jboss.ha.framework.interfaces.HAPartition` (a JBoss EAP 5 clustering API) is replaced by the public clustering services API in JBoss EAP 7+.

    ### Migration Steps
    - Remove references to `HAPartition`.
    - Use `org.wildfly.clustering.group.Group` to access cluster status and listen for membership changes.
    - Use `org.wildfly.clustering.dispatcher.CommandDispatcher` to dispatch commands across cluster nodes.

    ### Additional Info
    - See *Public API for Clustering Services* in the JBoss EAP Development Guide.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#clustering-services-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.jboss.ha.framework.interfaces.HAPartition
        location: IMPORT
