- ruleID: clustering-xml-00050
  description: <replication-config/> in jboss-web.xml is deprecated by the distributable-web subsystem in JBoss EAP 7+
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `distributable-web` subsystem deprecates `<replication-config/>` in `jboss-web.xml`. The element still works (the server generates an ad-hoc distributable web session profile), but new deployments should override the default distributable session management behaviour through a `distributable-web.xml` descriptor or through `jboss-all.xml`.

    ### Migration Steps
    - Move replication configuration to a `WEB-INF/distributable-web.xml` (or `META-INF/jboss-all.xml`) descriptor.
    - Remove `<replication-config/>` from `jboss-web.xml` once the deployment-level descriptor is in place.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#web-session-clustering-changes
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='jboss-web']//*[local-name()='replication-config']
        filepaths:
            - jboss-web.xml
