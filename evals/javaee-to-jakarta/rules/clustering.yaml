- ruleID: clustering-xml-00010
  description: <passivation-config/> and its sub-elements are obsolete in jboss-web.xml since JBoss EAP 7
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Starting with JBoss EAP 7, the `<passivation-config/>` element (and all its sub-elements such as `<use-session-passivation/>`, `<passivation-min-idle-time/>`, `<passivation-max-idle-time/>`) in `jboss-web.xml` is no longer used.

    ### Migration Steps
    - Remove `<passivation-config/>` from `jboss-web.xml`.
    - To enable passivation, specify a non-negative value on `<max-active-sessions/>`. When the threshold is exceeded, the oldest session is passivated lazily.
    - Eager passivation based on idle time is no longer supported.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#web-session-clustering-changes
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='jboss-web']//*[local-name()='passivation-config']
        filepaths:
            - jboss-web.xml
