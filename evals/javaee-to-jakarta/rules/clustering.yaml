- ruleID: clustering-import-00050
  description: Private org.jboss.as.clustering.singleton.* API is replaced by public org.wildfly.clustering.singleton.* in JBoss EAP 7+
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In JBoss EAP 6, there was no public API for the cluster-wide HA singleton service; applications used the private `org.jboss.as.clustering.singleton.*` classes. JBoss EAP 7 introduces a public API under `org.wildfly.clustering.singleton.*`.

    ### Migration Steps
    - Replace `org.jboss.as.clustering.singleton.*` imports and references with the corresponding `org.wildfly.clustering.singleton.*` types.
    - Refactor singleton service registration and lifecycle code to use the public API.

    ### Additional Info
    - See *HA Singleton Service* and *HA Singleton Deployments* in the JBoss EAP Development Guide.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#migrate-clustering-ha-singleton
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.jboss.as.clustering.singleton*
        location: PACKAGE
