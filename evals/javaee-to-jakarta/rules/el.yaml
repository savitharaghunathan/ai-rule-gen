- ruleID: el-method-00010
  description: Misspelled isParmetersProvided() removed in Jakarta Expression Language
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The incorrectly spelled `javax.el.MethodExpression.isParmetersProvided()` method was removed in Jakarta Expression Language. Use the correctly spelled `isParametersProvided()` instead.

    ### Before
    ```java
    boolean p = methodExpression.isParmetersProvided();
    ```

    ### After
    ```java
    boolean p = methodExpression.isParametersProvided();
    ```
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-expression-language
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.el.MethodExpression.isParmetersProvided
        location: METHOD_CALL
