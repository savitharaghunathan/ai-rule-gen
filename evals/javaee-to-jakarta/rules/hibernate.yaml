- ruleID: hibernate-pattern-00120
  description: Hibernate 5.3 added hibernate.native_exception_handling_51_compliance for native bootstrap applications relying on Hibernate 5.1 exception semantics
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Hibernate ORM 5.3 (since 5.3.3) added `hibernate.native_exception_handling_51_compliance`. Set it to `true` only if your application uses Hibernate native bootstrapping (not Jakarta Persistence) and depends on Hibernate 5.1 exception semantics where `HibernateException` is not wrapped.

    ### Migration Steps
    - Audit code that catches `HibernateException` or its subclasses.
    - For Jakarta Persistence bootstrapping, the property is ignored.
    - For native bootstrapping, set the property based on the exception-handling behavior your application requires.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#migrating-from-hibernate-orm-5-1-and-hibernate-orm-5-2-to-hibernate-orm_default
