  message: |-
    Hibernate ORM 5.1 unified schema management around the `SchemaManagementTool` SPI. Applications that programmatically invoke `org.hibernate.tool.hbm2ddl.SchemaExport` must adapt to the new bootstrap path.

    ### Migration Steps
    - Build the Hibernate `Metadata` via the new `MetadataSources`/`StandardServiceRegistryBuilder` API.
    - Drive schema export through `SchemaExport` constructed with `(StandardServiceRegistry, Metadata)` (or via `SchemaManagementTool`).
    - For ad-hoc use, switch to the JPA `Persistence.generateSchema(...)` entry point.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#migrating-from-hibernate-orm-5-0-to-hibernate-orm-5-1_default
