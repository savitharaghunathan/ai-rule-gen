- ruleID: hibernate-import-00140
  description: SchemaManagementTool SPI replaces the legacy hbm2ddl entry points in Hibernate 5.1
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Hibernate ORM 5.1 introduced `org.hibernate.tool.schema.spi.SchemaManagementTool` as the unified entry point for schema export/update/validation. Code that relied on the legacy `hbm2ddl` classes should adopt this SPI.

    ### Migration Steps
    - Resolve `SchemaManagementTool` via the `ServiceRegistry`.
    - Use its `getSchemaCreator`, `getSchemaDropper`, `getSchemaMigrator`, `getSchemaValidator` delegates.
    - Custom strategies should be registered via `hibernate.schema_management_tool`.
