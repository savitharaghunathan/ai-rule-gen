    The `org.hibernate.engine.transaction.spi.TransactionFactory` SPI was replaced in Hibernate ORM 5 by `org.hibernate.resource.transaction.TransactionCoordinatorBuilder`. Custom transaction factory implementations must be migrated.

    ### Migration Steps
    - Replace the implementation of `TransactionFactory` with a `TransactionCoordinatorBuilder`.
    - Update bootstrap configuration to use `hibernate.transaction.coordinator_class` referencing the new builder FQN.
  links:
