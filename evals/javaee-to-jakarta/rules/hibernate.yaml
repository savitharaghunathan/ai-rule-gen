- ruleID: hibernate-pattern-00020
  description: hibernate.transaction.factory_class deprecated in Hibernate 5; use hibernate.transaction.coordinator_class
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Hibernate ORM 5 introduced a redesigned transaction SPI. The `hibernate.transaction.factory_class` property is deprecated and replaced by `hibernate.transaction.coordinator_class`, which refers to a `TransactionCoordinatorBuilder` instead of a `TransactionFactory`.

    ### Migration Steps
    - Replace `hibernate.transaction.factory_class=<TransactionFactory FQN>` with `hibernate.transaction.coordinator_class=<TransactionCoordinatorBuilder FQN>`.
    - Use the short names `jdbc` or `jta` where appropriate.
    - A non-Jakarta-Persistence application that uses Jakarta Transactions should set this to `jta`.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#migrating-from-hibernate-orm-4-3-to-hibernate-orm-5-0_default
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: hibernate\.transaction\.factory_class
        filePattern: .*\.(properties|cfg\.xml|xml|ya?ml)
- ruleID: hibernate-import-00080
  description: TransactionFactory SPI replaced by TransactionCoordinatorBuilder in Hibernate ORM 5
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
