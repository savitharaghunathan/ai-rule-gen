    builtin.filecontent:
        pattern: hibernate\.query\.sql\.jdbc_style_params_base
        filePattern: .*\.(properties|cfg\.xml|xml|ya?ml)
- ruleID: hibernate-pattern-00110
  description: Hibernate 5.3 @TableGenerator now stores the last generated value (not next); existing apps must set hibernate.id.generator.stored_last_used=false
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Hibernate ORM 5.3 changed `@TableGenerator` to store the last generated value instead of the next, to comply with Jakarta Persistence. Existing applications using `@TableGenerator` must set `hibernate.id.generator.stored_last_used=false` to preserve their identifier sequence.

    ### Migration Steps
    - Set `hibernate.id.generator.stored_last_used=false` on applications upgraded to 5.3+.
    - New applications can leave the property at its default.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#migrating-from-hibernate-orm-5-1-and-hibernate-orm-5-2-to-hibernate-orm_default
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: hibernate\.id\.generator\.stored_last_used
        filePattern: .*\.(properties|cfg\.xml|xml|ya?ml)
