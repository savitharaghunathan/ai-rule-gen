- ruleID: hibernate-method-00050
  description: Hibernate 5.3 renamed Query.getMaxResults() to getHibernateMaxResults() to preserve legacy Hibernate pagination semantics
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Hibernate ORM 5.3 added `getHibernateMaxResults()` to preserve the legacy Hibernate-style pagination behavior. The Jakarta Persistence `getMaxResults()` may behave differently.

    ### Migration Steps
    - Where you previously relied on Hibernate-style semantics, call `query.getHibernateMaxResults()`.
    - The Jakarta Persistence accessor (`getMaxResults()`) returns `Integer.MAX_VALUE` when unset.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#migrating-from-hibernate-orm-5-1-and-hibernate-orm-5-2-to-hibernate-orm_default
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.hibernate.Query.getMaxResults
        location: METHOD_CALL
