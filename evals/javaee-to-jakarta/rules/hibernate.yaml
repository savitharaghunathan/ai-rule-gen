- ruleID: hibernate-pattern-00100
  description: Hibernate 5.3 made JDBC-style native query parameters 1-based to align with Jakarta Persistence; legacy 0-based binding requires this opt-in property
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Hibernate ORM 5.3 changed JDBC-style parameter declarations in native queries from 0-based to 1-based to align with Jakarta Persistence. The `hibernate.query.sql.jdbc_style_params_base=true` setting opts back into the legacy 0-based binding.

    ### Migration Steps
    - Audit native queries that bind positional parameters.
    - Either update the bindings to 1-based positions, or temporarily set `hibernate.query.sql.jdbc_style_params_base=true`.
    - Also note: HQL/JPQL JDBC-style positional declarations are no longer supported.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#migrating-from-hibernate-orm-5-1-and-hibernate-orm-5-2-to-hibernate-orm_default
      title: Migration Documentation
