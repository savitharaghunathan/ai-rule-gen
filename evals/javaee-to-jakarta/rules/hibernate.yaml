- ruleID: hibernate-method-00010
  description: Hibernate 6.0 changed Interceptor#onSave id parameter from Serializable to Object
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Hibernate ORM 6.0 changed the signature of `Interceptor#onSave`: the identifier parameter type changed from `Serializable` to `Object` to align with the relaxation of identifier type constraints.

    ### Before
    ```java
    boolean onSave(Object entity, Serializable id, Object[] state,
                   String[] propertyNames, Type[] types);
    ```

    ### After
    ```java
    boolean onSave(Object entity, Object id, Object[] state,
                   String[] propertyNames, Type[] types);
    ```

    ### Additional Info
    - Many other Hibernate API/SPI methods previously typed as `Serializable` now use `Object`.
    - Recompile and update all overriding methods accordingly.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#migrating-from-hibernate-orm-5-6-to-6-0_default
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.hibernate.Interceptor.onSave
        location: METHOD_CALL
- ruleID: hibernate-pattern-00030
  description: Hibernate 6.2 changed the default value of hibernate.timezone.default_storage to DEFAULT, affecting OffsetTime/OffsetDateTime DDL
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Starting with Hibernate ORM 6.2, `hibernate.timezone.default_storage` defaults to `DEFAULT` (previously `NORMALIZE`). DDL expectations for `OffsetTime` and `OffsetDateTime` columns change as a result, which can cause schema validation errors on existing databases.

    ### Migration Steps
    - Review your usage of `OffsetTime`/`OffsetDateTime` entity properties.
    - If you depended on the previous behavior, set `hibernate.timezone.default_storage=NORMALIZE` explicitly.
    - Otherwise, regenerate / migrate the affected database columns to match the new DDL.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#migrating-from-hibernate-orm-6-1-to-6-2_default
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: hibernate\.timezone\.default_storage
        filePattern: .*\.(properties|cfg\.xml|xml|ya?ml)
- ruleID: hibernate-pattern-00040
  description: Hibernate 6.2 only resolves CDI extensions when hibernate.cdi.extensions=true; behavior change for applications relying on CDI bean resolution
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Hibernate ORM 6.2 only resolves CDI BeanManager extensions when `hibernate.cdi.extensions` is set to `true`. If your application relied on Hibernate resolving CDI beans (e.g., AttributeConverter beans) implicitly, you must opt in.

    ### Migration Steps
    - Set `hibernate.cdi.extensions=true` in `persistence.xml`/`hibernate.properties` if your converters or other components are managed CDI beans.
    - Otherwise no action is required.
  links:
