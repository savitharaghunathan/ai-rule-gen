        location: IMPORT
- ruleID: hibernate-import-00090
  description: Legacy Hibernate Criteria API (org.hibernate.Criteria) was removed in Hibernate ORM 6.0
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The legacy Hibernate Criteria API (`org.hibernate.Criteria`), deprecated since Hibernate 5.x, was removed in Hibernate ORM 6.0.

    ### Before
    ```java
    import org.hibernate.Criteria;

    Criteria criteria = session.createCriteria(User.class);
    criteria.add(Restrictions.eq("username", "alice"));
    List<User> users = criteria.list();
    ```

    ### After
    ```java
    import jakarta.persistence.criteria.CriteriaBuilder;
    import jakarta.persistence.criteria.CriteriaQuery;
    import jakarta.persistence.criteria.Root;

    CriteriaBuilder cb = entityManager.getCriteriaBuilder();
    CriteriaQuery<User> cq = cb.createQuery(User.class);
    Root<User> root = cq.from(User.class);
    cq.select(root).where(cb.equal(root.get("username"), "alice"));
    List<User> users = entityManager.createQuery(cq).getResultList();
    ```

    ### Additional Info
    - Use the Jakarta Persistence Criteria API (`jakarta.persistence.criteria.*`).
    - Hibernate-specific extensions are available via `HibernateCriteriaBuilder`.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#migrating-from-hibernate-orm-5-6-to-6-0_default
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.hibernate.Criteria
        location: IMPORT
- ruleID: hibernate-import-00100
  description: Hibernate 6.0 no longer supports calling SQL functions and procedures via NativeQuery
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Hibernate ORM 6.0 no longer supports using `NativeQuery` to call SQL functions and procedures. Use `org.hibernate.procedure.ProcedureCall` or `jakarta.persistence.StoredProcedureQuery` instead.

    ### Migration Steps
    - Locate any usage of `NativeQuery` that invokes stored procedures or SQL functions.
    - Replace with `session.createStoredProcedureCall("procName")` or `entityManager.createStoredProcedureQuery("procName")`.
    - Use parameter registration APIs on the new types.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#migrating-from-hibernate-orm-5-6-to-6-0_default
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.hibernate.query.NativeQuery
        location: IMPORT
