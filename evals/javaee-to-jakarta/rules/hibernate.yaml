- ruleID: hibernate-dependency-00010
  description: Hibernate 5.4 (HHH-12973) requires Microsoft SQL Server JDBC Driver 6.1.2 or later
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Hibernate 5.4 (used in JBoss EAP 7.x and later) requires Microsoft SQL Server JDBC Driver 6.1.2 or later because older versions cannot introspect `INFORMATION_SCHEMA.SEQUENCES` without closing the database connection (HHH-12973).

    ### Migration Steps
    - Update the `com.microsoft.sqlserver:mssql-jdbc` dependency in your `pom.xml` to at least version `6.1.2`.
    - For JBoss EAP 8, prefer the most recent driver version compatible with your SQL Server release.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#sql-server-jdbc-driver-version-upgrade-to-at-least-6-1-2_default
      title: Migration Documentation
  when:
    java.dependency:
        name: com.microsoft.sqlserver.mssql-jdbc
        upperbound: 6.1.2
        lowerbound: 0.0.0
- ruleID: hibernate-dependency-00020
  description: Hibernate 5.5 reworked XML mapping parsing on top of JAXB and stopped depending on DOM4J
  category: potential
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Hibernate ORM 5.5 reworked XML mapping parsing to use JAXB instead of DOM4J. Hibernate no longer pulls in the `dom4j:dom4j` artifact transitively. If your application code or `pom.xml` relied on the transitive `dom4j` dependency, declare it explicitly or migrate to a supported XML API.

    ### Migration Steps
    - If your code uses `org.dom4j.*`, add an explicit dependency on `dom4j:dom4j` or migrate to `jakarta.xml.bind` / JAXB.
    - If your application does not use DOM4J directly, no action is required.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#dom4j-based-xml-mapping_default
      title: Migration Documentation
  when:
    java.dependency:
        name: dom4j.dom4j
        lowerbound: 0.0.0
- ruleID: hibernate-pattern-00010
  description: Hibernate 5.6 removed javassist as a bytecode enhancement provider; hibernate.bytecode.provider=javassist is no longer valid
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Starting with Hibernate ORM 5.6, Javassist is no longer available as a bytecode enhancement provider. The `hibernate.bytecode.provider=javassist` configuration is no longer valid.

    ### Migration Steps
    - Remove the `hibernate.bytecode.provider=javassist` setting from `hibernate.properties`, `hibernate.cfg.xml`, `persistence.xml`, or your application properties.
    - Hibernate uses Byte Buddy by default; no replacement value is required.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#removal-of-javassist_default
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: hibernate\.bytecode\.provider\s*=\s*javassist
        filePattern: .*\.(properties|cfg\.xml|xml|ya?ml)
