        pattern: hibernate\.native_exception_handling_51_compliance
        filePattern: .*\.(properties|cfg\.xml|xml|ya?ml)
- ruleID: hibernate-pattern-00130
  description: Hibernate51CompatibilityTransformer is a temporary measure; replace transformed method calls with the Hibernate 5.3 equivalents
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    JBoss EAP 7.4 introduced `org.jboss.as.hibernate.Hibernate51CompatibilityTransformer` as a temporary measure to keep Hibernate 5.1 API behavior under Hibernate 5.3. JBoss EAP 8 expects applications to be migrated; you should remove the transformer and replace transformed method calls with their Hibernate 5.3+ / Jakarta Persistence equivalents.

    ### Migration Steps
    - Remove the `Hibernate51CompatibilityTransformer` system property if set on the server.
    - Remove the `<transformer class="org.jboss.as.hibernate.Hibernate51CompatibilityTransformer"/>` entries from `jboss-deployment-structure.xml`.
    - Apply the per-method migrations listed in the JBoss EAP migration guide table (e.g., `getFlushMode` -> `getHibernateFlushMode`, `getMaxResults` -> `getHibernateMaxResults`, `FlushMode.NEVER` -> `FlushMode.MANUAL`).
  links:
