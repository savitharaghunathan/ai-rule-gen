        location: IMPORT
- ruleID: hibernate-pattern-00080
  description: Hibernate 5.1 introduced hibernate.hbm2ddl.jdbc_metadata_extraction_strategy; the default grouped strategy may require default_schema/default_catalog
  category: potential
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Hibernate ORM 5.1 introduced `hibernate.hbm2ddl.jdbc_metadata_extraction_strategy`. The new `grouped` default may require you to set `hibernate.default_schema` and/or `hibernate.default_catalog`.

    ### Migration Steps
    - If schema validation/migration now fails because the wrong tables are inspected, set `hibernate.default_schema` and `hibernate.default_catalog` explicitly.
    - To revert to per-entity metadata queries, set `hibernate.hbm2ddl.jdbc_metadata_extraction_strategy=individually`.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#migrating-from-hibernate-orm-5-0-to-hibernate-orm-5-1_default
