- ruleID: hibernate-import-00150
  description: HibernateEntityManager was deprecated in Hibernate 5.2; use Session directly
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `org.hibernate.jpa.HibernateEntityManager` was deprecated in Hibernate ORM 5.2 (and removed in 6.0). Use `org.hibernate.Session` directly via `entityManager.unwrap(Session.class)`.

    ### Before
    ```java
    import org.hibernate.jpa.HibernateEntityManager;
    HibernateEntityManager hem = (HibernateEntityManager) entityManager;
    Session session = hem.getSession();
    ```

    ### After
    ```java
    import org.hibernate.Session;
    Session session = entityManager.unwrap(Session.class);
    ```
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/#migrating-from-hibernate-orm-5-1-and-hibernate-orm-5-2-to-hibernate-orm_default
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.hibernate.jpa.HibernateEntityManager
        location: IMPORT
