- ruleID: soap-import-00010
  description: SOAPElementFactory removed; use SOAPFactory
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `javax.xml.soap.SOAPElementFactory` was removed in Jakarta SOAP with Attachments 3.0. Use `jakarta.xml.soap.SOAPFactory` for creating SOAPElements.

    ### Method mapping
    - `SOAPElementFactory.newInstance()` → `SOAPFactory.newInstance()`
    - `SOAPElementFactory.create(Name)` → `SOAPFactory.createElement(Name)`
    - `SOAPElementFactory.create(String)` → `SOAPFactory.createElement(String)`
    - `SOAPElementFactory.create(String, String, String)` → `SOAPFactory.createElement(String, String, String)`

    ### Additional Info
    - Support for provider lookup through a `jaxm.properties` file was also removed.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-soap-with-attachments
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.xml.soap.SOAPElementFactory
        location: IMPORT
