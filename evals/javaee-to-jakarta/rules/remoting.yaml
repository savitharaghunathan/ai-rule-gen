- ruleID: remoting-pattern-00010
  description: Default JNDI remote connector changed from remote://...:4447 to http-remoting://...:8080
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: Starting with JBoss EAP 7, the default connector has been changed from remote to http-remoting and the default remote connection port has changed from 4447 to 8080. Update any JNDI provider URLs from remote://host:4447 to http-remoting://host:8080 in client configuration files, jndi.properties, and InitialContext properties.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#update_the_remote_url_connector_and_port
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: remote://.*:4447
        filePattern: .*\.(properties|ya?ml|xml|conf|env)
