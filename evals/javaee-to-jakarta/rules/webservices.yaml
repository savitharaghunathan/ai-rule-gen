- ruleID: webservices-xml-00010
  description: JAX-RPC is no longer supported in JBoss EAP 7/8; migrate to Jakarta XML Web Services
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    JAX-RPC (Java API for XML-based RPC) is no longer supported. Migrate to Jakarta XML Web Services (JAX-WS). Remove the webservices.xml descriptor's <jaxrpc-mapping-file> reference and migrate the endpoint to a Jakarta XML Web Services implementation.

    ### Migration Steps
    - Remove the <jaxrpc-mapping-file> element from webservices.xml.
    - Rewrite JAX-RPC service endpoint interfaces using Jakarta XML Web Services annotations (e.g. @WebService).
    - Replace JAX-RPC mapping files (XML with root <java-wsdl-mapping>) with WSDL-based JAX-WS endpoints.
    - Refer to the JBoss EAP 8 Migration Guide JAX-RPC support changes section.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#jax_rpc_support_changes
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='jaxrpc-mapping-file']
        filepaths:
            - webservices.xml
- ruleID: webservices-xml-00020
  description: JAX-RPC mapping descriptors are no longer supported; migrate to Jakarta XML Web Services
  category: mandatory
