        pattern: cxf-api|cxf-rt-core
        filePattern: .*\.(xml|gradle|sbt|properties)
- ruleID: webservices-pattern-00070
  description: BouncyCastle module behavior changed; org.jboss.ws.cxf.noLocalBC controls fallback to a statically installed provider
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: Starting with JBoss EAP 7, the org.bouncycastle module ships the BouncyCastle Security Provider for JBossWS. To disable use of the module-provided provider and rely on a statically installed BouncyCastle (1.72+), set the org.jboss.ws.cxf.noLocalBC=true property in jaxws-endpoint-config.xml (server) or jaxws-client-config.xml (client).
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#bouncy_castle_requirements_and_changes
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: org\.jboss\.ws\.cxf\.noLocalBC
        filePattern: .*\.(sh|bat|cmd|conf|properties|ya?ml|xml|env|args|Dockerfile)
- ruleID: webservices-pattern-00080
  description: Default Apache CXF bus selection strategy for in-container clients changed from THREAD_BUS to TCCL_BUS
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: The default Apache CXF bus selection strategy for clients running in-container has changed from THREAD_BUS to TCCL_BUS (out-of-container clients still default to THREAD_BUS). To restore the previous behavior, set org.jboss.ws.cxf.jaxws-client.bus.strategy=THREAD_BUS on the JBoss EAP launch arguments or set the bus selection strategy explicitly in client code.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#apache_cxf_bus_selection_strategy
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: org\.jboss\.ws\.cxf\.jaxws-client\.bus\.strategy
        filePattern: .*\.(sh|bat|cmd|conf|properties|ya?ml|xml|env|args|Dockerfile)
- ruleID: webservices-method-00010
  description: Jakarta XML Web Services 2.2 requires Service subclasses to use a constructor that accepts WebServiceFeature arguments
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    User-provided Service subclasses injected via @WebServiceRef must implement Jakarta XML Web Services 2.2 or later. Update the constructor to use the form that accepts WebServiceFeature varargs.

    ### After
    ```java
    protected Service(URL wsdlDocumentLocation,
                      QName serviceName,
                      WebServiceFeature... features) { ... }
    ```

    ### Additional Info
    - JBoss EAP 6.4 (JBossWS 4) hid this requirement; JBoss EAP 7+/JBossWS 5+ does not.
    - Applies to any class that extends jakarta.xml.ws.Service and is referenced via @WebServiceRef.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#jakarta_xml_web_services_2_2_requirements_for_webserviceref
      title: Migration Documentation
  when:
    java.referenced:
        pattern: jakarta.xml.ws.Service
        location: CONSTRUCTOR_CALL
- ruleID: webservices-pattern-00090
  description: Handler classes are no longer auto-loaded from org.jboss.as.webservices.server.integration; explicit module dependencies are required
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: Because injections are now enabled in service endpoint and service client handlers, handler classes are no longer automatically loaded from the org.jboss.as.webservices.server.integration JBoss module. If your application depended on the predefined configuration, declare new module dependencies in jboss-deployment-structure.xml or MANIFEST.MF.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#server_side_configuration_and_class_loading
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: org\.jboss\.as\.webservices\.server\.integration
        filePattern: .*\.(xml|properties|conf)
- ruleID: webservices-pattern-00100
  description: Java-endorsed standards override mechanism was deprecated in JDK 1.8_40 and removed in JDK 9
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: The Java-endorsed standards override mechanism (java.endorsed.dirs) was deprecated in JDK 1.8_40 and removed in JDK 9. If your application accesses Apache CXF directly, you must provide the Apache CXF dependencies after the JBossWS dependencies as part of your deployment. Remove references to java.endorsed.dirs from JVM arguments and configuration.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#deprecation_of_java_endorsed_standards_override_mechanism
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: java\.endorsed\.dirs
        filePattern: .*\.(sh|bat|cmd|conf|properties|ya?ml|xml|env|args|Dockerfile)
