        location: IMPORT
- ruleID: webservices-pattern-00040
  description: Security Token Service now validates ActAs tokens; a valid UsernameToken username/password is required
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: The Security Token Service (STS) now validates ActAs tokens in addition to onBehalfOf tokens. Any client that issues an ActAs token must include a valid UsernameToken with a real username and password. Review WS-Security policy configuration and client code paths that supply ActAs tokens.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#ws_security_changes
      title: Migration Documentation
