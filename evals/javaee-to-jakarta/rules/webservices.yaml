        pattern: http://www.w3.org/2001/04/xmlenc#rsa-1_5
        filePattern: .*\.(xml|properties)
- ruleID: webservices-pattern-00060
  description: JBoss EAP 8 merged cxf-api and cxf-rt-core JARs into a single cxf-core JAR exposed by the org.apache.cxf module
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: The cxf-api and cxf-rt-core JARs have been merged into a single cxf-core JAR. The org.apache.cxf JBoss module now contains cxf-core and exposes more classes than the previous release. Review any explicit module references or jboss-deployment-structure.xml dependencies that mention cxf-api or cxf-rt-core.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#jboss_modules_structure_change
      title: Migration Documentation
  when:
