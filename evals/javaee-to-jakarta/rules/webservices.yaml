    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: SAML Bearer tokens are now required to have an internal signature. The org.apache.wss4j.dom.validate.SamlAssertionValidator class exposes setRequireBearerSignature(boolean) to control signature verification. Review existing usages of SamlAssertionValidator and decide whether bearer-signature verification should remain enabled (recommended) or be explicitly disabled.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#ws_security_changes
      title: Migration Documentation
