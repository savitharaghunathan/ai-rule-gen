- ruleID: webservices-pattern-00020
  description: Spring integration removed in JBoss EAP 8; jbossws-cxf.xml Spring configuration must be replaced with JBossWS descriptor or CDI
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring integration is no longer supported in JBoss EAP 8. Applications that use a jbossws-cxf.xml descriptor to customize JBossWS/Apache CXF integration must replace those Spring custom configurations with the new JBossWS jaxws-endpoint-config.xml / jaxws-client-config.xml descriptor configuration, or with CDI.

    ### Migration Steps
    - Remove jbossws-cxf.xml from the deployment archive.
    - Move CXF interceptor declarations to a JBossWS jaxws-endpoint-config.xml using cxf.interceptors.in / cxf.interceptors.out properties.
    - Move CXF feature declarations to the cxf.features property in jaxws-endpoint-config.xml.
    - Replace remaining Spring DI with CDI where possible.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#apache_cxf_spring_web_services_changes
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: jbossws-cxf\.xml
        filePattern: .*jbossws-cxf\.xml
- ruleID: webservices-import-00010
  description: Apache CXF HTTPConduit programmatic transport tuning should be reviewed for JBoss EAP 8 / JBossWS 7 compatibility
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Code that obtains and configures org.apache.cxf.transport.http.HTTPConduit programmatically (e.g. via ClientProxy.getClient(port).getConduit()) directly depends on Apache CXF. While this still works, the recommended JBoss EAP 8 approach is to set HTTP transport defaults via system properties (cxf.client.allowChunking, cxf.client.chunkingThreshold, cxf.client.connectionTimeout, cxf.client.receiveTimeout, cxf.client.connection, cxf.tls-client.disableCNCheck) or via JBossWS descriptor configuration so the application stays portable.

    ### Before
    ```java
    import org.apache.cxf.frontend.ClientProxy;
    import org.apache.cxf.transport.http.HTTPConduit;
    import org.apache.cxf.transports.http.configuration.HTTPClientPolicy;

    HTTPConduit conduit = (HTTPConduit) ClientProxy.getClient(port).getConduit();
    HTTPClientPolicy client = conduit.getClient();
    client.setChunkingThreshold(8192);
    ```

    ### After
    Prefer JBossWS jaxws-client-config.xml properties or system properties (e.g. cxf.client.chunkingThreshold=8192) over direct CXF API usage.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#apache_cxf_http_transport
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.cxf.transport.http.HTTPConduit
        location: IMPORT
- ruleID: webservices-pattern-00030
  description: System property org.jboss.security.ignoreHttpsHost renamed to cxf.tls-client.disableCNCheck
  category: mandatory
