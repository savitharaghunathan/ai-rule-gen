    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: The system property org.jboss.security.ignoreHttpsHost, which disables the HTTPS hostname CN check, has been renamed to cxf.tls-client.disableCNCheck. Update startup scripts, Dockerfiles, CI configs and JBoss EAP launch arguments accordingly.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#ignorehttpshost_cn_check_change
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: org\.jboss\.security\.ignoreHttpsHost
        filePattern: .*\.(sh|bat|cmd|conf|properties|ya?ml|xml|env|args|Dockerfile)
- ruleID: webservices-import-00020
