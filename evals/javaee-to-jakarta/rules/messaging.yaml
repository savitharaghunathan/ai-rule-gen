- ruleID: messaging-dependency-00020
  description: Clients that depend on Artemis client JARs must add the org.jboss.eap:wildfly-client-properties dependency
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Starting with JBoss EAP 7.2, client applications that directly depend on Artemis client JARs (artemis-jms-client, artemis-commons, artemis-core-client, artemis-selector) must add the following dependency to pom.xml to avoid JMSRuntimeException when calling message.getJMSReplyTo() from older JBoss EAP 7 clients:

    ```xml
    <dependency>
      <groupId>org.jboss.eap</groupId>
      <artifactId>wildfly-client-properties</artifactId>
    </dependency>
    ```

    See JBEAP-15889 for background.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#messaging_application_changes_required_for_jboss_eap_7
      title: Migration Documentation
  when:
    java.dependency:
        name: org.apache.activemq.artemis-jms-client
        lowerbound: 0.0.0
- ruleID: messaging-pattern-00020
  description: IBM MQ resource adapter RAR renamed for the jakarta namespace
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    JBoss EAP 8.0 requires a Jakarta EE 10 compliant IBM MQ resource adapter. If you previously deployed `wmq.jmsra.rar` (the javax-namespace adapter), you must replace it with `wmq.jakarta.jmsra.rar`.

    ### Migration Steps
    - Remove and undeploy the previous `wmq.jmsra.rar` resource adapter configuration.
    - Deploy `wmq.jakarta.jmsra.rar` (typically obtained from `/opt/mqm/java/lib/jca/wmq.jakarta.jmsra.rar`).
    - Update CLI scripts, MDB `@ResourceAdapter(value=...)` annotations, and any `@JMSConnectionFactoryDefinition(resourceAdapter=...)` to reference the new RAR name.
    - Update connection-factory `interfaceName` from `javax.jms.ConnectionFactory` to `jakarta.jms.ConnectionFactory`.
    - Update MQ admin-object `class-name` values from `com.ibm.mq.connector.outbound.*` to `com.ibm.mq.jakarta.connector.outbound.*`.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/application-migration-changes#deploying-ibm-mq-resource-adapter
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: wmq\.jmsra
        filePattern: .*\.(xml|properties|ya?ml|conf|sh|cli|java)
- ruleID: messaging-import-00020
  description: IBM MQ adapter class package moved to com.ibm.mq.jakarta.connector.outbound
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    IBM MQ resource adapter classes used in `admin-object` and `connection-definition` configuration moved from `com.ibm.mq.connector.outbound.*` to `com.ibm.mq.jakarta.connector.outbound.*` in the Jakarta-namespace adapter.

    ### Before
    ```
    class-name=com.ibm.mq.connector.outbound.MQQueueProxy
    class-name=com.ibm.mq.connector.outbound.MQTopicProxy
    class-name=com.ibm.mq.connector.outbound.ManagedConnectionFactoryImpl
    ```

    ### After
    ```
    class-name=com.ibm.mq.jakarta.connector.outbound.MQQueueProxy
    class-name=com.ibm.mq.jakarta.connector.outbound.MQTopicProxy
    class-name=com.ibm.mq.jakarta.connector.outbound.ManagedConnectionFactoryImpl
    ```
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/application-migration-changes#deploying-ibm-mq-resource-adapter
      title: Migration Documentation
  when:
    or:
        - java.referenced:
            pattern: com.ibm.mq.connector.outbound.MQQueueProxy
            location: IMPORT
        - java.referenced:
            pattern: com.ibm.mq.connector.outbound.MQTopicProxy
            location: IMPORT
        - java.referenced:
            pattern: com.ibm.mq.connector.outbound.ManagedConnectionFactoryImpl
            location: IMPORT
