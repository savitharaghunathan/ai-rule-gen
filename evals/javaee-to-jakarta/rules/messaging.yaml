- ruleID: messaging-pattern-00010
  description: HornetQ messaging deployment descriptor namespace replaced by ActiveMQ Artemis namespace
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The proprietary HornetQ -jms.xml deployment descriptors no longer work in JBoss EAP 7+. Either replace them with the standard Resource Definition deployment descriptor or update them to use the new messaging-activemq-deployment schema.

    ### Migration Steps
    - Change the namespace from urn:jboss:messaging-deployment:1.0 to urn:jboss:messaging-activemq-deployment:1.0.
    - Rename the <hornetq-server> element to <server>.
    - Verify that <jms-queue> and <jms-topic> entries remain unchanged.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#replace_or_update_jakarta_messaging_deployment_descriptors
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: urn:jboss:messaging-deployment:1.0
        filePattern: .*-jms\.xml
- ruleID: messaging-xml-00010
  description: <hornetq-server> element renamed to <server> in messaging-activemq-deployment schema
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: Rename the <hornetq-server> element in -jms.xml deployment descriptors to <server> under the urn:jboss:messaging-activemq-deployment:1.0 namespace.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#replace_or_update_jakarta_messaging_deployment_descriptors
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='hornetq-server']
- ruleID: messaging-import-00010
  description: HornetQ API replaced by Apache ActiveMQ Artemis API in JBoss EAP 7+
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: JBoss EAP 6 included the org.hornetq module so applications could use the HornetQ API. Apache ActiveMQ Artemis replaces HornetQ in JBoss EAP 7+. Migrate any code that imports from org.hornetq to use the equivalent Artemis classes from the org.apache.activemq.artemis module. Many concepts carry over, but APIs must be re-imported and method names verified.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#replace_the_hornetq_api
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.hornetq
        location: PACKAGE
- ruleID: messaging-dependency-00010
  description: HornetQ client library replaced by Apache ActiveMQ Artemis JMS client
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: Remove the org.hornetq:hornetq-core-client dependency and replace it with org.apache.activemq:artemis-jms-client (or the appropriate Artemis client module).
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#replace_the_hornetq_api
      title: Migration Documentation
  when:
    java.dependency:
        name: org.hornetq.hornetq-core-client
        lowerbound: 0.0.0
- ruleID: messaging-xml-00020
  description: Deprecated address-setting attribute auto-create-jms-queues replaced by auto-create-queues
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: The deprecated address-setting attribute auto-create-jms-queues no longer takes effect in JBoss EAP 8.0. Replace it with auto-create-queues. Note that JBoss EAP 6 default was false; the replacement attribute defaults to true. Set it back to false if you want to preserve EAP 6 behavior.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#replace_deprecated_address_setting_attributes
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[@name='auto-create-jms-queues' or local-name()='auto-create-jms-queues']
