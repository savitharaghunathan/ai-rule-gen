- ruleID: deployment-import-00010
  description: JSR-88 javax.enterprise.deploy.spi APIs were dropped in Java EE 7 / JBoss EAP 7
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    JSR-88 (Java EE Application Deployment) defined the `javax.enterprise.deploy.spi.DeploymentManager` and related interfaces. Support was dropped from Java EE 7 and JBoss EAP 7, so any client code that uses these APIs to deploy applications no longer works on JBoss EAP 8.

    ### Migration Steps
    - Remove references to `javax.enterprise.deploy.spi.*` (DeploymentManager, Target, ProgressObject, etc.).
    - Replace JSR-88 deployments with the JBoss EAP management CLI `deploy` command, the management HTTP API, or Maven/Gradle plugins (e.g., `wildfly-maven-plugin`).
    - Delete any `deployment-plan.xml` descriptors used to drive JSR-88 deployments.

    ### Additional Info
    - See *Management CLI Guide* for the new deployment workflow.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#migrate-deployment-plan-configurations
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.enterprise.deploy.spi
        location: PACKAGE
- ruleID: deployment-pattern-00010
  description: JSR-88 deployment-plan.xml descriptors are no longer used in JBoss EAP 7+
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `deployment-plan.xml` is the JSR-88 descriptor bundled inside archives or JARs to drive deployment through `javax.enterprise.deploy.spi.DeploymentManager`. Because JSR-88 was dropped in Java EE 7 / JBoss EAP 7, these files have no effect on JBoss EAP 8 deployments.

    ### Migration Steps
    - Remove `deployment-plan.xml` from your application archive.
    - Switch deployment automation to the JBoss EAP management CLI `deploy` command (or the management HTTP API / Maven plugin).
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#migrate-deployment-plan-configurations
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: deployment-plan
        filePattern: .*deployment-plan\.xml
