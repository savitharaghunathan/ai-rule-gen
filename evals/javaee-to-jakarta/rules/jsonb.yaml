- ruleID: jsonb-annotation-00010
  description: JSON-B default no longer requires all @JsonbCreator parameters in JSON input
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    By default, types annotated with `@JsonbCreator` no longer require all parameters to be present in the JSON content — default values are used for missing parameters. This is a behavioral default change relative to EE 8.

    ### Migration Steps
    - If your application relied on the strict EE 8 behavior (rejecting JSON missing one or more creator parameters), enable it explicitly: `new JsonbConfig().withCreatorParametersRequired(true)`.
    - Otherwise, accept the new lenient default behavior.
    - This rule fires on classes carrying `@JsonbCreator` (or pre-migration `javax.json.bind.annotation.JsonbCreator`) so the behavior change can be reviewed at each call site.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-json-binding
      title: Migration Documentation
  when:
    java.referenced:
        pattern: jakarta.json.bind.annotation.JsonbCreator
        location: ANNOTATION
