- ruleID: security-type-00010
  description: JBoss Web AuthenticatorBase is removed; replace with a custom HTTP authentication mechanism registered in the Elytron/Undertow subsystems
  category: mandatory
  effort: 9
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Custom authenticator valves that extend `org.apache.catalina.authenticator.AuthenticatorBase` were a JBoss EAP 6 JBoss Web extension point. JBoss EAP 7 replaced JBoss Web with Undertow, and JBoss EAP 8 enforces Elytron-only security, so these valves no longer work.

    ### Migration Steps
    - Identify classes that extend `org.apache.catalina.authenticator.AuthenticatorBase`.
    - Rewrite the authenticator as a custom HTTP authentication mechanism created in the `elytron` subsystem.
    - Register the mechanism with the `undertow` subsystem so deployments can reference it.
    - Remove the corresponding `<valve>` entry from `jboss-web.xml`.

    ### Additional Info
    - See *Developing a Custom HTTP Mechanism* in the JBoss EAP Development Guide.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#migrate-authenticator-valves
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.catalina.authenticator.AuthenticatorBase
        location: INHERITANCE
- ruleID: security-import-00010
  description: PicketLink has been removed from JBoss EAP 8.0; migrate to Keycloak SAML adapter or Red Hat build of Keycloak
  category: mandatory
  effort: 9
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    PicketLink (SP, IDP, and STS) has been removed from JBoss EAP 8.0. Any application code or configuration that references `org.picketlink.*` classes will fail at runtime.

    ### Migration Steps
    - Replace PicketLink Service Provider usage with the Keycloak SAML adapter feature pack.
    - Replace PicketLink Identity Provider deployments with the Red Hat build of Keycloak.
    - Replace PicketLink STS with the Apache CXF Security Token Service implementation.
    - Remove `org.picketlink.*` imports and the corresponding Maven dependencies (e.g., `org.picketlink:picketlink-api`, `org.picketlink:picketlink-impl`).

    ### Additional Info
    - See *Securing web applications using SAML* and *Configuring Red Hat build of Keycloak*.
    - See *Security Token Service (STS)* for CXF STS configuration.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#picketlink-removal_default
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.picketlink*
        location: PACKAGE
- ruleID: security-dependency-00010
  description: PicketLink API dependency is no longer available in JBoss EAP 8.0
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
