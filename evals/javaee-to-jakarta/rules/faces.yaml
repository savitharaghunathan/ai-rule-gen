        lowerbound: 0.0.0
- ruleID: faces-xml-00010
  description: Jakarta Faces 4.0 removed JSP support; FacesServlet must not be mapped to *.jsp
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Jakarta Server Pages (JSP) support was deprecated in Faces 2.0 and is removed in Jakarta Faces 4.0. Facelets is the only supported View Definition Language. A `web.xml` that maps `FacesServlet` to the `*.jsp` suffix indicates Faces-on-JSP usage that must be rewritten as Facelets.

    ### Migration Steps
    - Convert each JSP-based Faces view to a Facelets (`*.xhtml`) view.
    - Update the `<servlet-mapping>` in `web.xml` for `FacesServlet` from `*.jsp` to `*.xhtml`.
    - Remove or re-target any JSP tag libraries (taglib) that were specific to Faces.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#jakarta-faces-and-java-server-pages
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='servlet-mapping' and (*[local-name()='servlet-name'] = preceding::*[local-name()='servlet'][*[local-name()='servlet-class' and (text()='javax.faces.webapp.FacesServlet' or text()='jakarta.faces.webapp.FacesServlet')]]/*[local-name()='servlet-name']) and *[local-name()='url-pattern' and contains(text(), '.jsp')]]
        filepaths:
            - web.xml
- ruleID: faces-annotation-00010
  description: javax.faces.bean.ManagedBean removed in Faces 4.0; use CDI @Named
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The Faces-specific managed-bean concept (`@javax.faces.bean.ManagedBean`) was removed in Jakarta Faces 4.0. Replace it with CDI `@jakarta.inject.Named` and any `managed-bean` element in `faces-config.xml` should be removed.

    ### Before
    ```java
    import javax.faces.bean.ManagedBean;
    import javax.faces.bean.ApplicationScoped;

    @ManagedBean(name = "foo", eager = true)
    @ApplicationScoped
    public class FooBean { }
    ```

    ### After
    ```java
    import jakarta.inject.Named;
    import jakarta.enterprise.context.ApplicationScoped;
    import jakarta.enterprise.event.Observes;
    import jakarta.enterprise.event.Startup;

    @Named("foo")
    @ApplicationScoped
    public class FooBean {
        public void onStartup(@Observes Startup event) { /* eager init */ }
    }
    ```

    ### Additional Info
    - For `eager=true` startup semantics, observe `jakarta.enterprise.event.Startup` (new in CDI 4.0) or `@Initialized(ApplicationScoped.class)`.
    - Remove any `<managed-bean>` elements from `faces-config.xml`.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#faces-managed-beans
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.faces.bean.ManagedBean
        location: ANNOTATION
- ruleID: faces-annotation-00020
  description: javax.faces.bean.ManagedProperty removed in Faces 4.0
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `@javax.faces.bean.ManagedProperty` was removed in Jakarta Faces 4.0. Replace with `@jakarta.faces.annotation.ManagedProperty` combined with `@jakarta.inject.Inject`.

    ### Before
    ```java
    import javax.faces.bean.ManagedProperty;
    @ManagedProperty("#{userService}")
    private UserService userService;
    ```

    ### After
    ```java
    import jakarta.faces.annotation.ManagedProperty;
    import jakarta.inject.Inject;
    @Inject
    @ManagedProperty("#{userService}")
    private UserService userService;
    ```
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#faces-managed-beans
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.faces.bean.ManagedProperty
        location: ANNOTATION
- ruleID: faces-annotation-00030
