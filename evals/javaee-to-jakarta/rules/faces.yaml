- ruleID: faces-annotation-00090
  description: ResourceResolver / FaceletsResourceResolver removed; implement ResourceHandler
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Both `javax.faces.view.facelets.ResourceResolver` and `javax.faces.view.facelets.FaceletsResourceResolver` were removed in Jakarta Faces 4.0.

    ### Migration Steps
    - Implement the `jakarta.faces.application.ResourceHandler` interface instead.
    - Register the fully qualified class name of your implementation in the `<application>/<resource-handler>` element in `faces-config.xml`.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#other-faces-api-changes
      title: Migration Documentation
  when:
    or:
        - java.referenced:
            pattern: javax.faces.view.facelets.ResourceResolver
            location: ANNOTATION
        - java.referenced:
            pattern: javax.faces.view.facelets.FaceletsResourceResolver
            location: ANNOTATION
