        location: ANNOTATION
- ruleID: faces-annotation-00040
  description: '@CustomScoped removed; use a CDI custom scope implementation'
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `@javax.faces.bean.CustomScoped` was removed in Jakarta Faces 4.0. Replace with a CDI custom scope using `jakarta.enterprise.context.spi.Context`.

    ### Migration Steps
    - Define a new CDI scope annotation and implement `jakarta.enterprise.context.spi.Context`.
    - Register the scope with CDI via a portable extension or build-compatible extension.
    - See the CDI 4.0 specification chapters "Defining new scope types" and "The Context interface".
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html/migration_guide/jakarta-ee-changes#faces-managed-beans
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.faces.bean.CustomScoped
        location: ANNOTATION
