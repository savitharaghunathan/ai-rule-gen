- ruleID: faces-dependency-00010
  description: JBoss EAP 8.0 no longer supports any JSF version prior to 4.0; jsf-api dependency must be removed
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=eap7
    - konveyor.io/target=jakarta-ee
    - konveyor.io/target=eap8
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    JBoss EAP 8.0 only supports Jakarta Server Faces 4.0 and later. The old Mojarra `com.sun.faces:jsf-api` artifact (used by JSF 1.2 and 2.x) is no longer compatible.

    ### Migration Steps
    - Remove `com.sun.faces:jsf-api` (and `jsf-impl`) from `pom.xml`.
    - Add `jakarta.faces:jakarta.faces-api` (4.0 or later) as a `provided` dependency.
    - Rewrite `javax.faces.*` imports to `jakarta.faces.*` (covered by the Jakarta namespace rules).
    - See *Jakarta Faces Code Changes* in the migration guide for behavioural differences between JSF 1.2/2.x and 4.0.
  links:
    - url: https://access.redhat.com/documentation/en-us/red_hat_jboss_enterprise_application_platform/8.0/html-single/migration_guide/index#jakarta-faces-code-changes
      title: Migration Documentation
  when:
    java.dependency:
        name: com.sun.faces.jsf-api
        lowerbound: 0.0.0
- ruleID: faces-dependency-00020
