- ruleID: spring-security-annotation-00010
  description: '@PostAuthorize is not supported in Quarkus'
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: '`@PostAuthorize` is not supported by `quarkus-spring-security`. Refactor the authorisation check into the method body using `SecurityIdentity` (`io.quarkus.security.identity.SecurityIdentity`) or move the predicate into a request filter.'
  links:
    - url: https://quarkus.io/guides/spring-security
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.security.access.prepost.PostAuthorize
        location: ANNOTATION
