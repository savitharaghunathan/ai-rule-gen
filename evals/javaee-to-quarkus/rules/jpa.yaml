- ruleID: jpa-type-00010
  description: Spring Data repository interfaces require quarkus-spring-data-jpa; PanacheRepository is the native Quarkus equivalent
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Add `io.quarkus:quarkus-spring-data-jpa` to keep `CrudRepository`, `JpaRepository`, `PagingAndSortingRepository`, etc. working — Quarkus generates the implementation at build time.

    ### Before
    ```java
    import org.springframework.data.repository.CrudRepository;

    public interface FruitRepository extends CrudRepository<Fruit, Long> {
        List<Fruit> findByColor(String color);
    }
    ```

    ### After (native Quarkus style)
    ```java
    import io.quarkus.hibernate.orm.panache.PanacheRepository;

    @ApplicationScoped
    public class FruitRepository implements PanacheRepository<Fruit> {
        public List<Fruit> findByColor(String color) {
            return list("color", color);
        }
    }
    ```

    ### Additional Info
    - Unsupported: `QueryByExampleExecutor`, `JpaSpecificationExecutor`, QueryDSL, native/named `@Query`, `org.springframework.data.jpa.repository.Lock`, custom base repositories.
    - `@Modifying`-annotated methods are automatically wrapped in `@Transactional`.
  links:
    - url: https://quarkus.io/guides/spring-data-jpa
      title: Migration Documentation
  when:
    or:
        - java.referenced:
            pattern: org.springframework.data.repository.CrudRepository
            location: INHERITANCE
        - java.referenced:
            pattern: org.springframework.data.repository.Repository
            location: INHERITANCE
        - java.referenced:
            pattern: org.springframework.data.repository.ListCrudRepository
            location: INHERITANCE
        - java.referenced:
            pattern: org.springframework.data.repository.PagingAndSortingRepository
            location: INHERITANCE
        - java.referenced:
            pattern: org.springframework.data.repository.ListPagingAndSortingRepository
            location: INHERITANCE
        - java.referenced:
            pattern: org.springframework.data.jpa.repository.JpaRepository
            location: INHERITANCE
