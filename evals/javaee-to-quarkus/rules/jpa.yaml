- ruleID: jpa-import-00010
  description: Quarkus uses Jakarta EE 9+ namespace; javax.persistence is replaced by jakarta.persistence
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus uses Jakarta Persistence (Jakarta EE 9+) which renamed the `javax.persistence` namespace to `jakarta.persistence`. All JPA annotations, entity manager APIs, and persistence types must be re-imported from `jakarta.persistence.*`.

    ### Before
    ```java
    import javax.persistence.Entity;
    import javax.persistence.Id;
    import javax.persistence.EntityManager;
    import javax.persistence.PersistenceContext;

    @Entity
    public class Fruit {
        @Id
        private Long id;
    }
    ```

    ### After
    ```java
    import jakarta.persistence.Entity;
    import jakarta.persistence.Id;
    import jakarta.persistence.EntityManager;
    import jakarta.persistence.PersistenceContext;

    @Entity
    public class Fruit {
        @Id
        private Long id;
    }
    ```

    ### Additional Info
    - Quarkus integrates Hibernate ORM with Jakarta Persistence; the `quarkus-hibernate-orm` extension supplies the implementation.
    - Replace `@PersistenceContext EntityManager` with constructor / field injection via CDI `@Inject EntityManager`.
    - Consider migrating repository code to Panache (`PanacheRepository<Entity, Long>`) for less boilerplate.
    - See the Quarkus Hibernate ORM guide for configuration via `quarkus.hibernate-orm.*` properties instead of `persistence.xml`.
  links:
    - url: https://quarkus.io/guides/hibernate-orm
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.persistence*
        location: PACKAGE
- ruleID: jpa-dependency-00010
