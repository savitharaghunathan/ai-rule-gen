- ruleID: jpa-xml-00010
  description: Quarkus configures Hibernate ORM via application.properties instead of persistence.xml
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Delete `META-INF/persistence.xml` and move its settings into `application.properties` under the `quarkus.hibernate-orm.*` namespace (datasource selection is automatic when a single datasource exists).

    ### Migration Steps
    1. Remove `persistence.xml`.
    2. Set the datasource via `quarkus.datasource.db-kind`, `quarkus.datasource.username`, `quarkus.datasource.jdbc.url`.
    3. Map Hibernate properties: `hibernate.hbm2ddl.auto` -> `quarkus.hibernate-orm.schema-management.strategy`; `hibernate.dialect` is auto-detected from `db-kind`.
    4. For multiple persistence units, define named units under `quarkus.hibernate-orm."<unit>".*`.
  links:
    - url: https://quarkus.io/guides/hibernate-orm
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='persistence-unit']
        namespaces:
            p: http://xmlns.jcp.org/xml/ns/persistence
            p2: https://jakarta.ee/xml/ns/persistence
        filepaths:
            - src/main/resources/META-INF/persistence.xml
            - META-INF/persistence.xml
- ruleID: jpa-pattern-00010
  description: spring.jpa.* properties must be renamed to quarkus.hibernate-orm.* in Quarkus
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Rename `spring.jpa.*` properties to `quarkus.hibernate-orm.*`:
    - `spring.jpa.hibernate.ddl-auto` -> `quarkus.hibernate-orm.schema-management.strategy`
    - `spring.jpa.show-sql` -> `quarkus.hibernate-orm.log.sql`
    - `spring.jpa.properties.hibernate.dialect` -> usually unnecessary; Quarkus picks the dialect from `db-kind`.
    - `spring.jpa.properties.hibernate.*` -> `quarkus.hibernate-orm.unsupported-properties."hibernate.*"`.
  links:
    - url: https://quarkus.io/guides/hibernate-orm
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.jpa\.
        filePattern: application.*\.(properties|ya?ml)
- ruleID: jpa-pattern-00020
  description: Quarkus configures Hibernate ORM via application.properties; persistence.xml is optional and discouraged
  category: optional
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In Quarkus, Hibernate ORM is configured via `application.properties` (`quarkus.hibernate-orm.*` keys). A `persistence.xml` file is unnecessary for typical applications and only retained for advanced use cases.

    ### Migration Steps
    - Move JPA settings from `persistence.xml` to `application.properties` using `quarkus.hibernate-orm.*` and `quarkus.datasource.*` keys.
    - Replace `<jta-data-source>` JNDI references with a Quarkus named datasource.
    - Replace `<class>` listings with classpath-discovered `@Entity` classes (Quarkus indexes them automatically).
    - For mapping files, use `quarkus.hibernate-orm.mapping-files` instead of `<mapping-file>`.
    - Remove or simplify `persistence.xml` once migration is complete.
  links:
    - url: https://quarkus.io/guides/hibernate-orm
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: META-INF/persistence.xml
        filePattern: (.*/)?persistence\.xml
- ruleID: jpa-pattern-00030
  description: Quarkus auto-includes META-INF/orm.xml; verify mapping settings and that duplicate files do not exist in multiple JARs
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus auto-includes `META-INF/orm.xml` by default. Verify that no duplicate `orm.xml` files exist across JARs (Quarkus does not handle duplicates), and switch to `quarkus.hibernate-orm.mapping-files=no-file` if you want to disable it.

    ### Additional Info
    - `hbm.xml` format is deprecated by Hibernate; prefer `orm.xml`.
    - XML mapping files are parsed at build time in Quarkus.
  links:
    - url: https://quarkus.io/guides/hibernate-orm#xml-mapping
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: META-INF/orm\.xml
        filePattern: (.*/)?META-INF/orm\.xml
- ruleID: jpa-pattern-00040
  description: Hibernate hbm.xml mapping format is deprecated; migrate to orm.xml or annotations
  category: optional
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Hibernate's `hbm.xml` mapping format is deprecated. Convert mappings to `orm.xml` (Jakarta Persistence XML format) or to JPA annotations on `@Entity` classes.

    ### Additional Info
    - Quarkus still parses `hbm.xml` when referenced, but support is best-effort.
    - See https://quarkus.io/guides/hibernate-orm#xml-mapping
  links:
    - url: https://quarkus.io/guides/hibernate-orm#xml-mapping
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: \.hbm\.xml
        filePattern: .*\.hbm\.xml
- ruleID: jpa-import-00020
  description: Hibernate ThreadLocalSessionContext is not supported in Quarkus; use CDI injection
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus does not implement Hibernate's `ThreadLocalSessionContext` for binding the Session to a thread-local. Use CDI injection (`@Inject EntityManager` or `@Inject Session`) instead.

    ### Additional Info
    - The thread-local pattern does not integrate with reactive context propagation; CDI is the recommended approach.
    - See https://quarkus.io/guides/hibernate-orm#limitations (Binding the Session to ThreadLocal context).
  links:
    - url: https://quarkus.io/guides/hibernate-orm#limitations
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.hibernate.context.internal.ThreadLocalSessionContext
        location: IMPORT
