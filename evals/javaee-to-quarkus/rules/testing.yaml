- ruleID: testing-annotation-00020
  description: '@SpringBootTest must be replaced by @QuarkusTest'
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Replace `@SpringBootTest` with `@io.quarkus.test.junit.QuarkusTest`. Replace `MockMvc` HTTP assertions with REST-assured. `@WebMvcTest`/`@DataJpaTest` slices have no exact equivalent - use `@QuarkusTest` plus profile-restricted properties to disable unrelated extensions.

    ### Before
    ```java
    @SpringBootTest(webEnvironment = WebEnvironment.RANDOM_PORT)
    class MyTest {
        @Autowired TestRestTemplate restTemplate;
    }
    ```

    ### After
    ```java
    @QuarkusTest
    class MyTest {
        @Test void greet() {
            given().when().get("/greeting").then().statusCode(200);
        }
    }
    ```
  links:
    - url: https://quarkus.io/guides/getting-started-testing
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.context.SpringBootTest
        location: ANNOTATION
