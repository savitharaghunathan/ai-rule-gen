- ruleID: testing-annotation-00010
  description: '@QuarkusTestResource is being replaced by @WithTestResource for finer scoping'
  category: optional
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Quarkus introduced `@io.quarkus.test.common.WithTestResource`, which supports scoping via `TestResourceScope` (MATCHING_RESOURCES, RESTRICTED_TO_CLASS, GLOBAL). `@QuarkusTestResource` still works but is the older API; new code should prefer `@WithTestResource`.
  links:
