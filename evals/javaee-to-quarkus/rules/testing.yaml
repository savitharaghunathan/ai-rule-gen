- ruleID: testing-annotation-00050
  description: Replace Spring @MockBean with @InjectMock in Quarkus tests
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus' Mockito integration provides `@io.quarkus.test.InjectMock` (and `@InjectSpy`) to replace CDI beans with Mockito mocks during a `@QuarkusTest`. Add the `quarkus-junit5-mockito` dependency.

    ### Before
    ```java
    @MockBean
    MyService service;
    ```

    ### After
    ```java
    @InjectMock
    MyService service;
    ```
  links:
    - url: https://quarkus.io/guides/getting-started-testing#further-simplification-with-injectmock
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.mock.mockito.MockBean
        location: ANNOTATION
