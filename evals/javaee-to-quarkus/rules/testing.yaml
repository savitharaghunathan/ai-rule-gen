- ruleID: testing-annotation-00090
  description: Quarkus testing uses JUnit 5; JUnit 4 @Test must be migrated
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus testing infrastructure (`@QuarkusTest`, `@QuarkusIntegrationTest`, `QuarkusTestExtension`) is built on JUnit 5. JUnit 4 `org.junit.Test` annotations and Runners are not supported by `@QuarkusTest`. Migrate test classes to JUnit Jupiter (`org.junit.jupiter.api.Test`).

    ### Before
    ```java
    import org.junit.Test;
    import org.junit.runner.RunWith;
    import org.junit.runners.JUnit4;

    @RunWith(JUnit4.class)
    public class FooTest {
        @Test
        public void test() { ... }
    }
    ```

    ### After
    ```java
    import org.junit.jupiter.api.Test;
    import io.quarkus.test.junit.QuarkusTest;

    @QuarkusTest
    public class FooTest {
        @Test
        void test() { ... }
    }
    ```

    ### Additional Info
    - Remove junit:junit (JUnit 4) dependency
    - Add io.quarkus:quarkus-junit5 dependency
    - For mocking use io.quarkus.test.InjectMock / io.quarkus.test.junit.QuarkusMock
  links:
    - url: https://quarkus.io/guides/getting-started-testing
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.junit.Test
        location: ANNOTATION
- ruleID: testing-annotation-00100
  description: Spring's @RunWith / SpringRunner is not supported by Quarkus testing
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    JUnit 4's `@RunWith(SpringRunner.class)` and `@RunWith(SpringJUnit4ClassRunner.class)` are not supported by Quarkus tests. Quarkus uses JUnit 5 extensions (registered automatically by @QuarkusTest).

    ### Migration Steps
    1. Remove @RunWith annotations
    2. Add @QuarkusTest to the test class
    3. Migrate test methods to JUnit Jupiter (org.junit.jupiter.api.Test)
  links:
    - url: https://quarkus.io/guides/getting-started-testing
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.junit.runner.RunWith
        location: ANNOTATION
