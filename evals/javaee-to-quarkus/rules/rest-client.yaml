- ruleID: rest-client-annotation-00010
  description: Spring Cloud OpenFeign clients are not supported; use MicroProfile Rest Client
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: '`@FeignClient` interfaces are NOT supported. Migrate to MicroProfile Rest Client: annotate the interface with `@RegisterRestClient(baseUri = "...")`, use Jakarta REST method annotations (`@GET`, `@POST`, `@Path`), and inject with `@Inject @RestClient MyClient client;`. Add the `quarkus-rest-client-jackson` extension.'
  links:
    - url: https://quarkus.io/guides/rest-client
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.cloud.openfeign.FeignClient
        location: ANNOTATION
- ruleID: rest-client-method-00010
  description: Spring RestTemplate is not provided in Quarkus; use MicroProfile Rest Client or the Jakarta REST Client API
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Replace `new RestTemplate()` calls with a MicroProfile Rest Client interface (`@RegisterRestClient`) or with `jakarta.ws.rs.client.ClientBuilder.newClient()` from the `quarkus-rest-client` extension. Both support async and reactive usage with Mutiny `Uni`/`Multi`.
  links:
    - url: https://quarkus.io/guides/rest-client
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.web.client.RestTemplate
        location: CONSTRUCTOR_CALL
- ruleID: rest-client-dependency-00010
  description: quarkus-resteasy-client must not be used with quarkus-rest; replace with quarkus-rest-client
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `quarkus-resteasy-client` extension (classic RESTEasy MicroProfile REST Client) may NOT be used together with the new `quarkus-rest` (Quarkus REST, formerly RESTEasy Reactive) stack. The two implementations conflict at the JAX-RS provider level.

    If your application is on the Quarkus REST (reactive) stack, replace `quarkus-resteasy-client` with `quarkus-rest-client`, which is the non-blocking MicroProfile REST Client implementation.

    ### Before (pom.xml)
    ```xml
    <dependency>
      <groupId>io.quarkus</groupId>
      <artifactId>quarkus-resteasy-client</artifactId>
    </dependency>
    ```

    ### After (pom.xml)
    ```xml
    <dependency>
      <groupId>io.quarkus</groupId>
      <artifactId>quarkus-rest-client</artifactId>
    </dependency>
    ```

    ### Additional Info
    - `quarkus-resteasy-client-jackson`/`-jsonb` similarly map to `quarkus-rest-client-jackson`/`-jsonb`.
    - The REST Client API surface is largely the same (`@RegisterRestClient`, `@RestClient`).
    - See the [REST Client guide](https://quarkus.io/guides/rest-client) for details.
  links:
    - url: https://quarkus.io/guides/rest#rest-client
      title: Migration Documentation
  when:
    java.dependency:
        name: io.quarkus.quarkus-resteasy-client
        lowerbound: 0.0.0
