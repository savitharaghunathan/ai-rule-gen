- ruleID: spring-cloud-config-annotation-00010
  description: Spring Cloud @RefreshScope has no equivalent in Quarkus
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Cloud's @RefreshScope is not supported in Quarkus. Quarkus reads Spring Cloud Config Server values at startup using the quarkus-spring-cloud-config-client extension, but does not support runtime config refresh via @RefreshScope.

    ### Migration Steps
    1. Remove @RefreshScope annotations
    2. Configure Quarkus to read from Spring Cloud Config Server via `quarkus.spring-cloud-config.*` properties
    3. For runtime config changes, restart the application or use a different config refresh mechanism

    ### Additional Info
    - The quarkus-spring-cloud-config-client extension reads remote config only at startup
    - See https://quarkus.io/guides/spring-cloud-config-client
  links:
    - url: https://quarkus.io/guides/spring-cloud-config-client
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.cloud.context.config.annotation.RefreshScope
        location: ANNOTATION
