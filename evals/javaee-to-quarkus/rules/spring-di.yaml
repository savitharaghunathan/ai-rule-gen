- ruleID: spring-di-type-00050
  description: FactoryBean is a Spring infrastructure class and is not executed in Quarkus
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `org.springframework.beans.factory.FactoryBean` is a Spring infrastructure class and is NOT executed by Quarkus. Replace `FactoryBean` implementations with CDI producer methods that return the desired type directly.

    ### Before
    ```java
    @Component
    public class MyServiceFactory implements FactoryBean<MyService> {
        @Override
        public MyService getObject() { return new MyService(); }
        @Override
        public Class<?> getObjectType() { return MyService.class; }
    }
    ```

    ### After
    ```java
    @ApplicationScoped
    public class MyServiceProducer {
        @Produces
        @ApplicationScoped
        public MyService myService() { return new MyService(); }
    }
    ```

    ### Additional Info
    - CDI producers are the idiomatic replacement for custom bean construction.
    - The Spring Application Context is not started in Quarkus.
  links:
    - url: https://quarkus.io/guides/spring-di#important-technical-note
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.beans.factory.FactoryBean
        location: IMPLEMENTS_TYPE
- ruleID: spring-di-annotation-00110
  description: Spring AOP / AspectJ aspects are not supported in Quarkus; use CDI interceptors
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring AOP (and AspectJ `@Aspect`/`@Around`/`@Before`/`@After`) is NOT supported in Quarkus. Replace aspects with CDI interceptors: define an `@InterceptorBinding` annotation, an `@Interceptor`-annotated class with `@AroundInvoke`, and apply the binding to target methods or classes.

    ### Before
    ```java
    @Aspect
    @Component
    public class LoggingAspect {
        @Around("@annotation(Logged)")
        public Object log(ProceedingJoinPoint pjp) { ... }
    }
    ```

    ### After
    ```java
    @InterceptorBinding
    @Target({TYPE, METHOD})
    @Retention(RUNTIME)
    public @interface Logged {}

    @Logged
    @Interceptor
    public class LoggingInterceptor {
        @AroundInvoke
        public Object log(InvocationContext ctx) throws Exception { ... }
    }
    ```

    ### Additional Info
    - Interceptors on static methods are supported when `quarkus.arc.interception-of-static-methods` is enabled.
    - Self-invocations within a class do not trigger interceptors unless `quarkus.arc.intercepted-self-invocation` is enabled.
  links:
    - url: https://quarkus.io/guides/cdi-reference
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.aspectj.lang.annotation.Aspect
        location: ANNOTATION
