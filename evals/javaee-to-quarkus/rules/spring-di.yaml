- ruleID: spring-di-annotation-00010
  description: Spring @Service has no Quarkus-native equivalent; use @ApplicationScoped or quarkus-spring-di
  category: optional
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Replace `@Service` with a CDI scope such as `@ApplicationScoped`, or keep it and add the `quarkus-spring-di` extension which reads Spring stereotype metadata.

    ### Before
    ```java
    import org.springframework.stereotype.Service;

    @Service
    public class GreetingService { ... }
    ```

    ### After
    ```java
    import jakarta.enterprise.context.ApplicationScoped;

    @ApplicationScoped
    public class GreetingService { ... }
    ```
  links:
    - url: https://quarkus.io/guides/spring-di
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.stereotype.Service
        location: ANNOTATION
- ruleID: spring-di-annotation-00020
