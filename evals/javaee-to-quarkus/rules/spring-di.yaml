  message: |-
    Quarkus does not provide special exception translation for `@Repository`. Replace with `@ApplicationScoped` and use Hibernate ORM/Panache, or use the `quarkus-spring-data-jpa` extension to keep Spring Data repositories.

    ### Before
    ```java
    import org.springframework.stereotype.Repository;

    @Repository
    public class FruitRepository { ... }
    ```

    ### After
    ```java
    import jakarta.enterprise.context.ApplicationScoped;

    @ApplicationScoped
    public class FruitRepository { ... }
    ```
  links:
    - url: https://quarkus.io/guides/spring-di
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.stereotype.Repository
        location: ANNOTATION
