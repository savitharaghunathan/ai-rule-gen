    - konveyor.io/generated-by=ai-rule-gen
  message: Remove the `spring-boot-maven-plugin` and add `io.quarkus.platform:quarkus-maven-plugin` with the `build` and `generate-code` goals. For native image add `<native.enabled>true</native.enabled>` or pass `-Dnative` to the `package` phase.
  links:
    - url: https://quarkus.io/guides/maven-tooling
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //m:plugin[m:groupId/text() = 'org.springframework.boot' and m:artifactId/text() = 'spring-boot-maven-plugin']
        namespaces:
            m: http://maven.apache.org/POM/4.0.0
        filepaths:
            - pom.xml
