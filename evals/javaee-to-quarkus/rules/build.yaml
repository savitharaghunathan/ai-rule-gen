- ruleID: build-xml-00070
  description: spring-boot-maven-plugin must be replaced with quarkus-maven-plugin
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Replace the spring-boot-maven-plugin with the quarkus-maven-plugin. Quarkus builds use the quarkus-maven-plugin for packaging fast-jar / uber-jar / native executable.

    ### Before
    ```xml
    <plugin>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-maven-plugin</artifactId>
    </plugin>
    ```

    ### After
    ```xml
    <plugin>
        <groupId>${quarkus.platform.group-id}</groupId>
        <artifactId>quarkus-maven-plugin</artifactId>
        <version>${quarkus.platform.version}</version>
        <extensions>true</extensions>
        <executions>
            <execution>
                <goals>
                    <goal>build</goal>
                    <goal>generate-code</goal>
                    <goal>generate-code-tests</goal>
                </goals>
            </execution>
        </executions>
    </plugin>
    ```
  links:
    - url: https://quarkus.io/guides/maven-tooling
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: /m:project//m:plugin[m:groupId/text() = 'org.springframework.boot' and m:artifactId/text() = 'spring-boot-maven-plugin']
        namespaces:
            m: http://maven.apache.org/POM/4.0.0
        filepaths:
            - pom.xml
