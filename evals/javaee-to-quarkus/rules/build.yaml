    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Remove `SpringApplication.run(MyApp.class, args)`. Quarkus applications are launched by the Quarkus runtime; no `main` method is required for typical web/CLI apps. For CLI apps implement `io.quarkus.runtime.QuarkusApplication` / `@QuarkusMain`.
  links:
    - url: https://quarkus.io/guides/maven-tooling
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.SpringApplication
        location: METHOD_CALL
