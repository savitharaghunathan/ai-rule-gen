- ruleID: build-xml-00040
  description: Quarkus applications should use 'quarkus' packaging in pom.xml instead of 'war' or 'jar'
  category: optional
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus introduces a dedicated `quarkus` packaging type that hooks the Quarkus build into the Maven lifecycle. Replace `<packaging>war</packaging>` or `<packaging>jar</packaging>` with `<packaging>quarkus</packaging>` for the main application module (not library modules).

    ### Before
    ```xml
    <packaging>war</packaging>
    ```

    ### After
    ```xml
    <packaging>quarkus</packaging>
    ```

    ### Additional Info
    - This packaging type wires up the Quarkus Maven plugin lifecycle (generate-code, build, integration-test, etc.).
    - Quarkus does NOT produce WAR files - it produces a `fast-jar` directory (`target/quarkus-app/`), `uber-jar`, or native executable.
    - Do not use `quarkus` packaging in library modules.
  links:
    - url: https://quarkus.io/guides/maven-tooling#build-tool-maven
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: /*[local-name()='project']/*[local-name()='packaging'][text()='war' or text()='jar']
        filepaths:
            - pom.xml
- ruleID: build-xml-00050
  description: Spring Boot fat-jar/embedded server is replaced by Quarkus fast-jar or uber-jar packaging
  category: optional
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot's fat-jar (with `spring-boot-loader` and embedded Tomcat) is replaced in Quarkus by either:
    - `fast-jar` (default): produces `target/quarkus-app/` directory with `quarkus-run.jar` and required libraries. Run via `java -jar target/quarkus-app/quarkus-run.jar`.
    - `uber-jar`: produces a single self-contained JAR. Enable with `quarkus.package.jar.type=uber-jar`.
    - `native`: produces a GraalVM native executable.

    ### Migration Steps
    1. Remove `spring-boot-loader`/`spring-boot-maven-plugin` `repackage` goal.
    2. For deployment, copy the entire `target/quarkus-app/` directory or use `uber-jar`.
    3. Quarkus uses Vert.x as the HTTP layer - no embedded Tomcat/Jetty.

    ### Additional Info
    - `fast-jar` is the recommended default - it starts faster and uses less memory than uber-jar.
    - Native executables produce a much smaller and faster-starting binary at the cost of build time.
  links:
    - url: https://quarkus.io/guides/maven-tooling#fast-jar
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: /*[local-name()='project']//*[local-name()='dependency'][./*[local-name()='artifactId']/text()='spring-boot-loader']
        filepaths:
            - pom.xml
- ruleID: build-xml-00060
  description: Spring Boot parent POM must be replaced with Quarkus BOM in dependencyManagement
  category: mandatory
