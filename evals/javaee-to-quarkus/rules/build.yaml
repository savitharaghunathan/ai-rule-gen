- ruleID: build-xml-00010
  description: The Spring Boot parent POM is replaced by the Quarkus BOM imported in dependencyManagement
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Remove the `<parent>` reference to `spring-boot-starter-parent` (or `spring-boot-parent`). Replace with an import of the Quarkus BOM in `<dependencyManagement>` and add the `quarkus-maven-plugin` to the build.

    ### Migration Steps
    1. Delete the `<parent>` block referencing Spring Boot.
    2. Add `io.quarkus.platform:quarkus-bom` (or `quarkus-universe-bom`) to `<dependencyManagement>` with `type=pom, scope=import`.
    3. Add the `quarkus-maven-plugin` to `<build><plugins>` with `<extensions>true</extensions>`.
    4. Switch packaging-only `spring-boot-maven-plugin` invocations (`repackage`) to `quarkus:build`.
  links:
    - url: https://quarkus.io/guides/maven-tooling
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: /m:project/m:parent[m:groupId/text() = 'org.springframework.boot' and (m:artifactId/text() = 'spring-boot-starter-parent' or m:artifactId/text() = 'spring-boot-parent')]
        namespaces:
            m: http://maven.apache.org/POM/4.0.0
        filepaths:
            - pom.xml
- ruleID: build-xml-00020
  description: spring-boot-maven-plugin is replaced by quarkus-maven-plugin in Quarkus builds
  category: mandatory
