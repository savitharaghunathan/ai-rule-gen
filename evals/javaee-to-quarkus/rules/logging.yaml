- ruleID: logging-pattern-00080
  description: Spring Boot logging.pattern.* / logging.file.* properties must be migrated to quarkus.log.*
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot logging configuration properties (`logging.pattern.console`, `logging.pattern.file`, `logging.file.name`, `logging.file.path`, etc.) are not recognized by Quarkus. Migrate to the `quarkus.log.console.*` and `quarkus.log.file.*` namespaces.

    ### Before
    ```properties
    logging.pattern.console=%d %level %msg%n
    logging.file.name=app.log
    logging.file.path=/var/log
    ```

    ### After
    ```properties
    quarkus.log.console.format=%d %p %m%n
    quarkus.log.file.enable=true
    quarkus.log.file.path=/var/log/app.log
    ```

    ### Additional Info
    - Format placeholders use JBoss LogManager syntax (mostly identical to Log4j patterns)
    - See https://quarkus.io/guides/logging
  links:
    - url: https://quarkus.io/guides/logging#log-handlers
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: logging\.(pattern|file)\.
        filePattern: application.*\.(properties|ya?ml)
