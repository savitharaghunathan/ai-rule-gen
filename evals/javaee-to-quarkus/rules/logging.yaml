- ruleID: logging-import-00030
  description: Log4j 1.x is removed in Quarkus; migrate to JBoss Logging or a supported API
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |
    Log4j 1.x is no longer supported by Quarkus. Migrate code that references the `org.apache.log4j` package to JBoss Logging (`org.jboss.logging.Logger`), SLF4J, or the Log4j 2 adapter.

    ### Before
    ```java
    import org.apache.log4j.Logger;
    Logger log = Logger.getLogger(MyClass.class);
    ```

    ### After
    ```java
    import io.quarkus.logging.Log;
    Log.info("...");
    ```

    ### Additional Info
    - Replace any `log4j.properties` / `log4j.xml` configuration with `quarkus.log.*` properties.
    - Remove `log4j:log4j` dependency from your build.

    ### Specific replacements

    | Old class | Replacement |
    |---|---|
    | `org.apache.log4j.MDC` | org.jboss.logmanager.MDC |
  links:
    - url: https://quarkus.io/guides/logging#logging-adapters-log4j
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.log4j
        location: PACKAGE
