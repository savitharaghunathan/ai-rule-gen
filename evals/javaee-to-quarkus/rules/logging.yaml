- ruleID: logging-pattern-00070
  description: Log4j/Logback config files are ignored by Quarkus; use quarkus.log.* properties
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus does NOT process log4j2.xml, log4j.xml, logback.xml, or logback-spring.xml. All log configuration must be moved to application.properties using the `quarkus.log.*` namespace.

    ### Migration Steps
    1. Delete log4j2.xml / logback.xml / logback-spring.xml
    2. Translate log levels to `quarkus.log.category."my.package".level=INFO`
    3. Translate appenders to Quarkus handlers:
       - Console: `quarkus.log.console.*`
       - File: `quarkus.log.file.enable=true`, `quarkus.log.file.path=app.log`, with rotation via `quarkus.log.file.rotation.*`
       - Syslog: `quarkus.log.syslog.*`
       - Socket: `quarkus.log.socket.*`
    4. JSON logging is enabled by adding `quarkus-logging-json` extension
    5. See https://quarkus.io/guides/logging#log-handlers
  links:
    - url: https://quarkus.io/guides/logging
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: log4j2\.xml|log4j\.xml|logback\.xml|logback-spring\.xml
