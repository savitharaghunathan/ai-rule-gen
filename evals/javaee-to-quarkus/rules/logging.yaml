- ruleID: logging-import-00010
  description: Apache Commons Logging needs a JBoss Logging adapter in Quarkus, especially for native executables
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |
    Quarkus uses JBoss Logging. Code using Apache Commons Logging must be routed through the JBoss Logging adapter; otherwise native executables will fail with `ClassNotFoundException: org.apache.commons.logging.impl.LogFactoryImpl`.

    ### Migration Steps
    - Add the adapter dependency:
      ```xml
      <dependency>
          <groupId>org.jboss.logging</groupId>
          <artifactId>commons-logging-jboss-logging</artifactId>
      </dependency>
      ```
    - Optionally migrate logger declarations from `org.apache.commons.logging.LogFactory` to `org.jboss.logging.Logger` or `io.quarkus.logging.Log`.
    - Exclude the upstream `commons-logging` jar if needed.

    ### Specific replacements

    | Old class | Replacement |
    |---|---|
    | `org.apache.commons.logging.Log` | Use commons-logging adapter for JBoss Log Manager |
  links:
    - url: https://quarkus.io/guides/logging#logging-adapters-commons-logging
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.commons.logging
        location: PACKAGE
- ruleID: logging-method-00010
