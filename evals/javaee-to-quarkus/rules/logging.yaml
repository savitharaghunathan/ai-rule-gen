    Quarkus' logging backend is JBoss Log Manager. SLF4J calls must be routed through the `org.jboss.slf4j:slf4j-jboss-logmanager` adapter so log output is consistent (especially in native executables).

    ### Migration Steps
    - Add the adapter dependency to `pom.xml` or `build.gradle`:
      ```xml
      <dependency>
          <groupId>org.jboss.slf4j</groupId>
          <artifactId>slf4j-jboss-logmanager</artifactId>
      </dependency>
      ```
    - Optionally migrate the code to use `io.quarkus.logging.Log` or `org.jboss.logging.Logger` directly.
  links:
    - url: https://quarkus.io/guides/logging#logging-adapters-slf4j
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.slf4j.LoggerFactory
        location: METHOD_CALL
- ruleID: logging-import-00020
