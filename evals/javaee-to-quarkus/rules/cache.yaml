- ruleID: cache-dependency-00010
  description: spring-boot-starter-cache is replaced by quarkus-cache; quarkus-spring-cache provides annotation compatibility
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Replace `spring-boot-starter-cache` with `io.quarkus:quarkus-spring-cache` (supports `@Cacheable`, `@CachePut`, `@CacheEvict`) or the native `io.quarkus:quarkus-cache` extension.
  links:
    - url: https://quarkus.io/guides/spring-cache
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-cache
        lowerbound: 0.0.0
- ruleID: cache-annotation-00010
  description: '@Cacheable requires the quarkus-spring-cache extension; native equivalent is @CacheResult'
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Add `io.quarkus:quarkus-spring-cache` to keep `@Cacheable` working. Note that only the most common options (`value/cacheNames`, `key`) are supported; conditional caching is limited. For new code use Quarkus native `@io.quarkus.cache.CacheResult`.
  links:
    - url: https://quarkus.io/guides/spring-cache
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.cache.annotation.Cacheable
        location: ANNOTATION
- ruleID: cache-annotation-00020
  description: '@CacheEvict requires the quarkus-spring-cache extension; native equivalent is @CacheInvalidate(All)'
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Add `io.quarkus:quarkus-spring-cache` to keep `@CacheEvict` working, or migrate to `@io.quarkus.cache.CacheInvalidate` (single key) / `@CacheInvalidateAll` (entire cache).
  links:
    - url: https://quarkus.io/guides/spring-cache
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.cache.annotation.CacheEvict
        location: ANNOTATION
- ruleID: cache-annotation-00030
  description: '@CachePut requires the quarkus-spring-cache extension'
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Add `io.quarkus:quarkus-spring-cache` to keep `@CachePut`. Quarkus has no direct native equivalent â€” the recommended pattern is a method that always executes and stores its result via the cache API directly.
  links:
    - url: https://quarkus.io/guides/spring-cache
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.cache.annotation.CachePut
        location: ANNOTATION
- ruleID: cache-annotation-00040
  description: '@EnableCaching is implicit when a cache extension is present'
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Remove `@EnableCaching`. Caching is enabled by adding the `quarkus-cache` or `quarkus-spring-cache` extension to the build file - no explicit annotation is needed.
  links:
    - url: https://quarkus.io/guides/cache
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.cache.annotation.EnableCaching
        location: ANNOTATION
- ruleID: cache-annotation-00050
  description: JCache @CacheResult is not directly supported; use io.quarkus.cache.CacheResult
  category: optional
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Quarkus does NOT bundle JCache (JSR-107). Replace `javax.cache.annotation.CacheResult` with `io.quarkus.cache.CacheResult`. Map the JCache `cacheName` attribute directly.
  links:
    - url: https://quarkus.io/guides/cache
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.cache.annotation.CacheResult
        location: ANNOTATION
