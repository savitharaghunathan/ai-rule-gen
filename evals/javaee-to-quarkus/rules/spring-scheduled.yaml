- ruleID: spring-scheduled-dependency-00010
  description: Replace spring scheduling dependency with quarkus-spring-scheduled or quarkus-scheduler
  category: optional
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: If Spring scheduling was provided by `spring-context-support`, replace it with `io.quarkus:quarkus-spring-scheduled` (compatibility) or `io.quarkus:quarkus-scheduler` (native Quarkus scheduling).
  links:
    - url: https://quarkus.io/guides/spring-scheduled
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.spring-context-support
        lowerbound: 0.0.0
