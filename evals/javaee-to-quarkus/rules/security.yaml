- ruleID: security-dependency-00010
  description: spring-boot-starter-security is replaced by Quarkus security extensions; quarkus-spring-security provides annotation compatibility
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Remove `spring-boot-starter-security` and add `io.quarkus:quarkus-spring-security` (for `@Secured` / `@PreAuthorize` compatibility) together with an authentication mechanism extension such as `quarkus-elytron-security-properties-file`, `quarkus-elytron-security-jdbc`, `quarkus-oidc`, or `quarkus-smallrye-jwt`.
  links:
    - url: https://quarkus.io/guides/spring-security
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-security
        lowerbound: 0.0.0
- ruleID: security-dependency-00020
  description: spring-security-core is replaced by quarkus-spring-security plus an authentication extension
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Spring Security Core dependency replaced by quarkus-spring-security: spring-security-core is replaced by quarkus-spring-security plus an authentication extension'
  links:
    - url: https://quarkus.io/guides/spring-security
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.security.spring-security-core
        lowerbound: 0.0.0
- ruleID: security-annotation-00010
  description: '@Secured requires quarkus-spring-security; native equivalent is @RolesAllowed'
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Add `io.quarkus:quarkus-spring-security` to keep `@Secured("role")` working, or migrate to `@jakarta.annotation.security.RolesAllowed("role")`. Pair with `quarkus-elytron-security-properties-file`, `quarkus-oidc`, `quarkus-smallrye-jwt`, or another authentication extension.
  links:
    - url: https://quarkus.io/guides/spring-security
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.security.access.annotation.Secured
        location: ANNOTATION
- ruleID: security-annotation-00020
  description: '@PreAuthorize supports only a subset of Spring SpEL expressions in quarkus-spring-security'
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: '`quarkus-spring-security` supports `hasRole`, `hasAnyRole`, `permitAll`, `denyAll`, `isAnonymous`, `isAuthenticated`, `#param == authentication.principal.username`, `@bean.method(...)` and a single `AND`/`OR` boolean combinator. Mixed AND/OR expressions and full SpEL are NOT supported. For complex authorization use `@io.quarkus.security.PermissionsAllowed` or a custom security identity augmentor.'
  links:
    - url: https://quarkus.io/guides/spring-security
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.security.access.prepost.PreAuthorize
        location: ANNOTATION
- ruleID: security-import-00010
  description: Quarkus uses Jakarta annotations; migrate javax.annotation.security imports
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Replace `javax.annotation.security.*` (`@RolesAllowed`, `@PermitAll`, `@DenyAll`) with `jakarta.annotation.security.*`.
  links:
    - url: https://quarkus.io/guides/security-authorize-web-endpoints-reference
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.annotation.security
        location: PACKAGE
