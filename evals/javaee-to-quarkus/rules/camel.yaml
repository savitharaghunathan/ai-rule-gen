- ruleID: camel-import-00010
  description: Apache Camel on Quarkus is provided by Camel Quarkus extensions; CamelContext is auto-managed
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    On Quarkus, the Camel `CamelContext` is auto-instantiated and managed by the Camel Quarkus extensions (`org.apache.camel.quarkus:camel-quarkus-core` and component extensions). Do not manually create or start a `CamelContext` - inject it via CDI instead.

    ### Before
    ```java
    CamelContext ctx = new DefaultCamelContext();
    ctx.addRoutes(new MyRoute());
    ctx.start();
    ```

    ### After
    ```java
    import org.apache.camel.CamelContext;
    import jakarta.inject.Inject;
    import jakarta.enterprise.context.ApplicationScoped;

    @ApplicationScoped
    public class MyService {
        @Inject
        CamelContext ctx;
        // routes are auto-registered if declared as CDI beans extending RouteBuilder
    }
    ```

    ### Additional Info
    - Define routes as CDI beans extending `org.apache.camel.builder.RouteBuilder` - they're auto-discovered.
    - Use Camel Quarkus component extensions (`camel-quarkus-jms`, `camel-quarkus-ftp`, ...) instead of bare `camel-*` artifacts.
  links:
    - url: https://quarkus.io/guides/camel
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.camel.CamelContext
        location: IMPORT
- ruleID: camel-dependency-00010
  description: Bare camel-core dependency is replaced by org.apache.camel.quarkus:camel-quarkus-core in Quarkus
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Bare Apache Camel artifacts (`org.apache.camel:camel-core`, `camel-*` components) are replaced in Quarkus by their Camel Quarkus counterparts under the `org.apache.camel.quarkus` group ID. These extensions provide build-time optimisations, native image support, and CDI integration.

    ### Before
    ```xml
    <dependency>
      <groupId>org.apache.camel</groupId>
      <artifactId>camel-core</artifactId>
    </dependency>
    ```

    ### After
    ```xml
    <dependency>
      <groupId>org.apache.camel.quarkus</groupId>
      <artifactId>camel-quarkus-core</artifactId>
    </dependency>
    ```

    ### Additional Info
    - Each Camel component has a corresponding `camel-quarkus-<component>` extension.
    - Versions are managed by the Camel Quarkus BOM - do not pin explicit versions.
    - See [camel.apache.org/camel-quarkus](https://camel.apache.org/camel-quarkus/) for the full extension catalog.
  links:
    - url: https://quarkus.io/guides/camel
      title: Migration Documentation
  when:
    java.dependency:
        name: org.apache.camel.camel-core
        lowerbound: 0.0.0
