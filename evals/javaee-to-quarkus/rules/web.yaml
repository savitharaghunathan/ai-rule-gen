- ruleID: web-import-00010
  description: javax.servlet is replaced by jakarta.servlet; Quarkus reactive REST stack does not support Servlet API
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus uses Jakarta EE 9+ namespace; `javax.servlet` is renamed to `jakarta.servlet`. Additionally, the Servlet API is only available with the classic RESTEasy stack (`quarkus-undertow`); the reactive `quarkus-rest` stack does NOT support Servlets.

    ### Before
    ```java
    import javax.servlet.http.HttpServlet;
    import javax.servlet.http.HttpServletRequest;
    import javax.servlet.http.HttpServletResponse;

    public class GreetingServlet extends HttpServlet {
        protected void doGet(HttpServletRequest req, HttpServletResponse res) { ... }
    }
    ```

    ### After
    ```java
    import jakarta.ws.rs.GET;
    import jakarta.ws.rs.Path;
    import jakarta.ws.rs.Produces;
    import jakarta.ws.rs.core.MediaType;

    @Path("/greeting")
    public class GreetingResource {
        @GET
        @Produces(MediaType.TEXT_PLAIN)
        public String hello() { return "hello"; }
    }
    ```

    ### Additional Info
    - Prefer Jakarta REST (`jakarta.ws.rs`) endpoints over Servlets.
    - If you must keep Servlet code, add the `quarkus-undertow` extension and re-import everything from `jakarta.servlet`.
    - For low-level HTTP access on the reactive stack, inject `io.vertx.core.http.HttpServerRequest` / `HttpServerResponse`.
    - `HttpSession` and `web.xml` deployment descriptors are not honoured.
  links:
    - url: https://quarkus.io/guides/rest
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.servlet*
        location: PACKAGE
- ruleID: web-import-00020
  description: Quarkus uses Jakarta REST (jakarta.ws.rs); javax.ws.rs namespace is renamed
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus uses Jakarta REST. Re-import every JAX-RS type (`@Path`, `@GET`, `@Produces`, `Response`, `MediaType`, etc.) from the `jakarta.ws.rs` namespace.

    ### Before
    ```java
    import javax.ws.rs.GET;
    import javax.ws.rs.Path;
    import javax.ws.rs.Produces;
    import javax.ws.rs.core.MediaType;

    @Path("/api")
    public class MyResource {
        @GET
        @Produces(MediaType.APPLICATION_JSON)
        public String list() { return "[]"; }
    }
    ```

    ### After
    ```java
    import jakarta.ws.rs.GET;
    import jakarta.ws.rs.Path;
    import jakarta.ws.rs.Produces;
    import jakarta.ws.rs.core.MediaType;

    @Path("/api")
    public class MyResource {
        @GET
        @Produces(MediaType.APPLICATION_JSON)
        public String list() { return "[]"; }
    }
    ```

    ### Additional Info
    - Add the `quarkus-rest` extension (or `quarkus-rest-jackson` for JSON) instead of an external JAX-RS implementation.
    - Quarkus REST is reactive by default; blocking endpoints should be marked with `@io.smallrye.common.annotation.Blocking`.
    - `Application` subclasses are tolerated but configuration belongs in `application.properties`.
  links:
    - url: https://quarkus.io/guides/rest
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.ws.rs*
        location: PACKAGE
