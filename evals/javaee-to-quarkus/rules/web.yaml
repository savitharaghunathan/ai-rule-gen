- ruleID: web-annotation-00150
  description: '@ExceptionHandler is only supported inside @RestControllerAdvice in quarkus-spring-web; Jakarta REST uses ExceptionMapper'
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Per-controller `@ExceptionHandler` methods are NOT supported in `quarkus-spring-web`; only `@ExceptionHandler` inside a `@RestControllerAdvice` class is. For new code prefer Jakarta REST `ExceptionMapper<T>` providers.

    ### Before
    ```java
    @ExceptionHandler(IllegalArgumentException.class)
    public ResponseEntity<String> handle(IllegalArgumentException ex) {
        return new ResponseEntity<>(ex.getMessage(), HttpStatus.BAD_REQUEST);
    }
    ```

    ### After
    ```java
    @Provider
    public class IllegalArgumentMapper implements ExceptionMapper<IllegalArgumentException> {
        public Response toResponse(IllegalArgumentException ex) {
            return Response.status(Response.Status.BAD_REQUEST).entity(ex.getMessage()).build();
        }
    }
    ```

    ### Additional Info
    - On the reactive stack, inject `io.vertx.core.http.HttpServerRequest/Response` instead of `HttpServletRequest/Response`.
  links:
    - url: https://quarkus.io/guides/spring-web
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.web.bind.annotation.ExceptionHandler
        location: ANNOTATION
