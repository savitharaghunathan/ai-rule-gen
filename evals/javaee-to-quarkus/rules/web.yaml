- ruleID: web-annotation-00010
  description: '@RestController has no Jakarta REST equivalent; annotating a class with @Path is sufficient'
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Jakarta REST has no `@RestController` equivalent — annotating a class with `@jakarta.ws.rs.Path` makes it a REST resource. The `quarkus-spring-web` extension keeps `@RestController` working during migration.

    ### Before
    ```java
    @RestController
    @RequestMapping("/greeting")
    public class GreetingController {
        @GetMapping
        public String hello() { return "hello"; }
    }
    ```

    ### After
    ```java
    import jakarta.ws.rs.GET;
    import jakarta.ws.rs.Path;
    import jakarta.ws.rs.Produces;
    import jakarta.ws.rs.core.MediaType;

    @Path("/greeting")
    public class GreetingResource {
        @GET
        @Produces(MediaType.TEXT_PLAIN)
        public String hello() { return "hello"; }
    }
    ```
  links:
    - url: https://quarkus.io/guides/spring-web
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.web.bind.annotation.RestController
        location: ANNOTATION
