    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus does not process `web.xml`. Servlet/filter/listener mappings must be migrated:

    - Servlets: register via `@WebServlet` (with `quarkus-undertow`) or rewrite as Jakarta REST resources.
    - Filters: register via `@WebFilter` or use Vert.x `@RouteFilter` from `quarkus-vertx-http`.
    - Listeners: register via `@WebListener` or use Quarkus `StartupEvent`/`ShutdownEvent` observers.
    - Welcome files / static content: place under `src/main/resources/META-INF/resources/`.
    - Security constraints: use Quarkus Security HTTP policies (`quarkus.http.auth.*`).
  links:
    - url: https://quarkus.io/guides/servlet
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: WEB-INF/web\.xml
        filePattern: (.*/)?WEB-INF/web\.xml
- ruleID: web-change-00030
  description: Quarkus REST does not use servlet objects by default; access request data via Jakarta REST or Vert.x APIs
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus REST does not run on the servlet stack. Replace `HttpServletRequest`/`HttpServletResponse` usage with:

    - Jakarta REST context types: `@Context HttpHeaders`, `@Context UriInfo`, `@Context SecurityContext`.
    - Vert.x: `@Context io.vertx.core.http.HttpServerRequest` / `HttpServerResponse`.
    - Reactive routes' `io.vertx.ext.web.RoutingContext` when using `@Route`.

    If servlet APIs are mandatory, add the `quarkus-undertow` extension.
  links:
    - url: https://quarkus.io/guides/rest#accessing-context-objects
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.servlet.http.HttpServletRequest
        location: TYPE
- ruleID: web-type-00010
  description: Quarkus does not run servlet filters by default; use RouteFilter or REST request filters
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus does not run servlet `Filter` chains unless `quarkus-undertow` is added. Use:

    - `@io.quarkus.vertx.http.RouteFilter(priority)` for HTTP-level filters that see every request.
    - `jakarta.ws.rs.container.ContainerRequestFilter`/`ContainerResponseFilter` (annotated with `@Provider`) for Jakarta REST-scoped filters.
  links:
    - url: https://quarkus.io/guides/reactive-routes#intercepting-http-requests
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.servlet.Filter
        location: IMPLEMENTS_TYPE
