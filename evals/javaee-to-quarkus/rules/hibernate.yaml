- ruleID: hibernate-annotation-00010
  description: JNDI lookup is disabled in Quarkus Hibernate ORM extension; use CDI injection
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    JNDI support has been disabled in Quarkus' Hibernate ORM extension as both a security precaution and an optimisation. Configurations that look up `TransactionManager` or `Datasource` by name via JNDI must be migrated to direct CDI injection.

    ### Migration Steps
    1. Remove `jta-data-source` / `non-jta-data-source` JNDI names from `persistence.xml` and configure datasources via `application.properties` (`quarkus.datasource.*`).
    2. Replace `@PersistenceUnit(unitName = "...")` and `@PersistenceContext(unitName = "...")` with `@Inject` + `@io.quarkus.hibernate.orm.PersistenceUnit("...")` for the named persistence unit, or simply `@Inject EntityManager em;` for the default unit.
    3. Replace `lookup("java:/TransactionManager")` with `@Inject TransactionManager tm;`.

    ### Additional Info
    - The Narayana transaction manager is auto-wired by Quarkus' Hibernate ORM extension.
    - Agroal provides the connection pool integration.
  links:
    - url: https://quarkus.io/guides/hibernate-orm#limitations
      title: Migration Documentation
  when:
    java.referenced:
        pattern: jakarta.persistence.PersistenceUnit
        location: ANNOTATION
- ruleID: hibernate-annotation-00020
  description: javax.persistence is replaced by jakarta.persistence; Quarkus also provides a Quarkus-specific PersistenceUnit qualifier
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus uses the Jakarta EE namespace; replace `javax.persistence.PersistenceUnit` with `jakarta.persistence.PersistenceUnit`. For Quarkus, the recommended pattern is to use CDI injection with the Quarkus-specific qualifier `@io.quarkus.hibernate.orm.PersistenceUnit("name")` to select a named persistence unit.

    ### Before
    ```java
    import javax.persistence.PersistenceUnit;
    import javax.persistence.EntityManagerFactory;

    @PersistenceUnit(unitName = "mypu")
    EntityManagerFactory emf;
    ```

    ### After
    ```java
    import io.quarkus.hibernate.orm.PersistenceUnit;
    import jakarta.inject.Inject;
    import jakarta.persistence.EntityManager;

    @Inject
    @PersistenceUnit("mypu")
    EntityManager em;
    ```

    ### Additional Info
    - For the default persistence unit, just use `@Inject EntityManager em;` - no qualifier needed.
    - JNDI lookup of persistence units is disabled in the Quarkus extension.
  links:
    - url: https://quarkus.io/guides/hibernate-orm#setting-up-multiple-persistence-units
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.persistence.PersistenceUnit
        location: ANNOTATION
- ruleID: hibernate-annotation-00030
  description: Replace @PersistenceContext with CDI @Inject for EntityManager in Quarkus
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus uses CDI for entity manager injection. Replace `@PersistenceContext` with `@Inject` on an `EntityManager` field. Also migrate the `javax.persistence` namespace to `jakarta.persistence`.

    ### Before
    ```java
    import javax.persistence.EntityManager;
    import javax.persistence.PersistenceContext;

    @PersistenceContext
    EntityManager em;
    ```

    ### After
    ```java
    import jakarta.inject.Inject;
    import jakarta.persistence.EntityManager;

    @Inject
    EntityManager em;
    ```

    ### Additional Info
    - For named persistence units, use `@io.quarkus.hibernate.orm.PersistenceUnit("name")` alongside `@Inject`.
    - The `EntityManager` is request-scoped or transaction-scoped depending on context.
  links:
    - url: https://quarkus.io/guides/hibernate-orm#injecting-entry-points
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.persistence.PersistenceContext
        location: ANNOTATION
