    - konveyor.io/generated-by=ai-rule-gen
  message: Replace `spring-cloud-starter-config` with `io.quarkus:quarkus-spring-cloud-config-client`. Configure the server via `quarkus.spring-cloud-config.enabled=true` and `quarkus.spring-cloud-config.url=<server>`.
  links:
