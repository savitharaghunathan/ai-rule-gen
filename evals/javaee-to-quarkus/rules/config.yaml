- ruleID: config-method-00010
  description: Quarkus configuration is layered (sys props, env, files); avoid direct System.getProperty/getenv
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus configuration is layered (system properties, env vars, `.env`, `application.properties`, etc.). Reading config via `System.getProperty("...")` skips the Quarkus configuration sources and may miss values defined elsewhere. Use `@ConfigProperty` or `SmallRyeConfig.getValue(...)`.

    ### Before
    ```java
    String db = System.getProperty("database.name");
    ```

    ### After
    ```java
    @ConfigProperty(name = "database.name")
    String db;
    // or
    SmallRyeConfig config = ConfigProvider.getConfig().unwrap(SmallRyeConfig.class);
    String db = config.getValue("database.name", String.class);
    ```
  links:
    - url: https://quarkus.io/guides/config-reference#programmatically-access
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.lang.System.getProperty
        location: METHOD_CALL
- ruleID: config-method-00020
  description: Avoid System.getenv for app configuration in Quarkus; use @ConfigProperty
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Reading environment variables directly via `System.getenv("...")` bypasses Quarkus' MicroProfile Config layering (system properties, env, .env, application.properties). Use `@ConfigProperty` or `SmallRyeConfig` so the same code works across configuration sources and profiles.
  links:
    - url: https://quarkus.io/guides/config-reference#programmatically-access
      title: Migration Documentation
  when:
    java.referenced:
        pattern: java.lang.System.getenv
        location: METHOD_CALL
- ruleID: config-pattern-00050
  description: Quarkus does not read spring.* config keys; migrate to quarkus.* or spring-cloud-config-client extension
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus does not honor Spring Boot's `spring.*` configuration keys (datasource, JPA, server, etc.). Map them to their Quarkus equivalents:

    | Spring property | Quarkus property |
    |---|---|
    | `spring.datasource.url` | `quarkus.datasource.jdbc.url` |
    | `spring.datasource.username` | `quarkus.datasource.username` |
    | `spring.datasource.password` | `quarkus.datasource.password` |
    | `spring.jpa.hibernate.ddl-auto` | `quarkus.hibernate-orm.schema-management.strategy` |
    | `spring.profiles.active` | `quarkus.profile` |
    | `server.port` | `quarkus.http.port` |
  links:
    - url: https://quarkus.io/guides/config-reference
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: ^\s*spring\.
        filePattern: application.*\.(properties|ya?ml)
- ruleID: config-pattern-00060
  description: Quarkus reads quarkus.datasource.jdbc.url instead of spring.datasource.url
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Replace `spring.datasource.url=...` with `quarkus.datasource.jdbc.url=...`. Also migrate `spring.datasource.username` -> `quarkus.datasource.username` and `spring.datasource.password` -> `quarkus.datasource.password`. Add `quarkus.datasource.db-kind=<vendor>` (e.g. `postgresql`).
  links:
    - url: https://quarkus.io/guides/datasource
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.datasource\.url
        filePattern: application.*\.(properties|ya?ml)
- ruleID: config-pattern-00070
  description: Quarkus uses quarkus.hibernate-orm.schema-management.strategy instead of spring.jpa.hibernate.ddl-auto
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Replace `spring.jpa.hibernate.ddl-auto=update` with `quarkus.hibernate-orm.schema-management.strategy=update`. Possible values: `none`, `validate`, `update`, `drop-and-create`, `create`, `drop`.

    ### Additional Info
    - Older Quarkus versions used `quarkus.hibernate-orm.database.generation`; the current preferred property is `quarkus.hibernate-orm.schema-management.strategy`.
  links:
    - url: https://quarkus.io/guides/hibernate-orm
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.jpa\.hibernate\.ddl-auto
        filePattern: application.*\.(properties|ya?ml)
