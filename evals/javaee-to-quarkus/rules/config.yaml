- ruleID: config-annotation-00010
  description: Spring @Value maps to MicroProfile @ConfigProperty in Quarkus
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Replace `@Value("${prop:default}")` with `@ConfigProperty(name = "prop", defaultValue = "default")`. SpEL expressions inside `@Value` are NOT supported.

    ### Before
    ```java
    @Value("${greeting.suffix:!}")
    String suffix;
    ```

    ### After
    ```java
    import org.eclipse.microprofile.config.inject.ConfigProperty;

    @ConfigProperty(name = "greeting.suffix", defaultValue = "!")
    String suffix;
    ```

    ### Additional Info
    - For grouped config use `@ConfigMapping` (Quarkus) or `@ConfigurationProperties` via `quarkus-spring-boot-properties` for Spring compatibility.
    - Property keys keep the same `.`-separated form.
  links:
    - url: https://quarkus.io/guides/config-reference
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.beans.factory.annotation.Value
        location: ANNOTATION
- ruleID: config-annotation-00020
  description: Spring @ConfigurationProperties is supported by quarkus-spring-boot-properties; new code should use @ConfigMapping
  category: optional
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Add `io.quarkus:quarkus-spring-boot-properties` to keep `@ConfigurationProperties` working. For new code prefer `@io.smallrye.config.ConfigMapping(prefix = "greeting")` which has more features (Maps, validation, nested groups) and is type-safe.
  links:
    - url: https://quarkus.io/guides/spring-boot-properties
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.context.properties.ConfigurationProperties
        location: ANNOTATION
