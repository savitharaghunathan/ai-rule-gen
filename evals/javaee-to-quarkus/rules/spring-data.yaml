- ruleID: spring-data-type-00050
  description: Spring Data JpaRepository needs quarkus-spring-data-jpa extension
  category: optional
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Add `quarkus-spring-data-jpa` to support `JpaRepository`. Quarkus generates the implementation at build time. Migrate to `PanacheRepository` for a Quarkus-native experience.

    Note: Quarkus's `quarkus-spring-data-jpa` does NOT support `QueryByExampleExecutor`, `JpaSpecificationExecutor`, QueryDSL, native queries via `@Query`, or `org.springframework.data.jpa.repository.Lock`.
  links:
    - url: https://quarkus.io/guides/spring-data-jpa
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.data.jpa.repository.JpaRepository
        location: INHERITANCE
- ruleID: spring-data-annotation-00010
  description: '@Modifying is supported via quarkus-spring-data-jpa'
  category: optional
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: '`@Modifying` is supported by `quarkus-spring-data-jpa`; annotated methods are automatically wrapped in `@jakarta.transaction.Transactional`. No code change required, but ensure the extension is on the classpath.'
  links:
    - url: https://quarkus.io/guides/spring-data-jpa#user-defined-queries
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.data.jpa.repository.Modifying
        location: ANNOTATION
- ruleID: spring-data-type-00060
  description: Customising the base repository via SimpleJpaRepository is not supported in Quarkus
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Quarkus does not use Spring's `SimpleJpaRepository` (all repositories are generated at build time), so subclassing it to customize the base repository for all repositories has no effect. Use repository fragments + `JpaOperations` from `io.quarkus.hibernate.orm.panache.runtime` to add custom behaviour.
  links:
    - url: https://quarkus.io/guides/spring-data-jpa#what-is-currently-unsupported
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.data.jpa.repository.support.SimpleJpaRepository
        location: INHERITANCE
- ruleID: spring-data-annotation-00020
  description: Spring Data JPA @Lock is not supported by quarkus-spring-data-jpa
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: '`@org.springframework.data.jpa.repository.Lock` is NOT supported. Use `EntityManager.lock(entity, LockModeType)` or pass a `LockModeType` to query methods to obtain pessimistic/optimistic locking.'
  links:
    - url: https://quarkus.io/guides/spring-data-jpa#what-is-currently-unsupported
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.data.jpa.repository.Lock
        location: ANNOTATION
- ruleID: spring-data-annotation-00030
  description: '@Param is optional in Quarkus when parameter names are compiled'
  category: potential
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: '`@Param` is supported by `quarkus-spring-data-jpa`, but is optional when parameter names are compiled into the bytecode (default in projects generated by Quarkus). Keeping `@Param` works fine; you may also delete it once `-parameters` is enabled.'
  links:
    - url: https://quarkus.io/guides/spring-data-jpa#user-defined-queries
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.data.repository.query.Param
        location: ANNOTATION
