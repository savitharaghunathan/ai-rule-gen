- ruleID: spring-data-type-00070
  description: QuerydslPredicateExecutor is not implemented in Quarkus spring-data-jpa
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: QueryDSL-based repositories (`QuerydslPredicateExecutor`) are not supported by Quarkus' Spring Data JPA extension. Rewrite predicates using JPA Criteria, Panache `find("...")`, or `@Query` methods.
  links:
    - url: https://quarkus.io/guides/spring-data-jpa#what-is-currently-unsupported
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.data.querydsl.QuerydslPredicateExecutor
        location: IMPLEMENTS_TYPE
- ruleID: spring-data-annotation-00040
  description: Quarkus auto-detects Spring Data repositories at build time; remove @EnableJpaRepositories
  category: optional
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Quarkus' `quarkus-spring-data-jpa` extension discovers repository interfaces at build time. The `@EnableJpaRepositories` annotation is unnecessary and can be removed.
  links:
    - url: https://quarkus.io/guides/spring-data-jpa
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.data.jpa.repository.config.EnableJpaRepositories
        location: ANNOTATION
