- ruleID: spring-data-type-00010
  description: Spring Data Repository requires quarkus-spring-data-jpa extension
  category: optional
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Add `quarkus-spring-data-jpa` to support repositories extending `org.springframework.data.repository.Repository` (or any of the standard Spring Data repository interfaces). Alternatively migrate to `PanacheRepository`.
  links:
    - url: https://quarkus.io/guides/spring-data-jpa
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.data.repository.Repository
        location: INHERITANCE
