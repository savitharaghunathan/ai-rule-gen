- ruleID: health-annotation-00010
  description: io.quarkus.runtime.Startup conflicts with MicroProfile health Startup; review intent
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    There is an unfortunate naming clash between `io.quarkus.runtime.Startup` (Quarkus eager startup bean qualifier) and `org.eclipse.microprofile.health.Startup` (MicroProfile Health startup probe qualifier). Make sure you import the correct annotation for the intent.

    ### When migrating health checks
    - Use `@org.eclipse.microprofile.health.Startup` on `HealthCheck` beans to register them as startup probes (`/q/health/started`).

    ### When eagerly initializing a bean
    - Use `@io.quarkus.runtime.Startup` on the bean class to force eager initialization at application startup.

    ### Additional Info
    - Always check imports when using `@Startup` in a Quarkus codebase.
    - The two annotations have completely different semantics and cannot be substituted for each other.
  links:
    - url: https://quarkus.io/guides/smallrye-health#adding-a-startup-health-check-procedure
      title: Migration Documentation
  when:
    java.referenced:
        pattern: io.quarkus.runtime.Startup
        location: ANNOTATION
- ruleID: health-type-00010
  description: Spring Boot HealthIndicator is replaced by MicroProfile HealthCheck in Quarkus
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot's `HealthIndicator` interface is replaced in Quarkus by `org.eclipse.microprofile.health.HealthCheck`. Add a `@Liveness`, `@Readiness`, or `@Startup` qualifier to register the check with the corresponding probe endpoint.

    ### Before (Spring Boot)
    ```java
    import org.springframework.boot.actuate.health.Health;
    import org.springframework.boot.actuate.health.HealthIndicator;

    @Component
    public class DbHealthIndicator implements HealthIndicator {
        @Override
        public Health health() {
            return Health.up().withDetail("db", "reachable").build();
        }
    }
    ```

    ### After (Quarkus)
    ```java
    import org.eclipse.microprofile.health.HealthCheck;
    import org.eclipse.microprofile.health.HealthCheckResponse;
    import org.eclipse.microprofile.health.Readiness;
    import jakarta.enterprise.context.ApplicationScoped;

    @Readiness
    @ApplicationScoped
    public class DbHealthCheck implements HealthCheck {
        @Override
        public HealthCheckResponse call() {
            return HealthCheckResponse.named("db")
                    .status(true)
                    .withData("db", "reachable")
                    .build();
        }
    }
    ```

    ### Additional Info
    - Use `@Liveness` for liveness probes (`/q/health/live`).
    - Use `@Readiness` for readiness probes (`/q/health/ready`).
    - Use `@Startup` for startup probes (`/q/health/started`).
  links:
    - url: https://quarkus.io/guides/smallrye-health#creating-your-first-health-check
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.actuate.health.HealthIndicator
        location: IMPLEMENTS_TYPE
