- ruleID: cdi-annotation-00040
  description: Spring @Autowired maps to @Inject (jakarta.inject) in Quarkus
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Replace `@Autowired` with `@jakarta.inject.Inject`. Note: `@Autowired(required = false)` has no direct equivalent — use `Instance<T>` with `isResolvable()` instead.

    ### Before
    ```java
    @Autowired
    @Qualifier("capitalizer")
    StringFunction fn;
    ```

    ### After
    ```java
    @Inject
    @Named("capitalizer")
    StringFunction fn;
    ```

    ### Additional Info
    - For `List<Bean>` injection of all implementations, use the `@io.quarkus.arc.All` qualifier.
    - Constructor injection works without `@Inject` when there is a single constructor.
  links:
    - url: https://quarkus.io/guides/spring-di
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.beans.factory.annotation.Autowired
        location: ANNOTATION
