- ruleID: cdi-annotation-00120
  description: '@Named qualifier behaves differently in CDI; prefer @Identifier in Quarkus'
  category: optional
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In Quarkus / CDI, `@Named` is a string-based qualifier that also implicitly grants `@Default`, which can cause AmbiguousResolutionException between a bean producer without qualifiers and one with `@Named`. Replace `@Named` with the regular qualifier `io.smallrye.common.annotation.Identifier` unless you specifically need the bean name for external language references (e.g. Qute / JSF templates).

    ### Before
    ```java
    import jakarta.inject.Named;

    @ApplicationScoped
    public class Producers {
        @Produces
        @Named("foo")
        MyBean produceFoo() { ... }
    }
    ```

    ### After
    ```java
    import io.smallrye.common.annotation.Identifier;

    @ApplicationScoped
    public class Producers {
        @Produces
        @Identifier("foo")
        MyBean produceFoo() { ... }
    }
    ```

    ### Additional Info
    - `@Named` is still valid if the only consumer is an external language (Qute templates).
    - `@Identifier` is a regular qualifier and does not imply `@Default`.
    - See https://quarkus.io/guides/cdi-reference#string-based-qualifiers
  links:
    - url: https://quarkus.io/guides/cdi-reference#string-based-qualifiers
      title: Migration Documentation
  when:
    java.referenced:
        pattern: jakarta.inject.Named
        location: ANNOTATION
- ruleID: cdi-annotation-00130
  description: javax.inject.Named must be migrated to jakarta.inject.Named or @Identifier in Quarkus
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus uses Jakarta EE 10/11 namespaces. The legacy `javax.inject.Named` qualifier must be replaced with `jakarta.inject.Named`, or preferably `io.smallrye.common.annotation.Identifier` to avoid the `@Default` ambiguity issue.

    ### Before
    ```java
    import javax.inject.Named;

    @Named("foo")
    public class MyBean { ... }
    ```

    ### After
    ```java
    import io.smallrye.common.annotation.Identifier;

    @Identifier("foo")
    public class MyBean { ... }
    ```

    ### Additional Info
    - All `javax.*` Jakarta EE namespaces are renamed to `jakarta.*` in Quarkus 3.x.
    - `@Identifier` is recommended over `@Named` to avoid ambiguous resolution problems.
  links:
    - url: https://quarkus.io/guides/cdi-reference#string-based-qualifiers
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.inject.Named
        location: ANNOTATION
