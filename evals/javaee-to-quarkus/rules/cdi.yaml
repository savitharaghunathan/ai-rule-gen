- ruleID: cdi-import-00010
  description: Quarkus CDI (ArC) uses Jakarta CDI 4.1; javax.enterprise is renamed to jakarta.enterprise
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus DI (ArC) implements Jakarta CDI 4.1 Lite. Re-import CDI scopes, events and qualifiers from `jakarta.enterprise.*`.

    ### Before
    ```java
    import javax.enterprise.context.ApplicationScoped;
    import javax.enterprise.event.Observes;
    import javax.enterprise.inject.Produces;

    @ApplicationScoped
    public class MyBean {
        void onStart(@Observes StartupEvent ev) { ... }
    }
    ```

    ### After
    ```java
    import jakarta.enterprise.context.ApplicationScoped;
    import jakarta.enterprise.event.Observes;
    import jakarta.enterprise.inject.Produces;

    @ApplicationScoped
    public class MyBean {
        void onStart(@Observes StartupEvent ev) { ... }
    }
    ```

    ### Additional Info
    - Quarkus implements CDI Lite plus selected CDI Full features (Decorators, `BeanManager`, `@SessionScoped` via Undertow).
    - Bean discovery is `annotated`-mode only; beans without a bean-defining annotation are not discovered.
    - Portable Extensions (`javax.enterprise.inject.spi.Extension`) are NOT supported — use Quarkus build-time extensions instead.
    - Avoid `private` members on beans to keep the native image small.
  links:
    - url: https://quarkus.io/guides/cdi-reference
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.enterprise*
        location: PACKAGE
- ruleID: cdi-import-00020
  description: Quarkus uses Jakarta Inject (jakarta.inject); javax.inject is renamed
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus uses the Jakarta Inject API. Re-import `@Inject`, `@Named`, `@Qualifier`, `@Singleton`, and `Provider` from `jakarta.inject.*`.

    ### Before
    ```java
    import javax.inject.Inject;
    import javax.inject.Named;

    public class GreetingService {
        @Inject
        @Named("capitalizer")
        StringFunction fn;
    }
    ```

    ### After
    ```java
    import jakarta.inject.Inject;
    import jakarta.inject.Named;

    public class GreetingService {
        @Inject
        @Named("capitalizer")
        StringFunction fn;
    }
    ```

    ### Additional Info
    - Prefer `@io.smallrye.common.annotation.Identifier` over `@Named` for string-based qualifiers — `@Named` has the `@Default` foot-gun in CDI.
    - Constructor injection works without `@Inject` when a bean has a single constructor.
    - Use package-private (not `private`) fields/constructors to avoid reflection in native mode.
  links:
    - url: https://quarkus.io/guides/cdi-reference
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.inject*
        location: PACKAGE
- ruleID: cdi-import-00030
  description: Quarkus uses Jakarta Annotations (jakarta.annotation); javax.annotation is renamed
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus uses Jakarta Annotations. Re-import `@PostConstruct`, `@PreDestroy`, `@Resource`, `@Priority`, `@Generated`, etc. from `jakarta.annotation.*`.

    ### Before
    ```java
    import javax.annotation.PostConstruct;
    import javax.annotation.PreDestroy;
    import javax.annotation.Resource;
    ```

    ### After
    ```java
    import jakarta.annotation.PostConstruct;
    import jakarta.annotation.PreDestroy;
    import jakarta.annotation.Resource;
    ```

    ### Additional Info
    - `@Resource(lookup = ...)` JNDI references are not honoured; use CDI `@Inject` for datasources / queues.
    - `@RolesAllowed` (`jakarta.annotation.security`) is supported for endpoint security.
  links:
    - url: https://quarkus.io/guides/cdi-reference
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.annotation*
        location: PACKAGE
- ruleID: cdi-dependency-00010
  description: spring-context (Spring ApplicationContext) is not used in Quarkus; quarkus-spring-di provides annotation compatibility
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Quarkus does not start a Spring `ApplicationContext` and does not run Spring infrastructure classes. Remove `org.springframework:spring-context` and add `io.quarkus:quarkus-spring-di` if you want to keep `@Component`, `@Service`, `@Autowired`, etc. annotations. Otherwise migrate to CDI (`@ApplicationScoped`, `@Inject`).
  links:
    - url: https://quarkus.io/guides/spring-di
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.spring-context
        lowerbound: 0.0.0
- ruleID: cdi-annotation-00010
  description: Spring stereotype annotations (@Component, @Service, @Repository) map to @Singleton (or @ApplicationScoped) in CDI
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring's `@Component`, `@Service`, and `@Repository` are singleton stereotypes. Replace with `@jakarta.inject.Singleton` (or `@jakarta.enterprise.context.ApplicationScoped`). The Quarkus `spring-di` extension keeps the Spring annotations working during incremental migration but does not start a Spring `ApplicationContext`.

    ### Before
    ```java
    import org.springframework.stereotype.Service;

    @Service
    public class GreetingService { ... }
    ```

    ### After
    ```java
    import jakarta.inject.Singleton;

    @Singleton
    public class GreetingService { ... }
    ```

    ### Additional Info
    - Add `io.quarkus:quarkus-spring-di` if you need to keep the Spring annotations short-term.
    - Bean discovery in Quarkus is `annotated` only — beans without a bean-defining annotation are not picked up.
  links:
    - url: https://quarkus.io/guides/spring-di
      title: Migration Documentation
  when:
    or:
        - java.referenced:
            pattern: org.springframework.stereotype.Component
            location: ANNOTATION
        - java.referenced:
            pattern: org.springframework.stereotype.Service
            location: ANNOTATION
        - java.referenced:
            pattern: org.springframework.stereotype.Repository
            location: ANNOTATION
- ruleID: cdi-annotation-00020
  description: Spring @Configuration maps to @ApplicationScoped on a producer class in CDI
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Replace `@Configuration` with `@ApplicationScoped` (or any other CDI scope) and `@Bean` methods with `@Produces` methods.

    ### Before
    ```java
    @Configuration
    public class AppConfig {
        @Bean(name = "capitalizer")
        StringFunction capitalizer() { return String::toUpperCase; }
    }
    ```

    ### After
    ```java
    import jakarta.enterprise.context.ApplicationScoped;
    import jakarta.enterprise.inject.Produces;
    import jakarta.inject.Named;

    @ApplicationScoped
    public class AppConfig {
        @Produces @Named("capitalizer")
        StringFunction capitalizer() { return String::toUpperCase; }
    }
    ```

    ### Additional Info
    - `quarkus-spring-di` keeps `@Configuration` / `@Bean` working during migration.
  links:
    - url: https://quarkus.io/guides/spring-di
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.context.annotation.Configuration
        location: ANNOTATION
