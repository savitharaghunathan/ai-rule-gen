    Replace listeners on `ApplicationReadyEvent`/`ContextRefreshedEvent`/`ContextClosedEvent` with CDI observers on `io.quarkus.runtime.StartupEvent` (startup) and `io.quarkus.runtime.ShutdownEvent` (shutdown).

