    - konveyor.io/generated-by=ai-rule-gen
  message: Quarkus does not support EJBs. Remove the `javax.ejb:javax.ejb-api` (or equivalent jakarta.ejb-api) dependency and migrate stateless/stateful/singleton beans to CDI `@ApplicationScoped` beans with `@Transactional` for transaction semantics.
