- ruleID: ejb-annotation-00020
  description: Stateful session beans are not supported; choose a CDI scope that matches the desired lifetime
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Stateful EJBs have no direct replacement. Choose a CDI scope that matches the bean''s lifecycle: `@SessionScoped` (HTTP session, requires `quarkus-undertow`), `@RequestScoped`, `@TransactionScoped`, or a custom scope.'
  links:
    - url: https://quarkus.io/guides/cdi-reference
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.ejb.Stateful
        location: ANNOTATION
- ruleID: ejb-annotation-00030
  description: EJB @Singleton is not supported; use CDI @Singleton
  category: mandatory
  effort: 3
