- ruleID: ejb-pattern-00010
  description: Quarkus does not support EJB; ejb-jar.xml has no effect
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Quarkus does not implement EJB. `ejb-jar.xml` is ignored. Migrate session bean definitions to CDI beans (`@ApplicationScoped`/`@Singleton`/`@Dependent`) and MDBs to SmallRye Reactive Messaging consumers.
  links:
    - url: https://quarkus.io/guides/cdi-reference
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: META-INF/ejb-jar\.xml
        filePattern: (.*/)?ejb-jar\.xml
