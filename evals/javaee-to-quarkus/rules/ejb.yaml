- ruleID: ejb-import-00010
  description: EJB (javax.ejb) is not supported in Quarkus; migrate to CDI beans and JTA @Transactional
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    EJBs (`javax.ejb`) are not supported in Quarkus. Replace EJB session beans with CDI beans using `@ApplicationScoped` / `@RequestScoped`, replace EJB transaction semantics with `@jakarta.transaction.Transactional`, and replace MDBs with SmallRye Reactive Messaging (`@Incoming`).

    ### Before
    ```java
    import javax.ejb.Stateless;
    import javax.ejb.TransactionAttribute;
    import javax.ejb.TransactionAttributeType;

    @Stateless
    public class OrderService {
        @TransactionAttribute(TransactionAttributeType.REQUIRED)
        public void placeOrder(Order o) { ... }
    }
    ```

    ### After
    ```java
    import jakarta.enterprise.context.ApplicationScoped;
    import jakarta.transaction.Transactional;

    @ApplicationScoped
    public class OrderService {
        @Transactional
        public void placeOrder(Order o) { ... }
    }
    ```

    ### Additional Info
    - `@Stateless` / `@Stateful` / `@Singleton(javax.ejb)` -> `@ApplicationScoped` (CDI).
    - `@TransactionAttribute` -> `@Transactional` (jakarta.transaction) with matching `TxType` value.
    - `@MessageDriven` -> SmallRye Reactive Messaging `@Incoming`.
    - Local/remote EJB views, `@EJB` lookups, and `@Asynchronous` execution are not supported.
  links:
    - url: https://quarkus.io/guides/cdi-reference
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.ejb*
        location: PACKAGE
- ruleID: ejb-dependency-00010
  description: EJB API is not supported in Quarkus; migrate to CDI beans and @Transactional
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
