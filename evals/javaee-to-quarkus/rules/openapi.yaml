- ruleID: openapi-import-00010
  description: MicroProfile OpenAPI annotations are first-class in Quarkus via quarkus-smallrye-openapi
  category: potential
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: MicroProfile OpenAPI annotations (`@OpenAPIDefinition`, `@APIResponse`, `@Schema`, etc.) work natively in Quarkus through the `quarkus-smallrye-openapi` extension. Ensure that extension is added to the build.
  links:
    - url: https://quarkus.io/guides/openapi-swaggerui
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.eclipse.microprofile.openapi.annotations
        location: PACKAGE
- ruleID: openapi-import-00020
  description: Swagger / springdoc annotations should be replaced by MicroProfile OpenAPI annotations
  category: optional
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Quarkus does not support Springfox or springdoc-openapi. The recommended replacement is MicroProfile OpenAPI (`org.eclipse.microprofile.openapi.annotations.*`) via the `quarkus-smallrye-openapi` extension. Swagger annotations are partly compatible since both build on the OpenAPI spec, but explicit migration is recommended.
  links:
    - url: https://quarkus.io/guides/openapi-swaggerui
      title: Migration Documentation
  when:
    java.referenced:
        pattern: io.swagger.v3.oas.annotations
        location: PACKAGE
