- ruleID: scheduler-type-00010
  description: SchedulingConfigurer is not supported in Quarkus; use @Scheduled or Vert.x timers
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring's `SchedulingConfigurer` interface (and the `TaskScheduler` it configures) is NOT supported in Quarkus. Migrate to:
    - `@io.quarkus.scheduler.Scheduled` for declarative scheduling, or
    - The Quarkus `Scheduler` API for programmatic scheduling, or
    - Vert.x `Vertx#setPeriodic`/`#setTimer` for ad-hoc reactive scheduling.

    ### Additional Info
    - `fixedDelay`/`fixedDelayString` are not supported on `@Scheduled`.
    - See the [Quarkus Scheduler guide](https://quarkus.io/guides/scheduler-reference) for advanced patterns.
  links:
    - url: https://quarkus.io/guides/scheduler-reference
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.scheduling.annotation.SchedulingConfigurer
        location: IMPLEMENTS_TYPE
