- ruleID: transaction-change-00030
  description: Programmatic UserTransaction is the legacy approach; prefer @Transactional or QuarkusTransaction
  category: optional
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus supports `UserTransaction` but recommends `@Transactional` on the entry method, or `io.quarkus.narayana.jta.QuarkusTransaction` for programmatic transaction control. The latter integrates with the CDI request scope and auto-rolls back on leak.

    ### Before
    ```java
    @Inject UserTransaction transaction;

    public void work() {
        try {
            transaction.begin();
            // ...work...
            transaction.commit();
        } catch (Exception e) {
            transaction.rollback();
        }
    }
    ```

    ### After (declarative)
    ```java
    @Transactional
    public void work() {
        // ...work...
    }
    ```

    ### After (programmatic)
    ```java
    import io.quarkus.narayana.jta.QuarkusTransaction;

    public void work() {
        QuarkusTransaction.requiringNew().run(() -> {
            // ...work...
        });
    }
    ```

    ### Additional Info
    - You cannot use `UserTransaction` inside a method already running under `@Transactional` - it throws an exception.
    - `QuarkusTransaction` provides finer-grained control (timeout, exception handler, semantics).
  links:
    - url: https://quarkus.io/guides/transaction#legacy-api-approach
      title: Migration Documentation
  when:
    java.referenced:
        pattern: jakarta.transaction.UserTransaction
        location: FIELD
