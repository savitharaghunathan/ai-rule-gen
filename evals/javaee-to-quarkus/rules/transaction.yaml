- ruleID: transaction-import-00010
  description: Quarkus uses Jakarta Transactions (jakarta.transaction); javax.transaction is renamed
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus's `quarkus-narayana-jta` extension implements Jakarta Transactions. All `javax.transaction.*` types (`@Transactional`, `UserTransaction`, `TransactionManager`, `Status`) must be re-imported from `jakarta.transaction.*`.

    ### Before
    ```java
    import javax.transaction.Transactional;
    import javax.transaction.UserTransaction;

    @Transactional
    public void process() { ... }
    ```

    ### After
    ```java
    import jakarta.transaction.Transactional;
    import jakarta.transaction.UserTransaction;

    @Transactional
    public void process() { ... }
    ```

    ### Additional Info
    - Prefer `@Transactional` on CDI beans over manual `UserTransaction` usage.
    - For programmatic boundaries, prefer `io.quarkus.narayana.jta.QuarkusTransaction` over `UserTransaction`.
    - Distributed transactions (JTS, REST-AT, WS-AT) are not supported.
    - Set timeouts via `@TransactionConfiguration(timeout = ...)` or the `quarkus.transaction-manager.default-transaction-timeout` config property.
  links:
    - url: https://quarkus.io/guides/transaction
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.transaction*
        location: PACKAGE
- ruleID: transaction-change-00010
  description: UserTransaction is the legacy API; prefer @Transactional or io.quarkus.narayana.jta.QuarkusTransaction in Quarkus
  category: optional
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus supports `jakarta.transaction.UserTransaction` for backwards compatibility but recommends `@Transactional` (declarative) or `io.quarkus.narayana.jta.QuarkusTransaction` (programmatic) for new code.

    ### Before
    ```java
    @Inject UserTransaction transaction;

    public void process() {
        try {
            transaction.begin();
            // ... work ...
            transaction.commit();
        } catch (Exception e) {
            transaction.rollback();
        }
    }
    ```

    ### After
    ```java
    import io.quarkus.narayana.jta.QuarkusTransaction;

    @Transactional
    public void process() {
        // ... work ...
    }

    // Or programmatically:
    QuarkusTransaction.requiringNew().run(() -> {
        // ... work ...
    });
    ```

    ### Additional Info
    - `@Transactional` on a CDI bean is the most idiomatic approach.
    - `QuarkusTransaction.runner(...)` provides lambda-scoped transactions with timeouts and exception handlers.
    - Re-import `UserTransaction` from `jakarta.transaction` if you keep it.
  links:
    - url: https://quarkus.io/guides/transaction
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.transaction.UserTransaction
        location: FIELD
- ruleID: transaction-change-00020
  description: TransactionManager is provided by quarkus-narayana-jta in jakarta.transaction namespace
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Re-import `TransactionManager` from `jakarta.transaction`. Quarkus exposes it as a CDI bean via the `quarkus-narayana-jta` extension; call `tm.setRollbackOnly()` to programmatically mark a transaction for rollback.

    ### Before
    ```java
    import javax.transaction.TransactionManager;
    @Inject TransactionManager tm;
    ```

    ### After
    ```java
    import jakarta.transaction.TransactionManager;
    @Inject TransactionManager tm;
    ```
  links:
    - url: https://quarkus.io/guides/transaction
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.transaction.TransactionManager
        location: FIELD
- ruleID: transaction-annotation-00010
  description: Spring's @Transactional is not used in Quarkus; the Jakarta Transactions annotation must be used instead
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Replace `org.springframework.transaction.annotation.Transactional` with `jakarta.transaction.Transactional`. The `propagation`, `isolation`, `readOnly`, and `rollbackFor` attributes don't map one-to-one — see the Quarkus transaction guide for the supported `TxType` values and `rollbackOn`/`dontRollbackOn`.

    ### Before
    ```java
    import org.springframework.transaction.annotation.Transactional;

    @Transactional(propagation = Propagation.REQUIRES_NEW)
    public void process() { ... }
    ```

    ### After
    ```java
    import jakarta.transaction.Transactional;
    import jakarta.transaction.Transactional.TxType;

    @Transactional(TxType.REQUIRES_NEW)
    public void process() { ... }
    ```
  links:
    - url: https://quarkus.io/guides/transaction
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.transaction.annotation.Transactional
        location: ANNOTATION
