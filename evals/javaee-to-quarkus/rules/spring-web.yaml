- ruleID: spring-web-annotation-00010
  description: '@ResponseBody has no Jakarta REST equivalent; method return value IS the body'
  category: optional
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Jakarta REST automatically serializes the method return value to the response body. Remove `@ResponseBody`. Use `@Produces(MediaType.APPLICATION_JSON)` to declare the response content type.
  links:
    - url: https://quarkus.io/guides/spring-web
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.web.bind.annotation.ResponseBody
        location: ANNOTATION
- ruleID: spring-web-annotation-00020
  description: '@ControllerAdvice has no equivalent; declare global exception mappers in a stand-alone class'
  category: optional
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Quarkus does not support `@ControllerAdvice`. To register global exception mapping, declare a stand-alone class (not a `@Path` resource) containing one or more `@ServerExceptionMapper` methods, or a class implementing `ExceptionMapper<E>` annotated with `@Provider`.
  links:
    - url: https://quarkus.io/guides/rest#exception-mapping
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.web.bind.annotation.ControllerAdvice
        location: ANNOTATION
- ruleID: spring-web-import-00010
  description: Quarkus serves HTTP via Vert.x; DispatcherServlet is not used
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Quarkus uses a Vert.x-based HTTP layer. `DispatcherServlet` and Spring MVC's servlet stack are not present. Remove custom `DispatcherServlet` configuration; configure HTTP via `quarkus.http.*` properties.
  links:
    - url: https://quarkus.io/guides/rest
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.web.servlet.DispatcherServlet
        location: IMPORT
- ruleID: spring-web-type-00010
  description: Spring WebMvcConfigurer is not honored; use Quarkus REST configuration mechanisms
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Quarkus does not invoke `WebMvcConfigurer`. Migrate the customizations:

    - Argument resolvers / HandlerMethodArgumentResolver -> Jakarta REST `ParamConverterProvider` or REST Reactive `ParameterExtractor`.
    - Interceptors -> Jakarta REST `ContainerRequestFilter`/`ContainerResponseFilter`.
    - Static resource handlers -> `quarkus.http.static-resources` configuration or `META-INF/resources`.
  links:
    - url: https://quarkus.io/guides/rest
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.web.servlet.config.annotation.WebMvcConfigurer
        location: IMPLEMENTS_TYPE
- ruleID: spring-web-type-00020
  description: Spring MVC HandlerInterceptor is not supported in Quarkus; use Jakarta REST filters
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring MVC's `HandlerInterceptor` is not supported in Quarkus. Replace with Jakarta REST `ContainerRequestFilter`/`ContainerResponseFilter` (`@Provider`-annotated), or with Vert.x `@RouteFilter` for the underlying HTTP layer.

    ### Before
    ```java
    @Component
    public class LoggingInterceptor implements HandlerInterceptor {
        public boolean preHandle(HttpServletRequest request, HttpServletResponse response, Object handler) { ... }
    }
    ```

    ### After
    ```java
    @Provider
    public class LoggingFilter implements ContainerRequestFilter {
        @Override
        public void filter(ContainerRequestContext ctx) { ... }
    }
    ```

    ### Additional Info
    - `@Provider` is required for Jakarta REST filters.
    - Use `@PreMatching` on the filter if you need to run before route matching.
    - See the [Quarkus REST guide](https://quarkus.io/guides/rest).
  links:
    - url: https://quarkus.io/guides/rest
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.web.servlet.HandlerInterceptor
        location: IMPLEMENTS_TYPE
