- ruleID: validation-import-00010
  description: javax.validation was renamed to jakarta.validation in Jakarta EE 9+
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=java-ee
    - konveyor.io/source=javaee
    - konveyor.io/source=jakarta-ee
    - konveyor.io/source=spring-boot
    - konveyor.io/target=quarkus
    - konveyor.io/generated-by=ai-rule-gen
  message: Replace `import javax.validation.*` with `import jakarta.validation.*` for `@Valid`, `@NotNull`, `@Size`, `@Pattern`, `Validator`, `ConstraintValidator`, etc.
  links:
    - url: https://quarkus.io/guides/validation
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.validation
        location: PACKAGE
