- ruleID: dependencies-dependency-00070
  description: Ehcache3 ehcache module now declared with a jakarta classifier to support Jakarta EE 9+
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot2
    - konveyor.io/source=spring-boot
    - konveyor.io/source=spring5
    - konveyor.io/target=spring-boot3
    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    To support Jakarta EE 9+, Spring Boot 3 now declares the Ehcache3 `org.ehcache:ehcache` module with a `jakarta` classifier. Any explicit declaration of this artifact in your `pom.xml` or `build.gradle` should be updated to use the same classifier so the Jakarta-compatible JAR is resolved.

    ### Before
    ```xml
    <dependency>
      <groupId>org.ehcache</groupId>
      <artifactId>ehcache</artifactId>
    </dependency>
    ```

    ### After
    ```xml
    <dependency>
      <groupId>org.ehcache</groupId>
      <artifactId>ehcache</artifactId>
      <classifier>jakarta</classifier>
    </dependency>
    ```

    ### Additional Info
    - Without the `jakarta` classifier you will get the legacy `javax.cache` JAR, which is incompatible with Jakarta EE 9+ APIs used by Spring Boot 3.
    - Ehcache3 version `3.10.0+` is required for the `-jakarta` variant.
    - See [Spring Boot 3 Migration Guide — Ehcache3](https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#ehcache3).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#ehcache3
      title: Migration Documentation
  when:
    java.dependency:
        name: org.ehcache.ehcache
        lowerbound: 0.0.0
