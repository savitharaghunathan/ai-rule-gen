    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 3 has removed support for Hazelcast 3.x. Auto-configuration only recognizes Hazelcast 4 or later, and the dependency management for Hazelcast 3 client/server artifacts is gone.

    ### Migration Steps
    - Upgrade to Hazelcast 4 or later (5.x is recommended for Jakarta EE compatibility).
    - Update imports: many APIs moved between Hazelcast 3.x and 4.x (e.g., `IMap` and `IList` configuration APIs).
    - Replace `com.hazelcast.config.Config` setup if you used Hazelcast 3.x XML schemas — the schema changed in 4.x.
    - Re-test client/server compatibility — Hazelcast 4 clients cannot connect to Hazelcast 3 clusters.

    ### Additional Info
    - See [Spring Boot 3 Migration Guide — Other Removals](https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#other-removals).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#other-removals
      title: Migration Documentation
  when:
    java.dependency:
        name: com.hazelcast.hazelcast
        upperbound: 4.0.0
        lowerbound: 0.0.0
