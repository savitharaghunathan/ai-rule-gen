    Spring Boot 3 no longer manages the version of Hazelcast Hibernate (`com.hazelcast:hazelcast-hibernate53` and related artifacts). Spring Boot does not depend on Hazelcast Hibernate, so it no longer has an opinion about its version.

    ### Migration Steps
    - If you wish to continue using Hazelcast Hibernate, pin an explicit version in your build file (e.g., `5.2.0`).
    - Alternatively, consider switching to `org.hibernate.orm:hibernate-jcache` as the second-level cache provider — this is the recommended replacement.
    - Verify that the chosen Hazelcast Hibernate version is compatible with Hibernate 6.1 (used by Spring Boot 3).

    ### Additional Info
    - See [Spring Boot 3 Migration Guide — Hazelcast Hibernate Removed](https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#hazelcast-hibernate-removed).
