- ruleID: dependencies-dependency-00130
  description: EhCache 2 (net.sf.ehcache) support removed in Spring Boot 3.0
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=spring-boot2
    - konveyor.io/source=spring-boot
    - konveyor.io/source=spring5
    - konveyor.io/target=spring-boot3
    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 3 has removed support for EhCache 2 (`net.sf.ehcache:ehcache`). Dependency management and auto-configuration are gone.

    ### Migration Steps
    - Migrate to Ehcache 3 (`org.ehcache:ehcache` with the `jakarta` classifier — see the Ehcache3 section of the migration guide).
    - Update XML configurations: EhCache 2 used `ehcache.xml` with a specific schema; Ehcache 3 uses a different `ehcache.xml` schema and Java configuration.
    - `net.sf.ehcache.*` imports must be replaced with `org.ehcache.*` equivalents.
    - Cache regions, eviction policies, and persistence options have different APIs in Ehcache 3.

    ### Additional Info
    - See [Spring Boot 3 Migration Guide — Other Removals](https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#other-removals).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#other-removals
      title: Migration Documentation
  when:
    java.dependency:
        name: net.sf.ehcache.ehcache
        lowerbound: 0.0.0
- ruleID: dependencies-import-00010
  description: EhCache 2 (net.sf.ehcache) support removed in Spring Boot 3.0; migrate to Ehcache 3 (org.ehcache)
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=spring-boot2
    - konveyor.io/source=spring-boot
    - konveyor.io/source=spring5
    - konveyor.io/target=spring-boot3
    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 3 has removed support for EhCache 2. Any code that imports from `net.sf.ehcache` will no longer be auto-configured by Spring Boot.

    ### Before
    ```java
    import net.sf.ehcache.CacheManager;
    import net.sf.ehcache.Cache;
    ```

    ### After
    ```java
    import org.ehcache.CacheManager;
    import org.ehcache.Cache;
    ```

    ### Additional Info
    - The Ehcache 3 API is substantially different — `CacheManager` is built via `CacheManagerBuilder`, and cache configuration moves from XML to Java builder calls.
    - See [Spring Boot 3 Migration Guide — Other Removals](https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#other-removals).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#other-removals
      title: Migration Documentation
  when:
    java.referenced:
        pattern: net.sf.ehcache
        location: PACKAGE
- ruleID: dependencies-dependency-00140
  description: Hazelcast 3 support removed in Spring Boot 3.0; upgrade to Hazelcast 4 or later
  category: mandatory
  effort: 7
