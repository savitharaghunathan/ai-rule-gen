  message: |-
    Spring Boot 3 has removed support for Apache Solr because the Jetty-based client `Http2SolrClient` is not compatible with Jetty 11 (which Spring Boot 3 uses). Auto-configuration, the `spring-boot-starter-data-solr` starter, and dependency management for `solr-solrj` are gone.

    ### Migration Steps
    - Remove `org.apache.solr:solr-solrj` and `spring-boot-starter-data-solr` from your build.
    - Implement Solr access manually using an HTTP client compatible with your servlet container (or use Solr's REST API directly).
    - Consider migrating to Elasticsearch or OpenSearch if Solr-specific features aren't required.

    ### Additional Info
    - See [Spring Boot 3 Migration Guide — Other Removals](https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#other-removals).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#other-removals
      title: Migration Documentation
  when:
    java.dependency:
        name: org.apache.solr.solr-solrj
        lowerbound: 0.0.0
