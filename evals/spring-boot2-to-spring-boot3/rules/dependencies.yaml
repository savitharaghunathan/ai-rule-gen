    ### Migration Steps
    - Prefer migrating to Eclipse Yasson (`org.eclipse:yasson`) — this is what Spring Boot 3 now manages.
    - If you must continue using Apache Johnzon, pin a Jakarta EE 10-compatible version explicitly (`1.2.19` or newer with the `-jakarta` classifier, or `2.0.0+`).
    - Verify that your JSON-B provider configuration still resolves the correct binding after the change.

    ### Additional Info
    - See [Spring Boot 3 Migration Guide — JSON-B](https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#json-b).
