    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 3 has removed support for Atomikos. The auto-configuration and dependency management for `com.atomikos:*` artifacts are gone.

    ### Migration Steps
    - Migrate to a different JTA transaction manager. As of Spring Boot 3 there is no first-class auto-configured replacement — `spring-boot-starter-jta-atomikos` is removed and `spring-boot-starter-jta-bitronix` was already removed earlier.
    - Consider switching to a non-JTA approach (e.g., chained transactions on a single XA-capable database) where possible.
    - If you must stay on Atomikos, pin an explicit version that supports Jakarta EE 9+ (`com.atomikos:transactions:6.0.0+`) and wire the beans manually.

    ### Additional Info
    - See [Spring Boot 3 Migration Guide — Other Removals](https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#other-removals).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#other-removals
      title: Migration Documentation
  when:
    java.dependency:
        name: com.atomikos.transactions
        lowerbound: 0.0.0
