- ruleID: jakarta-dependency-00010
  description: javax.servlet:javax.servlet-api is replaced by jakarta.servlet:jakarta.servlet-api in Jakarta EE 9+
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot2
    - konveyor.io/source=spring-boot
    - konveyor.io/source=spring5
    - konveyor.io/target=spring-boot3
    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 3.0 uses Jakarta EE 10. The `javax.servlet:javax.servlet-api` dependency must be replaced with `jakarta.servlet:jakarta.servlet-api`. All `javax.servlet.*` imports must also be updated to `jakarta.servlet.*`.

    ### Before
    ```xml
    <dependency>
      <groupId>javax.servlet</groupId>
      <artifactId>javax.servlet-api</artifactId>
    </dependency>
    ```

    ### After
    ```xml
    <dependency>
      <groupId>jakarta.servlet</groupId>
      <artifactId>jakarta.servlet-api</artifactId>
    </dependency>
    ```

    ### Additional Info
    - All Jakarta EE specs in Spring Boot 3 use the `jakarta.*` namespace
    - OpenRewrite recipes can help automate this migration
    - Be careful of transitive `javax.servlet` dependencies
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#jakarta-ee
      title: Migration Documentation
  when:
    java.dependency:
        name: javax.servlet.javax.servlet-api
        lowerbound: 0.0.0
- ruleID: jakarta-import-00010
  description: javax.servlet package renamed to jakarta.servlet in Jakarta EE 9+
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot2
    - konveyor.io/source=spring-boot
    - konveyor.io/source=spring5
    - konveyor.io/target=spring-boot3
    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Jakarta EE 9+ renamed all `javax.*` packages to `jakarta.*`. Replace `javax.servlet` imports with `jakarta.servlet`. Spring Boot 3.0 uses the Servlet 6.0 specification under the `jakarta.servlet` namespace.

    ### Before
    ```java
    import javax.servlet.http.HttpServletRequest;
    import javax.servlet.Filter;
    ```

    ### After
    ```java
    import jakarta.servlet.http.HttpServletRequest;
    import jakarta.servlet.Filter;
    ```

    ### Additional Info
    - Update all `javax.servlet.*` imports to `jakarta.servlet.*`
    - Replace the `javax.servlet:javax.servlet-api` dependency with `jakarta.servlet:jakarta.servlet-api`
    - Use OpenRewrite or IntelliJ migration tooling to automate this
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#jakarta-ee
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.servlet
        location: PACKAGE
