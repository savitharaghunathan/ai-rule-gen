- ruleID: jakarta-import-00030
  description: javax.annotation package renamed to jakarta.annotation in Jakarta EE 9+
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot2
    - konveyor.io/source=spring-boot
    - konveyor.io/source=spring5
    - konveyor.io/target=spring-boot3
    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Jakarta EE 9+ renamed `javax.annotation` to `jakarta.annotation`. Annotations like `@PostConstruct`, `@PreDestroy`, and `@Resource` now live under `jakarta.annotation`.

    ### Before
    ```java
    import javax.annotation.PostConstruct;
    import javax.annotation.PreDestroy;
    ```

    ### After
    ```java
    import jakarta.annotation.PostConstruct;
    import jakarta.annotation.PreDestroy;
    ```

    ### Additional Info
    - Common affected annotations: `@PostConstruct`, `@PreDestroy`, `@Resource`, `@Priority`
    - The `javax.annotation:javax.annotation-api` dependency should be replaced with `jakarta.annotation:jakarta.annotation-api`
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#jakarta-ee
      title: Migration Documentation
  when:
    java.referenced:
        pattern: javax.annotation
        location: PACKAGE
