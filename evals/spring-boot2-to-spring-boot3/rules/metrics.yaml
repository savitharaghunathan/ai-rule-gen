        location: IMPORT
- ruleID: metrics-import-00030
  description: WebMvcTagsProvider deprecated in Spring Boot 3.0; replaced by ServerRequestObservationConvention
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot2
    - konveyor.io/source=spring-boot
    - konveyor.io/source=spring5
    - konveyor.io/target=spring-boot3
    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `WebMvcTagsProvider` has been deprecated. In the new Observation-based instrumentation model, tag providers are replaced by observation conventions. Implement `ServerRequestObservationConvention` (or extend `DefaultServerRequestObservationConvention`) and register it as a bean.

    ### Before
    ```java
    import org.springframework.boot.actuate.metrics.web.servlet.WebMvcTagsProvider;

    @Bean
    public WebMvcTagsProvider tagsProvider() { return new CustomWebMvcTagsProvider(); }
    ```

    ### After
    ```java
    import org.springframework.http.server.observation.ServerRequestObservationConvention;
    import org.springframework.http.server.observation.DefaultServerRequestObservationConvention;

    public class CustomServerRequestObservationConvention
            extends DefaultServerRequestObservationConvention { /* ... */ }

    @Bean
    public ServerRequestObservationConvention convention() {
        return new CustomServerRequestObservationConvention();
    }
    ```

    ### Additional Info
    - The default convention is no longer used by the Observation instrumentation, but is kept around during the deprecation phase for migration
    - You can also customize using `ObservationFilter` for post-processing key values
    - `ServerRequestObservationContext` provides access to the current request
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#tag-providers-and-contributors-migration
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.actuate.metrics.web.servlet.WebMvcTagsProvider
        location: IMPORT
- ruleID: metrics-import-00040
  description: WebMvcTagsContributor deprecated in Spring Boot 3.0; replaced by observation conventions
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot2
    - konveyor.io/source=spring-boot
    - konveyor.io/source=spring5
    - konveyor.io/target=spring-boot3
    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `WebMvcTagsContributor` has been deprecated. In the new Observation-based instrumentation model, tag contributors are replaced by observation conventions or `ObservationFilter`. Extend `DefaultServerRequestObservationConvention` to add tags while preserving defaults.

    ### Before
    ```java
    import org.springframework.boot.actuate.metrics.web.servlet.WebMvcTagsContributor;

    @Bean
    public WebMvcTagsContributor extraTags() { return new MyContributor(); }
    ```

    ### After
    ```java
    public class ExtendedServerRequestObservationConvention
            extends DefaultServerRequestObservationConvention {
        @Override
        public KeyValues getLowCardinalityKeyValues(ServerRequestObservationContext context) {
            return super.getLowCardinalityKeyValues(context).and(custom(context));
        }
    }
    ```

    ### Additional Info
    - `ObservationFilter` is an alternative for adding/removing key values as a post-processing step
    - Filters do not replace the default convention
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#tag-providers-and-contributors-migration
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.actuate.metrics.web.servlet.WebMvcTagsContributor
        location: IMPORT
