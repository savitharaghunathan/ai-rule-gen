- ruleID: metrics-import-00010
  description: WebMvcMetricsFilter deleted in Spring Boot 3.0; replaced by Spring Framework's ServerHttpObservationFilter
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot2
    - konveyor.io/source=spring-boot
    - konveyor.io/source=spring5
    - konveyor.io/target=spring-boot3
    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `WebMvcMetricsFilter` has been removed in Spring Boot 3.0. It is effectively replaced by Spring Framework's `org.springframework.web.filter.ServerHttpObservationFilter`, which is applied automatically by the Observation auto-configuration.

    ### Migration Steps
    - Remove any direct reference to or registration of `WebMvcMetricsFilter`
    - Rely on the auto-configured `ServerHttpObservationFilter` and the new Observation API
    - Customize observation behavior with `ServerRequestObservationConvention` beans rather than filter customization

    ### Additional Info
    - The new instrumentation is based on Micrometer Observation (1.10+)
    - This is part of the broader deprecation of Spring Boot 2.x instrumentation in favor of Observation
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#deprecation-of-the-spring-boot-2x-instrumentation
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.actuate.metrics.web.servlet.WebMvcMetricsFilter
        location: IMPORT
