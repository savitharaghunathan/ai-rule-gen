- ruleID: metrics-pattern-00010
  description: Actuator metrics export properties moved from management.metrics.export.<product> to management.<product>.metrics.export
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot2
    - konveyor.io/source=spring-boot
    - konveyor.io/source=spring5
    - konveyor.io/target=spring-boot3
    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Actuator metrics export properties have been restructured. The old schema `management.metrics.export.<product>` is replaced with `management.<product>.metrics.export`.

    ### Before
    ```properties
    management.metrics.export.prometheus.enabled=true
    management.metrics.export.prometheus.step=1m
    ```

    ### After
    ```properties
    management.prometheus.metrics.export.enabled=true
    management.prometheus.metrics.export.step=1m
    ```

    ### Additional Info
    - Applies to all metrics export products (prometheus, statsd, datadog, influx, etc.)
    - Spring Boot's `spring-boot-properties-migrator` reports these changes at startup
    - See spring-projects/spring-boot#30381 for the complete list of moved properties
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#actuator-metrics-export-properties
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: management\.metrics\.export\.
        filePattern: application.*\.(properties|ya?ml)
