- ruleID: security-dependency-00010
  description: Spring Boot 3.0 upgrades to Spring Security 6.0; review Spring Security 5.8 to 6.0 migration guide
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=spring-boot2
    - konveyor.io/source=spring-boot
    - konveyor.io/source=spring5
    - konveyor.io/target=spring-boot3
    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 3.0 ships with Spring Security 6.0. Before upgrading to Spring Boot 3.0, the Spring team recommends first upgrading your Spring Boot 2.7 application to Spring Security 5.8 (a transitional release that simplifies the 5.x to 6.0 migration). Then follow the Spring Security 5.8 to 6.0 migration guide.

    Note: Spring Security 6.0 also changes how the security filter is invoked for Servlet dispatch types — authorization is now applied to every dispatch type, not just REQUEST. Spring Boot configures Spring Security's filter accordingly. If you need to restrict this, use the `spring.security.filter.dispatcher-types` property.

    ### Migration Steps
    - Upgrade your Spring Boot 2.7 application to Spring Security 5.8 first using the 5.8 migration guide: https://docs.enterprise.spring.io/spring-security/reference/5.8/migration/index.html
    - Then follow the 5.8 to 6.0 migration guide: https://docs.enterprise.spring.io/spring-security/reference/6.0/migration/index.html
    - Review every security configuration class (`SecurityFilterChain`, `WebSecurityConfigurerAdapter` removal, lambda-based DSL, etc.)
    - If your application relies on the filter only being applied to REQUEST dispatches, configure `spring.security.filter.dispatcher-types` to restore the previous behavior

    ### Additional Info
    - `WebSecurityConfigurerAdapter` has been removed in Spring Security 6.0 — migrate to component-based configuration that defines a `SecurityFilterChain` bean
    - The default authorization model now covers all dispatch types (REQUEST, FORWARD, INCLUDE, ASYNC, ERROR)
    - The `EnableGlobalMethodSecurity` annotation has been deprecated in favor of `EnableMethodSecurity`
    - Some OAuth2 / SAML2 property paths have been renamed (see later sections of the Spring Boot 3.0 migration guide)
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#spring-security
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.security.spring-security-core
        upperbound: 6.0.0
- ruleID: security-change-00010
  description: ReactiveUserDetailsService is no longer auto-configured when an AuthenticationManagerResolver is present
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot2
    - konveyor.io/source=spring-boot
    - konveyor.io/source=spring5
    - konveyor.io/target=spring-boot3
    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    A `ReactiveUserDetailsService` is no longer auto-configured in the presence of an `AuthenticationManagerResolver`. If your application depends on the auto-configured `ReactiveUserDetailsService` while also defining (or auto-detecting) an `AuthenticationManagerResolver`, authentication will silently fall through to the resolver only.

    ### Migration Steps
    1. Inventory `ReactiveUserDetailsService` injection points in the application context.
    2. Check whether any `AuthenticationManagerResolver<ServerWebExchange>` bean (or auto-configured equivalent) is present.
    3. If both are required, define your own `@Bean ReactiveUserDetailsService` so the auto-configuration back-off does not leave you without a user-details lookup.
    4. Adjust integration tests that mocked the previously auto-configured `ReactiveUserDetailsService`.

    ### Before
    ```java
    // Relied on auto-configured ReactiveUserDetailsService + AuthenticationManagerResolver
    ```

    ### After
    ```java
    @Bean
    public ReactiveUserDetailsService userDetailsService() {
        return username -> userRepository.findByUsername(username)
            .map(user -> User.withUsername(user.getName()).password(user.getPassword()).build());
    }
    ```

    Reference: [Spring Boot 3 migration guide](https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#reactiveuserdetailsservice).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#reactiveuserdetailsservice
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.security.core.userdetails.ReactiveUserDetailsService
        location: TYPE
- ruleID: security-pattern-00010
  description: spring.security.saml2.relyingparty.registration.{id}.identity-provider.* properties removed; use asserting-party.*
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot2
    - konveyor.io/source=spring-boot
    - konveyor.io/source=spring5
    - konveyor.io/target=spring-boot3
    - konveyor.io/target=spring-boot
    - konveyor.io/target=spring6
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Properties under `spring.security.saml2.relyingparty.registration.{id}.identity-provider.*` have been removed. Use the new `asserting-party.*` properties as a replacement.

    ### Before
    ```yaml
    spring:
      security:
        saml2:
          relyingparty:
            registration:
              okta:
                identity-provider:
                  entity-id: https://idp.example.com/saml/metadata
                  verification:
                    credentials:
                      - certificate-location: classpath:idp.crt
                  singlesignon:
                    url: https://idp.example.com/saml/sso
                    sign-request: true
    ```

    ### After
    ```yaml
    spring:
      security:
        saml2:
          relyingparty:
            registration:
              okta:
                asserting-party:
                  entity-id: https://idp.example.com/saml/metadata
                  verification:
                    credentials:
                      - certificate-location: classpath:idp.crt
                  singlesignon:
                    url: https://idp.example.com/saml/sso
                    sign-request: true
    ```

    ### Additional Info
    - The terminology change ("identity-provider" -> "asserting-party") aligns with the SAML 2.0 specification.
    - Property structure underneath is otherwise identical — only the top-level segment changed.
    - Update all registration IDs (this rule matches any `{id}` segment).
    - See the [migration guide](https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#saml2-relying-party-configuration).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide#saml2-relying-party-configuration
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.security\.saml2\.relyingparty\.registration\.[^.]+\.identity-provider
        filePattern: application.*\.(properties|ya?ml)
