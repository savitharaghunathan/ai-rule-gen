- ruleID: sample-00010
  description: JNDI InitialContext is not supported in Quarkus
  category: mandatory
  effort: 5
  labels:
  - konveyor.io/source=java-ee
  - konveyor.io/target=quarkus
  links:
  - title: Quarkus CDI Reference
    url: https://quarkus.io/guides/cdi-reference
  message: |
    JNDI lookups via InitialContext are not supported in Quarkus.
    Use CDI @Inject instead.
  when:
    java.referenced:
      location: CONSTRUCTOR_CALL
      pattern: javax.naming.InitialContext
- ruleID: sample-00020
  category: optional
  effort: 3
  message: Replace Spring @Autowired with CDI @Inject
  when:
    java.referenced:
      location: ANNOTATION
      pattern: org.springframework.beans.factory.annotation.Autowired
