- ruleID: spring-boot3-to-spring-boot4-00270
  description: Renamed to spring-boot-starter-aspectj in Spring Boot 4.0
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `spring-boot-starter-aop` starter has been renamed to `spring-boot-starter-aspectj` in Spring Boot 4.0 to clarify its scope. Replace the dependency in your build file. Before renaming, review if you actually need it — check for usage of AspectJ annotations (e.g., `org.aspectj.lang.annotation.Aspect`) in your application or its dependencies.

    ## Before
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-aop</artifactId>
    </dependency>
    ```

    ## After
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-aspectj</artifactId>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#aop-starter-pom
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-aop
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00280
  description: Dependency management for Spring Retry removed in Spring Boot 4.0
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 4.0 no longer manages the version for Spring Retry. If your application uses `spring-retry`, you must now specify an explicit version in your build file. Consider migrating to the new retry features in [Spring Framework 7.0](https://docs.spring.io/spring-framework/docs/7.0.x-SNAPSHOT/javadoc-api/org/springframework/core/retry/package-summary.html) instead.

    ## Before
    ```xml
    <dependency>
        <groupId>org.springframework.retry</groupId>
        <artifactId>spring-retry</artifactId>
    </dependency>
    ```

    ## After
    ```xml
    <dependency>
        <groupId>org.springframework.retry</groupId>
        <artifactId>spring-retry</artifactId>
        <version>2.0.12</version>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#dependency-management-for-spring-retry
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.retry.spring-retry
        lowerbound: 0.0.0
