- ruleID: spring-boot3-to-spring-boot4-00090
  description: Flyway support now requires spring-boot-starter-flyway starter POM
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 4 modularization requires explicit starter POMs for technologies that previously worked with just the third-party dependency. Replace the direct `org.flywaydb:flyway-core` dependency with `org.springframework.boot:spring-boot-starter-flyway`.

    ## Before
    ```xml
    <dependency>
        <groupId>org.flywaydb</groupId>
        <artifactId>flyway-core</artifactId>
    </dependency>
    ```

    ## After
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-flyway</artifactId>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#main-code
      title: Migration Documentation
  when:
    java.dependency:
        name: org.flywaydb.flyway-core
        lowerbound: 0.0.0
