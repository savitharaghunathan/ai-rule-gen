- ruleID: spring-boot3-to-spring-boot4-00790
  description: '@Timed requires AspectJ; spring-boot-starter-aop renamed to spring-boot-starter-aspectj'
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `@Timed` annotation from Micrometer requires AspectJ AOP support. In Spring Boot 4, `spring-boot-starter-aop` has been renamed to `spring-boot-starter-aspectj`. Ensure your project uses `spring-boot-starter-aspectj` if you rely on `@Timed` for method-level timing metrics.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#aop-starter-pom
      title: Migration Documentation
  when:
    java.referenced:
        pattern: io.micrometer.core.annotation.Timed
        location: ANNOTATION
