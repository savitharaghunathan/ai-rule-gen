- ruleID: spring-boot3-to-spring-boot4-00750
  description: spring-boot-properties-migrator should be removed after migration
  category: potential
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring-boot-properties-migrator` dependency is present in your project. This module is intended as a temporary migration aid that analyzes renamed/removed configuration properties at startup. If this is leftover from a previous Spring Boot migration, remove it. If you are currently migrating to Spring Boot 4, ensure you are using the Boot 4 version and remember to remove it once migration is complete.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#configuration-properties-migration
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-properties-migrator
        lowerbound: 0.0.0
