- ruleID: spring-boot3-to-spring-boot4-00640
  description: RabbitRetryTemplateCustomizer replaced with dedicated retry customizers
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Spring AMQP retry has moved from Spring Retry to Spring Framework. `RabbitRetryTemplateCustomizer` has been replaced with two dedicated customizers: `RabbitTemplateRetrySettingsCustomizer` (for `RabbitTemplate` retry customization) and `RabbitListenerRetrySettingsCustomizer` (for message listener retry customization). Migrate to the appropriate interface based on whether you are customizing template or listener retry settings.'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-amqp-retry-features
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.amqp.RabbitRetryTemplateCustomizer
        location: IMPORT
