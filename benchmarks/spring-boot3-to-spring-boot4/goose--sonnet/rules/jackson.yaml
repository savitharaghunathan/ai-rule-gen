- ruleID: spring-boot3-to-spring-boot4-00340
  description: Jackson 3 uses tools.jackson package namespace
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 4.0 uses Jackson 3, which changes the package namespace from `com.fasterxml.jackson` to `tools.jackson`. Update all Jackson imports to use the new package names. **Exception:** The `jackson-annotations` module continues to use the `com.fasterxml.jackson.annotation` package — those imports do not need to change.

    If you cannot migrate to Jackson 3 immediately, Spring Boot 4.0 provides a `spring-boot-jackson2` compatibility module as a temporary stop-gap. Jackson will also auto-detect and register all modules on the classpath (previously only "well-known" modules); set `spring.jackson.find-and-add-modules=false` to disable this.

    ## Before
    ```java
    import com.fasterxml.jackson.databind.ObjectMapper;
    ```

    ## After
    ```java
    import tools.jackson.databind.ObjectMapper;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    java.referenced:
        pattern: com.fasterxml.jackson*
        location: PACKAGE
