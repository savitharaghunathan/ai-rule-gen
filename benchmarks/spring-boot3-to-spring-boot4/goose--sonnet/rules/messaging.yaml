- ruleID: spring-boot3-to-spring-boot4-00030
  description: Spring Pulsar Reactive auto-configuration and starter removed
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot no longer manages the reactive Pulsar client. Auto-configuration for Spring Pulsar Reactive has been removed following the decision to remove reactor support in Spring Pulsar. Remove the `spring-boot-starter-pulsar-reactive` dependency and migrate to the non-reactive Spring Pulsar client or manage the reactive client dependency manually.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#pulsar-reactive
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-pulsar-reactive
        lowerbound: 0.0.0
