- ruleID: spring-boot3-to-spring-boot4-00010
  description: Spring Boot 4.0 requires Java 17+, Jakarta EE 11, Servlet 6.1, and Spring Framework 7.x
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Spring Boot 4.0 has updated system requirements: Java 17 or later (latest LTS recommended), Kotlin 2.2+, GraalVM v25+ for native images, Jakarta EE 11 with Servlet 6.1 baseline, and Spring Framework 7.x. Review your project''s runtime environment and managed dependencies before upgrading.'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#review-system-requirements
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter
        upperbound: 4.0.0
- ruleID: spring-boot3-to-spring-boot4-00190
  description: Moved from org.springframework.boot to org.springframework.boot.bootstrap
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `BootstrapRegistry` has moved from `org.springframework.boot` to `org.springframework.boot.bootstrap` in Spring Boot 4.0. Update your import statement to use the new package.

    ## Before
    ```java
    import org.springframework.boot.BootstrapRegistry;
    ```

    ## After
    ```java
    import org.springframework.boot.bootstrap.BootstrapRegistry;
    ```

    Also update any `spring.factories` entries referencing the old package.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#bootstrapregistry-and-environmentpostprocessor-package-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.BootstrapRegistry
        location: IMPORT
