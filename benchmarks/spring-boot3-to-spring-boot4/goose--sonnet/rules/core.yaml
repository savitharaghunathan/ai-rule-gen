    - konveyor.io/generated-by=ai-rule-gen
  message: The `org.springframework.lang.Nullable` annotation is no longer supported for declaring optional actuator endpoint parameters. If you are using this annotation on actuator endpoint parameters, migrate to `org.jspecify.annotations.Nullable` instead.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#removed-support-for-javaxannotationsnonnull-and-orgspringframeworklangnullable
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.lang.Nullable
        location: ANNOTATION
