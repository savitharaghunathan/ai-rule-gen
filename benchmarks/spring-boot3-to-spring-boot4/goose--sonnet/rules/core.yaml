- ruleID: spring-boot3-to-spring-boot4-00230
  description: alwaysApplyingWhenNonNull() removed in Spring Boot 4.0
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `alwaysApplyingWhenNonNull()` method has been removed from `PropertyMapper` in Spring Boot 4.0. The `PropertyMapper` no longer calls adapter or predicate methods when the source value is `null` by default, making this method unnecessary. If you need to perform a mapping even for `null` values, use the new `always()` method instead.

    ## Before
    ```java
    PropertyMapper mapper = PropertyMapper.get().alwaysApplyingWhenNonNull();
    mapper.from(source::method).to(destination::method);
    ```

    ## After
    ```java
    PropertyMapper mapper = PropertyMapper.get();
    mapper.from(source::method).to(destination::method);
    // Or if you need null-value mapping:
    mapper.from(source::method).always().to(destination::method);
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#property-mapper-api-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: alwaysApplyingWhenNonNull
        location: METHOD_CALL
- ruleID: spring-boot3-to-spring-boot4-00240
  description: PropertyMapper no longer calls adapter/predicate for null values
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: 'The `PropertyMapper` class in Spring Boot 4.0 no longer calls adapter or predicate methods when the source value is `null`. Previously, `map.from(source::method).to(destination::method)` would call `destination.method(null)` if `source.method()` returned `null`. Now it skips the mapping entirely. If you rely on null-value mapping, use the new `always()` method: `map.from(source::method).always().to(destination::method)`. Review [commit 239f384ac0](https://github.com/spring-projects/spring-boot/commit/239f384ac0893d151b89f204886874c6adb00001) for examples of how Spring Boot adapted to this change.'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#property-mapper-api-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.context.properties.PropertyMapper
        location: IMPORT
