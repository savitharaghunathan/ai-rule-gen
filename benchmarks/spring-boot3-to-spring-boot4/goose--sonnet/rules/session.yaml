- ruleID: spring-boot3-to-spring-boot4-00060
  description: Spring Session Hazelcast support removed from Spring Boot
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Direct support for Spring Session Hazelcast has been removed from Spring Boot. Spring Session Hazelcast is now under the leadership of the Hazelcast team. Remove the `spring-session-hazelcast` dependency managed by Spring Boot and check the Hazelcast team's releases for a compatible version that you can manage directly.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-session-hazelcast
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.session.spring-session-hazelcast
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00070
  description: Spring Session MongoDB support removed from Spring Boot
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Direct support for Spring Session MongoDB has been removed from Spring Boot. Spring Session MongoDB is now under the leadership of the MongoDB team. Remove the `spring-session-data-mongodb` dependency managed by Spring Boot and check the MongoDB team's releases for a compatible version that you can manage directly.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-session-mongodb
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.session.spring-session-data-mongodb
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00450
  description: Spring Session Redis properties renamed from spring.session.redis to spring.session.data.redis
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Session Data Redis properties have been renamed from `spring.session.redis.*` to `spring.session.data.redis.*` to reflect the dependency on Spring Data Redis. Update your configuration accordingly.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-session
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.session\.redis\.
        filePattern: application.*\.(properties|ya?ml)
- ruleID: spring-boot3-to-spring-boot4-00460
  description: Spring Session MongoDB properties renamed from spring.session.mongodb to spring.session.data.mongodb
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Session Data MongoDB properties have been renamed from `spring.session.mongodb.*` to `spring.session.data.mongodb.*` to reflect the dependency on Spring Data MongoDB. Update your configuration accordingly.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-session
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.session\.mongodb\.
        filePattern: application.*\.(properties|ya?ml)
