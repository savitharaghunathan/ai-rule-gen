- ruleID: spring-boot3-to-spring-boot4-00730
  description: '@MockBean removed; use @MockitoBean from Spring Framework'
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot's `@MockBean` has been removed in favor of Spring Framework's `@MockitoBean`. Replace `@MockBean` with `@MockitoBean` in your test classes.

    Note: `@MockitoBean` can only be used as fields in test classes, not in `@Configuration` classes. If you were using `@MockBean` in `@Configuration` classes for shared mocks, declare them directly on the test class using `@MockitoBean(types = {ServiceA.class, ServiceB.class})` or create a custom composed annotation.

    ```java
    // Before
    @MockBean
    private GreetingService greetingService;

    // After
    @MockitoBean
    private GreetingService greetingService;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mockbean-and-spybean-removal
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.mock.mockito.MockBean
        location: ANNOTATION
