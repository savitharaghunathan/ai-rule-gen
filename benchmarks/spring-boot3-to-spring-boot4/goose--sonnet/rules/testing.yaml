- ruleID: spring-boot3-to-spring-boot4-00110
  description: '@WithMockUser now requires spring-boot-starter-security-test to operate properly'
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In Spring Boot 4, `@WithMockUser` from `spring-security-test` now requires `spring-boot-starter-security-test` to operate properly. Add `org.springframework.boot:spring-boot-starter-security-test` to your test dependencies.

    ## Before
    ```xml
    <dependency>
        <groupId>org.springframework.security</groupId>
        <artifactId>spring-security-test</artifactId>
        <scope>test</scope>
    </dependency>
    ```

    ## After
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-security-test</artifactId>
        <scope>test</scope>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#test-code
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.security.test.context.support.WithMockUser
        location: ANNOTATION
