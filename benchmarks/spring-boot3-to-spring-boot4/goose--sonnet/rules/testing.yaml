- ruleID: spring-boot3-to-spring-boot4-00130
  description: spring-boot-starter-test no longer provides all test modules; use dedicated test starters or classic starter
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 4 modularized its test dependencies. The base `spring-boot-starter-test` no longer transitively includes all test auto-configuration modules. You need to add dedicated test starters for each technology under test (e.g., `spring-boot-starter-security-test`, `spring-boot-starter-webmvc-test`). As an intermediate migration step, you can replace `spring-boot-starter-test` with `spring-boot-starter-test-classic` which provides the old behavior.

    ## Before
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-test</artifactId>
        <scope>test</scope>
    </dependency>
    ```

    ## After
    ```xml
    <!-- Option 1: Classic test starter (intermediate step) -->
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-test-classic</artifactId>
        <scope>test</scope>
    </dependency>
    <!-- Option 2: Use dedicated test starters for each technology -->
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#classic-starters
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-test
        upperbound: 4.0.0
