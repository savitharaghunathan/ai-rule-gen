- ruleID: spring-boot3-to-spring-boot4-00650
  description: spring-boot-starter-batch now operates without database by default
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Batch now operates without a database (in-memory mode) by default with `spring-boot-starter-batch`. On upgrade, Spring Batch will no longer store metadata in your existing database. To restore database-backed metadata storage, change your dependency from `spring-boot-starter-batch` to `spring-boot-starter-batch-jdbc`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-batch
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-batch
        upperbound: 4.0.0
