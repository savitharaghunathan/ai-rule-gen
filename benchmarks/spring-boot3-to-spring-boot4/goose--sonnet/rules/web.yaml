- ruleID: spring-boot3-to-spring-boot4-00020
  description: Undertow support dropped; not compatible with Servlet 6.1
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Undertow support has been removed from Spring Boot 4 because Undertow is not yet compatible with the Servlet 6.1 baseline. Remove the `spring-boot-starter-undertow` dependency and switch to Tomcat (default) or Jetty as your embedded server. Do not deploy Spring Boot 4.0 applications to a non-Servlet 6.1 compliant container.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#undertow
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-undertow
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00470
  description: HttpMessageConverters is deprecated; use customizer interfaces instead
  category: optional
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot's `HttpMessageConverters` class is deprecated. Contributing `HttpMessageConverter` beans directly to the context is no longer supported. Instead, declare `ClientHttpMessageConvertersCustomizer` and/or `ServerHttpMessageConvertersCustomizer` beans to customize converters. Each customizer can contribute converters as "custom" converters considered before default ones, or replace a default converter that was auto-detected.

    See the [reference documentation](https://docs.spring.io/spring-boot/4.0-SNAPSHOT/reference/web/servlet.html#web.servlet.spring-mvc.message-converters) for more details.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#httpmessageconverters-deprecation
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.http.HttpMessageConverters
        location: IMPORT
- ruleID: spring-boot3-to-spring-boot4-00480
  description: server.forward-headers-strategy no longer effective in WAR deployments
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `server.forward-headers-strategy` property no longer has an effect when deploying a WAR file to an external container. If you relied on `server.forward-headers-strategy=framework` in a WAR deployment, you must now define the `ForwardedHeaderFilter` bean manually:

    ```java
    @Bean
    FilterRegistrationBean<ForwardedHeaderFilter> forwardedHeaderFilter() {
        ForwardedHeaderFilter filter = new ForwardedHeaderFilter();
        FilterRegistrationBean<ForwardedHeaderFilter> registration = new FilterRegistrationBean<>(filter);
        registration.setDispatcherTypes(DispatcherType.REQUEST, DispatcherType.ASYNC, DispatcherType.ERROR);
        registration.setOrder(Ordered.HIGHEST_PRECEDENCE);
        return registration;
    }
    ```

    This change does not affect embedded server deployments.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#forwarded-headers-strategy
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: server\.forward-headers-strategy
        filePattern: application.*\.(properties|ya?ml)
- ruleID: spring-boot3-to-spring-boot4-00490
  description: Jersey 4.0 does not yet support Jackson 3; use spring-boot-jackson2
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot 4.0 supports Jersey 4.0, which does not yet support Jackson 3. To process JSON with Jersey, use `spring-boot-jackson2` either in place of or alongside `spring-boot-jackson`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#jersey
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-jersey
        upperbound: 4.0.0
- ruleID: spring-boot3-to-spring-boot4-00500
  description: WAR deployments to Tomcat require spring-boot-starter-tomcat-runtime
  category: potential
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: When deploying a WAR file to an external Tomcat, switch the dependency from `spring-boot-starter-tomcat` to `spring-boot-starter-tomcat-runtime`. This change only applies to WAR deployments; embedded Tomcat still uses `spring-boot-starter-tomcat`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#tomcat
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-tomcat
        upperbound: 4.0.0
- ruleID: spring-boot3-to-spring-boot4-00810
  description: MappingJackson2HttpMessageConverter replaced by Jackson 3 converters; bean contribution pattern changed
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: In Spring Boot 4, `MappingJackson2HttpMessageConverter` is replaced by `JacksonJsonHttpMessageConverter` for Jackson 3. Additionally, contributing `HttpMessageConverter` beans directly to the context is no longer supported. Instead, declare `ClientHttpMessageConvertersCustomizer` and/or `ServerHttpMessageConvertersCustomizer` beans to customize converters. See the [reference documentation](https://docs.spring.io/spring-boot/4.0-SNAPSHOT/reference/web/servlet.html#web.servlet.spring-mvc.message-converters) for details.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#httpmessageconverters-deprecation
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.http.converter.json.MappingJackson2HttpMessageConverter
        location: IMPORT
