  description: Spring Data MongoDB no longer provides defaults for UUID and BigDecimal representations
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Data MongoDB no longer provides defaults for `UUID` and `BigInteger`/`BigDecimal` representations. This aligns with the driver recommendation to not favor a particular representation. You should explicitly set `spring.mongodb.representation.uuid` and `spring.data.mongodb.representation.big-decimal` properties to avoid representation changes caused by upgrades.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mongodb-uuid-and-bigdecimal-representations
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-data-mongodb
        upperbound: 4.0.0
