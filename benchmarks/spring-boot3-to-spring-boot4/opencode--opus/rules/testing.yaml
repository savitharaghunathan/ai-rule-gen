        location: IMPORT
- ruleID: spring-boot3-to-spring-boot4-00830
  description: '@MockBean removed; use @MockitoBean from Spring Framework instead'
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot's `@MockBean` annotation has been removed in favor of Spring Framework's `@MockitoBean`. Replace all `@MockBean` usages with `@MockitoBean`. Note that `@MockitoBean` cannot be used in `@Configuration` classes — for shared mocks, declare them directly on the test class or use a custom annotation.

    ## Before
    ```java
    import org.springframework.boot.test.mock.mockito.MockBean;

    @SpringBootTest
    class MyTest {
        @MockBean
        private MyService myService;
    }
    ```

    ## After
    ```java
    import org.springframework.test.context.bean.override.mockito.MockitoBean;

    @SpringBootTest
    class MyTest {
        @MockitoBean
        private MyService myService;
    }
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mockbean-and-spybean-removal
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.mock.mockito.MockBean
        location: ANNOTATION
