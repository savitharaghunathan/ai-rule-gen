- ruleID: spring-boot3-to-spring-boot4-00080
  description: Spring Boot Spock integration removed; Spock not yet compatible with Groovy 5
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot's Spock integration has been removed as Spock does not yet support Groovy 5. Remove the `spock-spring` dependency and migrate your Spock tests to JUnit 5 or wait for Spock to release a Groovy 5 compatible version.

    ## Before
    ```xml
    <dependency>
        <groupId>org.spockframework</groupId>
        <artifactId>spock-spring</artifactId>
        <scope>test</scope>
    </dependency>
    ```

    ## After
    ```xml
    <!-- Migrate to JUnit 5 -->
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-test</artifactId>
        <scope>test</scope>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spock-integration
      title: Migration Documentation
  when:
    java.dependency:
        name: org.spockframework.spock-spring
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00090
  description: '@WithMockUser now requires spring-boot-starter-security-test to operate properly'
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    @WithMockUser from spring-security-test now requires `spring-boot-starter-security-test` to operate properly in Spring Boot 4. Add `spring-boot-starter-security-test` to your test dependencies. Not doing so could lead to issues that are hard to track.

    Given that all test starter POMs bring `spring-boot-starter-test` transitively, you don't need to define `spring-boot-starter-test` separately anymore.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#test-code
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.security.test.context.support.WithMockUser
        location: ANNOTATION
