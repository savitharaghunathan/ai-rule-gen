- ruleID: spring-boot3-to-spring-boot4-00770
  description: Spring Batch starter now uses in-memory mode; use spring-boot-starter-batch-jdbc for database
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Batch can now operate without a database (in-memory mode), and the regular `spring-boot-starter-batch` uses this simplified mode by default. On upgrade, Spring Batch will no longer store metadata in your existing database. You can either simplify your configuration and use this new mode, or restore the previous arrangement by changing to `spring-boot-starter-batch-jdbc`.

    ## Before
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-batch</artifactId>
    </dependency>
    ```

    ## After (to restore database mode)
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-batch-jdbc</artifactId>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-batch
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-batch
        upperbound: 4.0.0
