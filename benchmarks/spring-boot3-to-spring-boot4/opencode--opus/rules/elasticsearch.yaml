- ruleID: spring-boot3-to-spring-boot4-00490
  description: RestClientBuilderCustomizer replaced by Rest5ClientBuilderCustomizer for Elasticsearch
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot's auto-configuration for the deprecated low-level Elasticsearch `RestClient` has been replaced with auto-configuration for the new `Rest5Client`. If you were using `RestClientBuilderCustomizer` to customize the client, you must now use `Rest5ClientBuilderCustomizer` instead.

    ## Before
    ```java
    import org.springframework.boot.autoconfigure.elasticsearch.RestClientBuilderCustomizer;
    ```

    ## After
    ```java
    import org.springframework.boot.autoconfigure.elasticsearch.Rest5ClientBuilderCustomizer;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#elasticsearch-client
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.elasticsearch.RestClientBuilderCustomizer
        location: IMPORT
- ruleID: spring-boot3-to-spring-boot4-00500
  description: elasticsearch-rest-client module removed; use co.elastic.clients:elasticsearch-java instead
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `org.elasticsearch.client:elasticsearch-rest-client` module is no longer required. The client code has been consolidated in the `co.elastic.clients:elasticsearch-java` module. Remove this dependency and use `co.elastic.clients:elasticsearch-java` instead.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#elasticsearch-client
      title: Migration Documentation
  when:
    java.dependency:
        name: org.elasticsearch.client.elasticsearch-rest-client
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00510
  description: elasticsearch-rest-client-sniffer module removed; sniffer is built into elasticsearch-java
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `org.elasticsearch.client:elasticsearch-rest-client-sniffer` module is no longer required. The `co.elastic.clients:elasticsearch-java` module includes built-in sniffer support. Remove this dependency.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#elasticsearch-client
      title: Migration Documentation
  when:
    java.dependency:
        name: org.elasticsearch.client.elasticsearch-rest-client-sniffer
        lowerbound: 0.0.0
