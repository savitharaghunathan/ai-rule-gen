- ruleID: spring-boot3-to-spring-boot4-00120
  description: spring-boot-starter-oauth2-authorization-server renamed to spring-boot-starter-security-oauth2-authorization-server
  category: optional
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `spring-boot-starter-oauth2-authorization-server` starter has been deprecated and renamed to `spring-boot-starter-security-oauth2-authorization-server`. Update your POM to use the new artifact name. The old starter remains but will be removed in a future release.

    ## Before
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-oauth2-authorization-server</artifactId>
    </dependency>
    ```

    ## After
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-security-oauth2-authorization-server</artifactId>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#deprecated-starters
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-oauth2-authorization-server
        lowerbound: 0.0.0
