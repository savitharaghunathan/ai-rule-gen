- ruleID: spring-boot3-to-spring-boot4-00280
  description: spring-authorization-server.version property replaced by spring-security.version
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Authorization Server is now part of Spring Security. The `spring-authorization-server.version` property can no longer be used to override its version. Use `spring-security.version` instead to control the version of Spring Authorization Server going forward.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#dependency-management-for-spring-authorization-server
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring-authorization-server\.version
        filePattern: pom\.xml
