- ruleID: spring-boot3-to-spring-boot4-00230
  description: PropertyMapper.alwaysApplyingWhenNonNull() removed; use always() instead
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `PropertyMapper.alwaysApplyingWhenNonNull()` method has been removed. The `PropertyMapper` class no longer calls adapter or predicate methods by default when the source value is `null`, removing the need for this method. If you need to perform a mapping even for `null` values, use the new `always()` method instead.

    Review [commit 239f384ac0](https://github.com/spring-projects/spring-boot/commit/239f384ac0893d151b89f204886874c6adb00001) for examples of how Spring Boot itself adapted to the new API.

    ## Before
    ```java
    map.from(source::method).to(destination::method);
    // With alwaysApplyingWhenNonNull:
    PropertyMapper mapper = PropertyMapper.get().alwaysApplyingWhenNonNull();
    ```

    ## After
    ```java
    map.from(source::method).to(destination::method);
    // With always():
    map.from(source::method).always().to(destination::method);
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#property-mapper-api-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: alwaysApplyingWhenNonNull
        location: METHOD_CALL
- ruleID: spring-boot3-to-spring-boot4-00880
  description: PropertyMapper no longer calls destination when source is null by default
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `PropertyMapper` class no longer calls adapter or predicate methods by default when the source value is `null`. Previously, `map.from(source::method).to(destination::method)` would call `destination.method(null)` if `source.method()` returned `null`. Now it will skip the call entirely.

    If you need to perform a mapping even for `null` values, use the new `always()` method:

    ## Before
    ```java
    map.from(source::method).to(destination::method);
    // would call destination.method(null) if source returns null
    ```

    ## After
    ```java
    map.from(source::method).always().to(destination::method);
    // explicitly opts into calling destination.method(null)
    ```

    Review [commit 239f384ac0](https://github.com/spring-projects/spring-boot/commit/239f384ac0893d151b89f204886874c6adb00001) for examples.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#property-mapper-api-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.context.properties.PropertyMapper
        location: IMPORT
