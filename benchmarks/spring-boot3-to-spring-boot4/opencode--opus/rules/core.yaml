    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `BootstrapRegistry` class has moved from `org.springframework.boot` to `org.springframework.boot.bootstrap`. Update your imports and any `spring.factories` references.

    ## Before
    ```java
