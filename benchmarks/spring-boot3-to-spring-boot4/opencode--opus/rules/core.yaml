- ruleID: spring-boot3-to-spring-boot4-00010
  description: Spring Boot 4 requires Java 17+, Jakarta EE 11, Servlet 6.1, and Spring Framework 7.x
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Your project uses Spring Boot 3.x which must be upgraded to Spring Boot 4.0. Spring Boot 4.0 requires Java 17 or later (latest LTS encouraged), Kotlin 2.2+, GraalVM v25+ for native images, Jakarta EE 11 with Servlet 6.1 baseline, and Spring Framework 7.x. Review and update all managed and unmanaged dependencies before upgrading.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#review-system-requirements
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter
        upperbound: 4.0.0
- ruleID: spring-boot3-to-spring-boot4-00170
  description: Spring Framework nullable annotations replaced by JSpecify nullability annotations
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 4.0 adds JSpecify nullability annotations. If you are using a null checker in your build or using Kotlin, this could lead to compilation failures because of now nullable or non-nullable types.

    If you previously used Spring Framework's `@Nullable` annotation from the `org.springframework.lang` package, you should review the [Spring Framework migration guide for null-safety](https://docs.spring.io/spring-framework/reference/core/null-safety.html#null-safety-migrating).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#jspecify-nullability-annotations
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.lang.Nullable
        location: ANNOTATION
