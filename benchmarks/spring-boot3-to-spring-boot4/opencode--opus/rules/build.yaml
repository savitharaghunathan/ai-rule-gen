- ruleID: spring-boot3-to-spring-boot4-00040
  description: Embedded executable launch scripts removed in Spring Boot 4
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Support for embedded launch scripts, used to create "fully executable" jar files, has been removed in Spring Boot 4. The `<executable>true</executable>` configuration in the spring-boot-maven-plugin is no longer supported. You can still create uber jars and run them using `java -jar`. For init.d/systemd-style deployment, consider alternatives such as Gradle's application plugin or custom shell wrapper scripts.

    ## Before
    ```xml
    <plugin>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-maven-plugin</artifactId>
        <configuration>
            <executable>true</executable>
        </configuration>
    </plugin>
    ```

    ## After
    ```xml
    <plugin>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-maven-plugin</artifactId>
        <!-- Remove <executable>true</executable>; use java -jar instead -->
    </plugin>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#embedded-executable-uber-jar-launch-scripts
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='executable' and text()='true']
        namespaces:
            m: http://maven.apache.org/POM/4.0.0
        filepaths:
            - pom.xml
- ruleID: spring-boot3-to-spring-boot4-00050
  description: Embedded executable launch scripts removed in Spring Boot 4
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Support for embedded launch scripts, used to create "fully executable" jar files, has been removed in Spring Boot 4. The `launchScript()` configuration in the bootJar task is no longer supported. You can still create uber jars and run them using `java -jar`. For init.d/systemd-style deployment, consider alternatives such as Gradle's application plugin.

    ## Before
    ```groovy
    bootJar {
        launchScript()
    }
    ```

    ## After
    ```groovy
    bootJar {
        // Remove launchScript(); use java -jar instead
    }
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#embedded-executable-uber-jar-launch-scripts
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: launchScript
        filePattern: .*\.gradle(\.kts)?
- ruleID: spring-boot3-to-spring-boot4-00250
  description: Optional dependencies are no longer included in uber jars by default
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Optional dependencies are no longer included in uber jars in Spring Boot 4. If you need them, add `<includeOptional>true</includeOptional>` to your Spring Boot Maven Plugin repackage configuration.

    Review your dependencies marked `<optional>true</optional>` and determine if any are required at runtime in your uber jar.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#optional-dependencies-in-maven
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='optional' and text()='true']
        namespaces:
            m: http://maven.apache.org/POM/4.0.0
        filepaths:
            - pom.xml
- ruleID: spring-boot3-to-spring-boot4-00290
  description: Classic uber-jar loader has been removed
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The classic uber-jar loader has been removed from Spring Boot 4. Remove the `<loaderImplementation>CLASSIC</loaderImplementation>` configuration from your Maven build file.

    ## Before
    ```xml
    <loaderImplementation>CLASSIC</loaderImplementation>
    ```

    ## After
    Remove the `<loaderImplementation>` element entirely.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#classic-uber-jar-loader-support
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='loaderImplementation' and text()='CLASSIC']
        namespaces:
            m: http://maven.apache.org/POM/4.0.0
        filepaths:
            - pom.xml
- ruleID: spring-boot3-to-spring-boot4-00300
  description: Classic uber-jar loader has been removed
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The classic uber-jar loader has been removed from Spring Boot 4. Remove the `loaderImplementation` configuration from your Gradle build file.

    ## Before
    ```groovy
    loaderImplementation = org.springframework.boot.loader.tools.LoaderImplementation.CLASSIC
    ```

    ## After
    Remove the `loaderImplementation` line entirely.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#classic-uber-jar-loader-support
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: loaderImplementation\s*=\s*.*CLASSIC
        filePattern: .*\.gradle(\.kts)?
