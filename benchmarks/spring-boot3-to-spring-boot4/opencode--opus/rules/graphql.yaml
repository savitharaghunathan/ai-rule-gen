- ruleID: spring-boot3-to-spring-boot4-00850
  description: GraphQL auto-configuration relocated from autoconfigure.graphql to boot.graphql
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 4 introduced a new modular design where each technology has its own module. GraphQL support has moved from the `spring-boot-autoconfigure` module to the dedicated `spring-boot-graphql` module. The root package changed from `org.springframework.boot.autoconfigure.graphql` to `org.springframework.boot.graphql`. Update your imports accordingly.

    ## Before
    ```java
    import org.springframework.boot.autoconfigure.graphql.GraphQlAutoConfiguration;
    ```

    ## After
    ```java
    import org.springframework.boot.graphql.GraphQlAutoConfiguration;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#main-code
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.graphql*
        location: PACKAGE
- ruleID: spring-boot3-to-spring-boot4-00860
  description: spring-graphql-test should be swapped to spring-boot-starter-graphql-test
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    If you are using `org.springframework.graphql:spring-graphql-test` directly, swap it to `spring-boot-starter-graphql-test` in Spring Boot 4. The test starter has a dependency on `spring-graphql-test` and ensures proper integration with the modular test infrastructure. Not doing so could lead to issues that are hard to track.

    ## Before
    ```xml
    <dependency>
        <groupId>org.springframework.graphql</groupId>
        <artifactId>spring-graphql-test</artifactId>
        <scope>test</scope>
    </dependency>
    ```

    ## After
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-graphql-test</artifactId>
        <scope>test</scope>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#test-code
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.graphql.spring-graphql-test
        lowerbound: 0.0.0
