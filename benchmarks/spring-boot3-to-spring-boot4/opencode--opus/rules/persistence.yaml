- ruleID: spring-boot3-to-spring-boot4-00520
  description: '@EntityScan relocated to org.springframework.boot.persistence.autoconfigure'
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    A new `spring-boot-persistence` module has been created for general persistence-related code. The `@EntityScan` annotation has moved from `org.springframework.boot.autoconfigure.domain.EntityScan` to `org.springframework.boot.persistence.autoconfigure.EntityScan`. Update your imports accordingly.

    ## Before
    ```java
    import org.springframework.boot.autoconfigure.domain.EntityScan;
    ```

    ## After
    ```java
    import org.springframework.boot.persistence.autoconfigure.EntityScan;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#persistence-modules
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.domain.EntityScan
        location: ANNOTATION
- ruleID: spring-boot3-to-spring-boot4-00530
  description: spring.dao.exceptiontranslation.enabled replaced by spring.persistence.exceptiontranslation.enabled
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `spring.dao.exceptiontranslation.enabled` property is no longer supported. Use `spring.persistence.exceptiontranslation.enabled` instead.

    ## Before
    ```properties
    spring.dao.exceptiontranslation.enabled=true
    ```

    ## After
    ```properties
    spring.persistence.exceptiontranslation.enabled=true
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#persistence-modules
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.dao\.exceptiontranslation\.enabled
        filePattern: application.*\.(properties|ya?ml)
- ruleID: spring-boot3-to-spring-boot4-00710
  description: hibernate-jpamodelgen replaced by hibernate-processor
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The Hibernate dependency management has been harmonized to take relocations into account. Replace `hibernate-jpamodelgen` with `hibernate-processor`.

    ## Before
    ```xml
    <dependency>
        <groupId>org.hibernate.orm</groupId>
        <artifactId>hibernate-jpamodelgen</artifactId>
    </dependency>
    ```

    ## After
    ```xml
    <dependency>
        <groupId>org.hibernate.orm</groupId>
        <artifactId>hibernate-processor</artifactId>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#hibernate-dependency-management
      title: Migration Documentation
  when:
    java.dependency:
        name: org.hibernate.orm.hibernate-jpamodelgen
        lowerbound: 0.0.0
