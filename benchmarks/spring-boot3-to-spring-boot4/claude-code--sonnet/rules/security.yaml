- ruleID: spring-boot3-to-spring-boot4-00290
  description: spring-authorization-server.version property no longer works in Spring Boot 4; use spring-security.version
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Authorization Server is now part of Spring Security 7.0, and Spring Boot 4.0 has removed explicit dependency management for it in favor of what Spring Security provides. The `spring-authorization-server.version` property no longer works for overriding the version. If you need to override the Spring Authorization Server version, use `spring-security.version` instead.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#dependency-management-for-spring-authorization-server
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring-authorization-server\.version
        filePattern: .*\.(properties|xml|gradle|gradle\.kts)
