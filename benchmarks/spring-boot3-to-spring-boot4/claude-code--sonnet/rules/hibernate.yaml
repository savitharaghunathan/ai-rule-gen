- ruleID: spring-boot3-to-spring-boot4-00740
  description: hibernate-jpamodelgen replaced by hibernate-processor
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `hibernate-jpamodelgen` dependency has been replaced by `hibernate-processor` in Spring Boot 4's dependency management. Replace the `hibernate-jpamodelgen` artifact with `org.hibernate:hibernate-processor` in your build configuration.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#hibernate-dependency-management
      title: Migration Documentation
  when:
    java.dependency:
        name: org.hibernate.hibernate-jpamodelgen
        lowerbound: 0.0.0
