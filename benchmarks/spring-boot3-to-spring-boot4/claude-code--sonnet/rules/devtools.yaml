- ruleID: spring-boot3-to-spring-boot4-00260
  description: DevTools Live Reload is now disabled by default in Spring Boot 4
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: DevTools Live Reload support is now disabled by default in Spring Boot 4.0. If you rely on live reload functionality during development, you must explicitly enable it by setting `spring.devtools.livereload.enabled=true` in your `application.properties` or `application.yml`. If this property is currently set to `true` in your configuration, no action is needed. If it is not set, live reload will no longer work.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#devtools-live-reload-support
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.devtools\.livereload\.enabled
        filePattern: application.*\.(properties|ya?ml)
