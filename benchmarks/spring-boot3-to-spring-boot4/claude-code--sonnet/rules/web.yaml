- ruleID: spring-boot3-to-spring-boot4-00460
  description: FONTS location added to StaticResourceLocation common locations in Spring Boot 4
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Spring Boot 4 adds a `/fonts/**` location to the common static resource locations returned by `PathRequest#toStaticResources().atCommonLocations()`. This means any security configuration applied to common static locations will also apply to `/fonts/**` automatically. If you do not want the fonts location included, exclude it explicitly: `pathRequest.toStaticResources().atCommonLocations().excluding(StaticResourceLocation.FONTS)`.'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#fonts-added-to-common-static-locations
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.web.servlet.StaticResourceLocation
        location: TYPE
- ruleID: spring-boot3-to-spring-boot4-00490
  description: HttpMessageConverters is deprecated in Spring Boot 4; use ClientHttpMessageConvertersCustomizer/ServerHttpMessageConvertersCustomizer
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot 4 deprecates `HttpMessageConverters` because Spring Framework improved converter configuration in the traditional stack. If your application declares a custom `HttpMessageConverters` bean, it is still supported but the type is deprecated. If you are contributing `HttpMessageConverter` beans directly to the context (e.g., a `JacksonJsonHttpMessageConverter`), this is no longer supported. Instead, declare one or more `ClientHttpMessageConvertersCustomizer` and/or `ServerHttpMessageConvertersCustomizer` beans to customize converters flexibly. See the [reference documentation](https://docs.spring.io/spring-boot/4.0-SNAPSHOT/reference/web/servlet.html#web.servlet.spring-mvc.message-converters) for more information.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#httpmessageconverters-deprecation
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.http.converter.autoconfigure.HttpMessageConverters
        location: TYPE
- ruleID: spring-boot3-to-spring-boot4-00500
  description: server.forward-headers-strategy=FRAMEWORK no longer works for WAR deployments in Spring Boot 4
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In Spring Boot 4, the `server.forward-headers-strategy` property no longer has an effect when deploying a WAR file to an external container. If you relied on `server.forward-headers-strategy=FRAMEWORK` in a WAR deployment, you must now define the `ForwardedHeaderFilter` bean manually:

    ```java
    @Bean
    FilterRegistrationBean<ForwardedHeaderFilter> forwardedHeaderFilter() {
        ForwardedHeaderFilter filter = new ForwardedHeaderFilter();
        FilterRegistrationBean<ForwardedHeaderFilter> registration = new FilterRegistrationBean<>(filter);
        registration.setDispatcherTypes(DispatcherType.REQUEST, DispatcherType.ASYNC, DispatcherType.ERROR);
        registration.setOrder(Ordered.HIGHEST_PRECEDENCE);
        return registration;
    }
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#forwarded-headers-strategy
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: server\.forward-headers-strategy\s*=\s*(?i)framework
        filePattern: application.*\.(properties|ya?ml)
- ruleID: spring-boot3-to-spring-boot4-00510
  description: Spring Boot 4 supports Jersey 4.0 which does not support Jackson 3; Jackson 2 module required
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot 4.0 supports Jersey 4.0, which does not yet support Jackson 3. If your application uses Jersey for JSON processing, you will need to use the `spring-boot-jackson2` module either in place of or alongside `spring-boot-jackson` to process JSON with Jersey.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#jersey
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-jersey
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00520
  description: WAR deployments must switch from spring-boot-starter-tomcat to spring-boot-starter-tomcat-runtime in Spring Boot 4
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    If you are deploying a WAR file to Tomcat in Spring Boot 4, you need to switch the dependency from `spring-boot-starter-tomcat` to `spring-boot-starter-tomcat-runtime`. Update your `pom.xml` or `build.gradle` accordingly:

    ```xml
    <!-- Maven -->
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-tomcat-runtime</artifactId>
        <scope>provided</scope>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#tomcat
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-tomcat
        lowerbound: 0.0.0
