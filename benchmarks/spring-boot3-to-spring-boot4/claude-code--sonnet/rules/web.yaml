- ruleID: spring-boot3-to-spring-boot4-00180
  description: spring-boot-starter-web deprecated in favor of spring-boot-starter-webmvc
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The starter `spring-boot-starter-web` has been deprecated and renamed to `spring-boot-starter-webmvc` in Spring Boot 4.0 to better align with its corresponding module. Update your build file to use the new starter name.

    ```xml
    <!-- Replace -->
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-web</artifactId>
    </dependency>

    <!-- With -->
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-webmvc</artifactId>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#deprecated-starters
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-web
        lowerbound: 0.0.0
