- ruleID: spring-boot3-to-spring-boot4-00730
  description: Spring Data MongoDB no longer provides defaults for UUID representations; explicit config required
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Data MongoDB no longer provides defaults for `UUID` and `BigInteger`/`BigDecimal` representations in Spring Boot 4. This aligns with the MongoDB driver recommendation. You must now explicitly configure the representation using `spring.mongodb.representation.uuid` and `spring.data.mongodb.representation.big-decimal` properties. Without explicit configuration, representation may differ from your previous Spring Boot 3.x defaults, potentially causing data serialization issues.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mongodb-uuid-and-bigdecimal-representations
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.mongodb\.representation\.uuid
        filePattern: application.*\.(properties|ya?ml)
