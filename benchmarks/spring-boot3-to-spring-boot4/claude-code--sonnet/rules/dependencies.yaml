- ruleID: spring-boot3-to-spring-boot4-00010
  description: Spring Boot 4.0 requires Java 17, Kotlin 2.2+, GraalVM 25+, Servlet 6.1, and Spring Framework 7.x.
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Your project is on Spring Boot 3.x. Upgrading to Spring Boot 4.0 requires: Java 17 or later (latest LTS recommended), Kotlin 2.2+ (if used), GraalVM native-image 25+ (if used), Jakarta EE 11 with a Servlet 6.1 baseline, and Spring Framework 7.x. Additionally, configuration properties have been renamed or removed — add `spring-boot-properties-migrator` as a runtime dependency to detect and temporarily migrate renamed properties at startup:

    ```xml
    <dependency>
      <groupId>org.springframework.boot</groupId>
      <artifactId>spring-boot-properties-migrator</artifactId>
      <scope>runtime</scope>
    </dependency>
    ```

    Remove the migrator dependency once migration is complete.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#review-system-requirements
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot
        upperbound: 4.0.0
- ruleID: spring-boot3-to-spring-boot4-00020
  description: Undertow support removed in Spring Boot 4.0 due to Servlet 6.1 incompatibility.
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring-boot-starter-undertow` dependency is no longer supported in Spring Boot 4.0. Spring Boot 4.0 requires a Servlet 6.1 baseline, and Undertow is not yet compatible with Servlet 6.1. Remove the Undertow starter and use Tomcat (the default, via `spring-boot-starter-tomcat`) or Jetty (`spring-boot-starter-jetty`) instead. Spring Boot 4.0 does not support deploying to non-Servlet 6.1 compliant containers.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#undertow
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-undertow
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00030
  description: Pulsar Reactive support removed in Spring Boot 4.0; reactor support was dropped from Spring Pulsar.
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring-boot-starter-pulsar-reactive` dependency is no longer available in Spring Boot 4.0. Spring Boot no longer manages the reactive Pulsar client, and auto-configuration for Spring Pulsar Reactive has been removed following the decision to remove reactor support in Spring Pulsar. Remove this starter from your project. If you need Pulsar support, use the non-reactive `spring-boot-starter-pulsar` starter instead.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#pulsar-reactive
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-pulsar-reactive
        lowerbound: 0.0.0
