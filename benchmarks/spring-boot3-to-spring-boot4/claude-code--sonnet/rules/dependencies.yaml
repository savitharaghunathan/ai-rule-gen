        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00890
  description: spring-boot-starter-aop renamed to spring-boot-starter-aspectj; check if @Aspect usage requires the renamed starter
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Your application uses `@Aspect` from `org.aspectj.lang.annotation`. In Spring Boot 4.0, the `spring-boot-starter-aop` starter has been renamed to `spring-boot-starter-aspectj`. If you explicitly declared `spring-boot-starter-aop` in your build file, replace it with `spring-boot-starter-aspectj`. This rule identifies classes annotated with `@Aspect` to help you confirm that AspectJ support is needed before making the dependency change.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#aop-starter-pom
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.aspectj.lang.annotation.Aspect
        location: ANNOTATION
