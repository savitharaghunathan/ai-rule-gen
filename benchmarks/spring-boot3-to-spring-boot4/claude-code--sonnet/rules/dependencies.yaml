    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot 4's modular design introduces dedicated test starters for each technology. If your application uses `org.springframework.graphql:spring-graphql-test` directly, you should replace it with `spring-boot-starter-graphql-test`. The new test starter includes `spring-graphql-test` transitively and also brings in `spring-boot-starter-test`. Continuing to use `spring-graphql-test` directly may cause hard-to-diagnose issues with test infrastructure integration.
