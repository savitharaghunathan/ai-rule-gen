- ruleID: spring-boot3-to-spring-boot4-00130
  description: spring-boot-starter replaced by spring-boot-starter-classic for quick migration to Spring Boot 4
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 4 introduces a new modular design. When upgrading, you can use `spring-boot-starter-classic` as an interim replacement for `spring-boot-starter` to quickly get running with a classpath similar to previous Spring Boot versions (all auto-configuration classes available). Once the migration is complete, migrate away from the classic starter and use dedicated technology-specific starters.

    ```xml
    <!-- Interim migration step: replace with classic starter -->
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-classic</artifactId>
    </dependency>
    ```

    Eventually, identify the specific technology starters your application needs (e.g., `spring-boot-starter-webmvc`, `spring-boot-starter-data-jpa`) and use those instead.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#classic-starters
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter
        upperbound: 4.0.0
- ruleID: spring-boot3-to-spring-boot4-00270
  description: spring-boot-starter-aop renamed to spring-boot-starter-aspectj in Spring Boot 4
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring-boot-starter-aop` starter has been renamed to `spring-boot-starter-aspectj` in Spring Boot 4.0. If you have explicitly added this starter in your `pom.xml` or `build.gradle`, replace it with `spring-boot-starter-aspectj`. Before switching, review whether your application actually needs AspectJ — check for usage of annotations in the `org.aspectj.lang.annotation` package (e.g., `@Aspect`) and any frameworks that depend on AspectJ support (such as Micrometer's `@Timed` or `@Counted`).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#aop-starter-pom
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-aop
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00280
  description: Spring Retry no longer has dependency management in Spring Boot 4; explicit version required
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot 4.0 has removed dependency management for Spring Retry, as the project is moving toward new core retry features in Spring Framework 7. If your application uses Spring Retry (`org.springframework.retry:spring-retry`), you must now declare an explicit version in your `pom.xml` or `build.gradle`. Consider migrating your use of Spring Retry to the new retry support in Spring Framework 7 instead. See the [Spring Framework 7 retry package](https://docs.spring.io/spring-framework/docs/7.0.x-SNAPSHOT/javadoc-api/org/springframework/core/retry/package-summary.html).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#dependency-management-for-spring-retry
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.retry.spring-retry
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00880
  description: spring-graphql-test replaced by spring-boot-starter-graphql-test in Spring Boot 4
  category: mandatory
  effort: 3
