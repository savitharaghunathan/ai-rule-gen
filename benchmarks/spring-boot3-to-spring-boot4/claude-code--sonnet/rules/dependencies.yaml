- ruleID: spring-boot3-to-spring-boot4-00070
  description: Spring Boot's Spock integration removed in 4.0; Spock does not yet support Groovy 5.
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot's Spock integration (`spock-spring`) has been removed in Spring Boot 4.0. This removal is due to Spock not yet supporting Groovy 5, which is required by Spring Boot 4.0. You will need to remove the Spock-based test infrastructure from your project or wait for a Spock release that supports Groovy 5. As an alternative, consider migrating tests to JUnit 5 with Mockito or another compatible testing framework.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spock-integration
      title: Migration Documentation
  when:
    java.dependency:
        name: org.spockframework.spock-spring
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00080
  description: Flyway now requires spring-boot-starter-flyway instead of direct flyway-core dependency
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 4 introduced a modular design and requires dedicated starter POMs for technologies like Flyway. Replace the direct `org.flywaydb:flyway-core` dependency with `org.springframework.boot:spring-boot-starter-flyway` in your build file. The starter brings the necessary Flyway dependency and Spring Boot auto-configuration together.

    ```xml
    <!-- Remove -->
    <dependency>
        <groupId>org.flywaydb</groupId>
        <artifactId>flyway-core</artifactId>
    </dependency>

    <!-- Add -->
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-flyway</artifactId>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#main-code
      title: Migration Documentation
  when:
    java.dependency:
        name: org.flywaydb.flyway-core
        lowerbound: 0.0.0
