- ruleID: spring-boot3-to-spring-boot4-00440
  description: org.springframework.lang.Nullable no longer supported in actuator endpoint parameters in Spring Boot 4
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot 4 Actuator endpoint parameters no longer support `org.springframework.lang.Nullable` to declare that a parameter is optional. Migrate to `org.jspecify.annotations.Nullable` instead. Update the import and annotation usage in any actuator endpoint parameter declarations.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#removed-support-for-javaxannotationsnonnull-and-orgspringframeworklangnullable
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.lang.Nullable
        location: ANNOTATION
- ruleID: spring-boot3-to-spring-boot4-00450
  description: Liveness and readiness probes are now enabled by default in Spring Boot 4
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: In Spring Boot 4, liveness and readiness probes are now enabled by default, exposing `liveness` and `readiness` groups through the health endpoint. If you do not need these probes, disable them by setting `management.endpoint.health.probes.enabled=false` in your application configuration.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#liveness-and-readiness-probes
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: management\.endpoint\.health\.probes\.enabled
        filePattern: application.*\.(properties|ya?ml)
