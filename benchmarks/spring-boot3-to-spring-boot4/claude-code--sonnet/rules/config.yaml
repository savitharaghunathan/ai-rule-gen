- ruleID: spring-boot3-to-spring-boot4-00250
  description: PropertyMapper.alwaysApplyingWhenNonNull() removed in Spring Boot 4
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `alwaysApplyingWhenNonNull()` method on `PropertyMapper` has been removed in Spring Boot 4.0. This method is no longer needed because `PropertyMapper` now skips null values by default. If you need to apply a mapping even for null values, use the new `always()` method instead:

    ```java
    // Before (Spring Boot 3.x)
    map.from(source::method).alwaysApplyingWhenNonNull().to(destination::method);

    // After (Spring Boot 4.0)
    map.from(source::method).to(destination::method); // null values skipped by default
    // OR if you need to pass null:
    map.from(source::method).always().to(destination::method);
    ```

    See [commit 239f384ac0](https://github.com/spring-projects/spring-boot/commit/239f384ac0893d151b89f204886874c6adb00001) for how Spring Boot itself migrated to the new API.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#property-mapper-api-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.context.properties.bind.PropertyMapper.alwaysApplyingWhenNonNull
        location: METHOD_CALL
