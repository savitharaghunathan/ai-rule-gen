- ruleID: spring-boot3-to-spring-boot4-00560
  description: '@EntityScan moved to org.springframework.boot.persistence.autoconfigure in Spring Boot 4'
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `@EntityScan` annotation has been moved to the new `spring-boot-persistence` module. Update your imports from `org.springframework.boot.autoconfigure.domain.EntityScan` to `org.springframework.boot.persistence.autoconfigure.EntityScan`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#persistence-modules
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.domain.EntityScan
        location: ANNOTATION
- ruleID: spring-boot3-to-spring-boot4-00570
  description: spring.dao.exceptiontranslation.enabled property removed; use spring.persistence.exceptiontranslation.enabled
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring.dao.exceptiontranslation.enabled` property is no longer supported in Spring Boot 4. Replace it with `spring.persistence.exceptiontranslation.enabled` in your application configuration files.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#persistence-modules
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.dao\.exceptiontranslation\.enabled
        filePattern: application.*\.(properties|ya?ml)
