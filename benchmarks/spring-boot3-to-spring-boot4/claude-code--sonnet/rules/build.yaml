- ruleID: spring-boot3-to-spring-boot4-00040
  description: Embedded executable uber jar launch scripts removed in Spring Boot 4.0.
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `<executable>true</executable>` configuration in the Spring Boot Maven plugin is no longer supported. Spring Boot 4.0 has removed support for embedded launch scripts used to create 'fully executable' jar files. This feature was Unix-specific and conflicted with recommendations for efficient deployments. Remove the `<executable>true</executable>` element from your Spring Boot Maven plugin configuration. You can still create uber jars and run them with `java -jar`. For similar launch script functionality, consider using Gradle's application plugin or creating a custom startup wrapper script.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#embedded-executable-uber-jar-launch-scripts
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='plugin'][*[local-name()='artifactId'][text()='spring-boot-maven-plugin']]//*[local-name()='executable'][text()='true']
        namespaces:
            m: http://maven.apache.org/POM/4.0.0
        filepaths:
            - pom.xml
- ruleID: spring-boot3-to-spring-boot4-00300
  description: Classic uber-jar loader configuration removed from Spring Boot 4 Maven plugin
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The classic uber-jar loader (`<loaderImplementation>CLASSIC</loaderImplementation>`) has been removed in Spring Boot 4.0. Remove this configuration element from your Maven `pom.xml`. The Spring Boot Maven plugin no longer supports the classic loader implementation.

    ```xml
    <!-- Remove this from your pom.xml -->
    <loaderImplementation>CLASSIC</loaderImplementation>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#classic-uber-jar-loader-support
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='loaderImplementation' and text()='CLASSIC']
        namespaces:
            m: http://maven.apache.org/POM/4.0.0
        filepaths:
            - pom.xml
- ruleID: spring-boot3-to-spring-boot4-00310
  description: Classic uber-jar loader configuration removed from Spring Boot 4 Gradle plugin
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The classic uber-jar loader (`loaderImplementation = org.springframework.boot.loader.tools.LoaderImplementation.CLASSIC`) has been removed in Spring Boot 4.0. Remove this configuration from your Gradle build file. The Spring Boot Gradle plugin no longer supports the classic loader implementation.

    ```groovy
    // Remove this from your build.gradle
    loaderImplementation = org.springframework.boot.loader.tools.LoaderImplementation.CLASSIC
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#classic-uber-jar-loader-support
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: LoaderImplementation\.CLASSIC
        filePattern: .*\.gradle(\.kts)?
- ruleID: spring-boot3-to-spring-boot4-00320
  description: CycloneDX Gradle plugin requires minimum version 3.0.0 for Spring Boot 4 compatibility
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot 4.0 requires CycloneDX Gradle plugin version 3.0.0 or higher. If you are using an older version of the CycloneDX Gradle plugin (e.g., `id 'org.cyclonedx.bom' version '2.x.x'`), you must upgrade to version 3.0.0 or later. Check your `build.gradle` or `build.gradle.kts` for the plugin declaration and update the version accordingly.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#cyclone-dx-gradle-plugin
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: com\.cyclonedx\.bom
        filePattern: .*\.gradle(\.kts)?
