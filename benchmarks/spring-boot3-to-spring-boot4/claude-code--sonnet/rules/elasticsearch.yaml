- ruleID: spring-boot3-to-spring-boot4-00530
  description: elasticsearch-rest-client module removed; replaced by co.elastic.clients:elasticsearch-java
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `org.elasticsearch.client:elasticsearch-rest-client` module is no longer required in Spring Boot 4. Auto-configuration for the low-level `RestClient` has been replaced with auto-configuration for the new `Rest5Client`. The client code has been consolidated in `co.elastic.clients:elasticsearch-java`. Remove `org.elasticsearch.client:elasticsearch-rest-client` from your dependencies and migrate to the consolidated client module.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#elasticsearch-client
      title: Migration Documentation
  when:
    java.dependency:
        name: org.elasticsearch.client.elasticsearch-rest-client
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00540
  description: elasticsearch-rest-client-sniffer removed; sniffer support now built into co.elastic.clients:elasticsearch-java
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `org.elasticsearch.client:elasticsearch-rest-client-sniffer` module is no longer required in Spring Boot 4. Built-in sniffer support is now provided by `co.elastic.clients:elasticsearch-java`. Remove this dependency from your project.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#elasticsearch-client
      title: Migration Documentation
  when:
    java.dependency:
        name: org.elasticsearch.client.elasticsearch-rest-client-sniffer
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00550
  description: RestClientBuilderCustomizer replaced by Rest5ClientBuilderCustomizer for new Elasticsearch Rest5Client
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot's `RestClientBuilderCustomizer` has been replaced with `Rest5ClientBuilderCustomizer` to support the new Elasticsearch `Rest5Client`. Replace all imports and usages of `org.springframework.boot.autoconfigure.elasticsearch.RestClientBuilderCustomizer` with `org.springframework.boot.autoconfigure.elasticsearch.Rest5ClientBuilderCustomizer`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#elasticsearch-client
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.elasticsearch.RestClientBuilderCustomizer
        location: IMPORT
