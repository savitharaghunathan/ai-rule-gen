- ruleID: spring-boot3-to-spring-boot4-00100
  description: '@WithMockUser and @WithUserDetails now require spring-boot-starter-security-test to operate properly'
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In Spring Boot 4, `@WithMockUser` and `@WithUserDetails` from `spring-security-test` now require `spring-boot-starter-security-test` to operate properly. Replace the direct `spring-security-test` dependency with `org.springframework.boot:spring-boot-starter-security-test` in your test scope dependencies. Not doing so can lead to issues that are hard to track.

    ```xml
    <!-- Remove -->
    <dependency>
        <groupId>org.springframework.security</groupId>
        <artifactId>spring-security-test</artifactId>
        <scope>test</scope>
    </dependency>

    <!-- Add -->
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-security-test</artifactId>
        <scope>test</scope>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#test-code
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.security.spring-security-test
        lowerbound: 0.0.0
