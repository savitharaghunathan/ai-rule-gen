- ruleID: spring-boot3-to-spring-boot4-00140
  description: spring-boot-starter-test now brought transitively; use technology-specific test starters instead
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: In Spring Boot 4, all test starter POMs (`spring-boot-starter-<technology>-test`) bring `spring-boot-starter-test` transitively. You no longer need to declare `spring-boot-starter-test` explicitly. Instead, list the starters for the technologies that are under test in your module. For example, use `spring-boot-starter-webmvc-test` for Spring MVC tests, `spring-boot-starter-data-jpa-test` for JPA tests, etc. If you use the classic starters approach, use `spring-boot-starter-test-classic` as an interim step.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#test-code
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-test
        upperbound: 4.0.0
- ruleID: spring-boot3-to-spring-boot4-00810
  description: MockitoTestExecutionListener removed; use MockitoExtension from Mockito instead
  category: mandatory
  effort: 3
  labels:
