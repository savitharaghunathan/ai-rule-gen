    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `MockitoTestExecutionListener` (deprecated since Spring Boot 3.4) has been removed in Spring Boot 4. If your `@Mock` or `@Captor` annotated fields are not working, add `@ExtendWith(MockitoExtension.class)` to your test class to register the Mockito extension directly.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mockito-captor-and-mock-annotations
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.test.context.event.MockitoTestExecutionListener
        location: IMPORT
- ruleID: spring-boot3-to-spring-boot4-00820
  description: '@SpringBootTest no longer provides MockMVC support; add @AutoConfigureMockMvc explicitly'
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: In Spring Boot 4, `@SpringBootTest` no longer automatically provides MockMVC support. Add an explicit `@AutoConfigureMockMvc` annotation to your test class to enable it. Additionally, HtmlUnit-specific settings have moved under an `htmlUnit` attribute. For example, change `@AutoConfigureMockMvc(webClientEnabled=false, webDriverEnabled=false)` to `@AutoConfigureMockMvc(htmlUnit = @HtmlUnit(webClient = false, webDriver = false))`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#using-mockmvc-and-springboottest
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.context.SpringBootTest
        location: ANNOTATION
