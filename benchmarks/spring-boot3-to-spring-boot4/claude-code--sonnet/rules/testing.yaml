- ruleID: spring-boot3-to-spring-boot4-00860
  description: '@MockBean removed; use @MockitoBean from Spring Framework instead'
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Spring Boot''s `@MockBean` annotation has been removed in Spring Boot 4. Replace it with `@MockitoBean` from Spring Framework (`org.springframework.test.context.bean.override.mockito.MockitoBean`). Note a key behavioral difference: `@MockitoBean` cannot be used in `@Configuration` classes (unlike `@MockBean`). If you used `@MockBean` in a `@Configuration` to share mocks across test classes, refactor by declaring mocks directly on the test class using `@MockitoBean(types = {Service1.class, Service2.class})` or create a custom composed annotation.'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mockbean-and-spybean-removal
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.mock.mockito.MockBean
        location: ANNOTATION
