- ruleID: spring-boot3-to-spring-boot4-00410
  description: spring.jackson.parser.* properties replaced with spring.jackson.json.read in Spring Boot 4
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring.jackson.parser.*` properties have been replaced in Spring Boot 4. Where a Jackson 2 `JsonParser.Feature` has an equivalent Jackson 3 `JsonReadFeature`, use `spring.jackson.json.read.*` properties instead. Where there is no `JsonReadFeature` equivalent, use a `JsonMapperBuilderCustomizer` to apply the configuration programmatically.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.jackson\.parser\.
        filePattern: application.*\.(properties|ya?ml)
- ruleID: spring-boot3-to-spring-boot4-00420
  description: Jackson now auto-registers all classpath modules by default in Spring Boot 4
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: In Spring Boot 4, Jackson will automatically detect and register all modules present on the classpath. In Spring Boot 3, only 'well-known' modules were registered automatically. If you relied on the previous selective module registration behavior, you can disable the new auto-detection by setting `spring.jackson.find-and-add-modules=false`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.jackson\.find-and-add-modules
        filePattern: application.*\.(properties|ya?ml)
- ruleID: spring-boot3-to-spring-boot4-00430
  description: spring.jackson.use-jackson2-defaults is a Spring Boot 4-only property for Jackson 2 compatibility mode
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: If you are unable to fully migrate to Jackson 3, Spring Boot 4 provides the `spring.jackson.use-jackson2-defaults=true` property to align the auto-configured `JsonMapper` defaults with Jackson 2 behavior. Additionally, the deprecated `spring-boot-jackson2` module is available as a stop-gap. We strongly recommend adopting Jackson 3 when possible.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#jackson-2-compatibility
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.jackson\.use-jackson2-defaults
        filePattern: application.*\.(properties|ya?ml)
