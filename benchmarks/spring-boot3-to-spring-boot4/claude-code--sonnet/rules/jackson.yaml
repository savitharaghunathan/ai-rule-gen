- ruleID: spring-boot3-to-spring-boot4-00390
  description: spring.jackson.read.* properties moved to spring.jackson.json.read in Spring Boot 4
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring.jackson.read.*` properties have been moved to `spring.jackson.json.read.*` in Spring Boot 4. Update all occurrences of `spring.jackson.read.` to `spring.jackson.json.read.` in your application configuration files.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.jackson\.read\.
        filePattern: application.*\.(properties|ya?ml)
