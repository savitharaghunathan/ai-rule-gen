    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: '`JsonObjectSerializer` has been renamed to `ObjectValueSerializer` in Spring Boot 4 for consistency with Jackson 3. Update all references from `org.springframework.boot.autoconfigure.jackson.JsonObjectSerializer` to `org.springframework.boot.autoconfigure.jackson.ObjectValueSerializer`.'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.jackson.JsonObjectSerializer
        location: IMPORT
