- ruleID: spring-boot3-to-spring-boot4-00370
  description: '@JsonComponent annotation renamed to @JacksonComponent in Spring Boot 4'
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `@JsonComponent` annotation has been renamed to `@JacksonComponent` in Spring Boot 4 to clarify that it is specific to Jackson and not necessarily limited to JSON. Replace all usages of `@JsonComponent` with `@JacksonComponent` and update the import from `org.springframework.boot.jackson.JsonComponent` to the new class location.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.jackson.JsonComponent
        location: ANNOTATION
