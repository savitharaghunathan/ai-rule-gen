- ruleID: spring-boot3-to-spring-boot4-00330
  description: Jackson 3 package namespace changed from com.fasterxml.jackson to tools.jackson
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Spring Boot 4 uses Jackson 3 as its preferred JSON library. Jackson 3 uses new group IDs and package names: `com.fasterxml.jackson` has been renamed to `tools.jackson`. Update all imports that reference `com.fasterxml.jackson` to use the new `tools.jackson` namespace. Note: `jackson-annotations` is an exception and continues to use `com.fasterxml.jackson.core` group ID and `com.fasterxml.jackson.annotation` package. Refer to the [Jackson wiki](https://github.com/FasterXML/jackson/wiki/Jackson-Release-3.0#major-changesfeatures-in-30) for full details.'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    java.referenced:
        pattern: com.fasterxml.jackson*
        location: PACKAGE
- ruleID: spring-boot3-to-spring-boot4-00340
