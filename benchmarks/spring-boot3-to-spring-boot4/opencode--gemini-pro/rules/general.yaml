- ruleID: spring-boot3-to-spring-boot4-00240
  description: StreamsBuilderFactoryBeanCustomizer has been removed
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/target=spring-boot4
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot's `StreamsBuilderFactoryBeanCustomizer` has been removed. Migrate to Spring Kafka's `org.springframework.kafka.config.StreamsBuilderFactoryBeanConfigurer` instead. Note that the new configurer implements `Ordered` with a default value of `0`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#kafka-streams-customization
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.kafka.StreamsBuilderFactoryBeanCustomizer
        location: IMPORT
- ruleID: spring-boot3-to-spring-boot4-00250
  description: RabbitRetryTemplateCustomizer has been replaced
  category: mandatory
