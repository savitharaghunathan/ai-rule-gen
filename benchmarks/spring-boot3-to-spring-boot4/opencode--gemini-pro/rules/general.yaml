  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/target=spring-boot4
    - konveyor.io/generated-by=ai-rule-gen
  message: The `RabbitRetryTemplateCustomizer` has been removed. Migrate to `RabbitTemplateRetrySettingsCustomizer` or `RabbitListenerRetrySettingsCustomizer`.
