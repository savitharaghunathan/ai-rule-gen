        pattern: org.springframework.boot.autoconfigure.amqp.RabbitRetryTemplateCustomizer
        location: IMPORT
- ruleID: spring-boot3-to-spring-boot4-00260
  description: MockitoTestExecutionListener has been removed
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/target=spring-boot4
    - konveyor.io/generated-by=ai-rule-gen
  message: The `MockitoTestExecutionListener` has been removed. If your `@Mock` or `@Captor` annotations stop working, use `MockitoExtension` from Mockito itself.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mockito-captor-and-mock-annotations
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.mock.mockito.MockitoTestExecutionListener
        location: IMPORT
- ruleID: spring-boot3-to-spring-boot4-00270
  description: '@SpringBootTest no longer provides MockMVC support'
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/target=spring-boot4
    - konveyor.io/generated-by=ai-rule-gen
  message: The `@SpringBootTest` annotation no longer provides MockMVC support. If you want to use MockMVC in your tests, you must add an `@AutoConfigureMockMvc` annotation to the test class.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#using-mockmvc-and-springboottest
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.context.SpringBootTest
        location: ANNOTATION
- ruleID: spring-boot3-to-spring-boot4-00280
  description: TestRestTemplate has been relocated
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/target=spring-boot4
    - konveyor.io/generated-by=ai-rule-gen
  message: '`TestRestTemplate` has been relocated to `org.springframework.boot.resttestclient.TestRestTemplate`. A runtime dependency on `spring-boot-restclient` and test-scoped dependency on `spring-boot-resttestclient` are now required. Also consider replacing it with the new `RestTestClient`.'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#using-webclient-or-testresttemplate-and-springboottest
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.web.client.TestRestTemplate
        location: TYPE
