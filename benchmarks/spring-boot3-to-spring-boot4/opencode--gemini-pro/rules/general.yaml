- ruleID: spring-boot3-to-spring-boot4-00310
  description: '@MockBean removed in favor of @MockitoBean'
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/target=spring-boot4
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot's `@MockBean` support has been removed. Use `@MockitoBean` instead. Note that `@MockitoBean` cannot be used in `@Configuration` classes.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mockbean-and-spybean-removal
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.mock.mockito.MockBean
        location: ANNOTATION
