- ruleID: spring-boot3-to-spring-boot4-00220
  description: RestClientBuilderCustomizer is replaced with Rest5ClientBuilderCustomizer
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/target=spring-boot4
    - konveyor.io/generated-by=ai-rule-gen
  message: 'org.springframework.boot.autoconfigure.elasticsearch.RestClientBuilderCustomizer: RestClientBuilderCustomizer is replaced with Rest5ClientBuilderCustomizer'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#elasticsearch-client
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.elasticsearch.RestClientBuilderCustomizer
        location: IMPORT
