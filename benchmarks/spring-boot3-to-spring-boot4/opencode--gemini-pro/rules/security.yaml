- ruleID: spring-boot3-to-spring-boot4-00200
  description: PathRequest.toStaticResources() now includes /fonts/** by default
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/target=spring-boot4
    - konveyor.io/generated-by=ai-rule-gen
  message: If you use PathRequest#toStaticResources, this release adds a location to /fonts/**. If you don't want that location to be included, you can exclude it using pathRequest.toStaticResources().atCommonLocations().excluding(StaticResourceLocation.FONTS).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#fonts-added-to-common-static-locations
      title: Migration Documentation
  when:
    or:
        - java.referenced:
            pattern: org.springframework.boot.autoconfigure.security.servlet.PathRequest
            location: IMPORT
        - java.referenced:
            pattern: org.springframework.boot.autoconfigure.security.reactive.PathRequest
            location: IMPORT
