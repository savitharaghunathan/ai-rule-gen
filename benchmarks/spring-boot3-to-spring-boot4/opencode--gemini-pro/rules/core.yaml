- ruleID: spring-boot3-to-spring-boot4-00080
  description: PropertyMapper alwaysApplyingWhenNonNull() method removed
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/target=spring-boot4
    - konveyor.io/generated-by=ai-rule-gen
  message: The `alwaysApplyingWhenNonNull()` method was removed since `PropertyMapper` no longer maps nulls by default. If you need mapping for null values, use `always()`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#property-mapper-api-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.context.properties.PropertyMapper.alwaysApplyingWhenNonNull
        location: METHOD_CALL
- ruleID: spring-boot3-to-spring-boot4-00090
  description: PropertyMapper no longer calls adapter/predicate methods by default when source is null
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/target=spring-boot4
    - konveyor.io/generated-by=ai-rule-gen
  message: By default, PropertyMapper will not call destination methods if the source is null. If you need it to, chain with `.always()`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#property-mapper-api-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.context.properties.PropertyMapper.from
        location: METHOD_CALL
