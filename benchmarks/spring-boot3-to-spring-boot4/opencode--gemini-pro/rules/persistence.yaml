- ruleID: spring-boot3-to-spring-boot4-00230
  description: '@EntityScan moved to org.springframework.boot.persistence.autoconfigure.EntityScan'
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/target=spring-boot4
    - konveyor.io/generated-by=ai-rule-gen
  message: 'org.springframework.boot.autoconfigure.domain.EntityScan: @EntityScan moved to org.springframework.boot.persistence.autoconfigure.EntityScan'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#persistence-modules
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.domain.EntityScan
        location: ANNOTATION
