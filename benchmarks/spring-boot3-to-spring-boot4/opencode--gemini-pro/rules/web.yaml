- ruleID: spring-boot3-to-spring-boot4-00210
  description: HttpMessageConverters is deprecated. Custom converters should use ClientHttpMessageConvertersCustomizer and ServerHttpMessageConvertersCustomizer
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/target=spring-boot4
    - konveyor.io/generated-by=ai-rule-gen
  message: 'org.springframework.boot.http.converter.autoconfigure.HttpMessageConverters: HttpMessageConverters is deprecated. Custom converters should use ClientHttpMessageConvertersCustomizer and ServerHttpMessageConvertersCustomizer'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#httpmessageconverters-deprecation
      title: Migration Documentation
  when:
    or:
        - java.referenced:
            pattern: org.springframework.boot.http.converter.autoconfigure.HttpMessageConverters
            location: IMPORT
        - java.referenced:
            pattern: org.springframework.boot.autoconfigure.http.HttpMessageConverters
            location: IMPORT
