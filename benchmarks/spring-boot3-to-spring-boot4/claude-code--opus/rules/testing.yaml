  message: 'Spring Boot''s `@SpyBean` has been removed in favor of Spring Framework''s `@MockitoSpyBean`. Replace `@SpyBean` with `@MockitoSpyBean` on test class fields. Note: `@MockitoSpyBean` cannot be used in `@Configuration` classes. If you previously used `@SpyBean` in a `@Configuration` class, use `@MockitoSpyBean(types = {Service.class})` directly on the test class or create a custom composed annotation.'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mockbean-and-spybean-removal
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.mock.mockito.SpyBean
        location: ANNOTATION
- ruleID: spring-boot3-to-spring-boot4-00740
  description: '@SpringBootTest no longer auto-configures MockMVC support'
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In Spring Boot 4, `@SpringBootTest` no longer provides MockMVC support automatically. If your tests use `MockMvc`, add `@AutoConfigureMockMvc` to the test class.

    In addition, HtmlUnit-specific settings have moved under an `htmlUnit` attribute. For example:

    ```java
    // Spring Boot 3.5
    @AutoConfigureMockMvc(webClientEnabled=false, webDriverEnabled=false)

    // Spring Boot 4.0
    @AutoConfigureMockMvc(htmlUnit = @HtmlUnit(webClient = false, webDriver = false))
    ```
  links:
    - url: https://docs.spring.io/spring-boot/docs/current/reference/html/features.html#features.testing.spring-boot-applications.with-mock-environment
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.test.web.servlet.MockMvc
        location: IMPORT
