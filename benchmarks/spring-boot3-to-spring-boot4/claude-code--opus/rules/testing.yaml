  message: The `Skip` enum used with `@PropertyMapping` has been relocated. Update your import from `org.springframework.boot.test.autoconfigure.properties.Skip` to `org.springframework.boot.test.context.PropertyMapping.Skip`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#propertymapping-annotation
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.autoconfigure.properties.Skip
        location: IMPORT
- ruleID: spring-boot3-to-spring-boot4-00710
  description: '@MockBean removed; use @MockitoBean from Spring Framework'
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot's `@MockBean` has been removed in favor of Spring Framework's `@MockitoBean`. Replace `@MockBean` with `@MockitoBean` on test class fields. Note: `@MockitoBean` cannot be used in `@Configuration` classes. If you previously used `@MockBean` in a `@Configuration` class to share mocked beans, use `@MockitoBean(types = {Service.class})` directly on the test class or create a custom composed annotation.

    ```java
    // Before
    @MockBean
    private GreetingService greetingService;

    // After
    @MockitoBean
    private GreetingService greetingService;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mockbean-and-spybean-removal
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.mock.mockito.MockBean
        location: ANNOTATION
