- ruleID: spring-boot3-to-spring-boot4-00290
  description: Spring Authorization Server merged into Spring Security in Spring Boot 4
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Authorization Server is now part of Spring Security 7.0. Explicit dependency management for the standalone artifact has been removed in Spring Boot 4.0. The `spring-authorization-server.version` property no longer works; use `spring-security.version` instead if you need to override the version.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#dependency-management-for-spring-authorization-server
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.security.spring-security-oauth2-authorization-server
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00420
  description: spring-authorization-server.version property no longer supported in Spring Boot 4
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `spring-authorization-server.version` property can no longer be used to override the Spring Authorization Server version in Spring Boot 4.0. Spring Authorization Server is now part of Spring Security 7.0. Use `spring-security.version` instead.

    ## Before
    ```xml
    <properties>
        <spring-authorization-server.version>1.4.0</spring-authorization-server.version>
    </properties>
    ```

    ## After
    ```xml
    <properties>
        <spring-security.version>7.0.0</spring-security.version>
    </properties>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#dependency-management-for-spring-authorization-server
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: /m:project/m:properties/m:spring-authorization-server.version
        namespaces:
            m: http://maven.apache.org/POM/4.0.0
        filepaths:
            - pom.xml
