  message: Spring Boot 4's modular design requires using starter POMs for technologies that previously only needed a direct third-party dependency. Replace the direct `org.liquibase:liquibase-core` dependency with `org.springframework.boot:spring-boot-starter-liquibase` to ensure proper auto-configuration support.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#main-code
