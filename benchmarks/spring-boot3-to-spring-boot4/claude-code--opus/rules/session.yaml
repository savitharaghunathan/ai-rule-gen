- ruleID: spring-boot3-to-spring-boot4-00060
  description: Spring Session Hazelcast removed from Spring Boot, now under Hazelcast leadership
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Direct support for Spring Session Hazelcast has been removed from Spring Boot. Spring Session Hazelcast is now under the leadership of the Hazelcast team. You will need to manage the Spring Session Hazelcast dependency independently or migrate to another session store such as Redis (`spring-boot-starter-session-data-redis`) or JDBC (`spring-boot-starter-session-jdbc`).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-session-hazelcast
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.session.spring-session-hazelcast
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00070
  description: Spring Session MongoDB removed from Spring Boot, now under MongoDB leadership
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Direct support for Spring Session MongoDB has been removed from Spring Boot. Spring Session MongoDB is now under the leadership of the MongoDB team. You will need to manage the Spring Session MongoDB dependency independently or migrate to another session store such as Redis (`spring-boot-starter-session-data-redis`) or JDBC (`spring-boot-starter-session-jdbc`).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-session-mongodb
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.session.spring-session-data-mongodb
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00450
  description: spring.session.redis.* properties renamed to spring.session.data.redis.*
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Properties for Spring Session Data Redis have been renamed to reflect the dependencies on Spring Data Redis. Properties that previously began with `spring.session.redis` now begin with `spring.session.data.redis`.

    Update your configuration to use the new property prefix `spring.session.data.redis.*`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-session
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.session\.redis\.
        filePattern: application.*\.(properties|ya?ml)
