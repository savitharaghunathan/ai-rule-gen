- ruleID: spring-boot3-to-spring-boot4-00410
  description: spring.jackson.parser.* properties replaced by spring.jackson.json.read in Spring Boot 4
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring.jackson.parser.*` properties have been replaced in Spring Boot 4.0. Where a Jackson 2 `JsonParser.Feature` has an equivalent Jackson 3 `JsonReadFeature`, use `spring.jackson.json.read.*` properties. Where there is no `JsonReadFeature` equivalent, use a `JsonMapperBuilderCustomizer` to apply the desired configuration programmatically.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.jackson\.parser\.
        filePattern: application.*\.(properties|ya?ml)
