    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `@JsonMixin` annotation has been renamed to `@JacksonMixin` in Spring Boot 4.0 to clarify that it is specific to Jackson and not limited to JSON.

    ## Before
    ```java
    @JsonMixin(MyEntity.class)
    public abstract class MyEntityMixin { }
    ```

    ## After
    ```java
    @JacksonMixin(MyEntity.class)
    public abstract class MyEntityMixin { }
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.jackson.JsonMixin
        location: ANNOTATION
- ruleID: spring-boot3-to-spring-boot4-00390
  description: spring.jackson.read.* properties moved to spring.jackson.json.read
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The JSON-specific `spring.jackson.read.*` properties have moved to `spring.jackson.json.read.*` in Spring Boot 4.0.

    ## Before
    ```properties
    spring.jackson.read.use-big-decimal-for-floats=true
    ```

    ## After
    ```properties
    spring.jackson.json.read.use-big-decimal-for-floats=true
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.jackson\.read\.
        filePattern: application.*\.(properties|ya?ml)
