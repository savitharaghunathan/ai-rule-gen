- ruleID: spring-boot3-to-spring-boot4-00330
  description: Jackson 3 uses tools.jackson package namespace; com.fasterxml.jackson is replaced
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 4.0 uses Jackson 3 as its preferred JSON library. Jackson 3 uses new package names with `com.fasterxml.jackson` becoming `tools.jackson`. An exception is `jackson-annotations` which continues to use `com.fasterxml.jackson.core` group ID and `com.fasterxml.jackson.annotation` package.

    Update all Jackson imports from `com.fasterxml.jackson` to `tools.jackson`. For libraries that still require Jackson 2, a compatibility module is available.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    java.referenced:
        pattern: com.fasterxml.jackson*
        location: PACKAGE
- ruleID: spring-boot3-to-spring-boot4-00340
  description: JsonObjectSerializer renamed to ObjectValueSerializer in Spring Boot 4
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `JsonObjectSerializer` class has been renamed to `ObjectValueSerializer` in Spring Boot 4.0 for consistency with Jackson 3.

    ## Before
    ```java
    import org.springframework.boot.jackson.JsonObjectSerializer;
    ```

    ## After
    ```java
    import org.springframework.boot.jackson.ObjectValueSerializer;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.jackson.JsonObjectSerializer
        location: IMPORT
