- ruleID: spring-boot3-to-spring-boot4-00560
  description: Several spring.data.mongodb.* properties renamed to spring.mongodb.*
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Many MongoDB properties whose names previously began with `spring.data.mongodb` now begin with `spring.mongodb`. Update the following properties in your configuration:

    - `spring.data.mongodb.additional-hosts` -> `spring.mongodb.additional-hosts`
    - `spring.data.mongodb.authentication-database` -> `spring.mongodb.authentication-database`
    - `spring.data.mongodb.database` -> `spring.mongodb.database`
    - `spring.data.mongodb.host` -> `spring.mongodb.host`
    - `spring.data.mongodb.password` -> `spring.mongodb.password`
    - `spring.data.mongodb.port` -> `spring.mongodb.port`
    - `spring.data.mongodb.protocol` -> `spring.mongodb.protocol`
    - `spring.data.mongodb.replica-set-name` -> `spring.mongodb.replica-set-name`
    - `spring.data.mongodb.uri` -> `spring.mongodb.uri`
    - `spring.data.mongodb.username` -> `spring.mongodb.username`
    - `spring.data.mongodb.ssl.*` -> `spring.mongodb.ssl.*`

    Note: `spring.data.mongodb.auto-index-creation`, `spring.data.mongodb.field-naming-strategy`, `spring.data.mongodb.gridfs.*`, and `spring.data.mongodb.repositories.type` are unchanged.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mongodb
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.data\.mongodb\.(additional-hosts|authentication-database|database|host|password|port|protocol|replica-set-name|representation\.uuid|ssl\.|uri|username)
        filePattern: application.*\.(properties|ya?ml)
- ruleID: spring-boot3-to-spring-boot4-00570
  description: Management properties renamed from .mongo. to .mongodb.
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Management-related MongoDB properties have been renamed to use `mongodb` rather than `mongo`:

    - `management.health.mongo.enabled` -> `management.health.mongodb.enabled`
    - `management.metrics.mongo.command.enabled` -> `management.metrics.mongodb.command.enabled`
    - `management.metrics.mongo.connectionpool.enabled` -> `management.metrics.mongodb.connectionpool.enabled`
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mongodb
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: management\.(health|metrics)\.mongo\.
        filePattern: application.*\.(properties|ya?ml)
- ruleID: spring-boot3-to-spring-boot4-00580
  description: MongoDB UUID and BigDecimal representations no longer have defaults
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Data MongoDB no longer provides defaults for `UUID` and `BigInteger`/`BigDecimal` representations. This aligns with the driver recommendation to not favor a particular representation.

    An explicit configuration is now expected. Set the representations using:
    - `spring.mongodb.representation.uuid` for UUID representation
    - `spring.data.mongodb.representation.big-decimal` for BigDecimal representation
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mongodb-uuid-and-bigdecimal-representations
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-data-mongodb
        upperbound: 4.0.0
- ruleID: spring-boot3-to-spring-boot4-00590
  description: hibernate-jpamodelgen replaced by hibernate-processor
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The Hibernate `hibernate-jpamodelgen` artifact has been replaced by `hibernate-processor`. Update your dependency:

    ```xml
    <!-- Before -->
    <dependency>
        <groupId>org.hibernate.orm</groupId>
        <artifactId>hibernate-jpamodelgen</artifactId>
    </dependency>

    <!-- After -->
    <dependency>
        <groupId>org.hibernate.orm</groupId>
        <artifactId>hibernate-processor</artifactId>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#hibernate-dependency-management
      title: Migration Documentation
  when:
    java.dependency:
        name: org.hibernate.orm.hibernate-jpamodelgen
        lowerbound: 0.0.0
