- ruleID: spring-boot3-to-spring-boot4-00510
  description: RestClientBuilderCustomizer replaced by Rest5ClientBuilderCustomizer
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Auto-configuration for the deprecated low-level Elasticsearch `RestClient` has been replaced with auto-configuration for the new `Rest5Client`. If you were using `RestClientBuilderCustomizer` to customize the client, you must now use `Rest5ClientBuilderCustomizer` instead.

    ```java
    // Before
    import org.springframework.boot.autoconfigure.elasticsearch.RestClientBuilderCustomizer;

    // After
    import org.springframework.boot.autoconfigure.elasticsearch.Rest5ClientBuilderCustomizer;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#elasticsearch-client
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.elasticsearch.RestClientBuilderCustomizer
        location: IMPORT
- ruleID: spring-boot3-to-spring-boot4-00520
  description: elasticsearch-rest-client dependency management removed; use co.elastic.clients:elasticsearch-java
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `org.elasticsearch.client:elasticsearch-rest-client` module is no longer required. Spring Boot's dependency management for it has been removed. The client code has been consolidated in `co.elastic.clients:elasticsearch-java`, including built-in sniffer support.

    Replace `org.elasticsearch.client:elasticsearch-rest-client` with `co.elastic.clients:elasticsearch-java` in your dependency management.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#elasticsearch-client
      title: Migration Documentation
  when:
    java.dependency:
        name: org.elasticsearch.client.elasticsearch-rest-client
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00530
  description: elasticsearch-rest-client-sniffer dependency management removed; sniffer is now built-in
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `org.elasticsearch.client:elasticsearch-rest-client-sniffer` module is no longer required. Spring Boot's dependency management for it has been removed. Sniffer support is now built into `co.elastic.clients:elasticsearch-java`.

    Remove the `elasticsearch-rest-client-sniffer` dependency from your project.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#elasticsearch-client
      title: Migration Documentation
  when:
    java.dependency:
        name: org.elasticsearch.client.elasticsearch-rest-client-sniffer
        lowerbound: 0.0.0
- ruleID: spring-boot3-to-spring-boot4-00540
  description: '@EntityScan moved to org.springframework.boot.persistence.autoconfigure'
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `@EntityScan` annotation has been moved to the new `spring-boot-persistence` module. Update your imports.

    ```java
    // Before
    import org.springframework.boot.autoconfigure.domain.EntityScan;

    // After
    import org.springframework.boot.persistence.autoconfigure.EntityScan;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#persistence-modules
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.domain.EntityScan
        location: ANNOTATION
- ruleID: spring-boot3-to-spring-boot4-00550
  description: spring.dao.exceptiontranslation.enabled renamed to spring.persistence.exceptiontranslation.enabled
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
