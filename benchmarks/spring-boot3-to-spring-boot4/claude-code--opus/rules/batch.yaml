- ruleID: spring-boot3-to-spring-boot4-00650
  description: spring-boot-starter-batch now uses in-memory mode; use starter-batch-jdbc for database
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Batch can now operate without a database (in-memory), and `spring-boot-starter-batch` uses this simplified mode by default. On upgrade, Spring Batch will no longer store metadata in your existing database. If you need database-backed batch metadata, change to `spring-boot-starter-batch-jdbc` to restore the previous arrangement.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-batch
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-batch
        upperbound: 4.0.0
