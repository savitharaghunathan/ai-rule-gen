- ruleID: spring-boot3-to-spring-boot4-00010
  description: Spring Boot 4.0 requires Java 17+, Jakarta EE 11, Servlet 6.1, Spring Framework 7.x
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Spring Boot 4.0 has updated system requirements: Java 17 or later (latest LTS recommended), Kotlin 2.2+, GraalVM 25+, Jakarta EE 11 with Servlet 6.1 baseline, and Spring Framework 7.x. Additionally, Spring Boot 4 has a modular design where `spring-boot-starter` no longer includes all auto-configuration classes. For a quick migration, replace `spring-boot-starter` with `spring-boot-starter-classic`. For the recommended approach, use specific technology starters (e.g., `spring-boot-starter-webmvc`, `spring-boot-starter-data-jpa`). Review your project''s runtime and dependencies before upgrading.'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#review-system-requirements
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter
        upperbound: 4.0.0
- ruleID: spring-boot3-to-spring-boot4-00180
  description: org.springframework.lang.Nullable replaced by JSpecify annotations in Spring Boot 4
  category: optional
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 4.0 adds JSpecify nullability annotations. If you previously used Spring Framework's nullable annotations from the `org.springframework.lang` package, you should migrate to JSpecify annotations. This may cause compilation failures if you use a null checker in your build or use Kotlin.

    Refer to the Spring Framework migration guide for [migrating from Spring null-safety annotations](https://docs.spring.io/spring-framework/reference/core/null-safety.html#null-safety-migrating).
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#jspecify-nullability-annotations
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.lang.Nullable
        location: IMPORT
