- ruleID: spring-boot3-to-spring-boot4-00230
  description: EnvironmentPostProcessor moved from org.springframework.boot.env to org.springframework.boot
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `EnvironmentPostProcessor` interface has moved from `org.springframework.boot.env` to `org.springframework.boot` in Spring Boot 4.0. The deprecated form is still available but will be removed in a future release. Update your imports and `spring.factories` files.

    ## Before
    ```java
    import org.springframework.boot.env.EnvironmentPostProcessor;
    ```

    ## After
    ```java
    import org.springframework.boot.EnvironmentPostProcessor;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#bootstrapregistry-and-environmentpostprocessor-package-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.env.EnvironmentPostProcessor
        location: IMPORT
- ruleID: spring-boot3-to-spring-boot4-00240
  description: alwaysApplyingWhenNonNull() removed from PropertyMapper in Spring Boot 4
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `PropertyMapper.alwaysApplyingWhenNonNull()` method has been removed in Spring Boot 4.0. The `PropertyMapper` now skips adapter/predicate methods by default when the source value is `null`, making `alwaysApplyingWhenNonNull()` unnecessary. Simply remove the call. If you need to perform a mapping even for `null` values, use the new `always()` method instead.

    Review [commit 239f384ac0](https://github.com/spring-projects/spring-boot/commit/239f384ac0893d151b89f204886874c6adb00001) for examples of how Spring Boot adapted to the new API.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#property-mapper-api-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.context.properties.PropertyMapper.alwaysApplyingWhenNonNull
        location: METHOD_CALL
