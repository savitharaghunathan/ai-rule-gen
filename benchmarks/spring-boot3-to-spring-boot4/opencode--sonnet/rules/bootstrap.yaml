- ruleID: spring-boot-3-to-spring-boot-4-00240
  description: BootstrapRegistry moved from org.springframework.boot to org.springframework.boot.bootstrap
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `BootstrapRegistry` and related classes have moved from `org.springframework.boot` to `org.springframework.boot.bootstrap`. Update your imports and any `spring.factories` registrations accordingly.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#bootstrapregistry-and-environmentpostprocessor-package-changes
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.BootstrapRegistry
        location: IMPORT
