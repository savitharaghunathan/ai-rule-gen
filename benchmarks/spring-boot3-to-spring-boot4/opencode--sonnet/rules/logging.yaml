- ruleID: spring-boot-3-to-spring-boot-4-00230
  description: Logback default charset harmonized to UTF-8 in Spring Boot 4
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The default charset for Logback has been harmonized with Log4j2 in Spring Boot 4. Log files now use UTF-8 by default; console logging uses `Console#charset()` if available, otherwise UTF-8. Review your Logback configuration if you depend on a specific charset for log output.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#logback-default-charset
      title: Migration Documentation
  when:
    java.dependency:
        name: ch.qos.logback.logback-classic
        lowerbound: 0.0.0
