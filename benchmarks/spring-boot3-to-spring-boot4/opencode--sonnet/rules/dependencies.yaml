- ruleID: spring-boot-3-to-spring-boot-4-00090
  description: Flyway now requires the spring-boot-starter-flyway starter instead of a direct dependency.
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Spring Boot 4's new modular design requires explicit starter POMs for technologies like Flyway. Replace the direct `flyway-core` dependency with `spring-boot-starter-flyway` to ensure proper auto-configuration is available.

    ## Before
    ```xml
    <dependency>
        <groupId>org.flywaydb</groupId>
        <artifactId>flyway-core</artifactId>
    </dependency>
    ```

    ## After
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-flyway</artifactId>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#main-code
      title: Migration Documentation
  when:
    java.dependency:
        name: org.flywaydb.flyway-core
        lowerbound: 0.0.0
