- ruleID: spring-boot-3-to-spring-boot-4-00140
  description: spring-boot-starter renamed to spring-boot-starter-classic in Spring Boot 4.
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In Spring Boot 4, `spring-boot-starter` has been replaced by `spring-boot-starter-classic`. The classic starter provides all modules but excludes transitive dependencies, mimicking the previous generation of Spring Boot. For a quick upgrade path, replace `spring-boot-starter` with `spring-boot-starter-classic`. Eventually, migrate to the new focused starters for the specific technologies your application uses.

    ## Before
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter</artifactId>
    </dependency>
    ```

    ## After (quick migration)
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-classic</artifactId>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#classic-starters
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter
        upperbound: 4.0.0
- ruleID: spring-boot-3-to-spring-boot-4-00290
  description: spring-boot-starter-aop renamed to spring-boot-starter-aspectj in Spring Boot 4
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring-boot-starter-aop` starter has been renamed to `spring-boot-starter-aspectj` in Spring Boot 4 to clarify its scope. Replace `spring-boot-starter-aop` with `spring-boot-starter-aspectj` in your build file. Before upgrading, review if your application actually uses AspectJ (e.g., annotations from `org.aspectj.lang.annotation`) to determine if you need this dependency at all.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#aop-starter-pom
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-aop
        lowerbound: 0.0.0
- ruleID: spring-boot-3-to-spring-boot-4-00300
  description: Spring Boot 4 removed managed dependency for Spring Retry; explicit version now required
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot 4 has removed managed dependency management for Spring Retry. If your application uses Spring Retry, you must now declare an explicit version in your build file. Consider migrating to the equivalent retry features in Spring Framework 7 instead.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#dependency-management-for-spring-retry
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.retry.spring-retry
        lowerbound: 0.0.0
- ruleID: spring-boot-3-to-spring-boot-4-00310
  description: spring-authorization-server.version property no longer works in Spring Boot 4
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Authorization Server is now part of Spring Security and Spring Boot 4 has removed explicit dependency management for it. The `spring-authorization-server.version` property no longer works. If you need to override the version, use `spring-security.version` instead.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#dependency-management-for-spring-authorization-server
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring-authorization-server\.version
        filePattern: pom\.xml|build\.gradle(\.kts)?
