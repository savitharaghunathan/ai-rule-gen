- ruleID: spring-boot-3-to-spring-boot-4-00010
  description: Spring Boot 4.0 requires Java 17+, Spring Framework 7.x, and Jakarta EE 11.
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot 4.0 has updated system requirements. It requires Java 17 or later, Kotlin 2.2 or later (if using Kotlin), GraalVM 25+ (if using native-image), Spring Framework 7.x, and a Servlet 6.1 baseline (Jakarta EE 11). Ensure all system and dependency requirements are met before upgrading. Using the latest LTS release of Java is encouraged.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#review-system-requirements
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot
        upperbound: 4.0.0
- ruleID: spring-boot-3-to-spring-boot-4-00030
  description: Undertow support has been removed from Spring Boot 4; it is not Servlet 6.1 compatible.
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot 4 requires a Servlet 6.1 baseline, with which Undertow is not yet compatible. Undertow support has been removed, including the Undertow starter and the ability to use Undertow as an embedded server. Replace Undertow with a Servlet 6.1-compatible server such as Tomcat or Jetty. Use `spring-boot-starter-tomcat` or `spring-boot-starter-jetty` instead.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#undertow
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-undertow
        lowerbound: 0.0.0
- ruleID: spring-boot-3-to-spring-boot-4-00040
  description: Spring Pulsar Reactive auto-configuration has been removed from Spring Boot 4.
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Following the removal of reactor support in Spring Pulsar, Spring Boot 4 no longer manages the reactive Pulsar client and auto-configuration for Spring Pulsar Reactive has been removed. Remove `spring-boot-starter-pulsar-reactive` from your dependencies. If you require reactive Pulsar support, consult the Spring Pulsar project directly for alternatives.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#pulsar-reactive
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-pulsar-reactive
        lowerbound: 0.0.0
