- ruleID: spring-boot-3-to-spring-boot-4-00850
  description: ElasticsearchClient's underlying low-level client changed from RestClient to Rest5Client in Spring Boot 4
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Support for the high-level `ElasticsearchClient` remains in Spring Boot 4, but its underlying low-level client has changed from the deprecated `RestClient` to the new `Rest5Client`. If you were using `RestClientBuilderCustomizer` to customize the Elasticsearch client, you must now use `Rest5ClientBuilderCustomizer` instead. Verify your application's Elasticsearch integration works correctly with the new underlying client. The `org.elasticsearch.client:elasticsearch-rest-client` and `org.elasticsearch.client:elasticsearch-rest-client-sniffer` modules are no longer managed by Spring Boot's dependency management.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#elasticsearch-client
      title: Migration Documentation
  when:
    java.referenced:
        pattern: co.elastic.clients.elasticsearch.ElasticsearchClient
        location: IMPORT
- ruleID: spring-boot-3-to-spring-boot-4-00860
  description: ReactiveElasticsearchClient's underlying low-level client changed from RestClient to Rest5Client in Spring Boot 4
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Support for the Spring Data Elasticsearch-provided `ReactiveElasticsearchClient` remains in Spring Boot 4, but its underlying low-level client has changed from the deprecated `RestClient` to the new `Rest5Client`. If you were using `RestClientBuilderCustomizer`, you must now use `Rest5ClientBuilderCustomizer`. Verify your reactive Elasticsearch integration works correctly after upgrading.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#elasticsearch-client
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.data.elasticsearch.client.elc.ReactiveElasticsearchClient
        location: IMPORT
