- ruleID: spring-boot-3-to-spring-boot-4-00050
  description: Embedded executable uber jar launch scripts have been removed in Spring Boot 4.
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Support for embedded launch scripts used to create 'fully executable' jar files has been removed in Spring Boot 4. The `<executable>true</executable>` configuration in the Spring Boot Maven plugin will no longer produce a self-executing jar. Instead, run your application with `java -jar`. If you require similar functionality, consider alternatives such as Gradle's application plugin or OS-level service managers.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#embedded-executable-uber-jar-launch-scripts
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='plugin']/*[local-name()='configuration']/*[local-name()='executable'][text()='true']
        filepaths:
            - pom.xml
- ruleID: spring-boot-3-to-spring-boot-4-00320
  description: Classic uber-jar loader removed in Spring Boot 4; remove loaderImplementation CLASSIC config
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The classic uber-jar loader has been removed in Spring Boot 4. Remove the `<loaderImplementation>CLASSIC</loaderImplementation>` configuration from your Maven build plugin configuration.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#classic-uber-jar-loader-support
      title: Migration Documentation
  when:
    builtin.xml:
        xpath: //*[local-name()='loaderImplementation' and text()='CLASSIC']
        namespaces:
            m: http://maven.apache.org/POM/4.0.0
        filepaths:
            - pom.xml
- ruleID: spring-boot-3-to-spring-boot-4-00330
  description: Classic uber-jar loader removed in Spring Boot 4; remove Gradle loaderImplementation config
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The classic uber-jar loader has been removed in Spring Boot 4. Remove the `loaderImplementation = org.springframework.boot.loader.tools.LoaderImplementation.CLASSIC` line from your Gradle build script.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#classic-uber-jar-loader-support
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: loaderImplementation.*CLASSIC
        filePattern: build\.gradle(\.kts)?
- ruleID: spring-boot-3-to-spring-boot-4-00340
  description: CycloneDX Gradle plugin minimum version is 3.0.0 for Spring Boot 4
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot 4 requires a minimum version of 3.0.0 of the CycloneDX Gradle plugin. Check your Gradle build configuration and upgrade the CycloneDX plugin to at least version 3.0.0.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#cyclone-dx-gradle-plugin
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: cyclonedx
        filePattern: build\.gradle(\.kts)?
