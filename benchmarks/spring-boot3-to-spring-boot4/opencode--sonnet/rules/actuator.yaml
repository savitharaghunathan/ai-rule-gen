- ruleID: spring-boot-3-to-spring-boot-4-00490
  description: Liveness and readiness probes are now enabled by default in Spring Boot 4
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: In Spring Boot 4, liveness and readiness probes are enabled by default. The `management.endpoint.health.probes.enabled` property now defaults to `true`. Review your health endpoint configuration to ensure the `liveness` and `readiness` groups behave as expected. If you do not need these probes, explicitly set `management.endpoint.health.probes.enabled=false`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#liveness-and-readiness-probes
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: management\.endpoint\.health\.probes\.enabled
        filePattern: application.*\.(properties|ya?ml)
