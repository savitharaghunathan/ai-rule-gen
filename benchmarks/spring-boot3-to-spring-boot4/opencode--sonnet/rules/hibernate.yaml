- ruleID: spring-boot-3-to-spring-boot-4-00650
  description: hibernate-jpamodelgen replaced by hibernate-processor in Spring Boot 4 dependency management
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `org.hibernate.orm:hibernate-jpamodelgen` artifact has been replaced by `org.hibernate.orm:hibernate-processor` in Spring Boot 4 dependency management. Update your build files to use `hibernate-processor` instead of `hibernate-jpamodelgen`.

    ```xml
    <!-- Before -->
    <dependency>
        <groupId>org.hibernate.orm</groupId>
        <artifactId>hibernate-jpamodelgen</artifactId>
    </dependency>

    <!-- After -->
    <dependency>
        <groupId>org.hibernate.orm</groupId>
        <artifactId>hibernate-processor</artifactId>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#hibernate-dependency-management
      title: Migration Documentation
  when:
    java.dependency:
        name: org.hibernate.orm.hibernate-jpamodelgen
        lowerbound: 0.0.0
- ruleID: spring-boot-3-to-spring-boot-4-00660
  description: hibernate-proxool is no longer published in Spring Boot 4
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `org.hibernate.orm:hibernate-proxool` artifact is no longer published. If you were using Hibernate's Proxool connection pool integration, you must migrate to an alternative connection pool (such as HikariCP, which is Spring Boot's default). Remove the `hibernate-proxool` dependency and update your connection pool configuration.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#hibernate-dependency-management
      title: Migration Documentation
  when:
    java.dependency:
        name: org.hibernate.orm.hibernate-proxool
        lowerbound: 0.0.0
