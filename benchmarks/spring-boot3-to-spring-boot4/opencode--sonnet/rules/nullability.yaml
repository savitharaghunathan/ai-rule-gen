- ruleID: spring-boot-3-to-spring-boot-4-00210
  description: Spring's @Nullable replaced by JSpecify nullability annotations in Spring Boot 4
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Spring Boot 4.0 adds JSpecify nullability annotations and may change the nullability of previously nullable or non-nullable types. If you were using Spring Framework''s `@Nullable` from `org.springframework.lang`, you should migrate to JSpecify''s `org.jspecify.annotations.Nullable`. See the Spring Framework guide: https://docs.spring.io/spring-framework/reference/core/null-safety.html#null-safety-migrating'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#jspecify-nullability-annotations
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.lang.Nullable
        location: ANNOTATION
- ruleID: spring-boot-3-to-spring-boot-4-00220
  description: Spring's @NonNull replaced by JSpecify nullability annotations in Spring Boot 4
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Spring Boot 4.0 adds JSpecify nullability annotations. If you were using Spring Framework''s `@NonNull` from `org.springframework.lang`, you should migrate to JSpecify''s `org.jspecify.annotations.NonNull`. This may cause compilation failures due to changed nullability constraints. See the Spring Framework guide: https://docs.spring.io/spring-framework/reference/core/null-safety.html#null-safety-migrating'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#jspecify-nullability-annotations
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.lang.NonNull
        location: ANNOTATION
