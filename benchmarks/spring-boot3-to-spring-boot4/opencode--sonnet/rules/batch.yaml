- ruleID: spring-boot-3-to-spring-boot-4-00710
  description: spring-boot-starter-batch now uses in-memory mode; use spring-boot-starter-batch-jdbc for database
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring-boot-starter-batch` starter now defaults to in-memory mode — Spring Batch will no longer store metadata in your database on upgrade. If you were relying on database-backed job metadata, you must switch to `spring-boot-starter-batch-jdbc`. If you are happy with the simplified in-memory mode, you may be able to remove database-related Spring Batch configuration.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#spring-batch
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-batch
        upperbound: 4.0.0
