- ruleID: spring-boot-3-to-spring-boot-4-00350
  description: 'Jackson 3 uses new package names: com.fasterxml.jackson moved to tools.jackson'
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Spring Boot 4 uses Jackson 3 as its preferred JSON library. Jackson 3 uses new package names: `com.fasterxml.jackson` has moved to `tools.jackson`. Exception: `jackson-annotations` continues to use `com.fasterxml.jackson.annotation`. Update all Jackson imports accordingly. See the Jackson 3.0 wiki for full details: https://github.com/FasterXML/jackson/wiki/Jackson-Release-3.0'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    java.referenced:
        pattern: com.fasterxml.jackson*
        location: PACKAGE
- ruleID: spring-boot-3-to-spring-boot-4-00360
  description: Jackson 2 group ID com.fasterxml.jackson.core replaced by tools.jackson in Jackson 3
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Spring Boot 4 uses Jackson 3, which has new Maven group IDs. The `com.fasterxml.jackson.core:jackson-databind` artifact is replaced by `tools.jackson:jackson-databind`. Update your Maven/Gradle dependencies to use the new `tools.jackson` group IDs. Note: `jackson-annotations` is an exception and retains the `com.fasterxml.jackson.core` group ID.'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    java.dependency:
        name: com.fasterxml.jackson.core.jackson-databind
        lowerbound: 0.0.0
