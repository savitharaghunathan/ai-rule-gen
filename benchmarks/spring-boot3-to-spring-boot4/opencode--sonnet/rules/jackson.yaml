- ruleID: spring-boot-3-to-spring-boot-4-00450
  description: spring.jackson.parser.* properties replaced by spring.jackson.json.read in Spring Boot 4
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring.jackson.parser.*` properties have been replaced in Spring Boot 4. Where a Jackson 2 `JsonParser.Feature` has an equivalent Jackson 3 `JsonReadFeature`, use `spring.jackson.json.read.*` instead. Where there is no `JsonReadFeature` equivalent, use a `JsonMapperBuilderCustomizer` to apply the configuration programmatically.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.jackson\.parser\.
        filePattern: application.*\.(properties|ya?ml)
- ruleID: spring-boot-3-to-spring-boot-4-00460
  description: Jackson module auto-detection now enabled by default in Spring Boot 4
  category: potential
  effort: 3
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: In Spring Boot 4, Jackson will automatically detect and register all modules present on the classpath. Previously (Spring Boot 3), only 'well-known' modules were registered. This behavioral change may affect your application. To disable this new behavior, set `spring.jackson.find-and-add-modules=false`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#upgrading-jackson
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.jackson\.find-and-add-modules
        filePattern: application.*\.(properties|ya?ml)
- ruleID: spring-boot-3-to-spring-boot-4-00470
  description: spring.jackson.use-jackson2-defaults is a temporary compatibility property in Spring Boot 4
  category: optional
  effort: 5
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring.jackson.use-jackson2-defaults=true` property provides a temporary compatibility mode aligning Jackson 3's auto-configured `JsonMapper` defaults with those of Jackson 2 in Spring Boot 3.x. This is intended as a temporary migration aid. Plan to remove this property and fully adopt Jackson 3 defaults.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#jackson-2-compatibility
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.jackson\.use-jackson2-defaults
        filePattern: application.*\.(properties|ya?ml)
- ruleID: spring-boot-3-to-spring-boot-4-00480
  description: spring-boot-jackson2 is a deprecated compatibility module in Spring Boot 4
  category: optional
  effort: 5
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring-boot-jackson2` module is provided in Spring Boot 4.0 as a deprecated stop-gap for applications that need more time to migrate from Jackson 2 to Jackson 3. This module will be removed in a future release. Plan to migrate your application to Jackson 3 and remove this dependency.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#jackson-2-compatibility
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-jackson2
        lowerbound: 0.0.0
- ruleID: spring-boot-3-to-spring-boot-4-00840
  description: spring.jackson2.* properties indicate use of the deprecated Jackson 2 compatibility module in Spring Boot 4
  category: potential
  effort: 5
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Properties under the `spring.jackson2.*` prefix are provided by the deprecated `spring-boot-jackson2` compatibility module in Spring Boot 4. This module is a stop-gap for users who cannot yet migrate to Jackson 3 and will be removed in a future release. Migrate to Jackson 3 and remove the `spring-boot-jackson2` dependency as soon as possible. Jackson 3 configuration uses the `spring.jackson.*` prefix.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#jackson-2-compatibility
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.jackson2\.
        filePattern: application.*\.(properties|ya?ml)
