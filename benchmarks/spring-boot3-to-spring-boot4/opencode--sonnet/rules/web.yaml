- ruleID: spring-boot-3-to-spring-boot-4-00190
  description: spring-boot-starter-web renamed to spring-boot-starter-webmvc in Spring Boot 4.
  category: optional
  effort: 1
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `spring-boot-starter-web` starter has been renamed to `spring-boot-starter-webmvc` in Spring Boot 4 to better align with the module it provides. The old starter is deprecated and will be removed in a future release. Update your dependency to use the new name.

    ## Before
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-web</artifactId>
    </dependency>
    ```

    ## After
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-webmvc</artifactId>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#deprecated-starters
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-web
        upperbound: 4.0.0
