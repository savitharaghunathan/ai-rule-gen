- ruleID: spring-boot-3-to-spring-boot-4-00150
  description: spring-boot-starter-test renamed to spring-boot-starter-test-classic in Spring Boot 4.
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In Spring Boot 4, `spring-boot-starter-test` has been replaced by `spring-boot-starter-test-classic`. The classic test starter provides all test modules but excludes transitive dependencies. For a quick upgrade path, replace `spring-boot-starter-test` with `spring-boot-starter-test-classic`. Note that `spring-boot-starter-test` is now brought transitively by technology-specific test starters, so you may instead list the specific technology test starters for the modules under test.

    ## Before
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-test</artifactId>
        <scope>test</scope>
    </dependency>
    ```

    ## After (quick migration)
    ```xml
    <dependency>
        <groupId>org.springframework.boot</groupId>
        <artifactId>spring-boot-starter-test-classic</artifactId>
        <scope>test</scope>
    </dependency>
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#classic-starters
      title: Migration Documentation
  when:
    java.dependency:
        name: org.springframework.boot.spring-boot-starter-test
        upperbound: 4.0.0
