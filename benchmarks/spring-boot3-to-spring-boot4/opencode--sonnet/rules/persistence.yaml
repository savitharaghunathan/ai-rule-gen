- ruleID: spring-boot-3-to-spring-boot-4-00600
  description: EntityScan annotation relocated to org.springframework.boot.persistence.autoconfigure in Spring Boot 4
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `@EntityScan` annotation has been relocated from `org.springframework.boot.autoconfigure.domain.EntityScan` to `org.springframework.boot.persistence.autoconfigure.EntityScan` in Spring Boot 4. Update your import statements accordingly:

    ```java
    // Before
    import org.springframework.boot.autoconfigure.domain.EntityScan;

    // After
    import org.springframework.boot.persistence.autoconfigure.EntityScan;
    ```
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#persistence-modules
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.autoconfigure.domain.EntityScan
        location: ANNOTATION
- ruleID: spring-boot-3-to-spring-boot-4-00610
  description: spring.dao.exceptiontranslation.enabled property replaced by spring.persistence.exceptiontranslation.enabled
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: The `spring.dao.exceptiontranslation.enabled` property is no longer supported in Spring Boot 4. Replace it with `spring.persistence.exceptiontranslation.enabled` in your application configuration.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#persistence-modules
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: spring\.dao\.exceptiontranslation\.enabled
        filePattern: application.*\.(properties|ya?ml)
