- ruleID: spring-boot-3-to-spring-boot-4-00780
  description: '@MockBean removed; replaced by Spring Framework''s @MockitoBean'
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Spring Boot''s `@MockBean` annotation has been removed. Replace it with `@MockitoBean` from Spring Framework (`org.springframework.test.context.bean.override.mockito.MockitoBean`). Note a key behavioral difference: `@MockitoBean` can be used on test class fields but NOT in `@Configuration` classes. If you were using `@MockBean` inside a `@TestConfiguration` to share mocks, migrate to declaring `@MockitoBean` on the test class itself or use `@MockitoBean(types = {...})` to mock multiple beans in one annotation.'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mockbean-and-spybean-removal
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.mock.mockito.MockBean
        location: ANNOTATION
