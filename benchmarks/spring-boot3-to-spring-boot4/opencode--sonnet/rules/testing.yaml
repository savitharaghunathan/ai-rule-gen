- ruleID: spring-boot-3-to-spring-boot-4-00720
  description: MockitoTestExecutionListener removed; use MockitoExtension from Mockito directly
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: Spring Boot's `MockitoTestExecutionListener` has been removed (it was deprecated in Spring Boot 3.4). If your `@Mock` or `@Captor` annotated fields are no longer working, add `@ExtendWith(MockitoExtension.class)` to your test class, or use `MockitoExtension` from Mockito directly. The listener was only indirectly used, so deprecation warnings may have been easy to miss.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#mockito-captor-and-mock-annotations
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.autoconfigure.MockitoTestExecutionListener
        location: IMPORT
- ruleID: spring-boot-3-to-spring-boot-4-00730
  description: '@SpringBootTest no longer provides MockMVC; @AutoConfigureMockMvc now required'
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=spring-boot-3
    - konveyor.io/source=spring-boot
    - konveyor.io/target=spring-boot-4
    - konveyor.io/target=spring-boot
    - konveyor.io/generated-by=ai-rule-gen
  message: 'Using `@SpringBootTest` no longer provides MockMVC support automatically. You must now explicitly add `@AutoConfigureMockMvc` to your test class to enable MockMVC. Additionally, HtmlUnit-specific settings have moved under an `htmlUnit` attribute: replace `@AutoConfigureMockMvc(webClientEnabled=false, webDriverEnabled=false)` with `@AutoConfigureMockMvc(htmlUnit = @HtmlUnit(webClient = false, webDriver = false))`.'
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#using-mockmvc-and-springboottest
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.springframework.boot.test.autoconfigure.web.servlet.AutoConfigureMockMvc
        location: ANNOTATION
- ruleID: spring-boot-3-to-spring-boot-4-00740
  description: '@SpringBootTest no longer auto-configures WebClient or TestRestTemplate beans'
