    - konveyor.io/generated-by=ai-rule-gen
  message: Using `@SpringBootTest` no longer provides `WebClient` or `TestRestTemplate` beans automatically. To use `TestRestTemplate`, add `@AutoConfigureTestRestTemplate` to your test class and add dependencies on `org.springframework.boot:spring-boot-resttestclient` and `org.springframework.boot:spring-boot-restclient`. Alternatively, consider replacing `TestRestTemplate` with the new `RestTestClient` by adding `@AutoConfigureRestTestClient`.
  links:
    - url: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide#using-webclient-or-testresttemplate-and-springboottest
      title: Migration Documentation
  when:
