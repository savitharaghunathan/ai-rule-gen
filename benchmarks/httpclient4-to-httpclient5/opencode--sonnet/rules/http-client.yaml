- ruleID: httpclient-4-to-httpclient-5-00010
  description: Apache HttpClient 4.x org.apache.http package replaced by org.apache.hc.* in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |
    The entire `org.apache.http` package namespace has been replaced by `org.apache.hc.*` in Apache HttpClient 5.x. All imports from `org.apache.http.*` must be updated to the corresponding `org.apache.hc.client5.*` or `org.apache.hc.core5.*` packages.

    For example:

    ## Before
    ```java
    import org.apache.http.client.HttpClient;
    import org.apache.http.impl.client.HttpClients;
    import org.apache.http.HttpResponse;
    ```

    ## After
    ```java
    import org.apache.hc.client5.http.classic.HttpClient;
    import org.apache.hc.client5.http.impl.classic.HttpClients;
    import org.apache.hc.core5.http.ClassicHttpResponse;
    ```

    ### Specific replacements

    | Old class | Replacement |
    |---|---|
    | `org.apache.http.impl.nio.reactor.IOReactorConfig` | org.apache.hc.core5.reactor.IOReactorConfig |
    | `org.apache.http.concurrent.FutureCallback` | org.apache.hc.core5.concurrent.FutureCallback |
    | `org.apache.http.impl.nio.conn.PoolingNHttpClientConnectionManager` | PoolingNHttpClientConnectionManager removed; HTTP/2 async clients manage connections internally per origin host |
    | `org.apache.http.message.BasicNameValuePair` | org.apache.hc.core5.http.message.BasicNameValuePair or use JsonRequestProducers / streaming entity producers |
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http
        location: PACKAGE
- ruleID: httpclient-4-to-httpclient-5-00040
  description: HttpResponse.getStatusLine() removed in HttpClient 5.x; use ClassicHttpResponse.getCode() instead
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `HttpResponse.getStatusLine()` has been removed in Apache HttpClient 5.x. The `StatusLine` class no longer exists. Use `ClassicHttpResponse.getCode()` to retrieve the HTTP status code directly.

    ## Before
    ```java
    if (response.getStatusLine().getStatusCode() >= 300) {
        throw new ClientProtocolException(Objects.toString(response.getStatusLine()));
    }
    ```

    ## After
    ```java
    if (response.getCode() >= 300) {
        throw new HttpException("Unexpected status: " + response.getCode());
    }
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.HttpResponse.getStatusLine
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00100
  description: ClientProtocolException removed in HttpClient 5.x; use HttpException instead
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `org.apache.http.client.ClientProtocolException` has been removed in Apache HttpClient 5.x. Replace it with `org.apache.hc.core5.http.HttpException` or a more appropriate exception from the HttpClient 5.x API.

    ## Before
    ```java
    import org.apache.http.client.ClientProtocolException;
    // ...
    throw new ClientProtocolException(Objects.toString(response.getStatusLine()));
    ```

    ## After
    ```java
    import org.apache.hc.core5.http.HttpException;
    // ...
    throw new HttpException("Unexpected response: " + response.getCode());
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.client.ClientProtocolException
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00110
  description: setCookieSpec(String) replaced by setCookieSpec(StandardCookieSpec) enum in HttpClient 5.x
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `RequestConfig.Builder.setCookieSpec(String)` accepting a string constant from `CookieSpecs` has been replaced by `setCookieSpec(StandardCookieSpec)` using an enum value in Apache HttpClient 5.x. The `StandardCookieSpec.STRICT` constant is still available in HttpClient 5.x under the updated package.

    ## Before
    ```java
    RequestConfig.custom()
        .setCookieSpec(StandardCookieSpec.STRICT)
        .build();
    ```

    ## After
    ```java
    RequestConfig.custom()
        .setCookieSpec(StandardCookieSpec.STRICT)
        .build(); // package import must be updated to org.apache.hc.*
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setCookieSpec
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00120
  description: Apache HttpClient 4.x (org.apache.http) package namespace replaced by org.apache.hc.httpclient5
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Apache HttpClient 4.x uses the `org.apache.http` package namespace which has been replaced by `org.apache.hc.httpclient5` (and `org.apache.hc.core5`) in HttpClient 5.x. Remove all `org.apache.http` imports and re-import HttpClient classes from the new package namespace. Most old interfaces and classes resolve automatically after re-importing.

    ## Before
    ```java
    import org.apache.http.client.HttpClient;
    import org.apache.http.impl.client.HttpClients;
    ```

    ## After
    ```java
    import org.apache.hc.client5.http.classic.HttpClient;
    import org.apache.hc.client5.http.impl.classic.HttpClients;
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http*
        location: PACKAGE
- ruleID: httpclient-4-to-httpclient-5-00130
  description: BasicHttpContext replaced by HttpCoreContext or HttpClientContext in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `BasicHttpContext` (from `org.apache.http.protocol`) has been replaced in HttpClient 5.x. Use `HttpCoreContext` (`org.apache.hc.core5.http.protocol.HttpCoreContext`) for basic context needs or `HttpClientContext` (`org.apache.hc.client5.http.protocol.HttpClientContext`) for client-specific context. Replace usages of `new BasicHttpContext()` with `HttpCoreContext.create()` or `HttpClientContext.create()`.

    ## Before
    ```java
    import org.apache.http.protocol.BasicHttpContext;
    HttpContext context = new BasicHttpContext();
    ```

    ## After
    ```java
    import org.apache.hc.client5.http.protocol.HttpClientContext;
    HttpClientContext context = HttpClientContext.create();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.protocol.BasicHttpContext
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00160
  description: addInterceptorLast() replaced by addExecInterceptorFirst() with a name parameter in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `HttpClients.custom().addInterceptorLast()` has been replaced by `HttpClients.custom().addExecInterceptorFirst()` in HttpClient 5.x. The new method requires an additional `name` string parameter to identify the interceptor. The interceptor interface has also changed — use `ExecChainHandler` instead of `HttpResponseInterceptor`.

    ## Before
    ```java
    HttpClients.custom().addInterceptorLast(someLoggingInterceptor);
    ```

    ## After
    ```java
    HttpClients.custom().addExecInterceptorFirst("logging", someLoggingInterceptor);
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: addInterceptorLast
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00180
  description: setRetryHandler() renamed to setRetryStrategy() in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `HttpClients.custom().setRetryHandler(HttpRequestRetryHandler)` has been renamed to `setRetryStrategy(HttpRequestRetryStrategy)` in HttpClient 5.x. The `HttpRequestRetryHandler` interface has been replaced by `HttpRequestRetryStrategy` which provides more flexible retry control.

    ## Before
    ```java
    HttpClients.custom().setRetryHandler(myRetryHandler);
    ```

    ## After
    ```java
    HttpClients.custom().setRetryStrategy(myRetryStrategy);
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setRetryHandler
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00190
  description: HttpCoreContext.HTTP_TARGET_HOST attribute access replaced by HttpClientContext.getHttpRoute().getTargetHost()
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `HttpCoreContext.HTTP_TARGET_HOST` constant and the `HttpContext.getAttribute(HttpCoreContext.HTTP_TARGET_HOST)` pattern have been replaced in HttpClient 5.x. Use `HttpClientContext.getHttpRoute().getTargetHost()` instead.

    ## Before
    ```java
    HttpHost target = (HttpHost) context.getAttribute(HttpCoreContext.HTTP_TARGET_HOST);
    ```

    ## After
    ```java
    HttpHost target = clientContext.getHttpRoute().getTargetHost();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: HTTP_TARGET_HOST
        filePattern: .*\.java
- ruleID: httpclient-4-to-httpclient-5-00210
  description: HttpEntityEnclosingRequest replaced by HttpEntityContainer in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `HttpEntityEnclosingRequest` interface has been replaced by `HttpEntityContainer` in HttpClient 5.x. In HttpClient 5.x, any HTTP method can enclose a request entity even if it violates the semantic of the method — the separate `HttpEntityEnclosingRequest` interface is no longer needed.

    ## Before
    ```java
    import org.apache.http.HttpEntityEnclosingRequest;
    ```

    ## After
    ```java
    import org.apache.hc.core5.http.HttpEntityContainer;
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.HttpEntityEnclosingRequest
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00220
  description: getAllHeaders() renamed to getHeaders() and moved to MessageHeaders interface in HttpClient 5.x
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `HttpMessage.getAllHeaders()` has been renamed to `MessageHeaders.getHeaders()` in HttpClient 5.x. The method is now defined on the `MessageHeaders` interface.

    ## Before
    ```java
    Header[] headers = response.getAllHeaders();
    ```

    ## After
    ```java
    Iterator<Header> headers = response.headerIterator();
    // or use getHeaders() which returns an Iterator<Header>
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: getAllHeaders
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00230
  description: getRequestLine() removed in HttpClient 5.x; use new RequestLine(request) instead
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `HttpRequest.getRequestLine()` has been removed in HttpClient 5.x. To get request line information, wrap the request in `new RequestLine(request)` which constructs a `RequestLine` object from the request.

    ## Before
    ```java
    RequestLine requestLine = request.getRequestLine();
    String method = requestLine.getMethod();
    ```

    ## After
    ```java
    RequestLine requestLine = new RequestLine(request);
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: getRequestLine
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00240
  description: HttpRequestBase replaced by HttpUriRequestBase in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `HttpRequestBase` (from `org.apache.http.client.methods`) has been replaced by `HttpUriRequestBase` in HttpClient 5.x (`org.apache.hc.client5.http.classic.methods.HttpUriRequestBase`). Update subclasses and usage of `HttpRequestBase` to use `HttpUriRequestBase`.

    ## Before
    ```java
    import org.apache.http.client.methods.HttpRequestBase;
    public class CustomRequest extends HttpRequestBase { ... }
    ```

    ## After
    ```java
    import org.apache.hc.client5.http.classic.methods.HttpUriRequestBase;
    public class CustomRequest extends HttpUriRequestBase { ... }
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.client.methods.HttpRequestBase
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00250
  description: HttpResponse renamed to ClassicHttpResponse in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `HttpResponse` (from `org.apache.http`) has been renamed to `ClassicHttpResponse` in HttpClient 5.x. Update all usages to import and use `org.apache.hc.core5.http.ClassicHttpResponse` or `org.apache.hc.client5.http.classic.methods.ClassicHttpResponse` depending on the context.

    ## Before
    ```java
    import org.apache.http.HttpResponse;
    HttpResponse response = client.execute(request);
    ```

    ## After
    ```java
    import org.apache.hc.core5.http.ClassicHttpResponse;
    ClassicHttpResponse response = client.execute(request, r -> r);
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.HttpResponse
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00260
  description: RequestConfig.normalizeUri property removed; URIUtils.normalizeSyntax no longer public in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `RequestConfig` property `normalizeUri` has been removed in HttpClient 5.x, and `URIUtils.normalizeSyntax` is no longer a public API. For URI normalization, use the public `URIBuilder.normalizeSyntax()` method (available since 5.3, renamed to `optimize()`).

    ## Before
    ```java
    RequestConfig.custom().setNormalizeUri(true).build();
    // or
    URIUtils.normalizeSyntax(uri);
    ```

    ## After
    ```java
    new URIBuilder(uri).normalizeSyntax().build();
    // or since 5.3:
    new URIBuilder(uri).optimize().build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: normalizeUri
        filePattern: .*\.java
- ruleID: httpclient-4-to-httpclient-5-00280
  description: CloseableHttpClient replaced by CloseableHttpAsyncClient when adopting async APIs
  category: mandatory
  effort: 7
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    When migrating to HttpClient 5.x async APIs, replace `CloseableHttpClient` with `CloseableHttpAsyncClient` (created via `HttpAsyncClients.custom()`). Unlike the classic client, the async client must be explicitly started before executing requests by calling `client.start()`. Close with `client.close(CloseMode.GRACEFUL)` instead of `client.close()`.

    ```java
    // Before (HttpClient 4.x)
    CloseableHttpClient client = HttpClients.custom()
        .setDefaultRequestConfig(requestConfig)
        .build();

    // After (HttpClient 5.x async)
    CloseableHttpAsyncClient client = HttpAsyncClients.custom()
        .setConnectionManager(connectionManager)
        .setDefaultRequestConfig(requestConfig)
        .build();
    client.start(); // Required — async client must be started
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-async-simple.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.impl.client.CloseableHttpClient
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00290
  description: HttpClients.custom() replaced by HttpAsyncClients.custom() in the async migration path
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    When migrating to HttpClient 5.x async APIs, replace `HttpClients.custom()` with `HttpAsyncClients.custom()` to build the async client. The builder accepts `setConnectionManager(PoolingAsyncClientConnectionManager)` and `setIOReactorConfig(IOReactorConfig)` for I/O reactor configuration instead of `setDefaultSocketConfig()`.

    ```java
    // Before (HttpClient 4.x)
    CloseableHttpClient client = HttpClients.custom()
        .setDefaultSocketConfig(socketConfig)
        .build();

    // After (HttpClient 5.x async)
    CloseableHttpAsyncClient client = HttpAsyncClients.custom()
        .setConnectionManager(connectionManager)
        .setIOReactorConfig(IOReactorConfig.custom()
                .setSoTimeout(Timeout.ofMinutes(1))
                .build())
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-async-simple.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.impl.client.HttpClients.custom
        location: METHOD_CALL
