- ruleID: httpclient-4-to-httpclient-5-00050
  description: setConnectTimeout(int) replaced by setConnectTimeout(Timeout) in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `setConnectTimeout(int milliseconds)` has been replaced by `setConnectTimeout(Timeout)` in Apache HttpClient 5.x. The raw milliseconds integer parameter is replaced by a `org.apache.hc.core5.util.Timeout` object. Additionally, `setConnectTimeout` in `RequestConfig` was moved to `ConnectionConfig` in HttpClient 5.x.

    ## Before
    ```java
    RequestConfig.custom()
        .setConnectTimeout(60000)
        .build();
    ```

    ## After
    ```java
    ConnectionConfig.custom()
        .setConnectTimeout(Timeout.ofSeconds(60))
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setConnectTimeout
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00060
  description: setSocketTimeout(int) moved from RequestConfig to ConnectionConfig and changed to Timeout parameter in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `setSocketTimeout(int milliseconds)` has been removed from `RequestConfig.Builder` in Apache HttpClient 5.x. Socket timeout is now configured via `ConnectionConfig.Builder.setSocketTimeout(Timeout)` using the `org.apache.hc.core5.util.Timeout` type.

    ## Before
    ```java
    RequestConfig.custom()
        .setSocketTimeout(60000)
        .build();
    ```

    ## After
    ```java
    ConnectionConfig.custom()
        .setSocketTimeout(Timeout.ofSeconds(60))
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setSocketTimeout
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00070
