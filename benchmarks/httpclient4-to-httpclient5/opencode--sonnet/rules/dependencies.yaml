- ruleID: httpclient-4-to-httpclient-5-00020
  description: Apache HttpClient 4.x artifact (org.apache.httpcomponents:httpclient) removed; replaced by org.apache.httpcomponents.client5:httpclient5
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The Apache HttpClient 4.x Maven artifact `org.apache.httpcomponents:httpclient` has been superseded by `org.apache.httpcomponents.client5:httpclient5` in HttpClient 5.x. Remove the old dependency and add the new one.

    ## Before
    ```xml
    <dependency>
      <groupId>org.apache.httpcomponents</groupId>
      <artifactId>httpclient</artifactId>
      <version>4.5.14</version>
    </dependency>
    ```

    ## After
    ```xml
    <dependency>
      <groupId>org.apache.httpcomponents.client5</groupId>
      <artifactId>httpclient5</artifactId>
      <version>5.4.x</version>
    </dependency>
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.dependency:
        name: org.apache.httpcomponents.httpclient
        lowerbound: 0.0.0
- ruleID: httpclient-4-to-httpclient-5-00030
