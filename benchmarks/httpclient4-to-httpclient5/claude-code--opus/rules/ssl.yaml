- ruleID: httpclient-4-to-httpclient-5-00040
  description: SSLConnectionSocketFactory replaced by ClientTlsStrategyBuilder in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `SSLConnectionSocketFactory` has been replaced by `ClientTlsStrategyBuilder` for configuring TLS/SSL. Use `ClientTlsStrategyBuilder.create()` to build TLS strategies, calling `.buildClassic()` for classic HTTP clients or `.buildAsync()` for async clients.

    ## Before
    ```java
    new SSLConnectionSocketFactory(
        SSLContexts.createSystemDefault(),
        new String[] { "TLSv1.2" },
        null,
        SSLConnectionSocketFactory.getDefaultHostnameVerifier())
    ```

    ## After
    ```java
    ClientTlsStrategyBuilder.create()
        .setSslContext(SSLContexts.createSystemDefault())
        .setTlsVersions(TLS.V_1_3)
        .buildClassic()
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.conn.ssl.SSLConnectionSocketFactory
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00050
  description: setSSLSocketFactory() replaced by setTlsSocketStrategy() on connection manager builder
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `setSSLSocketFactory()` on `HttpClientBuilder` has been removed. SSL/TLS configuration is now done on the connection manager via `PoolingHttpClientConnectionManagerBuilder.create().setTlsSocketStrategy()`. Use `ClientTlsStrategyBuilder` to create the TLS strategy.

    ## Before
    ```java
    HttpClients.custom()
        .setSSLSocketFactory(new SSLConnectionSocketFactory(...))
        .build();
    ```

    ## After
    ```java
    PoolingHttpClientConnectionManager cm = PoolingHttpClientConnectionManagerBuilder.create()
        .setTlsSocketStrategy(ClientTlsStrategyBuilder.create()
            .setSslContext(SSLContexts.createSystemDefault())
            .setTlsVersions(TLS.V_1_3)
            .buildClassic())
        .build();
    HttpClients.custom().setConnectionManager(cm).build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setSSLSocketFactory
        location: METHOD_CALL
