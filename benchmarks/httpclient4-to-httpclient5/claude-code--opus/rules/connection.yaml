- ruleID: httpclient-4-to-httpclient-5-00060
  description: setConnectionTimeToLive() moved to ConnectionConfig.setTimeToLive() with TimeValue parameter
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `setConnectionTimeToLive(long, TimeUnit)` on `HttpClientBuilder` has been moved to `ConnectionConfig.custom().setTimeToLive(TimeValue)`. The time-to-live is now configured on the connection config, not the client builder. Note: HttpClient 5.0 treats zero TTL as an instruction that connections are not meant to be re-used (unlike 4.x where zero meant unlimited).

    ## Before
    ```java
    HttpClients.custom()
        .setConnectionTimeToLive(1, TimeUnit.MINUTES)
        .build();
    ```

    ## After
    ```java
    ConnectionConfig connConfig = ConnectionConfig.custom()
        .setTimeToLive(TimeValue.ofMinutes(10))
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setConnectionTimeToLive
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00070
  description: setConnectTimeout() moved from RequestConfig to ConnectionConfig with Timeout parameter
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `setConnectTimeout(int)` has been moved from `RequestConfig` to `ConnectionConfig` and now takes a `Timeout` parameter instead of a raw integer. Configure connect timeout on `ConnectionConfig.custom()` and apply it via the connection manager.

    ## Before
    ```java
    RequestConfig.custom()
        .setConnectTimeout(60000)
        .build();
    ```

    ## After
    ```java
    ConnectionConfig.custom()
        .setConnectTimeout(Timeout.ofMinutes(1))
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setConnectTimeout
        location: METHOD_CALL
