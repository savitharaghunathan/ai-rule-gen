- ruleID: httpclient-4-to-httpclient-5-00120
  description: setDefaultSocketConfig() moved from HttpClientBuilder to connection manager builder
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `setDefaultSocketConfig()` has been moved from `HttpClientBuilder` (`HttpClients.custom()`) to `PoolingHttpClientConnectionManagerBuilder`. Create a connection manager with the desired socket configuration and pass it to the client builder via `setConnectionManager()`.

    ## Before
    ```java
    HttpClients.custom()
        .setDefaultSocketConfig(SocketConfig.custom()
            .setSoTimeout(60000)
            .build())
        .build();
    ```

    ## After
    ```java
    PoolingHttpClientConnectionManager cm = PoolingHttpClientConnectionManagerBuilder.create()
        .setDefaultSocketConfig(SocketConfig.custom()
            .setSoTimeout(Timeout.ofMinutes(1))
            .build())
        .build();
    HttpClients.custom().setConnectionManager(cm).build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setDefaultSocketConfig
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00190
  description: closeExpiredConnections() renamed to closeExpired() in HttpClient 5.x
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The method `closeExpiredConnections()` on `HttpClientConnectionManager` has been renamed to `closeExpired()` on the `ConnPoolControl` interface in HttpClient 5.x.

    Before:
    ```java
    connectionManager.closeExpiredConnections();
    ```
    After:
    ```java
    connectionManager.closeExpired();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: closeExpiredConnections
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00200
  description: closeIdleConnections() renamed to closeIdle() in HttpClient 5.x
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The method `closeIdleConnections()` on `HttpClientConnectionManager` has been renamed to `closeIdle()` on the `ConnPoolControl` interface in HttpClient 5.x.

    Before:
    ```java
    connectionManager.closeIdleConnections(30, TimeUnit.SECONDS);
    ```
    After:
    ```java
    connectionManager.closeIdle(TimeValue.ofSeconds(30));
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: closeIdleConnections
        location: METHOD_CALL
