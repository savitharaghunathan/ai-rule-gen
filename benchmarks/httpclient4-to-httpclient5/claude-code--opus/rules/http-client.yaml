- ruleID: httpclient-4-to-httpclient-5-00010
  description: org.apache.http package namespace replaced by org.apache.hc in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Apache HttpClient 5.x uses a new package namespace. Remove old `org.apache.http` imports and re-import HttpClient classes from `org.apache.hc.client5` (client classes) and `org.apache.hc.core5` (core classes) packages. Most old interfaces and classes should resolve automatically under the new namespace, with some notable exceptions like `HttpEntityEnclosingRequest` which is replaced by `HttpEntityContainer`.

    ## Before
    ```java
    import org.apache.http.HttpResponse;
    import org.apache.http.client.methods.HttpGet;
    import org.apache.http.impl.client.HttpClients;
    ```

    ## After
    ```java
    import org.apache.hc.client5.http.classic.methods.HttpGet;
    import org.apache.hc.client5.http.impl.classic.HttpClients;
    import org.apache.hc.core5.http.ClassicHttpResponse;
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http*
        location: PACKAGE
- ruleID: httpclient-4-to-httpclient-5-00090
  description: HttpPost constructor replaced by ClassicRequestBuilder or SimpleRequestBuilder in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `new HttpPost(url)` is replaced by request builders. For classic APIs use `ClassicRequestBuilder.post(url).build()`, for async simple APIs use `SimpleRequestBuilder.post(url).build()`, and for async streaming APIs use `BasicRequestBuilder.post(url).build()` with appropriate request producers.

    ## Before
    ```java
    HttpPost httpPost = new HttpPost("https://httpbin.org/post");
    httpPost.setEntity(requestEntity);
    ```

    ## After (classic)
    ```java
    ClassicHttpRequest httpPost = ClassicRequestBuilder.post("https://httpbin.org/post")
        .setEntity(HttpEntities.create(outstream -> { ... }, ContentType.APPLICATION_JSON))
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.client.methods.HttpPost
        location: CONSTRUCTOR_CALL
- ruleID: httpclient-4-to-httpclient-5-00100
  description: EntityTemplate replaced by HttpEntities.create() factory methods in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `EntityTemplate` has been replaced by `HttpEntities.create()` factory methods. Content type is now set inline when creating the entity rather than via a separate `setContentType()` call.

    ## Before
    ```java
    EntityTemplate requestEntity = new EntityTemplate(outstream -> {
        objectMapper.writeValue(outstream, requestData);
        outstream.flush();
    });
    requestEntity.setContentType(ContentType.APPLICATION_JSON.toString());
    httpPost.setEntity(requestEntity);
    ```

    ## After
    ```java
    ClassicRequestBuilder.post(url)
        .setEntity(HttpEntities.create(outstream -> {
            objectMapper.writeValue(outstream, requestData);
            outstream.flush();
        }, ContentType.APPLICATION_JSON))
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.entity.EntityTemplate
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00110
  description: getStatusLine() removed in HttpClient 5.x; use getCode() for status code
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, HTTP response messages no longer have a status line. `response.getStatusLine().getStatusCode()` is replaced by `response.getCode()`. If you need the full status line representation, use `new StatusLine(response).toString()`.

    ## Before
    ```java
    if (response.getStatusLine().getStatusCode() >= 300) {
        throw new ClientProtocolException(
            Objects.toString(response.getStatusLine()));
    }
    ```

    ## After
    ```java
    if (response.getCode() >= 300) {
        throw new ClientProtocolException(
            new StatusLine(response).toString());
    }
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.HttpResponse.getStatusLine
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00130
  description: org.apache.http package replaced by org.apache.hc.httpclient5 in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: Remove old `org.apache.http` imports and re-import HttpClient classes from the `org.apache.hc.httpclient5` package namespace. Most old interfaces and classes should resolve automatically after re-importing. HttpClient 5.x releases can be co-located with earlier major versions on the same classpath due to versioned package namespace and Maven module coordinates.
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http
        location: PACKAGE
- ruleID: httpclient-4-to-httpclient-5-00140
  description: HttpEntityEnclosingRequest replaced by HttpEntityContainer in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `HttpEntityEnclosingRequest` interface has been replaced by `HttpEntityContainer` in HttpClient 5.x. In HttpClient 5.x, one can enclose a request entity with any HTTP method even if it violates the semantics of the method, so the separate `HttpEntityEnclosingRequest` interface is no longer needed.

    Replace:
    ```java
    import org.apache.http.HttpEntityEnclosingRequest;
    ```
    With:
    ```java
    import org.apache.hc.core5.http.HttpEntityContainer;
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.HttpEntityEnclosingRequest
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00150
  description: getRequestLine() removed; use new RequestLine(request) in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `getRequestLine()` method has been removed from `HttpRequest` in HttpClient 5.x. Instead, construct a `RequestLine` object directly from the request.

    Before:
    ```java
    request.getRequestLine()
    ```
    After:
    ```java
    new RequestLine(request)
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.HttpRequest.getRequestLine
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00160
  description: getAllHeaders() renamed to getHeaders() in HttpClient 5.x
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The method `getAllHeaders()` on `HttpMessage` has been renamed to `getHeaders()` on the `MessageHeaders` interface in HttpClient 5.x.

    Before:
    ```java
    Header[] headers = response.getAllHeaders();
    ```
    After:
    ```java
    Header[] headers = response.getHeaders();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.HttpMessage.getAllHeaders
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00170
  description: HttpRequestBase replaced by HttpUriRequestBase in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `HttpRequestBase` class has been replaced by `HttpUriRequestBase` in HttpClient 5.x. Update your code to extend or use `HttpUriRequestBase` instead.

    Before:
    ```java
    import org.apache.http.client.methods.HttpRequestBase;
    ```
    After:
    ```java
    import org.apache.hc.client5.http.classic.methods.HttpUriRequestBase;
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.client.methods.HttpRequestBase
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00180
  description: BasicHttpContext replaced by HttpCoreContext or HttpClientContext in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `BasicHttpContext` class has been replaced in HttpClient 5.x. Use `HttpCoreContext` for core HTTP context or `HttpClientContext` for client-specific context.

    Before:
    ```java
    import org.apache.http.protocol.BasicHttpContext;
    HttpContext context = new BasicHttpContext();
    ```
    After:
    ```java
    import org.apache.hc.core5.http.protocol.HttpCoreContext;
    // or
    import org.apache.hc.client5.http.protocol.HttpClientContext;
    HttpClientContext context = HttpClientContext.create();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.protocol.BasicHttpContext
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00210
  description: addInterceptorLast() replaced by addExecInterceptorFirst() in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The method `addInterceptorLast()` for adding logging interceptors has been replaced by `addExecInterceptorFirst()` in HttpClient 5.x. Using `addExecInterceptorFirst()` ensures the interceptor runs before compression, so the logged payload is not compressed.

    Before:
    ```java
    HttpClients.custom().addInterceptorLast(loggingInterceptor);
    ```
    After:
    ```java
    HttpClients.custom().addExecInterceptorFirst("logging", loggingInterceptor);
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: addInterceptorLast
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00220
  description: setRetryHandler() replaced by setRetryStrategy() in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The method `setRetryHandler(HttpRequestRetryHandler)` has been replaced by `setRetryStrategy(HttpRequestRetryStrategy)` in HttpClient 5.x. The new strategy interface provides more flexible retry control.

    Before:
    ```java
    HttpClients.custom().setRetryHandler(myRetryHandler);
    ```
    After:
    ```java
    HttpClients.custom().setRetryStrategy(myRetryStrategy);
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setRetryHandler
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00230
  description: HTTP_TARGET_HOST constant removed; use HttpClientContext.getHttpRoute().getTargetHost()
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The static constant `HttpCoreContext.HTTP_TARGET_HOST` used with `HttpContext.getAttribute()` has been removed in HttpClient 5.x. Use `HttpClientContext.getHttpRoute().getTargetHost()` instead.

    Before:
    ```java
    HttpHost target = (HttpHost) context.getAttribute(HttpCoreContext.HTTP_TARGET_HOST);
    ```
    After:
    ```java
    HttpHost target = clientContext.getHttpRoute().getTargetHost();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: HttpCoreContext\.HTTP_TARGET_HOST
        filePattern: .*\.java
- ruleID: httpclient-4-to-httpclient-5-00250
  description: URIUtils.normalizeSyntax() removed; use URIBuilder.optimize() in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `URIUtils.normalizeSyntax` method is no longer public in HttpClient 5.x, and the `normalizeUri` property in `RequestConfig` has been removed. The 5.x `URIBuilder` has a public `normalizeSyntax` method (deprecated since 5.3, renamed to `optimize`) that provides more thorough RFC 3986 support, specifically percent-encoding all components. Note that the behavior differs from 4.x — the 5.x version strives for more thorough normalization.

    Before:
    ```java
    URI normalized = URIUtils.normalizeSyntax(uri);
    ```
    After:
    ```java
    URI normalized = new URIBuilder(uri).optimize().build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.client.utils.URIUtils
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00260
  description: HTTP_CONNECTION constant removed; use typed context accessors in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The static constant `HttpCoreContext.HTTP_CONNECTION` used with `HttpContext.getAttribute()` and casting to `ManagedHttpClientConnection` has been removed in HttpClient 5.x. Use typed context accessor methods instead.

    Before:
    ```java
    ManagedHttpClientConnection conn = (ManagedHttpClientConnection) context.getAttribute(HttpCoreContext.HTTP_CONNECTION);
    SSLSession sslSession = conn.getSSLSession();
    ```
    After:
    ```java
    SSLSession sslSession = context.getSSLSession();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: HttpCoreContext\.HTTP_CONNECTION
        filePattern: .*\.java
