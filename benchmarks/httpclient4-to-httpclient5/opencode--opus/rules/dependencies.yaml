- ruleID: httpclient4-to-httpclient5-00090
  description: HttpClient 4.x dependency replaced by org.apache.httpcomponents.client5:httpclient5
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/target=httpclient5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    Apache HttpClient 4.x (`org.apache.httpcomponents:httpclient`) has been replaced by HttpClient 5.x (`org.apache.httpcomponents.client5:httpclient5`). Replace the Maven dependency coordinates and update imports from `org.apache.http` to `org.apache.hc.client5.http`.

    ## Before
    ```xml
    <dependency>
        <groupId>org.apache.httpcomponents</groupId>
        <artifactId>httpclient</artifactId>
        <version>4.5.14</version>
    </dependency>
    ```

    ## After
    ```xml
    <dependency>
        <groupId>org.apache.httpcomponents.client5</groupId>
        <artifactId>httpclient5</artifactId>
        <version>5.4</version>
    </dependency>
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.dependency:
        name: org.apache.httpcomponents.httpclient
        lowerbound: 0.0.0
