- ruleID: httpclient4-to-httpclient5-00220
  description: normalizeUri property removed from RequestConfig in 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/target=httpclient5
    - konveyor.io/generated-by=ai-rule-gen
  message: 'The `normalizeUri` property has been removed from `RequestConfig` in HttpClient 5.x. The 5.x `URIBuilder` has a `normalizeSyntax()` method (deprecated since 5.3, renamed to `optimize()`) that provides more thorough RFC 3986 support including percent-encoding of all components. Note the behavioral difference: 5.x normalization is more aggressive than 4.x.'
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    builtin.filecontent:
        pattern: normalizeUri
        filePattern: .*\.java
- ruleID: httpclient4-to-httpclient5-00230
  description: URIUtils.normalizeSyntax() no longer public; use URIBuilder.optimize()
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/target=httpclient5
    - konveyor.io/generated-by=ai-rule-gen
  message: The `URIUtils.normalizeSyntax()` method is no longer public in HttpClient 5.x. Use `URIBuilder.optimize()` instead (the 5.x `URIBuilder.normalizeSyntax()` was deprecated since 5.3 and renamed to `optimize()`). Note that 5.x normalization is more thorough, including percent-encoding all URI components per RFC 3986.
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.client.utils.URIUtils.normalizeSyntax
        location: METHOD_CALL
