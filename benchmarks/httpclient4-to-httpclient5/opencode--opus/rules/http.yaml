- ruleID: httpclient4-to-httpclient5-00110
  description: HttpEntityEnclosingRequest replaced by HttpEntityContainer in 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/target=httpclient5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `HttpEntityEnclosingRequest` interface has been replaced by `HttpEntityContainer` in HttpClient 5.x. In 5.x, any HTTP method can enclose a request entity, so the separate `HttpEntityEnclosingRequest` interface is no longer needed.

    ## Before
    ```java
    import org.apache.http.HttpEntityEnclosingRequest;
    ```

    ## After
    ```java
    import org.apache.hc.core5.http.HttpEntityContainer;
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.HttpEntityEnclosingRequest
        location: IMPORT
- ruleID: httpclient4-to-httpclient5-00120
  description: BasicHttpContext replaced by HttpCoreContext or HttpClientContext in 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/target=httpclient5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `BasicHttpContext` class has been replaced. Use `HttpCoreContext` for core operations or `HttpClientContext` for client-level context.

    ## Before
    ```java
    import org.apache.http.protocol.BasicHttpContext;
    HttpContext context = new BasicHttpContext();
    ```

    ## After
    ```java
    import org.apache.hc.core5.http.protocol.HttpCoreContext;
    HttpCoreContext context = HttpCoreContext.create();
    // or
    import org.apache.hc.client5.http.protocol.HttpClientContext;
    HttpClientContext context = HttpClientContext.create();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.protocol.BasicHttpContext
        location: IMPORT
- ruleID: httpclient4-to-httpclient5-00130
  description: HttpRequestBase renamed to HttpUriRequestBase in 5.x
  category: mandatory
  effort: 3
  labels:
