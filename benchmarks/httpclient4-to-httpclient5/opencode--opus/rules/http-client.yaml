- ruleID: httpclient4-to-httpclient5-00080
  description: setConnectionTimeToLive() renamed to setTimeToLive() on ConnectionConfig in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/target=httpclient5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `setConnectionTimeToLive(long, TimeUnit)` on the client builder has been replaced by `ConnectionConfig.custom().setTimeToLive(TimeValue)`. Configure the time-to-live on the connection configuration, not the client builder.

    ## Before
    ```java
    HttpClients.custom()
        .setConnectionTimeToLive(1, TimeUnit.MINUTES)
        .build();
    ```

    ## After
    ```java
    ConnectionConfig.custom()
        .setTimeToLive(TimeValue.ofMinutes(10))
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/preparation.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setConnectionTimeToLive
        location: METHOD_CALL
