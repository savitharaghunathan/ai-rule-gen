    import org.apache.hc.client5.http.HttpResponseException;
    ```

    ### Additional Info
    - All exception classes under `org.apache.http.client` have moved to `org.apache.hc.client5.http`
    - Exception handling patterns remain the same
    - When using status line info in exceptions, use `new StatusLine(response).toString()` instead of `response.getStatusLine().toString()`
    - Favor the response handler pattern which throws `ClientProtocolException` automatically on error codes
