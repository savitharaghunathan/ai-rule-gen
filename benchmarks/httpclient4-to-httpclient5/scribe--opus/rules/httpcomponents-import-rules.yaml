- ruleID: httpcomponents-00027
  description: "Detects Java import: org.apache.http.config.SocketConfig"
  message: |
    ## Migration Required: SocketConfig Package Change and Location

    ### Before
    In HttpComponents Client 4.x, `SocketConfig` is in `org.apache.http.config` and set on the client builder:
    ```java
    import org.apache.http.config.SocketConfig;

    CloseableHttpClient client = HttpClients.custom()
        .setDefaultSocketConfig(SocketConfig.custom()
            .setSoTimeout(60000)
            .build())
        .build();
    ```

    ### After
    In HttpComponents Client 5.x, `SocketConfig` has moved and is set on the connection manager builder:
    ```java
    import org.apache.hc.core5.http.io.SocketConfig;
    import org.apache.hc.core5.util.Timeout;

    PoolingHttpClientConnectionManager cm = PoolingHttpClientConnectionManagerBuilder.create()
        .setDefaultSocketConfig(SocketConfig.custom()
            .setSoTimeout(Timeout.ofMinutes(1))
            .build())
        .build();

    CloseableHttpClient client = HttpClients.custom()
        .setConnectionManager(cm)
        .build();
    ```

    ### Additional Info
    - `SocketConfig` has moved from `org.apache.http.config` to `org.apache.hc.core5.http.io`
    - Socket configuration is now set on the connection manager builder, not the client builder
    - `setSoTimeout(int)` now requires a `Timeout` object: `Timeout.ofMinutes(1)` or `Timeout.ofSeconds(30)`
    - The `setDefaultSocketConfig()` method on `HttpClientBuilder` has been removed
    - For async clients, socket timeout is configured via `IOReactorConfig` instead
  category: mandatory
  effort: 3
  labels:
  - konveyor.io/source=httpcomponents4
  - konveyor.io/target=httpcomponents5
  links:
  - title: "Apache HttpComponents Client 5.x Migration Guide - Classic API"
    url: "https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide/migration-to-classic.html"
  when:
    java.referenced:
      pattern: "org.apache.http.config.SocketConfig"
      location: IMPORT
