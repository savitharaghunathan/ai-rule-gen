- ruleID: httpclient4-to-httpclient5-00070
  description: SSLConnectionSocketFactory replaced by ClientTlsStrategyBuilder in 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpclient
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpclient
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `SSLConnectionSocketFactory` class has been replaced in HttpClient 5.x. Use `ClientTlsStrategyBuilder` to create TLS connection strategies with custom parameters.

    ## Before
    ```java
    import org.apache.http.conn.ssl.SSLConnectionSocketFactory;
    SSLConnectionSocketFactory sslsf = new SSLConnectionSocketFactory(
            SSLContexts.createSystemDefault(),
            new String[]{"TLSv1.2"}, null,
            SSLConnectionSocketFactory.getDefaultHostnameVerifier());
    HttpClients.custom().setSSLSocketFactory(sslsf);
    ```

    ## After
    ```java
    import org.apache.hc.client5.http.ssl.ClientTlsStrategyBuilder;
    PoolingHttpClientConnectionManagerBuilder.create()
        .setTlsSocketStrategy(ClientTlsStrategyBuilder.create()
                .setSslContext(SSLContexts.createSystemDefault())
                .setTlsVersions(TLS.V_1_3)
                .buildClassic())
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.conn.ssl.SSLConnectionSocketFactory
        location: IMPORT
- ruleID: httpclient4-to-httpclient5-00090
  description: ManagedHttpClientConnection cast removed; use HttpCoreContext.getSSLSession()
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpclient
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpclient
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The pattern of casting `HttpContext.getAttribute(HttpCoreContext.HTTP_CONNECTION)` to `ManagedHttpClientConnection` to access the SSL session has been simplified in HttpClient 5.x. Use `HttpCoreContext.getSSLSession()` directly.

    ## Before
    ```java
    import org.apache.http.conn.ManagedHttpClientConnection;
    ManagedHttpClientConnection conn = (ManagedHttpClientConnection)
        context.getAttribute(HttpCoreContext.HTTP_CONNECTION);
    SSLSession sslSession = conn.getSSLSession();
    ```

    ## After
    ```java
    SSLSession sslSession = context.getSSLSession();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.conn.ManagedHttpClientConnection
        location: IMPORT
