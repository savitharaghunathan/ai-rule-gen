- ruleID: httpclient4-to-httpclient5-00220
  description: setDefaultSocketConfig() moved from HttpClientBuilder to connection manager builder
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpclient
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpclient
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `setDefaultSocketConfig()` method has been removed from `HttpClientBuilder` in HttpClient 5.x. Configure socket settings via `PoolingHttpClientConnectionManagerBuilder` or `BasicHttpClientConnectionManager` instead.

    ## Before
    ```java
    HttpClients.custom()
        .setDefaultSocketConfig(SocketConfig.custom()
            .setSoTimeout(60000)
            .build())
        .build();
    ```

    ## After
    ```java
    PoolingHttpClientConnectionManager cm = PoolingHttpClientConnectionManagerBuilder.create()
        .setDefaultSocketConfig(SocketConfig.custom()
            .setSoTimeout(Timeout.ofMinutes(1))
            .build())
        .build();
    HttpClients.custom().setConnectionManager(cm).build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setDefaultSocketConfig
        location: METHOD_CALL
