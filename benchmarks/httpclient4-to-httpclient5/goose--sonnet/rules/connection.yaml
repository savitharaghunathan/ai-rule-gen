    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `closeIdleConnections()` method on `HttpClientConnectionManager` has been renamed to `closeIdle()` on the `ConnPoolControl` interface in HttpClient 5.x.

    ## Before
    ```java
    connectionManager.closeIdleConnections(30, TimeUnit.SECONDS);
    ```

    ## After
    ```java
    connectionManager.closeIdle(TimeValue.ofSeconds(30));
    ```
