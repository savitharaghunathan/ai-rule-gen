- ruleID: httpclient4-to-httpclient5-00170
  description: setConnectionTimeToLive() moved to ConnectionConfig.setTimeToLive() in 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpclient
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpclient
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `setConnectionTimeToLive(long, TimeUnit)` method on `HttpClientBuilder` has been moved to `ConnectionConfig.custom().setTimeToLive(TimeValue)` in HttpClient 5.x. Use `TimeValue` instead of raw `long` + `TimeUnit`.

    ## Before
    ```java
    HttpClients.custom()
        .setConnectionTimeToLive(1, TimeUnit.MINUTES)
        .build();
    ```

    ## After
    ```java
    ConnectionConfig.custom()
        .setTimeToLive(TimeValue.ofMinutes(10))
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setConnectionTimeToLive
        location: METHOD_CALL
- ruleID: httpclient4-to-httpclient5-00200
  description: setConnectTimeout() moved from RequestConfig to ConnectionConfig in 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpclient
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpclient
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `setConnectTimeout()` method has moved from `RequestConfig` to `ConnectionConfig` in HttpClient 5.x. Additionally, the parameter type changed from `int` (milliseconds) to `Timeout`.

    ## Before
    ```java
    RequestConfig.custom()
        .setConnectTimeout(60000)
        .build();
    ```

    ## After
    ```java
    ConnectionConfig.custom()
        .setConnectTimeout(Timeout.ofMinutes(1))
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setConnectTimeout
        location: METHOD_CALL
