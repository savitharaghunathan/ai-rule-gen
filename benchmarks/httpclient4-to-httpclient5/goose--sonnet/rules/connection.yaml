- ruleID: httpclient4-to-httpclient5-00100
  description: closeExpiredConnections() renamed to closeExpired() in 5.x
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpclient
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpclient
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `closeExpiredConnections()` method on `HttpClientConnectionManager` has been renamed to `closeExpired()` on the `ConnPoolControl` interface in HttpClient 5.x.

    ## Before
    ```java
    connectionManager.closeExpiredConnections();
    ```

    ## After
    ```java
    connectionManager.closeExpired();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: closeExpiredConnections
        location: METHOD_CALL
- ruleID: httpclient4-to-httpclient5-00110
  description: closeIdleConnections() renamed to closeIdle() in 5.x
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpclient
    - konveyor.io/target=httpclient5
