- ruleID: httpclient4-to-httpclient5-00020
  description: httpclient 4.x artifact replaced by org.apache.hc.client5:httpclient5
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/source=httpclient
    - konveyor.io/target=httpclient5
    - konveyor.io/target=httpclient
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The Apache HttpClient 4.x dependency `org.apache.httpcomponents:httpclient` has been replaced by `org.apache.hc.client5:httpclient5` in HttpClient 5.x. Replace the old dependency in your `pom.xml` with the new Maven coordinates.

    ## Before
    ```xml
    <dependency>
        <groupId>org.apache.httpcomponents</groupId>
        <artifactId>httpclient</artifactId>
        <version>4.5.14</version>
    </dependency>
    ```

    ## After
    ```xml
    <dependency>
        <groupId>org.apache.hc.client5</groupId>
        <artifactId>httpclient5</artifactId>
        <version>5.4</version>
    </dependency>
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.4.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.dependency:
        name: org.apache.httpcomponents.httpclient
        lowerbound: 0.0.0
