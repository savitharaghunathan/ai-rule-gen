- ruleID: httpclient-4-to-httpclient-5-00160
  description: HttpPost constructor replaced by ClassicRequestBuilder factory method in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    In HttpClient 5.x, `new HttpPost(url)` should be replaced with `ClassicRequestBuilder.post(url).setEntity(...).build()`. The `ClassicRequestBuilder` API provides a fluent builder pattern for constructing HTTP requests.

    Before:
    ```java
    HttpPost httpPost = new HttpPost("https://example.com/post");
    httpPost.setEntity(requestEntity);
    ```
    After:
    ```java
    ClassicHttpRequest httpPost = ClassicRequestBuilder.post("https://example.com/post")
        .setEntity(HttpEntities.create(outstream -> { ... }, ContentType.APPLICATION_JSON))
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.client.methods.HttpPost
        location: CONSTRUCTOR_CALL
- ruleID: httpclient-4-to-httpclient-5-00220
  description: RequestConfig.normalizeUri property removed in HttpClient 5.x; URIUtils.normalizeSyntax is no longer public
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: The `normalizeUri` property has been removed from `RequestConfig` in HttpClient 5.x, and `URIUtils.normalizeSyntax` is no longer public. The 5.x `URIBuilder` in httpcomponents-core provides a new public `normalizeSyntax()` method (deprecated since 5.3 and renamed to `optimize()`) that strives for more thorough RFC 3986 support with percent-encoding all components. Note the behavior differs from 4.x — review your URI normalization requirements carefully before migrating.
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.client.config.RequestConfig.Builder.normalizeUri
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00230
  description: URIUtils.normalizeSyntax() is no longer public in HttpClient 5.x; use URIBuilder.normalize()/optimize()
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: The `URIUtils` class from HttpClient 4.x has `normalizeSyntax()` as a public method. In HttpClient 5.x, `URIUtils.normalizeSyntax` is no longer public. Use `URIBuilder.normalizeSyntax()` (deprecated since 5.3) or its replacement `URIBuilder.optimize()` from `org.apache.hc.core5.net.URIBuilder` instead. Note that 5.x normalization behavior differs from 4.x.
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.util.URIUtils
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00240
  description: BasicHttpContext replaced by HttpCoreContext / HttpClientContext in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `BasicHttpContext` class has been replaced in HttpClient 5.x. Depending on the use case:
    - For core HTTP context: use `org.apache.hc.core5.http.protocol.HttpCoreContext`
    - For client-side context (cookies, credentials, etc.): use `org.apache.hc.client5.http.protocol.HttpClientContext`

    Before:
    ```java
    BasicHttpContext context = new BasicHttpContext();
    ```
    After:
    ```java
    HttpClientContext context = HttpClientContext.create();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.protocol.BasicHttpContext
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00270
  description: HttpClients.custom().addInterceptorLast() replaced by addExecInterceptorFirst() in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `addInterceptorLast()` method on `HttpClientBuilder` has been replaced by `addExecInterceptorFirst(name, interceptor)` in HttpClient 5.x. Note: for logging interceptors in particular, use `addExecInterceptorFirst` (not last) to avoid logging compressed payload data.

    Before:
    ```java
    HttpClients.custom().addInterceptorLast(someLoggingInterceptor)
    ```
    After:
    ```java
    HttpClients.custom().addExecInterceptorFirst("logging", someLoggingInterceptor)
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.impl.client.HttpClientBuilder.addInterceptorLast
        location: METHOD_CALL
