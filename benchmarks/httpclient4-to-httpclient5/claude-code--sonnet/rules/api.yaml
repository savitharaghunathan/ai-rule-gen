- ruleID: httpclient-4-to-httpclient-5-00290
  description: HttpEntityEnclosingRequest interface replaced by HttpEntityContainer in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `HttpEntityEnclosingRequest` interface has been removed in HttpClient 5.x. Use `HttpEntityContainer` instead. In HttpClient 5.x, request entities can be enclosed with any HTTP method regardless of semantic conventions.

    Before:
    ```java
    if (request instanceof HttpEntityEnclosingRequest) {
        HttpEntity entity = ((HttpEntityEnclosingRequest) request).getEntity();
    }
    ```
    After:
    ```java
    if (request instanceof HttpEntityContainer) {
        HttpEntity entity = ((HttpEntityContainer) request).getEntity();
    }
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.client.methods.HttpEntityEnclosingRequest
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00300
  description: HttpMessage.getAllHeaders() renamed to MessageHeaders.getHeaders() in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `getAllHeaders()` method on `HttpMessage` has been renamed to `getHeaders()` in HttpClient 5.x. The owning interface has also changed from `HttpMessage` to `MessageHeaders`.

    Before:
    ```java
    Header[] headers = response.getAllHeaders();
    ```
    After:
    ```java
    Header[] headers = response.getHeaders();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.HttpMessage.getAllHeaders
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00310
  description: HttpRequest.getRequestLine() removed in HttpClient 5.x; wrap with new RequestLine(request)
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `getRequestLine()` method has been removed from `HttpRequest` in HttpClient 5.x. To get request line information, wrap the request with `new RequestLine(request)`.

    Before:
    ```java
    RequestLine line = request.getRequestLine();
    ```
    After:
    ```java
    RequestLine line = new RequestLine(request);
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.HttpRequest.getRequestLine
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00320
  description: HttpRequestBase renamed to HttpUriRequestBase in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `HttpRequestBase` class has been renamed to `HttpUriRequestBase` in HttpClient 5.x. Update your class hierarchy and any `instanceof` checks.

    Before:
    ```java
    HttpRequestBase request = ...;
    if (request instanceof HttpRequestBase) { ... }
    ```
    After:
    ```java
    HttpUriRequestBase request = ...;
    if (request instanceof HttpUriRequestBase) { ... }
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.client.methods.HttpRequestBase
        location: IMPORT
- ruleID: httpclient-4-to-httpclient-5-00420
  description: HttpResponse.getEntity() removed in HttpClient 5.x; cast response to ClassicHttpResponse
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `getEntity()` method has been removed from `org.apache.http.HttpResponse` in HttpClient 5.x. In 5.x the abstract `HttpResponse` interface no longer carries an entity — only `ClassicHttpResponse` (which implements `HttpEntityContainer`) does. Cast your response to `ClassicHttpResponse` before calling `getEntity()`.

    ```java
    // HttpClient 4.x
    HttpEntity entity = response.getEntity();

    // HttpClient 5.x
    HttpEntity entity = ((ClassicHttpResponse) response).getEntity();
    ```

    Note: the PACKAGE-level rule fires on `HttpResponse` imports; this rule additionally catches every call site where `getEntity()` is invoked on an `HttpResponse`-typed variable.
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.HttpResponse.getEntity
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00430
  description: StatusLine interface removed from org.apache.http in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `org.apache.http.StatusLine` interface has been removed in HttpClient 5.x. Code that stores or passes a `StatusLine` object must be updated. Two options:

    1. **Native 5.x style** — access status code and reason directly on the response:
    ```java
    // HttpClient 4.x
    StatusLine statusLine = response.getStatusLine();
    int code = statusLine.getStatusCode();
    String reason = statusLine.getReasonPhrase();

    // HttpClient 5.x
    int code = response.getCode();
    String reason = response.getReasonPhrase();
    ```

    2. **Compatibility shim** — wrap the response with the new `StatusLine` class provided by HttpClient 5.x:
    ```java
    // HttpClient 5.x compat
    StatusLine statusLine = new org.apache.hc.core5.http.message.StatusLine(response);
    ```

    The compat `StatusLine` is in `org.apache.hc.core5.http.message.StatusLine`, not the old `org.apache.http.StatusLine`.
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.StatusLine
        location: IMPORT
