- ruleID: httpclient-4-to-httpclient-5-00050
  description: setConnectTimeout(int) moved from RequestConfig to ConnectionConfig with Timeout parameter in HttpClient 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `setConnectTimeout(int milliseconds)` has been removed from `RequestConfig` in HttpClient 5.x and moved to `ConnectionConfig` with a `Timeout` parameter type. Replace:

    ```java
    // HttpClient 4.x
    RequestConfig config = RequestConfig.custom()
        .setConnectTimeout(60000)
        .build();
    ```

    with:

    ```java
    // HttpClient 5.x
    ConnectionConfig connConfig = ConnectionConfig.custom()
        .setConnectTimeout(Timeout.ofSeconds(60))
        .build();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: setConnectTimeout
        location: METHOD_CALL
