- ruleID: httpclient-4-to-httpclient-5-00250
  description: HttpClientConnectionManager.closeExpiredConnections() renamed to ConnPoolControl.closeExpired() in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `closeExpiredConnections()` method has been removed from `HttpClientConnectionManager` in HttpClient 5.x. Use `ConnPoolControl.closeExpired()` instead. The `PoolingHttpClientConnectionManager` implements `ConnPoolControl` and can be cast to it, or stored as `ConnPoolControl` directly.

    Before:
    ```java
    connectionManager.closeExpiredConnections();
    ```
    After:
    ```java
    connectionManager.closeExpired(); // via ConnPoolControl
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.conn.HttpClientConnectionManager.closeExpiredConnections
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00260
  description: HttpClientConnectionManager.closeIdleConnections() renamed to ConnPoolControl.closeIdle() in HttpClient 5.x
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `closeIdleConnections(long, TimeUnit)` method has been removed from `HttpClientConnectionManager` in HttpClient 5.x. Use `ConnPoolControl.closeIdle(TimeValue)` instead.

    Before:
    ```java
    connectionManager.closeIdleConnections(30, TimeUnit.SECONDS);
    ```
    After:
    ```java
    connectionManager.closeIdle(TimeValue.ofSeconds(30)); // via ConnPoolControl
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.conn.HttpClientConnectionManager.closeIdleConnections
        location: METHOD_CALL
