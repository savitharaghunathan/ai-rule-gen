- ruleID: httpclient-4-to-httpclient-5-00030
  description: Apache HttpClient 4.x (org.apache.http) package namespace replaced by org.apache.hc in 5.x
  category: mandatory
  effort: 5
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    All Apache HttpClient 4.x classes in the `org.apache.http` package namespace have been relocated to the `org.apache.hc` namespace in HttpClient 5.x. Update all import statements from `org.apache.http.*` to the corresponding `org.apache.hc.*` classes. For example:
    - `org.apache.http.client.methods.HttpGet` → `org.apache.hc.client5.http.classic.methods.HttpGet`
    - `org.apache.http.impl.client.HttpClients` → `org.apache.hc.client5.http.impl.classic.HttpClients`
    - `org.apache.http.HttpResponse` → `org.apache.hc.core5.http.ClassicHttpResponse`

    See the migration guide for the full class mapping.
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http*
        location: PACKAGE
- ruleID: httpclient-4-to-httpclient-5-00040
  description: HttpResponse.getStatusLine() removed in HttpClient 5.x; use getCode() and getReasonPhrase()
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    The `getStatusLine()` method on `HttpResponse` has been removed in HttpClient 5.x. The `StatusLine` class no longer exists. Replace:

    ```java
    // HttpClient 4.x
    int code = response.getStatusLine().getStatusCode();
    String reason = response.getStatusLine().getReasonPhrase();
    ```

    with:

    ```java
    // HttpClient 5.x
    int code = response.getCode();
    String reason = response.getReasonPhrase();
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.HttpResponse.getStatusLine
        location: METHOD_CALL
- ruleID: httpclient-4-to-httpclient-5-00110
  description: CookieSpecs / StandardCookieSpec relocated from org.apache.http to org.apache.hc in HttpClient 5.x
  category: mandatory
  effort: 1
  labels:
    - konveyor.io/source=httpclient-4
    - konveyor.io/target=httpclient-5
    - konveyor.io/generated-by=ai-rule-gen
  message: |-
    `org.apache.http.client.config.CookieSpecs` has been replaced by `org.apache.hc.client5.http.cookie.StandardCookieSpec` in HttpClient 5.x. Update imports and usage:

    ```java
    // HttpClient 4.x
    RequestConfig.custom().setCookieSpec(CookieSpecs.STANDARD_STRICT)

    // HttpClient 5.x
    RequestConfig.custom().setCookieSpec(StandardCookieSpec.STRICT)
    ```
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.6.x/migration-guide
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.client.config.CookieSpecs
        location: IMPORT
