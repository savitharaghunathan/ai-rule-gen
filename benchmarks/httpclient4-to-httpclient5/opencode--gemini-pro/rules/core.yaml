- ruleID: httpclient4-to-httpclient5-00270
  description: HttpPost constructor replaced by RequestBuilder methods
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/target=httpclient5
    - konveyor.io/generated-by=ai-rule-gen
  message: In HttpClient 5.x classic APIs, use `ClassicRequestBuilder.post(...)` instead of `new HttpPost(...)`. For async APIs, use `SimpleRequestBuilder.post(...)` or `BasicRequestBuilder.post(...)`.
  when:
    java.referenced:
        pattern: org.apache.http.client.methods.HttpPost
        location: IMPORT
