- ruleID: httpclient4-to-httpclient5-00220
  description: SSLConnectionSocketFactory replaced by ClientTlsStrategyBuilder
  category: mandatory
  effort: 3
  labels:
    - konveyor.io/source=httpclient4
    - konveyor.io/target=httpclient5
    - konveyor.io/generated-by=ai-rule-gen
  message: In HttpClient 5.x, SSLConnectionSocketFactory is replaced by `ClientTlsStrategyBuilder` (or `DefaultClientTlsStrategy`) for configuring SSL/TLS.
  links:
    - url: https://hc.apache.org/httpcomponents-client-5.1.x/migration-guide/migration-to-classic.html
      title: Migration Documentation
  when:
    java.referenced:
        pattern: org.apache.http.conn.ssl.SSLConnectionSocketFactory
        location: IMPORT
