  case-005-junit4-to-junit5:
    budget_check:
      judge_type: builtin
      rationale: Cost $7.78 within budget $35.00
      value: true
    extraction_completeness:
      judge_type: llm
      rationale: 'The patterns.json comprehensively captures virtually all migration
        artifacts from the guide. All annotation changes are covered: @Test (org.junit.Test
        → org.junit.jupiter.api.Test), @Before → @BeforeEach, @After → @AfterEach,
        @BeforeClass → @BeforeAll, @AfterClass → @AfterAll, @Ignore → @Disabled, @Category
        → @Tag, @RunWith → @ExtendWith, @Rule → @ExtendWith, @ClassRule → @ExtendWith.
        The @Test expected/timeout parameter removal is thoroughly documented in the
        @Test pattern''s message. Class-level changes are captured: Assert → Assertions,
        Assume → Assumptions. The TestRule interface migration to extension callbacks
        is captured. Build configuration changes (surefire <groups> → <includeTags>/<excludeTags>)
        have a dedicated pattern. The junit:junit dependency migration and junit-vintage-engine
        transitional dependency are both captured. The only remaining coverage gaps
        identified by the system were standard library references (Integer, Arrays)
        and generic POM structural elements (build, plugins) which are not migration
        artifacts. Every before/after code example difference in the guide has a corresponding
        pattern with detailed messages including equivalent before/after examples.'
      value: 5
    patterns_quality:
      judge_type: check
      rationale: 15 patterns extracted with all required fields
      value: true
    report_exists:
      judge_type: check
      rationale: 'report.yaml valid: 15 rules, 0% pass rate'
      value: true
    rule_correctness:
      judge_type: llm
      rationale: All 9 sampled rules demonstrate accurate source-side when conditions
        with correct FQNs, location types, and provider types. Messages are thorough
        with clear before/after code examples, explanations of what changed and why,
        and practical migration guidance. Documentation URLs point to specific sections
