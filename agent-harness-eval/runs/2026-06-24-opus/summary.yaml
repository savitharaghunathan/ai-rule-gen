    budget_check:
      judge_type: builtin
      rationale: Cost $7.41 within budget $35.00
      value: true
    extraction_completeness:
      judge_type: llm
      rationale: 'Good coverage with 11 of 13 actionable migration artifacts captured.
        All five javax-to-jakarta package renames, GenericPrincipal.getPassword()
        removal, web.xml defaults, session management, access log pattern change,
        and all four 10.0.x notable changes are properly extracted. Two concrete sections
        are missing: (1) HTTP/2 connector configuration deduplication change, and
        (2) logging behavioral change about log files only being created when there
        is content to write. The general ''System properties'' section guidance about
        properties being replaced with component attributes is also only partially
        addressed (one specific property captured, but not the general pattern). These
        are minor but non-trivial omissions.'
      value: 4
    patterns_quality:
      judge_type: check
      rationale: 13 patterns extracted with all required fields
      value: true
    report_exists:
      judge_type: check
      rationale: No report.yaml found in output
      value: false
    rule_correctness:
      judge_type: llm
      rationale: 'All sampled rules have accurate source-side when conditions, clear
        before/after code examples, and specific documentation URLs. Categories and
        effort levels are reasonable throughout. Minor issues include: (1) potential
        overlap between javax.servlet* and javax.servlet.jsp* patterns, (2) the session
        rule detects Manager presence rather than absence (slightly inverted logic),
        (3) two Tomcat internal artifact versions (9.0.0) don''t exist on Maven Central
        (should be 9.0.1+), and (4) the %D filecontent pattern is short enough to
        risk false positives. These are minor and don''t undermine the overall quality.'
      value: 4
    rules_generated:
      judge_type: check
      rationale: 11 rule files, sampled 6 valid rules
      value: true
    test_coverage:
