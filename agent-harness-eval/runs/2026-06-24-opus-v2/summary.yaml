  case-004-tomcat9-to-tomcat10:
    budget_check:
      judge_type: builtin
      rationale: Cost $7.18 within budget $35.00
      value: true
    extraction_completeness:
      judge_type: llm
      rationale: 'The output captures the vast majority of migration artifacts from
        the guide. All 5 package rename changes (javax.servlet→jakarta.servlet, javax.servlet.jsp→jakarta.servlet.jsp,
        javax.el→jakarta.el, javax.websocket→jakarta.websocket, javax.security.auth.message→jakarta.security.auth.message)
        are captured. The GenericPrincipal.getPassword() removal, web.xml default
        encoding change, session persistence default change, HTTP/2 connector deduplication,
        access log %D pattern change, AsyncLoggerPollInterval removal, HostConfig.check()
        semantics change, CONFIDENTIAL transport-guarantee caching change, and multi-part
        upload direct memory requirement are all covered. Minor omissions include:
        (1) The ''System properties'' section mentions broadly that many Tomcat-specific
        system properties were replaced with component attributes, but no specific
        pattern captures this general change beyond AsyncLoggerPollInterval. (2) The
        ''Logging'' section notes that the logging implementation now only creates
        log files once there is something to write - this behavioral change has no
        pattern. (3) The ''Internal APIs'' section notes broad incompatibility beyond
        just GenericPrincipal.getPassword(), but this is inherently vague. (4) The
        legacyAppBase/webapps-javaee deployment-time conversion mechanism is mentioned
        in the guide but not captured as a distinct pattern (though it''s referenced
        in the servlet-import-00010 message). These are relatively minor gaps - the
        system properties and logging file creation changes are the most notable concrete
        omissions.'
      value: 4
    patterns_quality:
      judge_type: check
      rationale: 14 patterns extracted with all required fields
      value: true
    report_exists:
      judge_type: check
      rationale: 'report.yaml valid: 14 rules, 100% pass rate'
      value: true
    rule_correctness:
      judge_type: llm
      rationale: 'I reviewed all 10 rule YAML files (config.yaml with 2 rules, deployment.yaml,
        el.yaml, jsp.yaml, logging.yaml with 2 rules, security.yaml with 3 rules,
        servlet.yaml with 2 rules, session.yaml, websocket.yaml). Here is the assessment:\n\n**When
        condition accuracy**: All rules correctly match source-side (Tomcat 9 / javax)
        artifacts. The java.referenced rules use correct patterns like `javax.servlet*`
        (PACKAGE), `javax.el*` (PACKAGE), `javax.websocket*` (PACKAGE), `org.apache.catalina.realm.GenericPrincipal.getPassword`
        (METHOD_CALL), `javax.servlet.annotation.MultipartConfig` (ANNOTATION). The
        builtin rules appropriately use `builtin.xml` with XPath for web.xml elements
        and `builtin.filecontent` with regex patterns for server.xml and properties
        files. No rule matches target-side code.\n\n**Message quality**: Every rule
        provides clear explanation of WHAT changed, WHY (migration from Java EE to
        Jakarta EE, or Tomcat behavioral changes), and HOW to migrate with specific
        steps. The core namespace migration rules (servlet, jsp, el, websocket, security-import)
        all include well-formatted before/after Java code examples. Even non-code
        rules like config-xml-00010, logging-pattern-00010, and config-pattern-00010
        include before/after XML examples or clear migration steps. The GenericPrincipal.getPassword
        rule explains the removal and suggests alternative approaches.\n\n**Documentation
        URLs**: All URLs point to specific sections of the migration guide (e.g.,
        `migration-10.html#Servlet_5.0_API`, `migration-10.html#Pages_3.0`, `migration-10.html#Expression_Language_4.0`,
        `migration-10.html#Internal_APIs`, `migration-10.html#Access_Log_Patterns`).
        The CONFIDENTIAL transport-guarantee rule links to the specific Bugzilla issue.
        None are generic homepage links.\n\n**Category and effort**: Mandatory category
        is correctly applied to the namespace changes (javax→jakarta) and the removed
        API (GenericPrincipal.getPassword). Potential category is correctly used for
        behavioral changes (encoding defaults, session persistence, HTTP/2 config,
        access log patterns, caching behavior). Effort values are reasonable: 5 for
        code changes requiring recompilation, 3 for configuration review, 1 for trivial
        pattern/property changes.\n\n**No hallucinations**: All source artifacts are
        verified real - javax.servlet-api:4.0.1, javax.servlet.jsp-api:2.3.3, javax.el-api:3.0.0,
        javax.websocket-api:1.1, javax.security.auth.message-api:1.1 all exist. GenericPrincipal.getPassword()
        exists in Tomcat 9''s catalina. HostConfig.check() exists. StandardManager
        exists. The verify-results.json confirms 9 verified, 0 not_found. All 14 tests
        pass at 100%.\n\nThe only very minor observation is that the servlet-import-00010
        rule with `javax.servlet*` pattern could theoretically also match `javax.servlet.jsp*`
        packages, but the JSP rule with `javax.servlet.jsp*` provides more specific
        guidance, so both firing is actually beneficial. This is a negligible concern
        that doesn''t affect correctness.'
      value: 5
    rules_generated:
      judge_type: check
      rationale: 9 rule files, sampled 7 valid rules
      value: true
    test_coverage:
      judge_type: check
      rationale: 10 test files, 60 data files, 14 rules in manifest
      value: true
  case-005-junit4-to-junit5:
    budget_check:
      judge_type: builtin
      rationale: Cost $7.54 within budget $35.00
      value: true
    extraction_completeness:
      judge_type: llm
      rationale: 'The patterns.json captures the vast majority of migration artifacts
        from the guide. All annotation renames are covered (@Test, @Before/@BeforeEach,
        @After/@AfterEach, @BeforeClass/@BeforeAll, @AfterClass/@AfterAll, @Ignore/@Disabled).
        The @RunWith→@ExtendWith, @Category→@Tag, @Rule/@ClassRule removal, TestRule→extension
        interfaces, Assert→Assertions, Assume→Assumptions, SpringJUnit4ClassRunner→SpringExtension,
        Parameterized→@ParameterizedTest, and the junit:junit dependency are all captured.
        Minor omissions include: (1) The @Test(expected=...) → assertThrows() and
        @Test(timeout=...) → assertTimeout() behavioral changes are mentioned in messages
        but not as separate dedicated patterns with their own source_fqn targeting
        the specific attribute usage; (2) The JUnit Vintage Engine dependency (junit-vintage-engine)
        mentioned in section 3.7 is not captured as a separate pattern — it''s only
        referenced in the dependency migration message; (3) The assertAll() grouped
        assertions feature from section 3.2 and assumingThat() from section 3.3 are
        new JUnit 5 features mentioned in messages but don''t need separate source
        patterns since they''re additions not migrations; (4) The maven-surefire-plugin
        configuration change (includeTags/excludeTags) from section 3.4 is not captured
        as a separate pattern. Overall coverage is strong at roughly 90%, with the
        omissions being mostly secondary/contextual items rather than primary migration
        artifacts.'
      value: 4
    patterns_quality:
      judge_type: check
      rationale: 16 patterns extracted with all required fields
      value: true
    report_exists:
      judge_type: check
      rationale: 'report.yaml valid: 16 rules, 93.75% pass rate'
      value: true
    rule_correctness:
      judge_type: llm
      rationale: All sampled rules have accurate source-side when conditions with
        correct location types (ANNOTATION, IMPORT, IMPLEMENTS_TYPE). Every rule includes
        clear before/after code examples, explains what changed and how to migrate,
        and references specific documentation sections. All source FQNs are verified
        real artifacts from JUnit 4.13.2 and Spring Test. Category (mandatory) and
        effort values are well-calibrated to complexity. The single test failure (dependencies-dependency-00010)
        is a kantra test infrastructure issue (missing Eclipse project files), not
        a rule defect. No hallucinated classes or methods were found in any rule.
      value: 5
    rules_generated:
      judge_type: check
      rationale: 4 rule files, sampled 16 valid rules
      value: true
    test_coverage:
      judge_type: check
      rationale: 5 test files, 35 data files, 16 rules in manifest
      value: true
